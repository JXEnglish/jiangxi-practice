hai, but her family moved to Beijing two years ago.","o":["A. uses","B. use","C. used","D. using"],"a":"C","e":"used to do 过去住在……。","t":"📋 rj8b_U1语法"},{"s":"She ___ to the library every weekend. It's her favourite place.","o":["A. is going","B. went","C. goes","D. go"],"a":"C","e":"every weekend 表示经常性动作，一般现在时。主语She → goes。","t":"📋 rj8b_U1语法"},{"s":"___ is the traditional art of beautiful handwriting with a brush.","o":["A. Poem","B. Calligraphy","C. Yoga","D. Stroke"],"a":"B","e":"calligraphy 书法。","t":"📋 rj8b_U1词汇"},{"s":"We went on an ___ to the mountains last Sunday and had great fun.","o":["A. deal","B. outing","C. hobby","D. chat"],"a":"B","e":"outing 远足；出外游玩。","t":"📋 rj8b_U1词汇"},{"s":"We ___ a wonderful time at the party last night.","o":["A. are having","B. had","C. has","D. have"],"a":"B","e":"last night 过去时间，用一般过去时 had a wonderful time。","t":"📋 rj8b_U1语法"},{"s":"Taking a short walk can help ___ stress after a long day.","o":["A. push","B. express","C. manage","D. reduce"],"a":"D","e":"reduce 减少。reduce stress 减轻压力。","t":"📋 rj8b_U1词汇"},{"s":"— I'm feeling stressed about the exam.\n— ___","o":["A. I don't care.","B. Why not take a break and relax?","C. The exam is easy.","D. You should study harder."],"a":"B","e":"给出建议：Why not + 动词原形。","t":"📋 rj8b_U1情景"},{"s":"Please ___ your name on the paper.","o":["A. copy","B. write","C. paint","D. draw"],"a":"B","e":"write name 写名字。draw是\"画画\"，paint是\"刷漆/油画\"，copy是\"复制\"。","t":"📋 rj8b_U1辨析"},{"s":"She likes ___ poems about the beauty of nature.","o":["A. writing","B. to write","C. write","D. wrote"],"a":"A","e":"like doing sth 喜欢做某事。","t":"📋 rj8b_U1语法"},{"s":"I enjoy having a ___ with my friends online after finishing homework.","o":["A. hobby","B. outing","C. chat","D. deal"],"a":"C","e":"chat 闲聊。have a chat 聊天。","t":"📋 rj8b_U1词汇"},{"s":"Last summer, my family ___ to Beijing and visited the Great Wall.","o":["A. goes","B. are going","C. go","D. went"],"a":"D","e":"last summer 是过去时间，用一般过去时 went。","t":"📋 rj8b_U1语法"}]},"rj8b_U2":{"id":"rj8b_U2","n":"U2 · Stay Healthy","d":"情态动词 should/shouldn't; 祈使句 · 66词 · 42题","dd":"情态动词 should/shouldn't; 祈使句","ps":35,"q":[{"s":"You ___ better take an umbrella with you. It looks like it's going to rain.","o":["A. could","B. had","C. would","D. should"],"a":"B","e":"had better do sth 最好做某事。","t":"📋 rj8b_U2语法"},{"s":"We ___ better hurry, or we'll miss the last bus home.","o":["A. could","B. should","C. had","D. would"],"a":"C","e":"had better do 最好做某事。","t":"📋 rj8b_U2语法"},{"s":"___ I take this medicine before or after meals?","o":["A. Should","B. Need","C. Must","D. Could"],"a":"A","e":"Should I...? 询问建议。","t":"📋 rj8b_U2语法"},{"s":"— How long have you lived here?\n— ___","o":["A. In 2019.","B. Since five years.","C. Five years ago.","D. For about five years."],"a":"D","e":"How long 提问持续时长。for + 时间段；since + 时间点。回答不能说since five years。","t":"📋 rj8b_U2情景"},{"s":"You ___ drink more water when you have a fever.","o":["A. must to","B. need to be","C. can to be","D. should"],"a":"D","e":"should + 动词原形表示建议。","t":"📋 rj8b_U2语法"},{"s":"You ___ stay up too late the night before an important exam.","o":["A. should","B. shouldn't","C. mustn't to","D. don't need"],"a":"B","e":"shouldn't 表示不应该做某事。","t":"📋 rj8b_U2语法"},{"s":"Could you ___ me your new phone?","o":["A. watch","B. show","C. see","D. look"],"a":"B","e":"show sb sth 给某人看。see是\"看见\"，look是\"看\"（不及物），watch是\"观看\"。","t":"📋 rj8b_U2辨析"},{"s":"We ___ throw rubbish into the river. It pollutes the water.","o":["A. can't to","B. must","C. shouldn't","D. should"],"a":"C","e":"shouldn't 表示\"不应该\"，用于否定建议。","t":"📋 rj8b_U2语法"},{"s":"— What's your hobby?\n— ___","o":["A. I enjoy collecting old coins.","B. I am 15 years old.","C. My name is Li Hua.","D. I go to school by bus."],"a":"A","e":"回答爱好：I enjoy + doing sth。","t":"📋 rj8b_U2情景"},{"s":"Please ___ attention to the teacher when she explains the grammar rules.","o":["A. make","B. pay","C. put","D. give"],"a":"B","e":"pay attention to 注意","t":"📋 rj8b_U2搭配"},{"s":"Children ___ drink coffee — it's not good for their growing bodies.","o":["A. should","B. needn't to","C. mustn't to","D. shouldn't"],"a":"D","e":"shouldn't 表示不应该，比mustn't语气委婉。","t":"📋 rj8b_U2语法"},{"s":"She ___ better not eat that — it's been sitting in the fridge for a week.","o":["A. could","B. would","C. should","D. had"],"a":"D","e":"had better not do 最好不要做。","t":"📋 rj8b_U2语法"},{"s":"He caught a bad ___ and had to miss a whole week of school.","o":["A. flu","B. cold","C. cough","D. fever"],"a":"A","e":"flu 流感。catch a flu 得流感。","t":"📋 rj8b_U2词汇"},{"s":"He ___ see a doctor if the pain doesn't go away in two days.","o":["A. needs","B. should","C. could to","D. must to"],"a":"B","e":"should + 动词原形，提出建议。","t":"📋 rj8b_U2语法"},{"s":"The doctor asked the ___ to take the medicine three times a day.","o":["A. patient","B. visitor","C. doctor","D. dentist"],"a":"A","e":"patient 病人。","t":"📋 rj8b_U2词汇"},{"s":"— Have you ever been to the Great Wall?\n— ___","o":["A. I'm not sure.","B. Yes, I go every day.","C. No, I will go tomorrow.","D. Yes, I went there last summer."],"a":"D","e":"现在完成时问经历，回答用一般过去时说明具体时间。","t":"📋 rj8b_U2情景"},{"s":"You look tired. You ___ go to bed early tonight.","o":["A. need","B. can to","C. must to","D. should"],"a":"D","e":"should + 动词原形，表示建议\"应该\"。","t":"📋 rj8b_U2语法"},{"s":"We've ___ out of milk. Could you buy some on your way home?","o":["A. put","B. take","C. make","D. run"],"a":"D","e":"run out of 用完","t":"📋 rj8b_U2搭配"},{"s":"We all ___ a good time at the beach party last Sunday.","o":["A. have","B. do","C. make","D. take"],"a":"A","e":"have a good time 玩得开心","t":"📋 rj8b_U2搭配"},{"s":"___ your hands carefully before you eat anything.","o":["A. Wash","B. Washed","C. To wash","D. Washing"],"a":"A","e":"祈使句以动词原形开头。","t":"📋 rj8b_U2语法"},{"s":"— I'm feeling stressed about the exam.\n— ___","o":["A. Why not take a break and relax?","B. The exam is easy.","C. You should study harder.","D. I don't care."],"a":"A","e":"给出建议：Why not + 动词原形。","t":"📋 rj8b_U2情景"},{"s":"She ___ take a short break after studying for two hours without rest.","o":["A. should","B. needs to be","C. must to","D. could to"],"a":"A","e":"should 表示建议。","t":"📋 rj8b_U2语法"},{"s":"She ___ the first prize in the competition.","o":["A. beat","B. failed","C. won","D. lost"],"a":"C","e":"win a prize 获奖。beat + 对手（打败某人）。","t":"📋 rj8b_U2辨析"},{"s":"You ___ skip breakfast. It's the most important meal of the day.","o":["A. can't to","B. needn't to","C. shouldn't","D. should"],"a":"C","e":"shouldn't skip breakfast 不应该跳过早餐。","t":"📋 rj8b_U2语法"},{"s":"The doctor sent him for an ___ to check if the bone was broken.","o":["A. medicine","B. pill","C. test","D. X-ray"],"a":"D","e":"X-ray X射线检查。","t":"📋 rj8b_U2词汇"},{"s":"We ___ ignore the doctor's advice about getting enough sleep.","o":["A. mustn't to","B. shouldn't","C. don't need","D. should"],"a":"B","e":"shouldn't ignore 不应该忽视。","t":"📋 rj8b_U2语法"},{"s":"We ___ eat more vegetables and less junk food to keep fit.","o":["A. should","B. could to","C. must to","D. need to be"],"a":"A","e":"should 表示健康饮食建议。","t":"📋 rj8b_U2语法"},{"s":"I ___ my keys everywhere but couldn't find them.","o":["A. searched","B. discovered","C. looked for","D. found"],"a":"C","e":"look for 寻找（过程），find 找到（结果）。句意是找的过程。","t":"📋 rj8b_U2辨析"},{"s":"He ___ better take the medicine on time if he wants to get better soon.","o":["A. had","B. would","C. could","D. should"],"a":"A","e":"had better do 最好做某事。常用于给出强烈建议。","t":"📋 rj8b_U2语法"},{"s":"He ___ eat so much junk food. It's bad for his health.","o":["A. should","B. doesn't need","C. shouldn't","D. mustn't to"],"a":"C","e":"shouldn't 表示\"不应该\"。","t":"📋 rj8b_U2语法"},{"s":"She has a ___ nose and has been sneezing all morning.","o":["A. weak","B. runny","C. painful","D. sore"],"a":"B","e":"runny 流鼻涕的。runny nose 流鼻涕。","t":"📋 rj8b_U2词汇"},{"s":"My ___ hurts — I think I ate too much ice cream.","o":["A. throat","B. elbow","C. stomach","D. cheek"],"a":"C","e":"stomach 胃；腹部。","t":"📋 rj8b_U2词汇"},{"s":"She has a high ___ and needs to stay in bed for a couple of days.","o":["A. flu","B. cough","C. fever","D. pain"],"a":"C","e":"fever 发烧。high fever 高烧。","t":"📋 rj8b_U2词汇"},{"s":"His throat was ___ from shouting too much at the football game.","o":["A. runny","B. sore","C. weak","D. painful"],"a":"B","e":"sore 疼痛的。sore throat 喉咙痛。","t":"📋 rj8b_U2词汇"},{"s":"I have a terrible ___ — my head feels like it's going to explode.","o":["A. stomachache","B. backache","C. toothache","D. headache"],"a":"D","e":"headache 头痛。","t":"📋 rj8b_U2词汇"},{"s":"The doctor gave me some ___ for my cough and said I should rest.","o":["A. fever","B. test","C. medicine","D. pill"],"a":"C","e":"medicine 药。take medicine 服药。","t":"📋 rj8b_U2词汇"},{"s":"___ too much time on video games. Go outside and get some fresh air.","o":["A. No spend","B. Don't spend","C. Not spend","D. Spend not"],"a":"B","e":"否定祈使句：Don't + 动词原形。","t":"📋 rj8b_U2语法"},{"s":"— I can't sleep well at night. What ___ I do?\n— You ___ try drinking warm milk before bed.","o":["A. need; need","B. could; could","C. should; should","D. must; must"],"a":"C","e":"should 用于询问和给出建议。","t":"📋 rj8b_U2语法"},{"s":"___ enough water every day to keep your body working well.","o":["A. To drink","B. Drunk","C. Drinking","D. Drink"],"a":"D","e":"祈使句以动词原形开头表建议。","t":"📋 rj8b_U2语法"},{"s":"If you have a ___, you should go to the dentist as soon as possible.","o":["A. backache","B. toothache","C. headache","D. stomachache"],"a":"B","e":"toothache 牙痛。dentist提示看牙医。","t":"📋 rj8b_U2词汇"},{"s":"___ forget to take your medicine before going to bed at night.","o":["A. Not","B. Never to","C. No","D. Don't"],"a":"D","e":"Don't forget to... 否定祈使句，表提醒。","t":"📋 rj8b_U2语法"},{"s":"You ___ wash your hands before every meal to stay healthy.","o":["A. must to","B. should","C. can to","D. need"],"a":"B","e":"should 表示应该做的健康习惯。","t":"📋 rj8b_U2语法"}]},"rj8b_U3":{"id":"rj8b_U3","n":"U3 · Growing Up","d":"比较级与最高级; used to do · 50词 · 42题","dd":"比较级与最高级; used to do","ps":35,"q":[{"s":"My younger sister is getting ___ every year. Soon she'll be as tall as me.","o":["A. more tall","B. tallest","C. taller","D. tall"],"a":"C","e":"单音节比较级：tall → taller。","t":"📋 rj8b_U3语法"},{"s":"He got ___ score in the whole grade on the final exam.","o":["A. the highest","B. high","C. higher","D. the most high"],"a":"A","e":"最高级：the + highest。","t":"📋 rj8b_U3语法"},{"s":"They will ___ at the airport at 3 pm.","o":["A. arrive","B. get to","C. come","D. reach"],"a":"A","e":"arrive at + 小地点，arrive in + 大地点。reach是及物动词不加介词。","t":"📋 rj8b_U3辨析"},{"s":"He was completely ___ when he saw the birthday surprise.","o":["A. hurtful","B. negative","C. thankful","D. shocked"],"a":"D","e":"shocked 震惊的。","t":"📋 rj8b_U3词汇"},{"s":"The Yangtze River is ___ river in China.","o":["A. the longest","B. the longer","C. longer","D. long"],"a":"A","e":"最高级：the + 形容词最高级 + 范围。","t":"📋 rj8b_U3语法"},{"s":"Please ___ attention to the teacher when she explains the grammar rules.","o":["A. give","B. pay","C. put","D. make"],"a":"B","e":"pay attention to 注意","t":"📋 rj8b_U3搭配"},{"s":"This problem is ___ than the last one. I can't solve it alone.","o":["A. difficult","B. more difficult","C. most difficult","D. difficulter"],"a":"B","e":"多音节词比较级：more + difficult。","t":"📋 rj8b_U3语法"},{"s":"Tom doesn't jump as ___ as Jack. Jack is the best jumper in our class.","o":["A. more high","B. highest","C. high","D. higher"],"a":"C","e":"as + 原级 + as 表示\"和……一样\"。","t":"📋 rj8b_U3语法"},{"s":"She felt ___ when her best friend moved to another city.","o":["A. mad","B. upset","C. lonely","D. shocked"],"a":"C","e":"lonely 孤独的；寂寞的。","t":"📋 rj8b_U3词汇"},{"s":"We need to find a ___ to this problem before it gets any worse.","o":["A. fault","B. anger","C. emotion","D. solution"],"a":"D","e":"solution 解决办法。","t":"📋 rj8b_U3词汇"},{"s":"She runs ___ than anyone else in her class.","o":["A. fastest","B. fast","C. more fast","D. faster"],"a":"D","e":"单音节形容词比较级：adj + er。","t":"📋 rj8b_U3语法"},{"s":"He feels much ___ today than he did yesterday.","o":["A. good","B. best","C. more good","D. better"],"a":"D","e":"good的比较级是不规则变化：better。","t":"📋 rj8b_U3语法"},{"s":"This is ___ decision I have ever made in my life.","o":["A. more important","B. important","C. the most important","D. the importantest"],"a":"C","e":"多音节最高级：the most + important。","t":"📋 rj8b_U3语法"},{"s":"Could you ___ me on which after-school club would be best?","o":["A. forgive","B. advise","C. control","D. apologize"],"a":"B","e":"advise 建议；劝告。advise sb on sth 就某事给某人建议。","t":"📋 rj8b_U3词汇"},{"s":"I want to ___ for what I said — it was wrong and I'm sorry.","o":["A. advise","B. apologize","C. forgive","D. control"],"a":"B","e":"apologize 道歉。apologize for 为……道歉。","t":"📋 rj8b_U3词汇"},{"s":"My grandfather ___ to tell me stories about his childhood.","o":["A. used","B. use","C. using","D. uses"],"a":"A","e":"used to do 过去常常做某事。","t":"📋 rj8b_U3语法"},{"s":"Could you ___ me your new phone?","o":["A. see","B. watch","C. show","D. look"],"a":"C","e":"show sb sth 给某人看。see是\"看见\"，look是\"看\"（不及物），watch是\"观看\"。","t":"📋 rj8b_U3辨析"},{"s":"She felt a mix of ___ — happy, sad, and nervous all at once.","o":["A. angers","B. faults","C. solutions","D. emotions"],"a":"D","e":"emotion 情绪；情感。","t":"📋 rj8b_U3词汇"},{"s":"Of all the subjects, math is the ___ for me.","o":["A. more difficult","B. difficulter","C. difficult","D. most difficult"],"a":"D","e":"最高级：the most + 多音节形容词。","t":"📋 rj8b_U3语法"},{"s":"She is ___ girl in our class. Everyone loves her smile.","o":["A. kinder","B. the more kind","C. kind","D. the kindest"],"a":"D","e":"单音节最高级：the + adj + est。","t":"📋 rj8b_U3语法"},{"s":"The weather today is even ___ than it was yesterday.","o":["A. worse","B. worst","C. bad","D. more bad"],"a":"A","e":"bad的比较级不规则：worse。","t":"📋 rj8b_U3语法"},{"s":"Can you ___ up with a better idea for our class project?","o":["A. come","B. get","C. make","D. put"],"a":"A","e":"come up with 想出","t":"📋 rj8b_U3搭配"},{"s":"Learning to ___ your anger is an important part of growing up.","o":["A. manage","B. advise","C. express","D. control"],"a":"D","e":"control 控制。control anger 控制愤怒。","t":"📋 rj8b_U3词汇"},{"s":"Don't ___ up on learning English. It gets easier with practice.","o":["A. take","B. give","C. make","D. put"],"a":"B","e":"give up 放弃","t":"📋 rj8b_U3搭配"},{"s":"It wasn't my ___ that the vase broke — the cat knocked it over.","o":["A. solution","B. fault","C. emotion","D. anger"],"a":"B","e":"fault 过错；责任。It's not my fault 不是我的错。","t":"📋 rj8b_U3词汇"},{"s":"This book is ___ than the one I read last week.","o":["A. the more interesting","B. most interesting","C. interesting","D. more interesting"],"a":"D","e":"多音节形容词比较级：more + adj + than。","t":"📋 rj8b_U3语法"},{"s":"This is one of ___ cities I have ever visited.","o":["A. beautiful","B. the more beautiful","C. more beautiful","D. the most beautiful"],"a":"D","e":"one of the + 最高级 + 名词复数。","t":"📋 rj8b_U3语法"},{"s":"That was ___ movie I have ever seen. I almost fell asleep.","o":["A. the most boring","B. boring","C. more boring","D. the boringest"],"a":"A","e":"多音节最高级：the most + adj。","t":"📋 rj8b_U3语法"},{"s":"The river ___ to be clean, but now it's badly polluted.","o":["A. uses","B. using","C. used","D. use"],"a":"C","e":"used to be 过去是（某种状态）。","t":"📋 rj8b_U3语法"},{"s":"He ___ to like sweet food, but now he prefers salty snacks.","o":["A. used","B. using","C. uses","D. use"],"a":"A","e":"used to do 过去的喜好。","t":"📋 rj8b_U3语法"},{"s":"They ___ to walk to school together every morning.","o":["A. using","B. use","C. uses","D. used"],"a":"D","e":"used to do 表示过去经常性的动作。","t":"📋 rj8b_U3语法"},{"s":"Don't worry too much about the score — just ___ your best.","o":["A. have","B. do","C. make","D. take"],"a":"B","e":"do one's best 尽力","t":"📋 rj8b_U3搭配"},{"s":"He was really ___ when he found out his friends went without him.","o":["A. lonely","B. mad","C. shocked","D. upset"],"a":"D","e":"upset 难过的；沮丧的。","t":"📋 rj8b_U3词汇"},{"s":"It's better to stay positive than to let ___ thoughts take over.","o":["A. negative","B. gentle","C. joyful","D. thankful"],"a":"A","e":"negative 消极的。","t":"📋 rj8b_U3词汇"},{"s":"We've ___ out of milk. Could you buy some on your way home?","o":["A. take","B. put","C. run","D. make"],"a":"C","e":"run out of 用完","t":"📋 rj8b_U3搭配"},{"s":"She speaks English ___ than I do because she lived in London for a year.","o":["A. most fluently","B. more fluently","C. fluently","D. fluentlier"],"a":"B","e":"副词比较级：more + 副词 + than。","t":"📋 rj8b_U3语法"},{"s":"I ___ to be scared of dogs when I was little.","o":["A. using","B. used","C. use","D. uses"],"a":"B","e":"used to do 过去常常（现在不这样了）。","t":"📋 rj8b_U3语法"},{"s":"We ___ to live in a small town before we moved to the city.","o":["A. use","B. used","C. using","D. uses"],"a":"B","e":"used to do 过去的状态（居住）。","t":"📋 rj8b_U3语法"},{"s":"She ___ to have long hair, but she cut it short last month.","o":["A. used","B. using","C. uses","D. use"],"a":"A","e":"used to do 过去的习惯或状态。","t":"📋 rj8b_U3语法"},{"s":"— Have you ever been to the Great Wall?\n— ___","o":["A. No, I will go tomorrow.","B. I'm not sure.","C. Yes, I go every day.","D. Yes, I went there last summer."],"a":"D","e":"现在完成时问经历，回答用一般过去时说明具体时间。","t":"📋 rj8b_U3情景"},{"s":"— I'm feeling stressed about the exam.\n— ___","o":["A. I don't care.","B. You should study harder.","C. The exam is easy.","D. Why not take a break and relax?"],"a":"D","e":"给出建议：Why not + 动词原形。","t":"📋 rj8b_U3情景"},{"s":"I ___ my keys everywhere but couldn't find them.","o":["A. searched","B. looked for","C. discovered","D. found"],"a":"B","e":"look for 寻找（过程），find 找到（结果）。句意是找的过程。","t":"📋 rj8b_U3辨析"}]},"rj8b_U4":{"id":"rj8b_U4","n":"U4 · The Wonders of Nature","d":"形容词比较级与最高级; 被动语态初步 · 58词 · 42题","dd":"形容词比较级与最高级; 被动语态初步","ps":35,"q":[{"s":"The classroom ___ every day after school.","o":["A. is cleaned","B. has cleaned","C. cleans","D. cleaned"],"a":"A","e":"被动语态：教室是被打扫的。","t":"📋 rj8b_U4语法"},{"s":"We've ___ out of milk. Could you buy some on your way home?","o":["A. take","B. put","C. make","D. run"],"a":"D","e":"run out of 用完","t":"📋 rj8b_U4搭配"},{"s":"These beautiful flowers ___ in the school garden every spring.","o":["A. plant","B. is planted","C. are planted","D. have planted"],"a":"C","e":"被动语态：花是被种的。复数主语用are。","t":"📋 rj8b_U4语法"},{"s":"Don't ___ up on learning English. It gets easier with practice.","o":["A. take","B. make","C. put","D. give"],"a":"D","e":"give up 放弃","t":"📋 rj8b_U4搭配"},{"s":"Many trees ___ down every year to make paper.","o":["A. is cut","B. are cut","C. cut","D. have cut"],"a":"B","e":"被动语态：树是被砍的。一般现在时被动：are + 过去分词。","t":"📋 rj8b_U4语法"},{"s":"— What's your hobby?\n— ___","o":["A. My name is Li Hua.","B. I go to school by bus.","C. I am 15 years old.","D. I enjoy collecting old coins."],"a":"D","e":"回答爱好：I enjoy + doing sth。","t":"📋 rj8b_U4情景"},{"s":"It's much colder at the ___ of the ocean than near the surface.","o":["A. depth","B. bottom","C. surface","D. level"],"a":"B","e":"bottom 底部；最下部。","t":"📋 rj8b_U4词汇"},{"s":"The weather today is even ___ than it was yesterday.","o":["A. worse","B. more bad","C. bad","D. worst"],"a":"A","e":"bad的比较级不规则：worse。","t":"📋 rj8b_U4语法"},{"s":"This kind of tea ___ in the south of China.","o":["A. grows","B. is grown","C. was grown","D. has grown"],"a":"B","e":"被动语态：茶是被种植的。一般现在时被动。","t":"📋 rj8b_U4语法"},{"s":"She runs ___ than anyone else in her class.","o":["A. fast","B. faster","C. fastest","D. more fast"],"a":"B","e":"单音节形容词比较级：adj + er。","t":"📋 rj8b_U4语法"},{"s":"My younger sister is getting ___ every year. Soon she'll be as tall as me.","o":["A. taller","B. tall","C. more tall","D. tallest"],"a":"A","e":"单音节比较级：tall → taller。","t":"📋 rj8b_U4语法"},{"s":"She is ___ girl in our class. Everyone loves her smile.","o":["A. kinder","B. kind","C. the more kind","D. the kindest"],"a":"D","e":"单音节最高级：the + adj + est。","t":"📋 rj8b_U4语法"},{"s":"The bridge ___ badly in the earthquake and had to be rebuilt.","o":["A. damaged","B. is damaged","C. has damaged","D. was damaged"],"a":"D","e":"被动语态：桥是被损坏的。","t":"📋 rj8b_U4语法"},{"s":"She ___ the first prize in the competition.","o":["A. beat","B. won","C. failed","D. lost"],"a":"B","e":"win a prize 获奖。beat + 对手（打败某人）。","t":"📋 rj8b_U4辨析"},{"s":"He feels much ___ today than he did yesterday.","o":["A. better","B. good","C. best","D. more good"],"a":"A","e":"good的比较级是不规则变化：better。","t":"📋 rj8b_U4语法"},{"s":"That was ___ movie I have ever seen. I almost fell asleep.","o":["A. more boring","B. the most boring","C. the boringest","D. boring"],"a":"B","e":"多音节最高级：the most + adj。","t":"📋 rj8b_U4语法"},{"s":"The ___ from my home to school is about three kilometers.","o":["A. distance","B. surface","C. mile","D. depth"],"a":"A","e":"distance 距离。","t":"📋 rj8b_U4词汇"},{"s":"Please ___ attention to the teacher when she explains the grammar rules.","o":["A. make","B. give","C. pay","D. put"],"a":"C","e":"pay attention to 注意","t":"📋 rj8b_U4搭配"},{"s":"Only a small number of people managed to ___ the terrible earthquake.","o":["A. dive","B. wonder","C. measure","D. survive"],"a":"D","e":"survive 生存；存活。","t":"📋 rj8b_U4词汇"},{"s":"The little girl can ___ from 1 to 100.","o":["A. calculate","B. number","C. count","D. add"],"a":"C","e":"count from...to... 从...数到...。number作动词是\"编号\"。","t":"📋 rj8b_U4辨析"},{"s":"He dreams of becoming a mountain ___ and climbing the world's highest peaks.","o":["A. visitor","B. diver","C. climber","D. instructor"],"a":"C","e":"climber 攀登者；登山者。","t":"📋 rj8b_U4词汇"},{"s":"He got ___ score in the whole grade on the final exam.","o":["A. high","B. the most high","C. the highest","D. higher"],"a":"C","e":"最高级：the + highest。","t":"📋 rj8b_U4语法"},{"s":"Of all the subjects, math is the ___ for me.","o":["A. difficult","B. difficulter","C. most difficult","D. more difficult"],"a":"C","e":"最高级：the most + 多音节形容词。","t":"📋 rj8b_U4语法"},{"s":"It is quite ___ to see snow in this part of the country in April.","o":["A. cubic","B. northern","C. historical","D. unusual"],"a":"D","e":"unusual 不寻常的。","t":"📋 rj8b_U4词汇"},{"s":"English ___ all over the world.","o":["A. speaks","B. spoke","C. is spoken","D. has spoken"],"a":"C","e":"一般现在时被动：am/is/are + 过去分词。","t":"📋 rj8b_U4语法"},{"s":"The Yangtze River is ___ river in China.","o":["A. longer","B. the longer","C. the longest","D. long"],"a":"C","e":"最高级：the + 形容词最高级 + 范围。","t":"📋 rj8b_U4语法"},{"s":"The Great Wall ___ by millions of people from all over the world every year.","o":["A. was visited","B. has visited","C. is visited","D. visits"],"a":"C","e":"被动语态：长城是被参观的。every year → 一般现在时。","t":"📋 rj8b_U4语法"},{"s":"This book ___ by Mo Yan in 2012.","o":["A. wrote","B. was written","C. is writing","D. has written"],"a":"B","e":"被动语态：be + 过去分词。书是被写的。","t":"📋 rj8b_U4语法"},{"s":"This problem is ___ than the last one. I can't solve it alone.","o":["A. more difficult","B. difficult","C. most difficult","D. difficulter"],"a":"A","e":"多音节词比较级：more + difficult。","t":"📋 rj8b_U4语法"},{"s":"Don't worry too much about the score — just ___ your best.","o":["A. do","B. have","C. make","D. take"],"a":"A","e":"do one's best 尽力","t":"📋 rj8b_U4搭配"},{"s":"The window ___ by the strong wind during the storm last night.","o":["A. is broken","B. broke","C. has broken","D. was broken"],"a":"D","e":"被动语态：窗户是被打破的。","t":"📋 rj8b_U4语法"},{"s":"— Would you like to join us for the volunteer activity?\n— ___","o":["A. I'd love to. When shall we meet?","B. Maybe next year.","C. No, I'm busy every day.","D. I don't like you."],"a":"A","e":"接受邀请的礼貌表达：I'd love to。","t":"📋 rj8b_U4情景"},{"s":"— How long have you lived here?\n— ___","o":["A. In 2019.","B. Five years ago.","C. Since five years.","D. For about five years."],"a":"D","e":"How long 提问持续时长。for + 时间段；since + 时间点。回答不能说since five years。","t":"📋 rj8b_U4情景"},{"s":"Tom doesn't jump as ___ as Jack. Jack is the best jumper in our class.","o":["A. more high","B. highest","C. high","D. higher"],"a":"C","e":"as + 原级 + as 表示\"和……一样\"。","t":"📋 rj8b_U4语法"},{"s":"This is ___ decision I have ever made in my life.","o":["A. important","B. the importantest","C. the most important","D. more important"],"a":"C","e":"多音节最高级：the most + important。","t":"📋 rj8b_U4语法"},{"s":"She speaks English ___ than I do because she lived in London for a year.","o":["A. more fluently","B. fluently","C. fluentlier","D. most fluently"],"a":"A","e":"副词比较级：more + 副词 + than。","t":"📋 rj8b_U4语法"},{"s":"They will ___ at the airport at 3 pm.","o":["A. arrive","B. come","C. reach","D. get to"],"a":"A","e":"arrive at + 小地点，arrive in + 大地点。reach是及物动词不加介词。","t":"📋 rj8b_U4辨析"},{"s":"The hikers had to ___ for three hours through the heavy rain to reach camp.","o":["A. dive","B. fly","C. walk","D. swim"],"a":"C","e":"walk 徒步行走。","t":"📋 rj8b_U4词汇"},{"s":"This book is ___ than the one I read last week.","o":["A. most interesting","B. the more interesting","C. interesting","D. more interesting"],"a":"D","e":"多音节形容词比较级：more + adj + than。","t":"📋 rj8b_U4语法"},{"s":"From the top of the mountain, the town ___ looked like a tiny model.","o":["A. below","B. above","C. outside","D. inside"],"a":"A","e":"below 在……下面。","t":"📋 rj8b_U4词汇"},{"s":"This picture ___ by my little sister last weekend.","o":["A. has drawn","B. is drawn","C. drew","D. was drawn"],"a":"D","e":"一般过去时被动：was/were + 过去分词。","t":"📋 rj8b_U4语法"},{"s":"This is one of ___ cities I have ever visited.","o":["A. the most beautiful","B. beautiful","C. the more beautiful","D. more beautiful"],"a":"A","e":"one of the + 最高级 + 名词复数。","t":"📋 rj8b_U4语法"}]},"rj8b_U5":{"id":"rj8b_U5","n":"U5 · Nature's Temper","d":"过去进行时 was/were doing · 57词 · 30题","dd":"过去进行时 was/were doing","ps":35,"q":[{"s":"Heavy rain for three days caused a serious ___ in the river valley.","o":["A. wildfire","B. drought","C. flood","D. snowstorm"],"a":"C","e":"flood 洪水。","t":"📋 rj8b_U5词汇"},{"s":"The loud ___ woke everyone in the village at three in the morning.","o":["A. scream","B. alarm","C. wave","D. thunder"],"a":"B","e":"alarm 警报。","t":"📋 rj8b_U5词汇"},{"s":"I ___ (do) my homework when you called.","o":["A. am doing","B. did","C. was doing","D. have done"],"a":"C","e":"when表示某个时间点，主句用过去进行时was/were doing。","t":"📋 rj8b_U5语法"},{"s":"I ___ my keys everywhere but couldn't find them.","o":["A. looked for","B. found","C. discovered","D. searched"],"a":"A","e":"look for 寻找（过程），find 找到（结果）。句意是找的过程。","t":"📋 rj8b_U5辨析"},{"s":"The teacher came in while we ___ (talk).","o":["A. are talking","B. were talking","C. have talked","D. talked"],"a":"B","e":"was/were + doing 表示过去某一时刻正在进行的动作。","t":"📋 rj8b_U5语法"},{"s":"The forest ___ destroyed over 5,000 hectares of land before it was put out.","o":["A. tsunami","B. earthquake","C. tornado","D. wildfire"],"a":"D","e":"wildfire 野火。wild + fire。","t":"📋 rj8b_U5词汇"},{"s":"Firefighters worked through the night to ___ people trapped in the building.","o":["A. scream","B. beat","C. rescue","D. warn"],"a":"C","e":"rescue 救援；营救。","t":"📋 rj8b_U5词汇"},{"s":"— Would you like to join us for the volunteer activity?\n— ___","o":["A. Maybe next year.","B. No, I'm busy every day.","C. I don't like you.","D. I'd love to. When shall we meet?"],"a":"D","e":"接受邀请的礼貌表达：I'd love to。","t":"📋 rj8b_U5情景"},{"s":"My sister helps ___ care of our dog when I'm busy with homework.","o":["A. take","B. put","C. make","D. give"],"a":"A","e":"take care of 照顾","t":"📋 rj8b_U5搭配"},{"s":"While they ___ (play) outside, it started to rain.","o":["A. were playing","B. play","C. played","D. have played"],"a":"A","e":"while引导从句，表示两个动作同时进行，用过去进行时。","t":"📋 rj8b_U5语法"},{"s":"A huge ___ hit the coast, destroying hundreds of homes near the beach.","o":["A. tsunami","B. landslide","C. tornado","D. typhoon"],"a":"A","e":"tsunami 海啸。","t":"📋 rj8b_U5词汇"},{"s":"I can't ___ the difference between these two pictures.","o":["A. tell","B. talk","C. say","D. speak"],"a":"A","e":"tell the difference 辨别差异。say是\"说内容\"，speak是\"说语言\"，talk是\"交谈\"。","t":"📋 rj8b_U5辨析"},{"s":"The strong wind ___ against the windows all through the night.","o":["A. warn","B. scream","C. rescue","D. beat"],"a":"D","e":"beat 敲；打。不规则：beat, beaten。","t":"📋 rj8b_U5词汇"},{"s":"Loud ___ and bright lightning filled the sky during the summer storm.","o":["A. alarm","B. wave","C. thunder","D. froth"],"a":"C","e":"thunder 雷；雷声。","t":"📋 rj8b_U5词汇"},{"s":"Don't worry too much about the score — just ___ your best.","o":["A. make","B. have","C. do","D. take"],"a":"C","e":"do one's best 尽力","t":"📋 rj8b_U5搭配"},{"s":"During the heavy ___, the school cancelled all outdoor activities.","o":["A. wildfire","B. snowstorm","C. heatwave","D. rainstorm"],"a":"B","e":"snowstorm 暴风雪。snow + storm。","t":"📋 rj8b_U5词汇"},{"s":"— Have you ever been to the Great Wall?\n— ___","o":["A. No, I will go tomorrow.","B. I'm not sure.","C. Yes, I went there last summer.","D. Yes, I go every day."],"a":"C","e":"现在完成时问经历，回答用一般过去时说明具体时间。","t":"📋 rj8b_U5情景"},{"s":"The ___ shook the whole city, and many old buildings collapsed.","o":["A. earthquake","B. tsunami","C. tornado","D. typhoon"],"a":"A","e":"earthquake 地震。earth + quake。","t":"📋 rj8b_U5词汇"},{"s":"She let out a loud ___ when she saw the snake in the garden.","o":["A. thunder","B. wave","C. alarm","D. scream"],"a":"D","e":"scream 尖叫。","t":"📋 rj8b_U5词汇"},{"s":"Tourists were ___ to stay away from the beach because of the huge waves.","o":["A. screamed","B. rescued","C. beaten","D. warned"],"a":"D","e":"warn 警告。warn sb of sth 警告某人某事。","t":"📋 rj8b_U5词汇"},{"s":"— I'm feeling stressed about the exam.\n— ___","o":["A. Why not take a break and relax?","B. The exam is easy.","C. I don't care.","D. You should study harder."],"a":"A","e":"给出建议：Why not + 动词原形。","t":"📋 rj8b_U5情景"},{"s":"Please ___ your name on the paper.","o":["A. copy","B. paint","C. draw","D. write"],"a":"D","e":"write name 写名字。draw是\"画画\"，paint是\"刷漆/油画\"，copy是\"复制\"。","t":"📋 rj8b_U5辨析"},{"s":"She ___ (not sleep) when the alarm went off.","o":["A. doesn't sleep","B. didn't sleep","C. wasn't sleeping","D. hasn't slept"],"a":"C","e":"过去进行时否定：was/were + not + doing。","t":"📋 rj8b_U5语法"},{"s":"I really ___ forward to the summer holiday every year.","o":["A. put","B. make","C. take","D. look"],"a":"D","e":"look forward to 期待","t":"📋 rj8b_U5搭配"},{"s":"— How long have you lived here?\n— ___","o":["A. For about five years.","B. Since five years.","C. Five years ago.","D. In 2019."],"a":"A","e":"How long 提问持续时长。for + 时间段；since + 时间点。回答不能说since five years。","t":"📋 rj8b_U5情景"},{"s":"We've ___ out of milk. Could you buy some on your way home?","o":["A. put","B. make","C. take","D. run"],"a":"D","e":"run out of 用完","t":"📋 rj8b_U5搭配"},{"s":"The long ___ caused all the crops in the field to die from lack of water.","o":["A. landslide","B. drought","C. flood","D. wildfire"],"a":"B","e":"drought 旱灾；干旱。","t":"📋 rj8b_U5词汇"},{"s":"Please ___ attention to the teacher when she explains the grammar rules.","o":["A. put","B. pay","C. give","D. make"],"a":"B","e":"pay attention to 注意","t":"📋 rj8b_U5搭配"},{"s":"How much did you ___ for the new bike?","o":["A. spend","B. pay","C. cost","D. take"],"a":"B","e":"pay for 支付。人+spend+时间/钱+on。物+cost+人+钱。","t":"📋 rj8b_U5辨析"},{"s":"What ___ you ___ (do) at 8 o'clock last night?","o":["A. were; doing","B. are; doing","C. did; do","D. have; done"],"a":"A","e":"过去具体时间点 at 8 o'clock last night，用过去进行时。","t":"📋 rj8b_U5语法"}]},"rj8b_U6":{"id":"rj8b_U6","n":"U6 · Crossing Cultures","d":"现在完成时 already/yet · 55词 · 35题","dd":"现在完成时 already/yet","ps":35,"q":[{"s":"He gave his mother a warm ___ before leaving for his first day at the new school.","o":["A. kiss","B. bow","C. bump","D. hug"],"a":"D","e":"hug 拥抱。give sb a hug 拥抱某人。","t":"📋 rj8b_U6词汇"},{"s":"She felt really ___ when she forgot all her lines during the school play.","o":["A. confused","B. surprising","C. confusing","D. embarrassed"],"a":"D","e":"embarrassed 尴尬的（人的感受）。-ed结尾修饰人。","t":"📋 rj8b_U6词汇"},{"s":"— I'm feeling stressed about the exam.\n— ___","o":["A. Why not take a break and relax?","B. You should study harder.","C. I don't care.","D. The exam is easy."],"a":"A","e":"给出建议：Why not + 动词原形。","t":"📋 rj8b_U6情景"},{"s":"The little girl can ___ from 1 to 100.","o":["A. add","B. number","C. calculate","D. count"],"a":"D","e":"count from...to... 从...数到...。number作动词是\"编号\"。","t":"📋 rj8b_U6辨析"},{"s":"She ___ never ___ (try) Chinese painting before.","o":["A. did; try","B. does; try","C. has; tried","D. is; trying"],"a":"C","e":"never + 现在完成时表示\"从未做过某事\"。","t":"📋 rj8b_U6语法"},{"s":"___ he ___ (return) the book to the library?","o":["A. Does; return","B. Did; return","C. Is; returning","D. Has; returned"],"a":"D","e":"现在完成时一般疑问句：Have/Has + 主语 + 过去分词。","t":"📋 rj8b_U6语法"},{"s":"She held the tiny bird gently in the ___ of her hand before letting it fly.","o":["A. cheek","B. elbow","C. palm","D. fist"],"a":"C","e":"palm 手掌。","t":"📋 rj8b_U6词汇"},{"s":"It is ___ how quickly children can learn to use a new language.","o":["A. confused","B. confusing","C. surprising","D. embarrassing"],"a":"C","e":"surprising 出人意料的。","t":"📋 rj8b_U6词汇"},{"s":"They ___ (not decide) where to go for the holiday ___.","o":["A. didn't decide; already","B. don't decide; just","C. haven't decided; yet","D. won't decide; ever"],"a":"C","e":"not...yet 表示\"还没有\"，用于现在完成时。","t":"📋 rj8b_U6语法"},{"s":"The tourist was completely ___ by the subway map and got on the wrong train.","o":["A. embarrassed","B. confusing","C. embarrassing","D. confused"],"a":"D","e":"confused 困惑的（人的感受）。","t":"📋 rj8b_U6词汇"},{"s":"I ___ (not see) this movie yet.","o":["A. don't see","B. won't see","C. didn't see","D. haven't seen"],"a":"D","e":"yet表示\"还\"，用于现在完成时否定句。","t":"📋 rj8b_U6语法"},{"s":"How long ___ you ___ (study) English?","o":["A. have; studied","B. did; study","C. do; study","D. are; studying"],"a":"A","e":"How long 询问持续时间，用现在完成时。","t":"📋 rj8b_U6语法"},{"s":"In China, people traditionally use ___ to eat, not knives and forks.","o":["A. forks","B. fists","C. chopsticks","D. palms"],"a":"C","e":"chopstick 筷子。常以复数形式出现。","t":"📋 rj8b_U6词汇"},{"s":"He accidentally ___ into an old friend at the shopping mall yesterday.","o":["A. rubbed","B. shook","C. bowed","D. bumped"],"a":"D","e":"bump 碰；撞。bump into 偶遇。","t":"📋 rj8b_U6词汇"},{"s":"Don't worry too much about the score — just ___ your best.","o":["A. take","B. make","C. do","D. have"],"a":"C","e":"do one's best 尽力","t":"📋 rj8b_U6搭配"},{"s":"— What's your hobby?\n— ___","o":["A. I enjoy collecting old coins.","B. I am 15 years old.","C. My name is Li Hua.","D. I go to school by bus."],"a":"A","e":"回答爱好：I enjoy + doing sth。","t":"📋 rj8b_U6情景"},{"s":"They will ___ at the airport at 3 pm.","o":["A. come","B. get to","C. reach","D. arrive"],"a":"D","e":"arrive at + 小地点，arrive in + 大地点。reach是及物动词不加介词。","t":"📋 rj8b_U6辨析"},{"s":"How much did you ___ for the new bike?","o":["A. spend","B. take","C. cost","D. pay"],"a":"D","e":"pay for 支付。人+spend+时间/钱+on。物+cost+人+钱。","t":"📋 rj8b_U6辨析"},{"s":"The instructions for the new game were so ___ that nobody understood what to do.","o":["A. confused","B. embarrassing","C. confusing","D. embarrassed"],"a":"C","e":"confusing 令人困惑的（事物属性）。-ing结尾修饰事物。","t":"📋 rj8b_U6词汇"},{"s":"She gently ___ her tired eyes and took a short break from reading.","o":["A. shook","B. bowed","C. bumped","D. rubbed"],"a":"D","e":"rub 摩擦；揉。","t":"📋 rj8b_U6词汇"},{"s":"— How long have you lived here?\n— ___","o":["A. In 2019.","B. Since five years.","C. Five years ago.","D. For about five years."],"a":"D","e":"How long 提问持续时长。for + 时间段；since + 时间点。回答不能说since five years。","t":"📋 rj8b_U6情景"},{"s":"In many Western countries, people ___ hands when they meet someone for the first time.","o":["A. rub","B. shake","C. bump","D. bow"],"a":"B","e":"shake 握手。shake hands 握手。","t":"📋 rj8b_U6词汇"},{"s":"___ you ever ___ (be) to Shanghai?","o":["A. Have; been","B. Do; go","C. Did; be","D. Are; going"],"a":"A","e":"Have you ever been to... 询问经历。","t":"📋 rj8b_U6语法"},{"s":"It's hard to ___ a decision when you don't have enough information.","o":["A. make","B. do","C. take","D. give"],"a":"A","e":"make a decision 做决定","t":"📋 rj8b_U6搭配"},{"s":"The little girl gave her grandmother a ___ on the cheek before running off.","o":["A. hug","B. bump","C. bow","D. kiss"],"a":"D","e":"kiss 亲吻。","t":"📋 rj8b_U6词汇"},{"s":"Please ___ attention to the teacher when she explains the grammar rules.","o":["A. put","B. pay","C. give","D. make"],"a":"B","e":"pay attention to 注意","t":"📋 rj8b_U6搭配"},{"s":"In Japan, it's polite to ___ when you greet someone, rather than shake hands.","o":["A. rub","B. bump","C. bow","D. hug"],"a":"C","e":"bow 鞠躬。","t":"📋 rj8b_U6词汇"},{"s":"— Have you ever been to the Great Wall?\n— ___","o":["A. I'm not sure.","B. Yes, I go every day.","C. Yes, I went there last summer.","D. No, I will go tomorrow."],"a":"C","e":"现在完成时问经历，回答用一般过去时说明具体时间。","t":"📋 rj8b_U6情景"},{"s":"We ___ (know) each other ___ we were kids.","o":["A. knew; when","B. are knowing; from","C. know; for","D. have known; since"],"a":"D","e":"since + 过去时间点；for + 时间段。","t":"📋 rj8b_U6语法"},{"s":"She is easy to ___ along with — everyone in our class likes her.","o":["A. have","B. get","C. take","D. make"],"a":"B","e":"get along with 相处","t":"📋 rj8b_U6搭配"},{"s":"She ___ already ___ (finish) her project.","o":["A. has; finished","B. did; finish","C. is; finishing","D. was; finished"],"a":"A","e":"already用于现在完成时肯定句，放在have/has之后。","t":"📋 rj8b_U6语法"},{"s":"Please ___ your name on the paper.","o":["A. draw","B. write","C. paint","D. copy"],"a":"B","e":"write name 写名字。draw是\"画画\"，paint是\"刷漆/油画\"，copy是\"复制\"。","t":"📋 rj8b_U6辨析"},{"s":"I ___ just ___ (come) back from the library.","o":["A. was; come","B. have; come","C. am; coming","D. did; came"],"a":"B","e":"just表示\"刚刚\"，用于现在完成时。","t":"📋 rj8b_U6语法"},{"s":"He ___ (live) in Beijing ___ three years.","o":["A. lives; in","B. lived; since","C. has lived; for","D. is living; about"],"a":"C","e":"for + 时间段（three years）表示持续多久。","t":"📋 rj8b_U6语法"},{"s":"Don't ___ up on learning English. It gets easier with practice.","o":["A. give","B. make","C. put","D. take"],"a":"A","e":"give up 放弃","t":"📋 rj8b_U6搭配"}]},"rj8b_U7":{"id":"rj8b_U7","n":"U7 · A Good Read","d":"现在完成时 ever/never; already/just/yet · 51词 · 35题","dd":"现在完成时 ever/never; already/just/yet","ps":35,"q":[{"s":"They ___ (not decide) where to go for the holiday ___.","o":["A. haven't decided; yet","B. don't decide; just","C. didn't decide; already","D. won't decide; ever"],"a":"A","e":"not...yet 表示\"还没有\"，用于现在完成时。","t":"📋 rj8b_U7语法"},{"s":"— I'm feeling stressed about the exam.\n— ___","o":["A. The exam is easy.","B. Why not take a break and relax?","C. I don't care.","D. You should study harder."],"a":"B","e":"给出建议：Why not + 动词原形。","t":"📋 rj8b_U7情景"},{"s":"The writer's new ___ novel keeps readers guessing who the real criminal is.","o":["A. adventure","B. fiction","C. fantasy","D. mystery"],"a":"D","e":"mystery 悬疑小说；神秘的事物。","t":"📋 rj8b_U7词汇"},{"s":"— What's your hobby?\n— ___","o":["A. My name is Li Hua.","B. I am 15 years old.","C. I go to school by bus.","D. I enjoy collecting old coins."],"a":"D","e":"回答爱好：I enjoy + doing sth。","t":"📋 rj8b_U7情景"},{"s":"The book had a deep ___ on how I think about friendship and growing up.","o":["A. adventure","B. climax","C. effect","D. summary"],"a":"C","e":"effect 影响；结果。effect on 对……的影响。","t":"📋 rj8b_U7词汇"},{"s":"Could you ___ me your new phone?","o":["A. show","B. see","C. look","D. watch"],"a":"A","e":"show sb sth 给某人看。see是\"看见\"，look是\"看\"（不及物），watch是\"观看\"。","t":"📋 rj8b_U7辨析"},{"s":"The little girl can ___ from 1 to 100.","o":["A. add","B. calculate","C. number","D. count"],"a":"D","e":"count from...to... 从...数到...。number作动词是\"编号\"。","t":"📋 rj8b_U7辨析"},{"s":"It's hard to ___ a decision when you don't have enough information.","o":["A. take","B. make","C. do","D. give"],"a":"B","e":"make a decision 做决定","t":"📋 rj8b_U7搭配"},{"s":"Don't worry too much about the score — just ___ your best.","o":["A. take","B. have","C. make","D. do"],"a":"D","e":"do one's best 尽力","t":"📋 rj8b_U7搭配"},{"s":"I ___ just ___ (come) back from the library.","o":["A. was; come","B. have; come","C. did; came","D. am; coming"],"a":"B","e":"just表示\"刚刚\"，用于现在完成时。","t":"📋 rj8b_U7语法"},{"s":"— Would you like to join us for the volunteer activity?\n— ___","o":   curIdx: 0,
  answers: {},

  // Vocab A
  vocabATexts: {},
  vocabASubmitted: false,
  // Vocab B
  vocabBTexts: {},
  vocabBSubmitted: false,
  // Grammar
  grammarTexts: {},
  grammarSubmitted: false,
};

function H(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    if (k === 'className') el.className = attrs[k];
    else if (k === 'disabled') { if (attrs[k]) el.setAttribute('disabled', ''); }
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else el.setAttribute(k, attrs[k]);
  }
  if (children) {
    if (typeof children === 'string') el.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) {
      if (typeof c === 'string') el.appendChild(document.createTextNode(c));
      else if (c) el.appendChild(c);
    });
  }
  return el;
}

function skey() { return 'jxmulti_' + ST.ver + '_' + ST.tab + '_session'; }
function pkey() { return 'jxmulti_' + ST.ver + '_' + ST.tab + '_practice'; }
function ekey() { return 'jxmulti_' + ST.ver + '_' + ST.tab + '_errors'; }

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ============================================================
// SESSION
// ============================================================
function saveSession() {
  try {
    var s = { timestamp: Date.now(), ver: ST.ver, tab: ST.tab };
    if (ST.tab === 'sc') {
      s.catIdx = ST.catIdx; s.mode = ST.mode; s.shuffled = ST.shuffled;
      s.curIdx = ST.curIdx; s.answers = ST.answers;
    } else if (ST.tab === 'cloze') {
      s.catIdx = ST.catIdx; s.clozeTexts = ST.clozeTexts;
      s.clozeSubmitted = ST.clozeSubmitted;
    } else if (ST.tab === 'vocab_a') {
      s.catIdx = ST.catIdx; s.vocabATexts = ST.vocabATexts;
      s.vocabASubmitted = ST.vocabASubmitted;
    } else if (ST.tab === 'vocab_b') {
      s.catIdx = ST.catIdx; s.vocabBTexts = ST.vocabBTexts;
      s.vocabBSubmitted = ST.vocabBSubmitted;
    } else if (ST.tab === 'grammar') {
      s.catIdx = ST.catIdx; s.grammarTexts = ST.grammarTexts;
      s.grammarSubmitted = ST.grammarSubmitted;
    }
    localStorage.setItem(skey(), JSON.stringify(s));
  } catch(e) {}
}

function loadStats(statsKey) {
  try {
    var raw = localStorage.getItem(statsKey);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveStats(statsKey, catId, score, total) {
  try {
    var s = loadStats(statsKey);
    if (!s[catId] || score > s[catId].score || (score === s[catId].score && total < s[catId].total)) {
      s[catId] = { score: score, total: total, time: Date.now() };
    }
    localStorage.setItem(statsKey, JSON.stringify(s));
  } catch(e) {}
}

function saveError(qData) {
  try {
    var errors = JSON.parse(localStorage.getItem(ekey()) || '[]');
    var exists = errors.some(function(e) {
      return e.qIdx === qData.qIdx && e.catIdx === qData.catIdx;
    });
    if (!exists) {
      errors.push(qData);
      localStorage.setItem(ekey(), JSON.stringify(errors));
    }
  } catch(e) {}
}

function clearSession() {
  localStorage.removeItem(skey());
  ST.view = 'landing'; ST.catIdx = -1; ST.curIdx = 0;
  ST.answers = {}; ST.feedbackShown = false;
  ST.clozeTexts = {}; ST.clozeSubmitted = false;
  ST.vocabATexts = {}; ST.vocabASubmitted = false;
  ST.vocabBTexts = {}; ST.vocabBSubmitted = false;
  ST.grammarTexts = {}; ST.grammarSubmitted = false;
}

function checkResume() {
  try {
    var raw = localStorage.getItem(skey());
    if (!raw) return null;
    var s = JSON.parse(raw);
    if (Date.now() - s.timestamp > 86400000) { localStorage.removeItem(skey()); return null; }
    if (s.ver !== ST.ver || s.tab !== ST.tab) return null;
    if (s.tab === 'sc' && s.catIdx >= 0 && s.shuffled && s.shuffled.length > 0 && s.curIdx < s.shuffled.length) return s;
    if (s.tab !== 'sc' && s.catIdx >= 0 && !s[s.tab + 'Submitted']) return s;
    return null;
  } catch(e) { return null; }
}

function renderLanding() {
  var app = document.getElementById('app');
  app.innerHTML = '';
  var verCfg = VERSIONS[ST.ver];
  var tabs = verCfg.tabs;
  var tabKeys = Object.keys(tabs);
  if (!tabKeys.includes(ST.tab)) ST.tab = tabKeys[0];

  // Version tabs
  var verBar = H('div', {className:'ver-bar'});
  Object.keys(VERSIONS).forEach(function(v) {
    var btn = H('button', {
      className: 'ver-btn' + (v === ST.ver ? ' active' : ''),
      onClick: function() { if (v !== ST.ver) { ST.ver = v; ST.tab = Object.keys(VERSIONS[v].tabs)[0]; ST.view = 'landing'; clearSession(); renderLanding(); } }
    }, VERSIONS[v].n);
    verBar.appendChild(btn);
  });
  app.appendChild(verBar);

  // Type tabs
  var tabBar = H('div', {className:'tab-bar'});
  tabKeys.forEach(function(t) {
    var btn = H('button', {
      className: 'tab-btn' + (t === ST.tab ? ' active' : ''),
      onClick: function() { if (t !== ST.tab) { ST.tab = t; ST.view = 'landing'; clearSession(); renderLanding(); } }
    }, tabs[t].icon + ' ' + tabs[t].n);
    tabBar.appendChild(btn);
  });
  app.appendChild(tabBar);

  // Header
  var header = H('div', {className:'landing-header'}, [
    H('h1', null, verCfg.n),
    H('p', null, verCfg.desc)
  ]);
  app.appendChild(header);

  // Category grid
  var data = ALL_DATA[ST.ver][ST.tab];
  var grid = H('div', {className:'cat-grid'});

  if (ST.tab === 'sc') {
    var cats = Object.keys(data);
    if (cats.length === 0) {
      var emptyCard = H('div', {className:'cat-card empty-card'}, [
        H('div', {className:'cat-name'}, '即将上线'),
        H('div', {className:'cat-desc'}, '题库正在建设中')
      ]);
      emptyCard.style.gridColumn = '1 / -1';
      grid.appendChild(emptyCard);
    } else {
      cats.forEach(function(cid) {
        var cat = data[cid];
        var stats = loadStats(pkey());
        var stat = stats[cid];
        var card = H('div', {
          className: 'cat-card',
          onClick: function() { startSCQuiz(cid); }
        }, [
          H('div', {className:'cat-name'}, cat.n),
          H('div', {className:'cat-desc'}, cat.d),
          stat ? H('div', {className:'cat-stat'}, '最佳: ' + stat.score + '/' + stat.total) : null
        ]);
        grid.appendChild(card);
      });
    }
  } else {
    // Cloze / VocabA / VocabB / Grammar - array data
    var items = data;
    if (!items || items.length === 0) {
      var emptyCard = H('div', {className:'cat-card empty-card'}, [
        H('div', {className:'cat-name'}, '即将上线'),
        H('div', {className:'cat-desc'}, '题库正在建设中')
      ]);
      emptyCard.style.gridColumn = '1 / -1';
      grid.appendChild(emptyCard);
    } else {
      items.forEach(function(item, idx) {
        var stats = loadStats(pkey());
        var stat = stats[item.id];
        var card = H('div', {
          className: 'cat-card',
          onClick: function() { startFillQuiz(idx); }
        }, [
          H('div', {className:'cat-name'}, item.n),
          H('div', {className:'cat-desc'}, item.d),
          item.g ? H('span', {className:'cat-genre-tag'}, item.g) : null,
          stat ? H('div', {className:'cat-stat'}, '最佳: ' + stat.score + '/' + stat.total) : null
        ]);
        grid.appendChild(card);
      });
    }
  }
  app.appendChild(grid);
}

function startSCQuiz(catId) {
  var cat = ALL_DATA[ST.ver][ST.tab][catId];
  ST.catIdx = catId;
  ST.mode = 'full';
  ST.curIdx = 0;
  ST.answers = {};
  ST.feedbackShown = false;

  var allIds = cat.q.map(function(_, i) { return i; });
  if (cat.ps && allIds.length > cat.ps) allIds = shuffle(allIds).slice(0, cat.ps);
  ST.shuffled = shuffle(allIds);
  ST.view = 'quiz';
  renderSCQuiz();
  window.scrollTo(0, 0);
}

function renderSCQuiz() {
  var app = document.getElementById('app');
  app.innerHTML = '';
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var total = ST.shuffled.length;
  var done = Object.keys(ST.answers).length;
  var progress = total > 0 ? Math.round(ST.curIdx / total * 100) : 0;

  // Top bar
  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { clearSession(); renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, cat.n),
  ]));

  // Progress
  app.appendChild(H('div', {className:'progress-wrap'}, [
    H('div', {className:'progress-text'}, '第 ' + (ST.curIdx + 1) + '/' + total + ' 题 · 已答 ' + done + ' 题'),
    H('div', {className:'progress-bar'}, [
      H('div', {className:'progress-fill', style:'width:' + progress + '%'})
    ])
  ]));

  var qIdx = ST.shuffled[ST.curIdx];
  var q = cat.q[qIdx];
  var answered = ST.answers.hasOwnProperty(qIdx);

  // Stem
  var stemDiv = H('div', {className:'q-stem-display'});
  var stemHtml = q.s.replace(/_(3,)/g, '<span class="blank"></span>');
  stemDiv.innerHTML = stemHtml;
  app.appendChild(stemDiv);

  // Options
  var optsWrap = H('div', {className:'options-wrap'});
  q.o.forEach(function(opt, oi) {
    var letter = String.fromCharCode(65 + oi);
    var isCorrect = letter === q.a;
    var userAnswer = ST.answers[qIdx];
    var isSelected = userAnswer === letter;

    var cls = 'opt-btn';
    if (answered) {
      if (isCorrect) cls += ' correct';
      else if (isSelected) cls += ' wrong';
      else if (isCorrect) cls += ' reveal';
    }

    var btn = H('button', {
      className: cls,
      disabled: answered,
      onClick: function() {
        if (answered) return;
        ST.answers[qIdx] = letter;
        ST.feedbackShown = true;
        if (!isCorrect) saveError({
          qIdx: qIdx, catIdx: ST.catIdx,
          stem: q.s, userAnswer: letter, correctAnswer: q.a,
          explain: q.e, time: new Date().toLocaleString('zh-CN')
        });
        saveSession();
        renderSCQuiz();
        window.scrollTo(0, 0);
      }
    }, [
      H('span', {className:'opt-letter'}, letter),
      H('span', null, opt.replace(/^[A-D]\.\s*/, ''))
    ]);
    optsWrap.appendChild(btn);
  });
  app.appendChild(optsWrap);

  // Feedback
  if (ST.feedbackShown && answered) {
    var isRight = ST.answers[qIdx] === q.a;
    var fb = H('div', {className:'feedback show'}, [
      H('div', {className:'fb-result ' + (isRight ? 'good' : 'bad')}, isRight ? '✅ 回答正确' : '❌ 回答错误'),
      H('div', {className:'fb-explain'}, q.e),
      q.t ? H('div', {className:'fb-tags'}, q.t) : null
    ]);
    app.appendChild(fb);
  }

  // Next button
  var nextBtn = H('button', {
    className: 'btn-next' + (answered ? ' show' : ''),
    onClick: function() {
      ST.feedbackShown = false;
      if (ST.curIdx < total - 1) {
        ST.curIdx++;
        renderSCQuiz();
        window.scrollTo(0, 0);
      } else {
        showSCResults();
      }
    }
  }, ST.curIdx < total - 1 ? '下一题 →' : '查看结果');
  app.appendChild(nextBtn);
}

function showSCResults() {
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var total = ST.shuffled.length;
  var correct = 0;
  ST.shuffled.forEach(function(qIdx) {
    if (ST.answers[qIdx] === cat.q[qIdx].a) correct++;
  });
  var score = correct;
  var pct = total > 0 ? Math.round(correct / total * 100) : 0;

  saveStats(pkey(), ST.catIdx, score, total);
  clearSession();

  var app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { clearSession(); renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, cat.n + ' · 结果'),
  ]));

  var cls = pct >= 80 ? 'good' : (pct < 60 ? 'bad' : '');
  app.appendChild(H('div', {className:'results-wrap'}, [
    H('div', {className:'score ' + cls}, correct + '/' + total),
    H('div', {className:'score-label'}, pct >= 80 ? '很棒！' : (pct >= 60 ? '继续加油！' : '需要多练习哦')),
    H('button', {className:'btn-restart', onClick: function() { startSCQuiz(ST.catIdx); }}, '重新练习'),
    H('button', {className:'btn-restart', style:'background:var(--gold-l);color:var(--gold-d);margin-top:6px;', onClick: function() { clearSession(); renderLanding(); }}, '返回列表'),
  ]));

  window.scrollTo(0, 0);
}

// ============================================================
// FILL-IN QUIZ (cloze, vocab_a, vocab_b, grammar)
// ============================================================
function startFillQuiz(idx) {
  ST.catIdx = idx;
  ST.view = 'quiz';
  if (ST.tab === 'cloze') { ST.clozeTexts = {}; ST.clozeSubmitted = false; }
  else if (ST.tab === 'vocab_a') { ST.vocabATexts = {}; ST.vocabASubmitted = false; }
  else if (ST.tab === 'vocab_b') { ST.vocabBTexts = {}; ST.vocabBSubmitted = false; }
  else if (ST.tab === 'grammar') { ST.grammarTexts = {}; ST.grammarSubmitted = false; }

  if (ST.tab === 'cloze') renderClozeQuiz();
  else if (ST.tab === 'vocab_a') renderVocabAQuiz();
  else if (ST.tab === 'vocab_b') renderVocabBQuiz();
  else if (ST.tab === 'grammar') renderGrammarQuiz();
  window.scrollTo(0, 0);
}

// ---- CLOZE B ----
function renderClozeQuiz() {
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { clearSession(); renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, cat.n),
  ]));

  // Word bank (sticky)
  var bankDiv = H('div', {className:'cloze-bank-ref'}, [
    H('div', {className:'cloze-bank-ref-label'}, '词库（在空格中填入单词的正确形式）'),
    H('div', {className:'cloze-bank-ref-words'},
      cat.bank.map(function(w) { return H('span', {className:'bank-ref-word'}, w); })
    ),
  ]);
  app.appendChild(bankDiv);

  // Passage with blanks
  var passageDiv = H('div', {className:'cloze-passage'});
  var parts = cat.passage.split(/(__\d+__)/g);
  parts.forEach(function(part) {
    var m = part.match(/^__(\d+)__$/);
    if (m) {
      var bn = parseInt(m[1]) - 1;
      var input = H('input', {
        className: 'cloze-input',
        type: 'text',
        autocomplete: 'off',
        autocorrect: 'off',
        autocapitalize: 'off',
        spellcheck: false,
        value: ST.clozeTexts[bn] || '',
        disabled: ST.clozeSubmitted,
        onInput: function(e) { ST.clozeTexts[bn] = e.target.value; saveSession(); }
      });
      passageDiv.appendChild(input);
    } else {
      passageDiv.appendChild(document.createTextNode(part));
    }
  });
  app.appendChild(passageDiv);

  // Submit
  var allFilled = cat.answers.every(function(_, j) { return ST.clozeTexts[j] && ST.clozeTexts[j].trim(); });
  var submitBtn = H('button', {
    className: 'cloze-submit' + (allFilled && !ST.clozeSubmitted ? ' ready' : ''),
    disabled: ST.clozeSubmitted,
    onClick: function() {
      var filled = cat.answers.every(function(_, j) { return ST.clozeTexts[j] && ST.clozeTexts[j].trim(); });
      if (!filled || ST.clozeSubmitted) return;
      ST.clozeSubmitted = true;
      saveSession();
      renderClozeQuiz();
      window.scrollTo(0, 0);
    }
  }, ST.clozeSubmitted ? '已提交' : '提交答案');
  app.appendChild(submitBtn);

  // Feedback after submit
  if (ST.clozeSubmitted) {
    var correct = 0;
    var total = cat.answers.length;
    cat.answers.forEach(function(_, j) {
      var userAns = (ST.clozeTexts[j] || '').trim();
      if (userAns === cat.inflections[j]) correct++;
    });
    saveStats(pkey(), cat.id, correct, total);

    var fbDiv = H('div', {className:'feedback show'});
    fbDiv.appendChild(H('div', {className:'fb-result ' + (correct === total ? 'good' : (correct < total * 0.6 ? 'bad' : ''))},
      '得分: ' + correct + '/' + total + ' (' + Math.round(correct / total * 100) + '%)'));
    cat.answers.forEach(function(_, j) {
      var userAns = (ST.clozeTexts[j] || '').trim();
      var right = userAns === cat.inflections[j];
      if (!right) saveError({
        qIdx: j, catIdx: ST.catIdx,
        stem: cat.passage, userAnswer: userAns || '未填',
        correctAnswer: cat.inflections[j],
        explain: cat.explain[j], time: new Date().toLocaleString('zh-CN')
      });
      var item = H('div', {className:'cloze-fb-item'}, [
        right ? '✅ ' : '❌ ',
        H('span', null, '空' + (j + 1) + ': '),
        H('span', {style:'color:' + (right ? 'var(--green)' : 'var(--red)')}, userAns || '未填'),
        !right ? H('span', {style:'color:var(--green)'}, ' → ' + cat.inflections[j]) : null,
        H('br'),
        H('span', {style:'font-size:11px;color:var(--muted)'}, cat.explain[j])
      ]);
      fbDiv.appendChild(item);
    });
    app.appendChild(fbDiv);

    app.appendChild(H('button', {
      className:'btn-next show',
      onClick: function() { clearSession(); renderLanding(); }
    }, '返回列表'));
    app.appendChild(H('button', {
      className:'btn-next show',
      style:'background:var(--gold-l);color:var(--gold-d);margin-top:4px;',
      onClick: function() { ST.clozeTexts = {}; ST.clozeSubmitted = false; saveSession(); renderClozeQuiz(); }
    }, '重新填写'));
  }
}

// ---- VOCAB A (方框选词 + 独立句) ----
function renderVocabAQuiz() {
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { clearSession(); renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, cat.n),
  ]));

  // Word bank
  var bankDiv = H('div', {className:'vocab-a-bank'}, [
    H('div', {className:'vocab-a-bank-label'}, '方框词库（每词限用一次，填入正确形式）'),
    H('div', {className:'vocab-a-bank-words'},
      cat.bank.map(function(w) { return H('span', {className:'bank-pill'}, w); })
    ),
  ]);
  app.appendChild(bankDiv);

  // Sentences
  var sentWrap = H('div', {className:'vocab-a-sentences'});
  cat.sentences.forEach(function(sent, si) {
    var sentDiv = H('div', {className:'vocab-a-sentence'});
    sentDiv.appendChild(H('span', {className:'s-num'}, '' + (si + 1)));
    var parts = sent.s.split(/_(3,)/g);
    parts.forEach(function(part, pi) {
      if (pi > 0) {
        var input = H('input', {
          className: 'vocab-a-input',
          type: 'text',
          autocomplete: 'off',
          spellcheck: false,
          disabled: ST.vocabASubmitted,
          value: ST.vocabATexts[si] || '',
          onInput: function(e) { ST.vocabATexts[si] = e.target.value; saveSession(); }
        });
        sentDiv.appendChild(input);
      }
      sentDiv.appendChild(document.createTextNode(part));
    });
    sentWrap.appendChild(sentDiv);
  });
  app.appendChild(sentWrap);

  // Submit
  var allFilled = cat.sentences.every(function(_, j) { return ST.vocabATexts[j] && ST.vocabATexts[j].trim(); });
  var submitBtn = H('button', {
    className: 'vocab-a-submit' + (allFilled && !ST.vocabASubmitted ? ' ready' : ''),
    disabled: ST.vocabASubmitted,
    onClick: function() {
      var filled = cat.sentences.every(function(_, j) { return ST.vocabATexts[j] && ST.vocabATexts[j].trim(); });
      if (!filled || ST.vocabASubmitted) return;
      ST.vocabASubmitted = true;
      saveSession();
      renderVocabAQuiz();
      window.scrollTo(0, 0);
    }
  }, ST.vocabASubmitted ? '已提交' : '提交答案');
  app.appendChild(submitBtn);

  if (ST.vocabASubmitted) renderFillFeedback(app, cat.sentences.map(function(s) { return s.a; }), cat.explain, ST.vocabATexts);
}

// ---- VOCAB B (短文+中文提示) ----
function renderVocabBQuiz() {
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { clearSession(); renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, cat.n),
  ]));

  // Passage with blanks + Chinese hints
  var passageDiv = H('div', {className:'vocab-b-passage'});
  var parts = cat.passage.split(/(__\d+__)/g);
  var hintIdx = 0;
  parts.forEach(function(part) {
    var m = part.match(/^__(\d+)__$/);
    if (m) {
      var bn = parseInt(m[1]) - 1;

      var wrap = H('span', {className:'vocab-b-blank-wrap'}, [

        H('input', {
          className: 'vocab-b-input',
          type: 'text',
          autocomplete: 'off',
          spellcheck: false,
          disabled: ST.vocabBSubmitted,

        })
      ]);
      passageDiv.appendChild(wrap);
    } else {
      passageDiv.appendChild(document.createTextNode(part));
    }
  });

  // Submit
  var allFilled = cat.answers.every(function(_, j) { return ST.vocabBTexts[j] && ST.vocabBTexts[j].trim(); });
  var submitBtn = H('button', {
    className: 'cloze-submit' + (allFilled && !ST.vocabBSubmitted ? ' ready' : ''),
    disabled: ST.vocabBSubmitted,
    onClick: function() {
      var filled = cat.answers.every(function(_, j) { return ST.vocabBTexts[j] && ST.vocabBTexts[j].trim(); });
      if (!filled || ST.vocabBSubmitted) return;
      ST.vocabBSubmitted = true;
      saveSession();
      renderVocabBQuiz();
      window.scrollTo(0, 0);
    }
  }, ST.vocabBSubmitted ? '已提交' : '提交答案');

}

// ---- GRAMMAR FILL (有/无提示词混合) ----
function renderGrammarQuiz() {
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { clearSession(); renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, cat.n),
  ]));

  // Passage with blanks + hint words
  var passageDiv = H('div', {className:'grammar-passage'});
  var parts = cat.passage.split(/(__\d+__)/g);
  parts.forEach(function(part) {
    var m = part.match(/^__(\d+)__$/);
    if (m) {
      var bn = parseInt(m[1]) - 1;
      var hint = cat.hints[bn] || '';
      var isNoHint = !hint;
      var wrap = H('span', {className:'grammar-blank-wrap'}, [
        hint ? H('span', {className:'grammar-hint'}, hint) : H('span', {className:'grammar-hint', style:'color:var(--red)'}, '无提示'),
        H('input', {
          className: 'grammar-input' + (isNoHint ? ' no-hint' : ''),
          type: 'text',
          autocomplete: 'off',
          spellcheck: false,
          disabled: ST.grammarSubmitted,
          value: ST.grammarTexts[bn] || '',
          onInput: function(e) { ST.grammarTexts[bn] = e.target.value; saveSession(); }
        })
      ]);
      passageDiv.appendChild(wrap);
    } else {
      passageDiv.appendChild(document.createTextNode(part));
    }
  });
  app.appendChild(passageDiv);

  // Submit
  var allFilled = cat.answers.every(function(_, j) { return ST.grammarTexts[j] && ST.grammarTexts[j].trim(); });
  var submitBtn = H('button', {
    className: 'cloze-submit' + (allFilled && !ST.grammarSubmitted ? ' ready' : ''),
    disabled: ST.grammarSubmitted,
    onClick: function() {
      var filled = cat.answers.every(function(_, j) { return ST.grammarTexts[j] && ST.grammarTexts[j].trim(); });
      if (!filled || ST.grammarSubmitted) return;
      ST.grammarSubmitted = true;
      saveSession();
      renderGrammarQuiz();
      window.scrollTo(0, 0);
    }
  }, ST.grammarSubmitted ? '已提交' : '提交答案');
  app.appendChild(submitBtn);

  if (ST.grammarSubmitted) renderFillFeedback(app, cat.answers, cat.explain, ST.grammarTexts, cat.id);
}

// ---- Shared fill-in feedback ----
function renderFillFeedback(app, answers, explains, texts, catId) {
  var correct = 0;
  var total = answers.length;
  answers.forEach(function(a, j) {
    var userAns = (texts[j] || '').trim();
    if (userAns === a) correct++;
    else saveError({
      qIdx: j, catIdx: ST.catIdx,
      stem: '', userAnswer: userAns || '未填',
      correctAnswer: a, explain: explains[j],
      time: new Date().toLocaleString('zh-CN')
    });
  });
  if (catId) saveStats(pkey(), catId, correct, total);

  var fbDiv = H('div', {className:'feedback show'});
  fbDiv.appendChild(H('div', {className:'fb-result ' + (correct === total ? 'good' : (correct < total * 0.6 ? 'bad' : ''))},
    '得分: ' + correct + '/' + total + ' (' + Math.round(correct / total * 100) + '%)'));
  answers.forEach(function(a, j) {
    var userAns = (texts[j] || '').trim();
    var right = userAns === a;
    var item = H('div', {className:'cloze-fb-item'}, [
      right ? '✅ ' : '❌ ',
      H('span', null, '空' + (j + 1) + ': '),
      H('span', {style:'color:' + (right ? 'var(--green)' : 'var(--red)')}, userAns || '未填'),
      !right ? H('span', {style:'color:var(--green)'}, ' → ' + a) : null,
      H('br'),
      H('span', {style:'font-size:11px;color:var(--muted)'}, explains[j])
    ]);
    fbDiv.appendChild(item);
  });
  app.appendChild(fbDiv);

  app.appendChild(H('button', {
    className:'btn-next show',
    onClick: function() { clearSession(); renderLanding(); }
  }, '返回列表'));
  app.appendChild(H('button', {
    className:'btn-next show',
    style:'background:var(--gold-l);color:var(--gold-d);margin-top:4px;',
    onClick: function() {
      if (ST.tab === 'cloze') { ST.clozeTexts = {}; ST.clozeSubmitted = false; }
      else if (ST.tab === 'vocab_a') { ST.vocabATexts = {}; ST.vocabASubmitted = false; }
      else if (ST.tab === 'vocab_b') { ST.vocabBTexts = {}; ST.vocabBSubmitted = false; }
      else if (ST.tab === 'grammar') { ST.grammarTexts = {}; ST.grammarSubmitted = false; }
      saveSession();
      if (ST.tab === 'cloze') renderClozeQuiz();
      else if (ST.tab === 'vocab_a') renderVocabAQuiz();
      else if (ST.tab === 'vocab_b') renderVocabBQuiz();
      else if (ST.tab === 'grammar') renderGrammarQuiz();
    }
  }, '重新填写'));
}

// ============================================================
// ERROR BOOK
// ============================================================
function renderErrorBook() {
  var allErrors = [];
  Object.keys(VERSIONS).forEach(function(v) {
    Object.keys(VERSIONS[v].tabs).forEach(function(t) {
      try {
        var key = 'jxmulti_' + v + '_' + t + '_errors';
        var errors = JSON.parse(localStorage.getItem(key) || '[]');
        errors.forEach(function(e) { e._ver = v; e._tab = t; });
        allErrors = allErrors.concat(errors);
      } catch(e) {}
    });
  });

  var app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, '错题本 (' + allErrors.length + '题)'),
    allErrors.length > 0 ? H('button', {
      className:'btn-back',
      style:'color:var(--red)',
      onClick: function() {
        Object.keys(VERSIONS).forEach(function(v) {
          Object.keys(VERSIONS[v].tabs).forEach(function(t) {
            localStorage.removeItem('jxmulti_' + v + '_' + t + '_errors');
          });
        });
        renderErrorBook();
      }
    }, '清空') : null
  ]));

  if (allErrors.length === 0) {
    app.appendChild(H('div', {className:'results-wrap'}, [
      H('div', {style:'font-size:14px;color:var(--muted);padding:20px;'}, '暂无错题，继续加油！')
    ]));
    return;
  }

  var list = H('div', {className:'err-list'});
  allErrors.reverse().forEach(function(e) {
    var verName = VERSIONS[e._ver] ? VERSIONS[e._ver].n : e._ver;
    var item = H('div', {className:'err-item'}, [
      H('div', {className:'err-stem'}, '[' + verName + '] ' + (e.stem || '题' + (e.qIdx + 1))),
      H('div', {className:'err-detail'}, [
        H('span', {className:'wrong'}, e.userAnswer || '未填'),
        ' → ',
        H('span', {className:'correct'}, e.correctAnswer),
      ]),
      e.explain ? H('div', {className:'err-detail', style:'margin-top:4px;color:var(--muted)'}, e.explain) : null,
      e.time ? H('div', {style:'font-size:10px;color:var(--muted);margin-top:2px;'}, e.time) : null
    ]);
    list.appendChild(item);
  });
  app.appendChild(list);
}

// ============================================================
// RESUME MODAL
// ============================================================
function showResumeModal(session) {
  var overlay = H('div', {className:'modal-overlay', onClick: function(e) { if (e.target === overlay) overlay.remove(); }});
  var box = H('div', {className:'modal-box'}, [
    H('h2', null, '恢复未完成的练习'),
    H('p', null, '检测到你有未完成的练习，是否继续？'),
    H('div', {className:'btn-row'}, [
      H('button', {
        className:'btn-primary',
        onClick: function() {
          overlay.remove();
          if (session.tab === 'sc') resumeSCQuiz(session);
          else {
            ST.catIdx = session.catIdx;
            ST.view = 'quiz';
            if (session.tab === 'cloze') { ST.clozeTexts = session.clozeTexts || {}; ST.clozeSubmitted = session.clozeSubmitted || false; }
            else if (session.tab === 'vocab_a') { ST.vocabATexts = session.vocabATexts || {}; ST.vocabASubmitted = session.vocabASubmitted || false; }
            else if (session.tab === 'vocab_b') { ST.vocabBTexts = session.vocabBTexts || {}; ST.vocabBSubmitted = session.vocabBSubmitted || false; }
            else if (session.tab === 'grammar') { ST.grammarTexts = session.grammarTexts || {}; ST.grammarSubmitted = session.grammarSubmitted || false; }
            if (ST.tab === 'cloze') renderClozeQuiz();
            else if (ST.tab === 'vocab_a') renderVocabAQuiz();
            else if (ST.tab === 'vocab_b') renderVocabBQuiz();
            else if (ST.tab === 'grammar') renderGrammarQuiz();
          }
        }
      }, '继续'),
      H('button', {
        className:'btn-secondary',
        onClick: function() { overlay.remove(); clearSession(); }
      }, '重新开始'),
    ])
  ]);
  document.body.appendChild(overlay);
}

function resumeSCQuiz(session) {
  ST.view = 'quiz';
  ST.catIdx = session.catIdx;
  ST.mode = session.mode || 'full';
  ST.shuffled = session.shuffled || [];
  ST.curIdx = session.curIdx || 0;
  ST.answers = session.answers || {};
  ST.feedbackShown = false;
  renderSCQuiz();
  window.scrollTo(0, 0);
}

// ============================================================
// INIT
// ============================================================
function init() {
  var resume = checkResume();
  if (resume) {
    renderLanding();
    showResumeModal(resume);
  } else {
    renderLanding();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
