// ===== STATE =====
var ST = {
  view: 'landing',
  catIdx: -1,
  mode: 'full',
  shuffled: [],
  wrongIds: [],
  curIdx: 0,
  answers: {},
  feedbackShown: false,
  catStats: {},
};

function loadStats() {
  try {
    var raw = localStorage.getItem('jx_sc_practice');
    if (raw) ST.catStats = JSON.parse(raw);
  } catch(e) { ST.catStats = {}; }
}
function saveStats() {
  try { localStorage.setItem('jx_sc_practice', JSON.stringify(ST.catStats)); } catch(e) {}
}
function getStats(catId) {
  return ST.catStats[catId] || { best:0, total:0, lastScore:0, wrongIds:[] };
}
function recordAttempt(catId, score, wrongIds) {
  var s = getStats(catId);
  if (score > s.best) s.best = score;
  s.total++;
  s.lastScore = score;
  s.wrongIds = wrongIds;
  ST.catStats[catId] = s;
  saveStats();
}

function shuffle(a) {
  var b = a.slice();
  for (var i = b.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = b[i]; b[i] = b[j]; b[j] = t;
  }
  return b;
}

// ===== RENDER =====
var app = document.getElementById('app');

function h(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    var v = attrs[k];
    if (v == null) continue;
    if (k === 'className') el.className = v;
    else if (k === 'dataset') for (var d in v) el.dataset[d] = v[d];
    else if (k === 'style') el.style.cssText = v;
    else if (k === 'disabled') el.disabled = true;
    else if (k === 'onclick') el.onclick = v;
    else el.setAttribute(k, v);
  }
  if (children) {
    if (typeof children === 'string') el.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) {
      if (typeof c === 'string') el.appendChild(document.createTextNode(c));
      else if (c) el.appendChild(c);
    });
    else if (children instanceof Node) el.appendChild(children);
  }
  return el;
}

function renderLanding() {
  ST.view = 'landing';
  app.innerHTML = '';

  app.appendChild(h('div', {className:'landing-header'}, [
    h('h1', {}, '江西中考单选 · 专项练习'),
    h('p', {}, '13个考点 × 50题  |  选你出错的考点，逐题练习'),
  ]));

  var grid = h('div', {className:'cat-grid'});
  QDATA.forEach(function(cat, i) {
    var stats = getStats(cat.id);
    var statText = stats.total > 0
      ? '最高 ' + stats.best + '/50  |  共练 ' + stats.total + ' 次'
      : '未练习';
    var card = h('div', {
      className:'cat-card',
      dataset: {idx: i},
      onclick: function() { startQuiz(i, 'full'); }
    }, [
      h('div', {className:'cat-name'}, cat.n),
      h('div', {className:'cat-desc'}, cat.d),
      h('div', {className:'cat-stat'}, statText),
    ]);
    grid.appendChild(card);
  });
  app.appendChild(grid);
}

function startQuiz(catIdx, mode) {
  ST.catIdx = catIdx;
  ST.mode = mode;
  ST.curIdx = 0;
  ST.answers = {};
  ST.feedbackShown = false;

  var cat = QDATA[catIdx];
  if (mode === 'wrong') {
    var stats = getStats(cat.id);
    ST.wrongIds = stats.wrongIds.slice();
    ST.shuffled = shuffle(ST.wrongIds);
  } else {
    var allIds = cat.q.map(function(_, i) { return i; });
    // Pool mode: randomly draw pool_size from all questions
    if (cat.ps && allIds.length > cat.ps) {
      allIds = shuffle(allIds).slice(0, cat.ps);
    }
    ST.shuffled = shuffle(allIds);
  }
  ST.view = 'quiz';
  renderQuiz();
}

function renderQuiz() {
  app.innerHTML = '';
  var cat = QDATA[ST.catIdx];
  var total = ST.shuffled.length;
  var progress = total > 0 ? Math.round((ST.curIdx) / total * 100) : 0;
  var qIdx = ST.shuffled[ST.curIdx];
  var q = cat.q[qIdx];
  var answered = ST.answers.hasOwnProperty(qIdx);
  var userAns = ST.answers[qIdx];

  // Top bar
  var topBar = h('div', {className:'quiz-top'}, [
    h('button', {className:'btn-back', onclick:goLanding}, '< 选题'),
    h('div', {className:'quiz-title'}, cat.n + (cat.ps ? ' (随机抽' + cat.ps + '题)' : '')),
  ]);
  app.appendChild(topBar);

  // Progress
  app.appendChild(h('div', {className:'progress-wrap'}, [
    h('div', {className:'progress-text'}, (ST.mode === 'wrong' ? '错题 ' : '第 ') + (ST.curIdx + 1) + '/' + total + ' 题'),
    h('div', {className:'progress-bar'}, [
      h('div', {className:'progress-fill', style:'width:' + progress + '%'})
    ]),
  ]));

  // Stem
  var stemHtml = q.s.replace(/____/g, '<span class="blank"></span>');
  var stemDiv = h('div', {className:'q-stem-display'});
  stemDiv.innerHTML = stemHtml;
  app.appendChild(stemDiv);

  // Options
  var optsWrap = h('div', {className:'options-wrap'});
  var letters = ['A','B','C','D'];
  q.o.forEach(function(opt, i) {
    var letter = letters[i];
    var btnClasses = ['opt-btn'];
    if (answered) {
      if (letter === q.a) {
        btnClasses.push(userAns === letter ? 'correct' : 'reveal');
      } else if (letter === userAns) {
        btnClasses.push('wrong');
      }
    }
    var btn = h('button', {
      className: btnClasses.join(' '),
      disabled: answered || null,
      dataset: {letter: letter},
      onclick: function() { selectAnswer(qIdx, letter); }
    }, [
      h('span', {className:'opt-letter'}, letter),
      opt.replace(/^[A-D]\.\s*/, ''),
    ]);
    optsWrap.appendChild(btn);
  });
  app.appendChild(optsWrap);

  // Feedback
  var fbClasses = ['feedback'];
  if (answered) fbClasses.push('show');
  var fb = h('div', {className: fbClasses.join(' ')});
  if (answered) {
    var isCorrect = userAns === q.a;
    fb.appendChild(h('div', {className:'fb-result ' + (isCorrect ? 'good' : 'bad')},
      isCorrect ? '✅ 回答正确！' : '❌ 回答错误，正确答案是 ' + q.a));
    fb.appendChild(h('div', {className:'fb-explain'}, q.e));
    if (q.sc) fb.appendChild(h('div', {className:'fb-tags'}, '📂 来源：' + q.sc));
    if (q.t) fb.appendChild(h('div', {className:'fb-tags'}, '🏛 ' + q.t));
  }
  app.appendChild(fb);

  // Next button
  var nextBtn = h('button', {
    className: 'btn-next' + (answered ? ' show' : ''),
    onclick: nextQuestion
  }, ST.curIdx + 1 >= total ? '查看结果 →' : '下一题 →');
  app.appendChild(nextBtn);

  ST.feedbackShown = answered;
  window.scrollTo(0, 0);
}

function selectAnswer(qIdx, letter) {
  if (ST.feedbackShown) return;
  ST.answers[qIdx] = letter;
  ST.feedbackShown = true;
  renderQuiz();
}
window.onerror = function(msg, url, line) {
  var el = document.getElementById('app');
  if (el) el.innerHTML = '<div style="padding:20px;color:red;">JS Error: ' + msg + ' at line ' + line + '</div>' + el.innerHTML;
};

function nextQuestion() {
  if (!ST.feedbackShown) return;
  ST.curIdx++;
  ST.feedbackShown = false;
  if (ST.curIdx >= ST.shuffled.length) {
    showResults();
  } else {
    renderQuiz();
    window.scrollTo(0, 0);
  }
}

function showResults() {
  ST.view = 'results';
  var cat = QDATA[ST.catIdx];
  var total = ST.shuffled.length;
  var correct = 0;
  var wrongIds = [];
  ST.shuffled.forEach(function(qIdx) {
    if (ST.answers[qIdx] === cat.q[qIdx].a) correct++;
    else wrongIds.push(qIdx);
  });

  if (ST.mode === 'full') {
    recordAttempt(cat.id, correct, wrongIds);
  }

  var pct = total > 0 ? Math.round(correct / total * 100) : 0;

  app.innerHTML = '';
  app.appendChild(h('div', {className:'results-wrap'}, [
    h('h2', {style:'font-size:18px;margin-bottom:4px;'}, cat.n),
    h('div', {style:'font-size:13px;color:var(--muted);margin-bottom:4px;'},
      ST.mode === 'wrong' ? '错题重做结果' : '练习结果'),
    h('div', {className:'score-circle'}, [
      h('div', {className:'score-num'}, correct + '/' + total),
      h('div', {className:'score-pct'}, pct + '%'),
    ]),
    h('div', {className:'score-msg'},
      pct >= 80 ? '🎉 很棒！继续保持！' : pct >= 60 ? '💪 还不错，错题再练一次！' : '📚 别灰心，仔细看解析再练！'),
  ]));

  // Wrong list
  if (wrongIds.length > 0) {
    var wl = h('div', {className:'wrong-list'});
    wl.appendChild(h('h3', {}, '错题回顾（' + wrongIds.length + ' 题）'));
    wrongIds.forEach(function(qIdx) {
      var q = cat.q[qIdx];
      var yourAns = ST.answers[qIdx];
      var item = h('div', {className:'wrong-item', onclick: function(e) {
        var detail = this.querySelector('.wi-detail');
        detail.classList.toggle('show');
      }}, [
        h('div', {className:'wi-top'}, [
          h('span', {className:'wi-num'}, '' + (q.i)),
          h('span', {className:'wi-stem'}, q.s),
          h('span', {className:'wi-answer'}, [
            h('span', {className:'wi-your'}, yourAns),
            h('span', {className:'wi-correct'}, q.a),
          ]),
        ]),
        h('div', {className:'wi-detail'}, q.e),
      ]);
      wl.appendChild(item);
    });
    app.appendChild(wl);
  }

  // Action buttons
  var btns = h('div', {className:'act-btns'});
  if (wrongIds.length > 0) {
    btns.appendChild(h('button', {
      className:'btn-act btn-primary',
      onclick: function() { startQuiz(ST.catIdx, 'wrong'); }
    }, '只做错题（' + wrongIds.length + ' 题）'));
  }
  btns.appendChild(h('button', {
    className:'btn-act btn-outline',
    onclick: function() { startQuiz(ST.catIdx, 'full'); }
  }, '再做一次'));
  btns.appendChild(h('button', {
    className:'btn-act btn-text',
    onclick: goLanding
  }, '返回选题'));
  app.appendChild(btns);

  window.scrollTo(0, 0);
}

function goLanding() {
  ST.view = 'landing';
  loadStats();
  renderLanding();
  window.scrollTo(0, 0);
}

// ===== INIT =====
loadStats();
renderLanding();
</script>
</body>
</html>
