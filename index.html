<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta property="og:title" content="江西中考单选 · 专项练习">
<meta property="og:description" content="13个考点 × 50题，按2026命题标准编写，逐题解析">
<title>江西中考单选 · 专项练习</title>
<style>
:root {
  --bg: #FDFBF7; --card: #fff; --text: #2c2418; --sub: #3a3028;
  --muted: #8a8070; --gold: #b8a080; --gold-d: #9b7d5a; --gold-l: #f7f3eb;
  --border: #e0d6c8;
  --green: #4a7a40; --green-bg: #e6f0e2;
  --red: #b84a3a; --red-bg: #fce6e0;
  --blue: #4a6fa5;
}
* { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; -webkit-text-size-adjust:100%; }
body {
  font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  background:var(--bg); color:var(--text); line-height:1.6;
  min-height:100dvh; min-height:100vh;
  display:flex; justify-content:center;
}
#app { width:100%; max-width:480px; padding:16px; padding-bottom:env(safe-area-inset-bottom,16px); }

/* ===== LANDING ===== */
.landing-header { text-align:center; padding:24px 0 16px; }
.landing-header h1 { font-size:22px; color:var(--text); margin-bottom:4px; }
.landing-header p { font-size:13px; color:var(--muted); }
.cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding-bottom:24px; }
.cat-card {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px; cursor:pointer; transition:border-color .2s,box-shadow .2s;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  display:flex; flex-direction:column; gap:4px; min-height:90px;
}
.cat-card:active, .cat-card:hover { border-color:var(--gold); box-shadow:0 2px 8px rgba(184,160,128,.15); }
.cat-card .cat-name { font-size:15px; font-weight:700; color:var(--text); }
.cat-card .cat-desc { font-size:11px; color:var(--muted); line-height:1.4; flex:1; }
.cat-card .cat-stat { font-size:11px; color:var(--gold-d); margin-top:2px; }

/* ===== QUIZ ===== */
.quiz-top { display:flex; align-items:center; gap:10px; padding:8px 0 12px; }
.btn-back {
  background:none; border:1px solid var(--border); border-radius:8px;
  padding:6px 12px; font-size:13px; color:var(--text); cursor:pointer;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent;
}
.btn-back:active { background:var(--gold-l); }
.quiz-title { font-size:15px; font-weight:700; flex:1; }
.progress-wrap { padding:0 0 16px; }
.progress-text { font-size:12px; color:var(--muted); margin-bottom:4px; }
.progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:var(--gold); border-radius:3px; transition:width .3s; }

.q-stem-display {
  font-family:Georgia,"Times New Roman",serif; font-size:17px; line-height:1.6;
  padding:16px; background:var(--card); border-radius:10px; border:1px solid var(--border);
  margin-bottom:14px; text-align:center;
}
.q-stem-display .blank { border-bottom:2px dashed var(--gold); padding:0 30px; }

.options-wrap { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.opt-btn {
  display:flex; align-items:center; gap:10px; width:100%; min-height:52px;
  padding:12px 14px; border:1.5px solid var(--border); border-radius:10px;
  background:var(--card); font-size:15px; color:var(--text); cursor:pointer;
  transition:background .15s,border-color .15s;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent; text-align:left;
}
.opt-btn:active { background:var(--gold-l); }
.opt-letter {
  width:28px; height:28px; border-radius:50%; background:var(--gold-l);
  color:var(--gold-d); font-weight:700; font-size:13px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.opt-btn.correct { background:var(--green-bg); border-color:var(--green); }
.opt-btn.correct .opt-letter { background:var(--green); color:#fff; }
.opt-btn.wrong { background:var(--red-bg); border-color:var(--red); }
.opt-btn.wrong .opt-letter { background:var(--red); color:#fff; }
.opt-btn.reveal { border-color:var(--green); }
.opt-btn:disabled { pointer-events:none; }

.feedback {
  background:var(--card); border-radius:10px; padding:14px; margin-bottom:12px;
  border:1px solid var(--border); display:none;
}
.feedback.show { display:block; }
.feedback .fb-result { font-size:15px; font-weight:700; margin-bottom:6px; }
.feedback .fb-result.good { color:var(--green); }
.feedback .fb-result.bad { color:var(--red); }
.feedback .fb-explain { font-size:13px; color:var(--sub); line-height:1.5; }
.feedback .fb-tags { font-size:12px; color:var(--gold-d); margin-top:6px; }

.btn-next {
  width:100%; min-height:50px; border:none; border-radius:10px;
  background:var(--gold); color:#fff; font-size:16px; font-weight:700;
  cursor:pointer; transition:background .2s; display:none;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent;
}
.btn-next:active { background:var(--gold-d); }
.btn-next.show { display:block; }

/* ===== RESULTS ===== */
.results-wrap { text-align:center; }
.score-circle {
  width:140px; height:140px; border-radius:50%; margin:20px auto 16px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  border:4px solid var(--gold); background:var(--card);
}
.score-num { font-size:36px; font-weight:700; color:var(--text); }
.score-pct { font-size:14px; color:var(--muted); }
.score-msg { font-size:14px; color:var(--sub); margin-bottom:8px; }

.wrong-list { text-align:left; margin:16px 0; }
.wrong-list h3 { font-size:15px; margin-bottom:8px; color:var(--text); }
.wrong-item {
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; margin-bottom:6px; cursor:pointer;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent;
}
.wrong-item:active { background:var(--gold-l); }
.wrong-item .wi-top { display:flex; align-items:center; gap:8px; font-size:13px; }
.wrong-item .wi-num {
  background:var(--red-bg); color:var(--red); width:24px; height:24px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:12px; flex-shrink:0;
}
.wrong-item .wi-stem { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.wrong-item .wi-answer { font-size:12px; }
.wrong-item .wi-your { color:var(--red); text-decoration:line-through; margin-right:4px; }
.wrong-item .wi-correct { color:var(--green); font-weight:700; }
.wrong-item .wi-detail { display:none; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); font-size:12px; color:var(--sub); }
.wrong-item .wi-detail.show { display:block; }

.act-btns { display:flex; flex-direction:column; gap:8px; margin-top:16px; padding-bottom:24px; }
.btn-act {
  width:100%; min-height:50px; border-radius:10px; font-size:16px; font-weight:700;
  cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  transition:background .2s; border:none;
}
.btn-primary { background:var(--gold); color:#fff; }
.btn-primary:active { background:var(--gold-d); }
.btn-outline { background:var(--card); color:var(--text); border:1.5px solid var(--border); }
.btn-outline:active { background:var(--gold-l); }
.btn-text { background:none; border:none; color:var(--muted); font-size:14px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===== DATA =====
var QDATA = [{"id":"conjunctions","n":"连词辨析","d":"六年必考（2020-2025每年必考）","dd":"覆盖因果、转折、条件、让步、时间、选择六种逻辑关系。对话体≥60%，题干8-16词。核心区分：because（因）vs so（果）、though（让步）vs but（转折）不可同句连用。","q":[{"i":1,"s":"She was late for school ____ the bus didn't come on time.","o":["A. because","B. although","C. unless","D. while"],"a":"A","e":"因果关系。前果后因，because引导原因状语从句，解释迟到的原因。although表让步，unless表条件，while表时间或对比，均不合逻辑。"},{"i":2,"s":"The problem was very difficult, ____ he worked it out in the end.","o":["A. so","B. but","C. because","D. if"],"a":"B","e":"转折关系。问题很难，但他最终解出来了。前后分句语义相反，需用but。"},{"i":3,"s":"____ it snows tomorrow, we will make a snowman together.","o":["A. Because","B. Though","C. If","D. Until"],"a":"C","e":"条件关系。假设明天下雪就一起堆雪人。if引导真实条件句。"},{"i":4,"s":"The students stopped talking ____ the teacher walked into the room.","o":["A. unless","B. until","C. although","D. when"],"a":"D","e":"时间关系。老师进来那一刻学生停止说话。when表示一个动作发生时另一个动作也发生。"},{"i":5,"s":"He was very tired, ____ he fell asleep on the sofa.","o":["A. so","B. but","C. or","D. and"],"a":"A","e":"因果关系。因为很累所以在沙发上睡着了。so前因后果。"},{"i":6,"s":"Dad likes watching the news, ____ Mom enjoys music shows.","o":["A. so","B. while","C. unless","D. because"],"a":"B","e":"对比关系。爸爸喜欢看新闻而妈妈喜欢音乐节目，while表前后对比。"},{"i":7,"s":"____ he is only fourteen, he can play three musical instruments.","o":["A. If","B. Because","C. Although","D. Unless"],"a":"C","e":"让步关系。虽然只有十四岁，但能演奏三种乐器。although引导让步状语从句。"},{"i":8,"s":"Read the questions carefully ____ you start answering them.","o":["A. after","B. although","C. because","D. before"],"a":"D","e":"时间先后关系。答题之前先仔细读题。before表在...之前。"},{"i":9,"s":"She waited at the bus stop ____ the last bus finally arrived.","o":["A. until","B. because","C. although","D. if"],"a":"A","e":"时间关系。一直等到末班车来。until表动作持续到某个时间点为止。"},{"i":10,"s":"Put on more clothes, ____ you will catch a cold.","o":["A. so","B. or","C. but","D. and"],"a":"B","e":"选择/否则关系。祈使句+or+陈述句=否则。多穿点否则会感冒。"},{"i":11,"s":"____ you are not feeling well, you should go to see a doctor.","o":["A. Unless","B. Since","C. Although","D. Before"],"a":"B","e":"原因关系。既然身体不舒服就应该去看医生。since=because表原因。"},{"i":12,"s":"____ the road was icy, he still rode his bike to work.","o":["A. Because","B. If","C. When","D. Though"],"a":"D","e":"让步关系。虽然路面结冰，但仍骑自行车上班。though引导让步状语从句。"},{"i":13,"s":"The children always wash their hands ____ they play outside.","o":["A. after","B. before","C. until","D. unless"],"a":"A","e":"时间先后关系。在外面玩完之后洗手。after表在...之后。"},{"i":14,"s":"I am not sure ____ he can come to my party this Sunday.","o":["A. unless","B. whether","C. because","D. although"],"a":"B","e":"选择/是否关系。whether引导宾语从句表是否，与not sure搭配。"},{"i":15,"s":"She walked along the street ____ sang a happy song.","o":["A. but","B. or","C. so","D. as"],"a":"D","e":"时间同时关系。as=while表一边...一边...，两个动作同时进行。"},{"i":16,"s":"— Can I play computer games now? — Not ____ you finish your homework first.","o":["A. if","B. while","C. because","D. unless"],"a":"D","e":"条件否定关系。unless=if...not，除非你先完成作业否则不能玩游戏。"},{"i":17,"s":"— This dress looks beautiful! — ____ it doesn't feel comfortable on me.","o":["A. But","B. So","C. Or","D. And"],"a":"A","e":"转折关系。裙子好看但是穿着不舒服。but连接两个语义相反的评价。"},{"i":18,"s":"— Why were you so worried? — ____ I couldn't find my little dog anywhere.","o":["A. Although","B. Unless","C. Because","D. Until"],"a":"C","e":"因果关系。Why提问原因，because给出原因解释。"},{"i":19,"s":"— Lucy enjoys dancing every evening. — ____ her brother can't even stand still.","o":["A. Because","B. While","C. Unless","D. Until"],"a":"B","e":"对比关系。Lucy喜欢跳舞而她的弟弟连站都站不稳。while表前后对比。"},{"i":20,"s":"— The last train has already left. — ____ we need to find another way home.","o":["A. So","B. But","C. Or","D. And"],"a":"A","e":"因果关系。末班车走了所以需要另找办法回家。so前因后果。"},{"i":21,"s":"— ____ Mrs. Wang comes back, can you ask her to call me? — Sure, I will.","o":["A. Though","B. Because","C. If","D. While"],"a":"C","e":"条件关系。如果王老师回来了，让她给我打电话。if引导条件状语从句。"},{"i":22,"s":"— Did you hear me ____ I knocked on your door? — No, I was listening to music.","o":["A. until","B. unless","C. because","D. when"],"a":"D","e":"时间关系。我敲门的时候你听到了吗。when表一个动作发生的具体时间点。"},{"i":23,"s":"— Did you go over your test paper? — Yes, I checked everything ____ I handed it in.","o":["A. after","B. before","C. while","D. until"],"a":"B","e":"时间先后关系。交卷之前检查了所有内容。before表在...之前。"},{"i":24,"s":"— He's only sixteen years old. — ____ he can already fix computers by himself.","o":["A. Although","B. Because","C. Unless","D. Since"],"a":"A","e":"让步关系。虽然只有十六岁但已能自己修电脑。although引导让步状语从句。"},{"i":25,"s":"— Did you go hiking by yourself? — ____ no one else was free, I went alone.","o":["A. Unless","B. Though","C. Since","D. While"],"a":"C","e":"原因关系。既然没有其他人有空，我就自己去了。since表既然。"},{"i":26,"s":"I didn't know the truth ____ my best friend told me everything that night.","o":["A. when","B. after","C. before","D. until"],"a":"D","e":"时间关系。直到好朋友告诉我才知道真相。not...until结构。"},{"i":27,"s":"— Let's run a bit faster. — ____ we'll miss the beginning of the show.","o":["A. So","B. Or","C. But","D. And"],"a":"B","e":"选择/否则关系。跑快点，否则会错过开场。祈使句+or表否则。"},{"i":28,"s":"— Did you feel scared during the storm? — A little, but I was fine ____ it passed.","o":["A. unless","B. although","C. after","D. before"],"a":"C","e":"时间先后关系。暴风雨过去之后我就没事了。after表在...之后。"},{"i":29,"s":"— What did you do ____ you were waiting for the bus? — I read a few pages of my book.","o":["A. unless","B. because","C. although","D. while"],"a":"D","e":"时间关系。等公交车的时候你在做什么。while表两个动作同时持续进行。"},{"i":30,"s":"____ he is over sixty years old, he still runs three miles every day.","o":["A. Even though","B. As long as","C. As soon as","D. So that"],"a":"A","e":"让步关系。虽然六十多岁了，但仍每天跑三英里。even though=although。"},{"i":31,"s":"— You knew the classroom rules. — ____ I still broke one of them today.","o":["A. But","B. So","C. Or","D. And"],"a":"A","e":"转折关系。你知道班规——但我今天还是违反了一条。but表示前后语义转折。"},{"i":32,"s":"— Do you think they'll arrive on time? — Not ____ the traffic gets better soon.","o":["A. if","B. although","C. unless","D. because"],"a":"C","e":"条件否定关系。unless=if...not，除非交通很快好转否则不能准时到。"},{"i":33,"s":"— Did you open your eyes right away? — No, I counted to ten ____ I opened them.","o":["A. after","B. before","C. because","D. unless"],"a":"B","e":"时间先后关系。数到十之后才睁开眼睛。before表在...之前才。"},{"i":34,"s":"— Why did you pay for the meal? — ____ it was her birthday, I wanted to treat her.","o":["A. Although","B. Unless","C. While","D. Since"],"a":"D","e":"原因关系。因为是她生日所以请她吃饭。since表既然/因为。"},{"i":35,"s":"— This backpack looks so small! — ____ it seems tiny, it can hold fifteen books easily.","o":["A. If","B. Because","C. While","D. Though"],"a":"D","e":"让步关系。虽然它看起来小，但其实能装十五本书。though引导让步状语从句。"},{"i":36,"s":"— I'd love to visit Lushan Mountain one day. — ____ you go there in spring, the flowers are amazing.","o":["A. If","B. Though","C. Because","D. Until"],"a":"A","e":"条件关系。如果你春天去庐山，花会很美。if引导条件句。","t":"🏛 庐山"},{"i":37,"s":"____ Jinggangshan means a lot to China's history, many students visit it for school trips.","o":["A. Unless","B. Since","C. Although","D. While"],"a":"B","e":"原因关系。既然井冈山在历史上意义重大，许多学生去那里研学旅行。since表原因。","t":"🏛 井冈山"},{"i":38,"s":"____ Jingdezhen is not a big city, people all over the world know its name.","o":["A. Because","B. Unless","C. While","D. Since"],"a":"C","e":"让步关系。虽然景德镇不是大城市，但全世界的人都知道它的名字。while在此表让步。","t":"🏛 景德镇"},{"i":39,"s":"— Is Tengwang Pavilion worth a visit? — Yes. ____ you step inside, you'll understand why.","o":["A. Unless","B. Because","C. Once","D. Although"],"a":"C","e":"时间/条件关系。一旦你走进去就会明白。once=as soon as。","t":"🏛 滕王阁"},{"i":40,"s":"Bailudong Academy had been teaching students for hundreds of years ____ modern schools appeared.","o":["A. after","B. until","C. since","D. before"],"a":"D","e":"时间先后关系。在现代学校出现之前，白鹿洞书院已经教书育人几百年了。before表在...之前。","t":"🏛 白鹿洞书院"},{"i":41,"s":"— When did you finally get the answer? — It wasn't ____ the teacher gave us a hint.","o":["A. when","B. before","C. until","D. after"],"a":"C","e":"时间关系。直到老师给了提示才得到答案。not...until固定结构。"},{"i":42,"s":"— Do you still write to your pen friend? — Not really. It's been three months ____ I last heard from her.","o":["A. since","B. when","C. before","D. after"],"a":"A","e":"时间关系。It is/has been + 时间段 + since固定句型。"},{"i":43,"s":"— Did the two brothers get back in touch quickly? — No, many years went by ____ they met again.","o":["A. when","B. before","C. until","D. since"],"a":"B","e":"时间先后关系。过了很多年才再次见面。before表在...之前才。"},{"i":44,"s":"— Can I get close to the hot stove? — No, stay away, ____ you could burn yourself badly.","o":["A. so","B. but","C. and","D. or"],"a":"D","e":"选择/否则关系。祈使句+or=否则。离远点，否则会烫伤。"},{"i":45,"s":"— Do you and your best friend like the same things? — Not really. ____ I'm into sports, he enjoys reading quietly.","o":["A. While","B. Unless","C. Because","D. After"],"a":"A","e":"对比关系。我喜欢运动而他喜欢安静读书。while表前后对比。"},{"i":46,"s":"— When did she open her first shop? — ____ she was still a student in college.","o":["A. While","B. Because","C. After","D. Unless"],"a":"A","e":"时间关系。当她还是个大学生时就开了第一家店。while表当...的时候。"},{"i":47,"s":"Not ____ the school bell rang did the children run out of the classroom.","o":["A. after","B. until","C. when","D. before"],"a":"B","e":"时间关系。Not until+倒装结构，直到铃响孩子们才跑出教室。"},{"i":48,"s":"— Is it easy to stop a bad habit? — No, ____ you start one, it's really hard to get rid of it.","o":["A. Unless","B. Although","C. Before","D. Once"],"a":"D","e":"时间/条件关系。一旦养成坏习惯就很难改掉。once=as soon as。"},{"i":49,"s":"No sooner had the meeting ended ____ everyone rushed to the dining hall.","o":["A. when","B. than","C. then","D. before"],"a":"B","e":"时间关系。No sooner...than固定搭配，一...就...。学生极易与hardly...when混淆。"},{"i":50,"s":"The real question is ____ we should keep the old plan or start something new.","o":["A. because","B. although","C. whether","D. unless"],"a":"C","e":"选择/是否关系。whether...or结构引导表语从句。"}]},{"id":"nouns","n":"名词词义辨析","d":"六年考频2/6（2022、2024）","dd":"前句行为描述→后句名词归类匹配。四选项同语义场、同搭配结构。覆盖职业/地点/工具/交通工具/食物等高频名词。对话体≥50%。","q":[{"i":1,"s":"Tom likes singing and dancing. He joins the ______ group.","o":["A. music","B. sport","C. art","D. science"],"a":"A","e":"前句线索singing and dancing→music group（音乐社团）。sport运动、art美术、science科学，都与唱跳无关。"},{"i":2,"s":"Lucy often helps her mother cook meals. The ______ is her favorite place.","o":["A. bedroom","B. kitchen","C. bathroom","D. garden"],"a":"B","e":"前句线索cook meals→kitchen（厨房）。bedroom卧室、bathroom浴室、garden花园，都不是做饭的地方。"},{"i":3,"s":"Mike reads books every evening. Reading is his favorite ______.","o":["A. subject","B. sport","C. hobby","D. job"],"a":"C","e":"前句线索reads books every evening→hobby（爱好），是课余经常做的事。subject科目、sport运动、job工作，都不符合每天读书的行为描述。"},{"i":4,"s":"It's raining outside. Take a(n) ______ with you.","o":["A. bag","B. hat","C. coat","D. umbrella"],"a":"D","e":"前句线索raining→umbrella（雨伞）。bag包、hat帽子、coat外套，虽然下雨天也可能带，但raining直接指向挡雨工具。"},{"i":5,"s":"My father works on a farm. He is a ______.","o":["A. farmer","B. driver","C. doctor","D. teacher"],"a":"A","e":"前句线索on a farm→farmer（农民）。driver司机、doctor医生、teacher老师，都不在农场工作。"},{"i":6,"s":"I want to send a letter. I need a ______.","o":["A. ticket","B. stamp","C. card","D. key"],"a":"B","e":"前句线索send a letter→stamp（邮票）。ticket票、card卡片、key钥匙，都不是寄信必需的东西。"},{"i":7,"s":"We can see many animals there. It's a ______.","o":["A. park","B. farm","C. zoo","D. school"],"a":"C","e":"前句线索many animals→zoo（动物园）。park公园以植物为主、farm农场以家畜为主、school学校，都不是集中看动物的地方。"},{"i":8,"s":"She goes to the ______ to borrow some books.","o":["A. museum","B. cinema","C. hospital","D. library"],"a":"D","e":"前句线索borrow some books→library（图书馆）。museum博物馆、cinema电影院、hospital医院，都不提供借书服务。"},{"i":9,"s":"The boy is good at running. He wins the 100-meter ______.","o":["A. race","B. game","C. match","D. party"],"a":"A","e":"前句线索running + 100-meter→race（赛跑）。game/party是娱乐活动，match多指球类比赛。100-meter专指竞速项目。"},{"i":10,"s":"My sister studies very hard. She is the top ______ in her class.","o":["A. teacher","B. student","C. worker","D. player"],"a":"B","e":"前句线索studies + in her class→student（学生）。teacher老师、worker工人、player运动员，与study行为不符。"},{"i":11,"s":"I'm thirsty. I'd like a glass of ______.","o":["A. bread","B. rice","C. water","D. meat"],"a":"C","e":"前句线索thirsty→water（水）。bread面包、rice米饭、meat肉都是食物，解渴必须喝水。"},{"i":12,"s":"The ______ is shining brightly. Let's go out and play.","o":["A. moon","B. star","C. cloud","D. sun"],"a":"D","e":"前句线索shining brightly→sun（太阳）。moon月亮、star星星亮度不够，cloud云不发光。"},{"i":13,"s":"He plays the piano every day. He loves ______.","o":["A. music","B. sport","C. art","D. dance"],"a":"A","e":"前句线索plays the piano→music（音乐）。sport运动、art美术、dance舞蹈，与弹钢琴的活动不对应。"},{"i":14,"s":"They grow rice and vegetables there. It's a ______.","o":["A. garden","B. farm","C. park","D. forest"],"a":"B","e":"前句线索grow rice and vegetables→farm（农场）。garden花园规模小、park公园和forest森林不种庄稼。"},{"i":15,"s":"Jane can draw beautiful pictures. She wants to be a(n) ______.","o":["A. writer","B. singer","C. artist","D. dancer"],"a":"C","e":"前句线索draw beautiful pictures→artist（画家/艺术家）。writer作家、singer歌手、dancer舞者，与画画行为无关。"},{"i":16,"s":"David always tells the truth. He is known for his ______.","o":["A. kindness","B. courage","C. patience","D. honesty"],"a":"D","e":"前句线索tells the truth→honesty（诚实）。kindness友善、courage勇气、patience耐心，不是说真话直接体现的品质。"},{"i":17,"s":"She gets up at 5:30 and runs every morning. It's a good ______.","o":["A. habit","B. lesson","C. dream","D. plan"],"a":"A","e":"前句线索gets up + runs every morning→habit（习惯），每天重复的行为。lesson课、dream梦想、plan计划，都不强调每日重复性。"},{"i":18,"s":"The question is too hard. Nobody knows the ______.","o":["A. reason","B. answer","C. truth","D. idea"],"a":"B","e":"question对answer，固定搭配。reason原因、truth真相、idea想法，与问题太难的语境不搭。"},{"i":19,"s":"Don't tell this to anyone. It's a ______ between us.","o":["A. message","B. letter","C. secret","D. story"],"a":"C","e":"前句线索Don't tell anyone→secret（秘密）。message消息、letter信、story故事，不要告诉任何人就是秘密。"},{"i":20,"s":"The boy saved a child from the river. He showed great ______.","o":["A. confidence","B. patience","C. kindness","D. courage"],"a":"D","e":"前句线索saved a child from the river→courage（勇气），救人需要勇敢。confidence信心、patience耐心、kindness友善，都不直接对应危险救援行为。"},{"i":21,"s":"We need to buy some bread. Let's go to the ______.","o":["A. store","B. bank","C. library","D. hospital"],"a":"A","e":"前句线索buy some bread→store（商店）。bank银行、library图书馆、hospital医院都不卖面包。"},{"i":22,"s":"He failed the exam because of one ______. He chose the wrong word.","o":["A. reason","B. mistake","C. problem","D. change"],"a":"B","e":"前句线索chose the wrong word→mistake（错误）。reason原因、problem问题、change变化，选错词就是犯了一个错误。"},{"i":23,"s":"The room is too dark. Please turn on the ______.","o":["A. fan","B. TV","C. light","D. radio"],"a":"C","e":"前句线索dark→light（灯）。fan风扇、TV电视、radio收音机，都不解决黑暗的问题。"},{"i":24,"s":"My mother is making a shopping ______ before we go out.","o":["A. note","B. plan","C. rule","D. list"],"a":"D","e":"shopping list是固定搭配（购物清单）。note笔记、plan计划、rule规则，shopping list是地道的英文表达。"},{"i":25,"s":"The film is about a true story from ______. It happened in 1949.","o":["A. history","B. science","C. nature","D. culture"],"a":"A","e":"前句线索1949→history（历史）。science科学、nature自然、culture文化，1949年的事件属于历史范畴。"},{"i":26,"s":"I don't know which one to buy. Can you give me some ______?","o":["A. news","B. advice","C. information","D. knowledge"],"a":"B","e":"前句线索don't know which one to buy→advice（建议），需要别人给建议。news新闻、information信息、knowledge知识，都不表示出主意。"},{"i":27,"s":"Jack waited for two hours without getting angry. He has great ______.","o":["A. courage","B. kindness","C. patience","D. honesty"],"a":"C","e":"前句线索waited for two hours without getting angry→patience（耐心）。courage勇气、kindness友善、honesty诚实，两个小时不生气就是耐心。"},{"i":28,"s":"There will be a football ______ between Class 1 and Class 2.","o":["A. party","B. lesson","C. speech","D. match"],"a":"D","e":"football + between Class 1 and Class 2→match（比赛）。party聚会、lesson课、speech演讲，football配合match是固定搭配。"},{"i":29,"s":"I like acting and being on stage. I'm in the ______ group.","o":["A. theater","B. chess","C. speech","D. science"],"a":"A","e":"前句线索acting + on stage→theater（戏剧/话剧）。chess国际象棋、speech演讲、science科学社团，与表演无关。"},{"i":30,"s":"Lushan is a famous ______ in Jiangxi. Many tourists climb it every year.","o":["A. river","B. mountain","C. lake","D. forest"],"a":"B","e":"前句线索Lushan + climb→mountain（山）。river河流、lake湖、forest森林，庐山是山，用climb爬也是山的行为。","t":"庐山是江西著名文化景观。"},{"i":31,"s":"The old man told us an interesting ______ about his childhood.","o":["A. joke","B. song","C. story","D. report"],"a":"C","e":"前句线索about his childhood→story（故事），童年经历就是故事。joke笑话太短、song歌曲、report报告，都不适合承载童年回忆。"},{"i":32,"s":"We should save every drop of water. Water is a valuable ______.","o":["A. gift","B. secret","C. tool","D. resource"],"a":"D","e":"前句线索save every drop of water→resource（资源），水是自然资源。gift礼物、secret秘密、tool工具，都不表达自然资源的概念。"},{"i":33,"s":"She spent a lot of ______ preparing for the English exam.","o":["A. effort","B. money","C. time","D. energy"],"a":"A","e":"spent effort是固定搭配，表示投入精力。money钱、time时间、energy能量，虽然spent time也对，但prepare for exam更强调努力而非单纯时间。"},{"i":34,"s":"He gave me a warm ______ and said hello. I felt welcome.","o":["A. letter","B. smile","C. gift","D. word"],"a":"B","e":"前句线索warm→smile（微笑），warm smile是常见搭配。letter信、gift礼物、word话，warm修饰smile最自然。"},{"i":35,"s":"The ______ of this bag is too high. I can't afford it.","o":["A. size","B. color","C. price","D. weight"],"a":"C","e":"前句线索can't afford it→price（价格）。size尺寸、color颜色、weight重量，买不起说的就是价格问题。"},{"i":36,"s":"The teacher explained the new word again. I finally got the ______.","o":["A. reason","B. answer","C. truth","D. meaning"],"a":"D","e":"前句线索explained the new word→meaning（词义）。reason原因、answer答案、truth真相，老师解释单词后学生理解的是词义。"},{"i":37,"s":"Before writing, you need a clear ______ of what you want to say.","o":["A. idea","B. word","C. sentence","D. passage"],"a":"A","e":"前句线索before writing→idea（想法/构思），写作前先有想法。word词、sentence句子、passage段落，都是写作产物而非前置构思。"},{"i":38,"s":"She stood up and gave a ______ about school safety at the meeting.","o":["A. talk","B. speech","C. report","D. lesson"],"a":"B","e":"give a speech是固定搭配（发表演讲），at the meeting暗示正式场合。talk太随意、report报告、lesson课，give a speech最正式。"},{"i":39,"s":"Jingdezhen is known for its beautiful cups and plates. It's a city of ______.","o":["A. music","B. sports","C. art","D. trade"],"a":"C","e":"前句线索beautiful cups and plates→art（艺术/工艺），制瓷属于工艺美术。music音乐、sports运动、trade贸易，杯盘制作是art范畴。","t":"景德镇是江西著名瓷都，以陶瓷工艺闻名。"},{"i":40,"s":"It took him years of hard work, but he finally achieved his ______.","o":["A. problem","B. lesson","C. trouble","D. goal"],"a":"D","e":"前句线索years of hard work + achieved→goal（目标）。problem问题、lesson课、trouble麻烦，长年努力换来的是达成目标。"},{"i":41,"s":"She has a strong ______ that she can pass the driving test.","o":["A. belief","B. reason","C. secret","D. interest"],"a":"A","e":"have a strong belief + that从句（相信能通过考试）。reason原因、secret秘密、interest兴趣，只有belief可以接that从句表信念。"},{"i":42,"s":"The ______ between Jake and his brother is clear. One loves sports; the other loves books.","o":["A. problem","B. difference","C. fight","D. secret"],"a":"B","e":"前句线索One loves sports; the other loves books→difference（差异）。problem问题、fight打架、secret秘密，两兄弟爱好不同就是差异。"},{"i":43,"s":"He made a wise ______ to study abroad. It changed his life.","o":["A. change","B. plan","C. choice","D. wish"],"a":"C","e":"made a choice是固定搭配（做出选择），且wise修饰choice最自然。change变化、plan计划、wish愿望，出国读书是一个人生选择。"},{"i":44,"s":"The boy was filled with ______ when he first saw the sea.","o":["A. fear","B. anger","C. sadness","D. joy"],"a":"D","e":"前句线索first saw the sea→joy（喜悦）。fear恐惧、anger愤怒、sadness悲伤，第一次看到大海通常充满喜悦而非负面情绪。"},{"i":45,"s":"She needs more ______ before she can make the final decision.","o":["A. information","B. advice","C. courage","D. patience"],"a":"A","e":"前句线索before making decision→information（信息），做决定前先收集信息。advice建议、courage勇气、patience耐心，make decision前需要的是了解情况。"},{"i":46,"s":"Poyang Lake is the largest freshwater ______ in China.","o":["A. river","B. lake","C. sea","D. ocean"],"a":"B","e":"Poyang Lake名字中就带Lake，鄱阳湖是中国最大淡水湖。river河流、sea海、ocean大洋，湖必须用lake。","t":"鄱阳湖位于江西，是中国最大的淡水湖。"},{"i":47,"s":"From this ______, learning is a journey, not a race.","o":["A. side","B. place","C. point","D. step"],"a":"C","e":"from this point of view是固定搭配（从这个角度看/观点）。side方面、place地方、step步骤，没有from this side的抽象用法。"},{"i":48,"s":"The teacher was full of ______ for the students who worked so hard.","o":["A. anger","B. fear","C. surprise","D. praise"],"a":"D","e":"前句线索worked so hard→praise（表扬）。anger生气、fear害怕、surprise惊讶，老师对努力的学生应该表扬而非批评。"},{"i":49,"s":"To everyone's ______, the shy girl won first prize in the speech contest.","o":["A. surprise","B. joy","C. sadness","D. worry"],"a":"A","e":"to one's surprise是固定搭配（令某人惊讶），shy girl + won first prize构成反差→惊讶。joy开心、sadness悲伤、worry担忧，反差带来的是surprise。"},{"i":50,"s":"The White Deer Cave Academy in Jiangxi has a long ______ of over 1,000 years.","o":["A. lesson","B. story","C. history","D. culture"],"a":"C","e":"has a long history是固定搭配（有悠久历史），over 1000 years直接指向历史长度。lesson课、story故事、culture文化，时间跨度用history。","t":"白鹿洞书院位于江西庐山，有千年历史。"}]},{"id":"comparative","n":"形容词/副词比较等级","d":"六年考频4/6（2020、2022、2023、2025）","dd":"2×2矩阵：正反义 × 比较级/最高级。覆盖than+比较级、one of+最高级、much/a lot+比较级、as...as原级比较。隐含比较对象是近年趋势。","q":[{"i":1,"s":"Tom is 175 cm tall. Jack is 165 cm tall. So Tom is ______ than Jack.","o":["A. taller","B. shorter","C. the tallest","D. the shortest"],"a":"A","e":"175cm vs 165cm → Tom更高 → 比较级taller。tall→taller规则变化，单音节加-er。C/D是最高级，仅两人比较不用最高级。B语义相反。"},{"i":2,"s":"Our new classroom is much ______ than the old one. It can hold 60 students while the old one only held 40.","o":["A. the smallest","B. smaller","C. larger","D. the largest"],"a":"C","e":"60人 vs 40人 → 新教室更大 → 比较级larger。large以-e结尾，直接加-r。B语义反（smaller方向错）。A/D是最高级，两者比较不用最高级。"},{"i":3,"s":"— What's the weather like in Nanchang in July?\n— It's much ______ than in June. You can hardly stand the heat outside.","o":["A. the hottest","B. the coldest","C. hotter","D. colder"],"a":"C","e":"七月vs六月 + can hardly stand the heat → 更热 → hotter。hot需双写t加-er（重读闭音节）。A/B是最高级无三者范围。D语义反。"},{"i":4,"s":"— Is your schoolbag heavy today?\n— Not really. With only one book inside, it is much ______ than it was yesterday.","o":["A. heavier","B. the heaviest","C. the lightest","D. lighter"],"a":"D","e":"只有一本书 → 比昨天轻 → lighter。light→lighter规则变化。A语义反。B/C是最高级无范围。"},{"i":5,"s":"— Why do you always get up so early?\n— I find that getting up an hour ______ gives me more time to read English aloud.","o":["A. earlier","B. later","C. the earliest","D. the latest"],"a":"A","e":"more time to read → 更早起 → earlier。early→earlier(y变i+er)。B语义反。C/D最高级，仅与之前习惯比较不用最高级。"},{"i":6,"s":"My grandfather is much ______ now that he has retired. He spends hours fishing by the lake every day.","o":["A. busier","B. freer","C. the busiest","D. the freest"],"a":"B","e":"退休+每天钓鱼 → 更空闲 → freer。free→freer规则变化。A语义反。C/D最高级（退休后状态仅与退休前比较）。"},{"i":7,"s":"— Who runs ______ in your class, Tom or Jerry?\n— Jerry does. He finishes 100 meters in just 12 seconds.","o":["A. the fastest","B. the slowest","C. faster","D. slower"],"a":"C","e":"Tom or Jerry二选一 → 比较级 → faster。fast→faster规则变化。12秒很快暗示Jerry更快。A/B是最高级，不适用于两人比较。D语义反。"},{"i":8,"s":"After days of heavy rain, the air finally became much ______. You could smell the freshness of grass and flowers.","o":["A. the cleanest","B. cleaner","C. the dirtiest","D. dirtier"],"a":"B","e":"下雨后+smell freshness → 空气更干净 → cleaner。clean→cleaner规则变化。A/C最高级无范围。D语义反。"},{"i":9,"s":"The sunset over the lake is much ______ than in the city center. The colors here are truly amazing.","o":["A. more beautiful","B. less beautiful","C. more common","D. less common"],"a":"A","e":"colors truly amazing → 日落更美 → more beautiful。beautiful多音节词，比较级加more。B语义反。C/D与amazing矛盾（amazing ≠ common）。"},{"i":10,"s":"— What do you think of the two English novels?\n— I find the second one much ______. I finished it in just three days.","o":["A. more boring","B. more interesting","C. less boring","D. less interesting"],"a":"B","e":"finished in just three days → 三天读完说明很投入 → 更有趣 → more interesting。interesting多音节，比较级加more。A语义反（三天读完不可能是无聊）。C/D程度方向不对。"},{"i":11,"s":"After studying both Chinese and Japanese for a year, I find Japanese ______ than Chinese, especially the writing system.","o":["A. less difficult","B. more boring","C. more difficult","D. less boring"],"a":"C","e":"especially the writing system暗示日语书写系统难 → 更难 → more difficult。difficult多音节，比较级加more。A/B/D均与especially从句逻辑不符。"},{"i":12,"s":"The new teacher explains everything very clearly. Her classes are much ______ than I expected.","o":["A. more interesting","B. more confusing","C. less interesting","D. less confusing"],"a":"D","e":"explains very clearly → 不令人困惑 → less confusing。confusing是负面形容词，less + confusing = 更不困惑。A/B偏离核心线索「explains clearly「。C语义反。"},{"i":13,"s":"Between Beijing and Shanghai, I find Beijing ______. It has so many historical sites to explore.","o":["A. more interesting","B. less interesting","C. the most interesting","D. the least interesting"],"a":"A","e":"Between A and B二选一 + historical sites → 更有趣 → more interesting。interesting多音节，比较级加more。C/D最高级不用于两者之间。B语义反。"},{"i":14,"s":"Among all the subjects this term, math is ______ for me. Numbers just never make sense in my head.","o":["A. more difficult","B. the most difficult","C. less difficult","D. the least difficult"],"a":"B","e":"Among all...限定全部科目范围 → 最高级 → the most difficult。never make sense说明最难。A/C是比较级不含「所有科目中最「之意。D语义反。"},{"i":15,"s":"After learning about how climate change affects our planet, I realized that protecting the environment is much ______ than I thought before.","o":["A. more difficult","B. less difficult","C. more important","D. less important"],"a":"C","e":"了解气候变化影响后 → 保护环境更重要 → more important。important多音节，比较级加more。than明确提示比较级。A/B偏离核心语义。D语义反。"},{"i":16,"s":"— How is your grandmother feeling today?\n— Even ______ than yesterday, I'm afraid. The doctor says she needs to stay in hospital longer.","o":["A. better","B. the best","C. the worst","D. worse"],"a":"D","e":"need to stay in hospital longer → 状况更糟 → worse。bad→worse不规则变化。even修饰比较级表「甚至更…「。A语义反。B/C是最高级不含范围。"},{"i":17,"s":"Tom spends ______ time on homework among the three of us. He always finishes it in ten minutes while we need over an hour.","o":["A. the least","B. more","C. less","D. the most"],"a":"A","e":"among the three → 最高级 → the least time（最少时间）。little→less→least不规则变化。10分钟vs1小时说明时间最少。B/C是比较级与among范围冲突。D语义反。"},{"i":18,"s":"Last year our school had 950 students, but this year we only have 800. So there are ______ students than last year.","o":["A. more","B. fewer","C. the most","D. the fewest"],"a":"B","e":"950→800人数减少 → fewer students。many→more→most不规则，few→fewer规则变化，此处考数量比较方向。than提示比较级。A语义反。C/D最高级不含范围。"},{"i":19,"s":"— What do you think is ______ invention in history?\n— The Internet, without a doubt. It has changed how we live and work.","o":["A. more important","B. less important","C. the most important","D. the least important"],"a":"C","e":"in history限定全部历史范围 → 最高级 → the most important。has changed how we live说明最重要。important多音节，最高级加most。A/B比较级不含历史范围。D语义反。"},{"i":20,"s":"The traffic in our city is getting ______ every year. It used to take 20 minutes to get to school, but now it takes nearly an hour.","o":["A. better","B. the worst","C. the best","D. worse"],"a":"D","e":"20分钟→近1小时 → 交通变糟 → worse。bad→worse不规则变化。get+比较级表「逐渐变得…「。A语义反。B/C最高级不含比较。"},{"i":21,"s":"— Which dress do you prefer, the red one or the blue one?\n— The blue one. It is ______ than the red one, so I can wear it more often.","o":["A. cheaper","B. more expensive","C. the cheapest","D. the most expensive"],"a":"A","e":"wear it more often → 更便宜所以更常穿 → cheaper。cheap→cheaper规则变化。B语义反。C/D最高级不适用于二选一。"},{"i":22,"s":"Among all my classmates, Li Wei lives ______ from school. It takes him nearly two hours to get here every day.","o":["A. far","B. the farthest","C. farther","D. further"],"a":"B","e":"Among all → 最高级 → the farthest。far→farther→farthest不规则变化（物理距离优先用farther/farthest）。two hours说明最远。A原级无比较。C/D比较级不含among范围。"},{"i":23,"s":"— You play the piano ______ than before. Is everything alright?\n— Not really. I hurt my finger last week, so I haven't been able to practice much.","o":["A. more beautifully","B. more loudly","C. less beautifully","D. less loudly"],"a":"C","e":"hurt finger + haven't practiced → 弹得不如以前好 → less beautifully。beautifully多音节副词，less+副词原形构成降级比较。A语义与受伤矛盾。B/D偏离「弹得好坏「核心。"},{"i":24,"s":"— I have two tickets for the concert, Row 5 and Row 15. Which one would you take?\n— Row 5, of course. The seats there are ______ to the stage than those in Row 15.","o":["A. farther","B. the closest","C. the farthest","D. closer"],"a":"D","e":"Row 5 vs Row 15 → 5排更靠近舞台 → closer。close→closer规则变化。A语义反（15排才更远）。B/C最高级不含二选一范围。"},{"i":25,"s":"— I heard the English test this time was very hard.\n— Actually, I found it much ______ than the one we took last month. I finished it in half the time.","o":["A. less difficult","B. more difficult","C. more interesting","D. less interesting"],"a":"A","e":"finished in half the time → 没那么难 → less difficult。less+形容词原形构成降级比较。B语义反（时间短说明不难）。C/D偏离「难度「核心信息。"},{"i":26,"s":"— Have you been to the new library downtown?\n— Yes! It is even ______ than the university library. There are so many more books and study rooms.","o":["A. smaller","B. bigger","C. the smallest","D. the biggest"],"a":"B","e":"more books and study rooms → 更大 → bigger。big需双写g加-er。even修饰比较级表「甚至更…「。A语义反。C/D最高级不含两者比较。"},{"i":27,"s":"— I think we should take the bus to the museum.\n— Actually, walking there is much ______. Besides, the weather is lovely today.","o":["A. the healthiest","B. the least healthy","C. healthier","D. less healthy"],"a":"C","e":"walking vs bus + lovely weather → 走路更健康 → healthier。healthy→healthier(y变i+er)。much修饰比较级。A/B最高级不含二者比较。D语义反。"},{"i":28,"s":"— Do you still go jogging every morning?\n— Yes, but I run ______ now. My knees hurt if I push myself too hard.","o":["A. faster","B. the fastest","C. the slowest","D. slower"],"a":"D","e":"knees hurt → 跑得更慢 → slower。slow→slower规则变化。隐含与之前比较。A语义与膝盖疼矛盾。B/C最高级不含范围。"},{"i":29,"s":"— Why don't you eat at the school canteen anymore?\n— The food there is getting ______. The dishes used to be delicious but now they all taste the same.","o":["A. worse","B. better","C. the worst","D. the best"],"a":"A","e":"used to be delicious but now taste the same → 变差了 → worse。bad→worse不规则变化。get+比较级表渐变。B语义反。C/D最高级不含范围。"},{"i":30,"s":"This coat is a bit too small. Can you show me a ______ size?","o":["A. smaller","B. the smallest","C. larger","D. the largest"],"a":"C","e":"too small → 需要更大的 → larger。large→larger规则变化（去e加-r）。A语义反（smaller方向错）。B/D最高级不含多件衣服比较。"},{"i":31,"s":"— How do you like your new apartment compared with the old one?\n— It is much ______, but it is also a lot ______ from my workplace.","o":["A. smaller...closer","B. smaller...farther","C. bigger...closer","D. bigger...farther"],"a":"D","e":"but also提示前后对比：新公寓更大（好事）但更远（坏事）。bigger+father构成合理语义转折。A前后矛盾。B/C的smaller或closer与「新公寓改善「常理不符。"},{"i":32,"s":"______ you practice speaking English, ______ your pronunciation will become.","o":["A. The more...the good","B. The most...the best","C. The more...the worse","D. The more...the better"],"a":"D","e":"The + 比较级, the + 比较级 固定句型（越…就越…）。the more you practice, the better...=练得越多，发音越好。A的good是原级。B的most/best是最高级。C语义反。good→better不规则变化。"},{"i":33,"s":"______ you read, ______ knowledge you will gain. Books are truly the best teachers.","o":["A. The more...the more","B. The more...the less","C. The most...the most","D. The more...the fewer"],"a":"A","e":"The+比较级, the+比较级固定句型。read more→gain more knowledge。knowledge不可数→用more不用fewer。many/much→more不规则变化。B/D语义反。C最高级错误。"},{"i":34,"s":"— Let's take the subway to the city center. It will be faster.\n— Actually, the bus is a little ______ during rush hour. The bus lane means we won't get stuck in traffic.","o":["A. slower","B. quicker","C. the slowest","D. the quickest"],"a":"B","e":"bus lane+won't get stuck → 公交车反而更快 → quicker。a little修饰比较级表「稍快一点「。A语义与「不堵车「矛盾。C/D最高级不含比较。"},{"i":35,"s":"The cherry blossoms in the park are even ______ than what I saw in the travel photos. You really have to see them with your own eyes.","o":["A. less beautiful","B. the most beautiful","C. more beautiful","D. the least beautiful"],"a":"C","e":"see with your own eyes + 暗示实景更美 → more beautiful。beautiful多音节，比较级加more。even修饰比较级。A/D语义反。B最高级不含比较对象。"},{"i":36,"s":"Mount Lu in Jiangxi is one of ______ summer resorts in China. The temperature there is always much cooler than in the cities below.","o":["A. more famous","B. less famous","C. the least famous","D. the most famous"],"a":"D","e":"one of + the + 最高级 + 复数名词。庐山是中国最著名的避暑胜地之一。famous多音节，最高级加most。A/B比较级不含one of所需范围。C语义反。","t":"庐山 — 位于江西九江，中国十大名山之一，以避暑胜地著称，夏季气温比山下城市低5-8℃"},{"i":37,"s":"Poyang Lake is the largest freshwater lake in China. It is even ______ during the summer flood season when the water covers a much larger area.","o":["A. wider","B. narrower","C. the widest","D. the narrowest"],"a":"A","e":"flood season+covers larger area → 汛期更宽 → wider。even修饰比较级。隐含比较：汛期vs平时。B语义反。C/D最高级不含比较。","t":"鄱阳湖 — 位于江西北部，中国第一大淡水湖，夏季汛期面积可达平时的数倍"},{"i":38,"s":"Jingdezhen is known as the Porcelain Capital of China. Its ceramics are far ______ than those made in ordinary workshops.","o":["A. more expensive","B. more delicate","C. less expensive","D. less delicate"],"a":"B","e":"Porcelain Capital+ordinary workshops对比 → 景德镇瓷器更精致 → more delicate。far修饰比较级表「远更…」。delicate多音节，比较级加more。A的expensive虽语法对，但delicate更能体现景德镇瓷器工艺水平。C/D语义反。","t":"景德镇 — 江西景德镇，被誉为「瓷都「，以精美瓷器闻名世界，千年制瓷历史"},{"i":39,"s":"Gannan navel oranges are famous across China. People say they taste much ______ than oranges grown in other areas because of the special local climate.","o":["A. the sweetest","B. the most sour","C. sweeter","D. more sour"],"a":"C","e":"famous across China+special climate → 更甜 → sweeter。sweet→sweeter规则变化。much修饰比较级。than明确提示比较级。A/B最高级不含比较对象。D语义与「famous「矛盾（出名不可能是更酸）。","t":"赣南脐橙 — 江西赣州特产，中国国家地理标志产品，以甜度高、口感好闻名"},{"i":40,"s":"Jinggangshan is one of ______ revolutionary bases in Chinese history. Many important events of the Red Army took place there.","o":["A. more important","B. less important","C. the least important","D. the most important"],"a":"D","e":"one of + the + 最高级。井冈山是中国历史上最重要的革命根据地之一。important多音节，最高级加most。A/B比较级不与one of搭配表示「最…之一「。C语义严重错误。","t":"井冈山 — 位于江西西南部，中国第一个农村革命根据地，被称为「中国革命的摇篮「"},{"i":41,"s":"— Do you think AI will replace human teachers someday?\n— I don't think so. A good teacher can understand students' feelings, and that is ______ than any technology.","o":["A. more important","B. less important","C. the most important","D. the least important"],"a":"A","e":"understand feelings vs technology → 人情味比技术更重要 → more important。than明确提示比较级。B/D语义反。C最高级不含比较对象。"},{"i":42,"s":"— I usually stay up late to finish my homework. I feel like I can get more done at night.\n— But research shows you actually learn ______ when you get enough sleep. Your brain needs rest to remember things.","o":["A. the most effectively","B. more effectively","C. the least effectively","D. less effectively"],"a":"B","e":"brain needs rest+remember things → 充足睡眠后学习更有效 → more effectively。effectively多音节副词，比较级加more。隐含比较：熬夜vs充足睡眠。A/C最高级不含比较。D语义反。"},{"i":43,"s":"— Mom, can I have a mobile phone like all my classmates?\n— When you are ______ and can use it responsibly, we will talk about it again.","o":["A. the oldest","B. the youngest","C. older","D. younger"],"a":"C","e":"when you can use it responsibly → 更大一些（更成熟）→ older。隐含比较：现在vs将来。old→older规则变化（older指年龄更大，区别于elder指长幼）。A/B最高级不含单线成长比较。D语义反。"},{"i":44,"s":"— This book is over 800 pages. Do you really think I can finish it?\n— The ______ it looks, the more proud you will feel when you turn the last page.","o":["A. easier","B. the easiest","C. the hardest","D. harder"],"a":"D","e":"The+比较级, the+比较级固定句型。800页 → 书看起来越难 → 读完越有成就感 → the harder..., the more proud...。harder与后句more proud构成合理因果。A语义反。B/C最高级不含此句型。"},{"i":45,"s":"— Between reading paper books and e-books, which do you prefer?\n— Paper books, definitely. The feeling of turning real pages is simply ______.","o":["A. more satisfying","B. less satisfying","C. the most satisfying","D. the least satisfying"],"a":"A","e":"Between A and B二选一 → 比较级 → more satisfying。definitely+simply表强烈偏好。satisfying多音节，比较级加more。B/D语义反。C最高级不含between范围。"},{"i":46,"s":"— I got 95 in the English exam this time!\n— That's great, but don't stop trying. There is always room to be even ______.","o":["A. the best","B. better","C. the worst","D. worse"],"a":"B","e":"don't stop trying+room to be → 还有进步空间 → even better。even修饰比较级。good→better不规则变化。隐含比较：现在的95分vs未来更好的成绩。A/C最高级不含比较。D语义反。"},{"i":47,"s":"— Look, this sweater is on sale. It is only 50 yuan now!\n— But the quality feels much ______ than the one we saw in the other shop. Sometimes cheap things end up costing more.","o":["A. better","B. the worst","C. worse","D. the best"],"a":"C","e":"cheap things end up costing more → 质量更差 → worse。bad→worse不规则变化。than明确提示比较级。much修饰比较级。A语义与「便宜没好货「逻辑矛盾。B/D最高级不含两家店比较。"},{"i":48,"s":"— I don't know whether to join the basketball club or the swimming club.\n— Try both and see which one you enjoy ______. You can always switch later.","o":["A. the most","B. the least","C. less","D. more"],"a":"D","e":"basketball or swimming二选一 → 比较级 → enjoy more。many/much→more不规则变化，此处作副词修饰enjoy。A/B是最高级不适用于两者之间。C语义反。"},{"i":49,"s":"The population of this small town is getting ______ each year as more and more young people move to big cities for work.","o":["A. smaller","B. larger","C. the smallest","D. the largest"],"a":"A","e":"young people move to big cities → 人口变少 → smaller。get+比较级表渐变。small→smaller规则变化。B语义反。C/D最高级不含逐年变化。"},{"i":50,"s":"— You look much ______ than the last time I saw you. Have you been working out?\n— Yes! I go to the gym five times a week now.","o":["A. weaker","B. stronger","C. the weakest","D. the strongest"],"a":"B","e":"gym five times a week → 身体更强壮 → stronger。strong→stronger规则变化。much修饰比较级。than last time明确提示比较级。A语义反。C/D最高级不含二人比较。"}]},{"id":"verbs","n":"动词词义辨析","d":"六年考频1/6（2024）","dd":"前句动作→后句动词匹配，四选项同形式、同语义场。覆盖说/看/拿取/借还/花费/创造/到达/胜负等15组高频动词。对话体≥50%。","q":[{"i":1,"s":"She opened her mouth and ___ \"hello\" to everyone in the room.","o":["A. said","B. spoke","C. talked","D. told"],"a":"A","e":"said可直接接引语；spoke/talked不接引语；told需接双宾语(tell sb sth)，此处仅有单宾语。"},{"i":2,"s":"He ___ at the photo for a long time but didn't recognize anyone.","o":["A. watched","B. noticed","C. looked","D. saw"],"a":"C","e":"look at为固定搭配表示「朝…看」；watched强调长时间观察移动对象；noticed/saw不可与at搭配构成此义。"},{"i":3,"s":"\"Please ___ to me! I have something important to tell you,\" Mom said.","o":["A. hear","B. listen","C. sound","D. speak"],"a":"B","e":"listen to为固定搭配表「听」动作；hear表「听见」结果，不用于祈使句请求注意；sound/speak不接to sb表此义。"},{"i":4,"s":"Don't forget to ___ your notebook to school tomorrow, or you'll be in trouble.","o":["A. carry","B. fetch","C. take","D. bring"],"a":"D","e":"bring表「带来」，方向朝向说话人/目的地；take表「带走」方向相反；carry强调搬运动作不表方向；fetch表「去取回」。"},{"i":5,"s":"\"Can I ___ your dictionary for a moment? I need to check a word,\" said Li Ming.","o":["A. lend","B. borrow","C. keep","D. return"],"a":"B","e":"borrow表「借入」(主语是借入方)；lend表「借出」(主语是借出方)；keep表「保留」；return表「归还」。主语I是借入方。"},{"i":6,"s":"It ___ the workers three months to build the new bridge last year.","o":["A. spent","B. paid","C. took","D. cost"],"a":"C","e":"It takes sb time to do sth为固定句型；spent主语为人；paid主语为人；cost主语为物。此处It作形式主语只能用took。"},{"i":7,"s":"When the train finally ___ at the station, it was already dark outside.","o":["A. arrived","B. reached","C. got","D. came"],"a":"A","e":"arrive at+地点为固定搭配；reached直接接宾语无介词；got需got to；came不表「到达」终点义。"},{"i":8,"s":"Alexander Graham Bell ___ the first telephone in 1876, changing the world forever.","o":["A. discovered","B. invented","C. created","D. made"],"a":"B","e":"invent表「发明」(创造前所未有之物)；discover表「发现」(已有但未知)；created/made不强调首次创造的含义。"},{"i":9,"s":"Their basketball team ___ the match by only one point. Everyone cheered loudly.","o":["A. beat","B. lost","C. won","D. failed"],"a":"C","e":"win the match为固定搭配表「赢得比赛」；beat后接对手不接比赛；lost表「输掉」与cheered矛盾；failed表「失败」。"},{"i":10,"s":"She was surprised to ___ so many birthday gifts from her classmates this morning.","o":["A. accept","B. refuse","C. return","D. receive"],"a":"D","e":"receive表「收到」(客观事实)与surprised呼应；accept表「接受」(主观决定)语境错位；refuse/return与gifts的积极语境矛盾。"},{"i":11,"s":"The sun ___ in the east and sets in the west every single day.","o":["A. lifts","B. rises","C. raises","D. grows"],"a":"B","e":"rise为不及物动词表「升起」；raise为及物动词需接宾语；lifts表「举起」亦及物；grows表「生长」。主语sun用不及物rise。"},{"i":12,"s":"Her parents ___ her stay up late on weekends because there is no school.","o":["A. make","B. have","C. ask","D. allow"],"a":"D","e":"allow sb to do/allow sb do均可表「允许」；make/have sb do表「迫使/让」，与because引导的宽松理由矛盾；ask sb to do表「请求」不符合父母权威语境。"},{"i":13,"s":"\"I can't ___ the name of the song, but the melody sounds very familiar,\" she said.","o":["A. remind","B. forget","C. remember","D. recall"],"a":"C","e":"remember表「记得」与can't搭配否定记忆；remind表「提醒」主语通常为物或人提醒别人；forget表「忘记」已含否定；recall比remember更正式且多接doing。"},{"i":14,"s":"\"My brother wants to ___ the school football team next term,\" said Xiao Ming.","o":["A. attend","B. join","C. enter","D. take"],"a":"B","e":"join+组织/团体表「加入成为成员」；attend+活动/会议表「出席」；enter+场所表「进入」；take part in+活动。team为团体用join。"},{"i":15,"s":"Susan ___ math very hard every evening because she finds it quite difficult.","o":["A. learns","B. teaches","C. trains","D. studies"],"a":"D","e":"study+学科表「学习」强调努力钻研；learn表「学会」强调结果而非过程；teaches主语为人教授别人；trains表「训练」多用于技能。"},{"i":16,"s":"\"What did the teacher ___ about the exam?\" \"She said it will be next Monday.\"","o":["A. tell","B. speak","C. say","D. talk"],"a":"C","e":"say about sth表「说了关于…的内容」；tell about需接sb；speak/talk about可表谈论但what did sb say about为固定询问方式。"},{"i":17,"s":"\"Did you ___ the girl in the red dress at the party last night?\" \"No, I didn't.\"","o":["A. watch","B. look","C. notice","D. read"],"a":"C","e":"notice表「注意到」强调无意间看到；watch表「观看」有目的性；look为不及物不可直接接宾语；read表「读」与girl无关。答语「没注意到」与notice呼应。"},{"i":18,"s":"\"I ___ a strange noise outside just now. Did you hear anything?\" \"No, I didn't.\"","o":["A. listened","B. heard","C. sounded","D. felt"],"a":"B","e":"heard表「听见」结果；listened表「听」动作但结果不确定；sounded表「听起来」主语为物非人；felt表「感觉」与noise不搭配。"},{"i":19,"s":"\"Please ___ the umbrella with you. It looks like rain this afternoon,\" Mom reminded me.","o":["A. take","B. bring","C. carry","D. fetch"],"a":"A","e":"take表「带走」方向从说话人处往外；bring方向相反朝说话人；carry强调搬运不表方向；fetch表「去取」。Mom让从家带伞出去用take。"},{"i":20,"s":"\"How long can I ___ this book?\" \"You can have it for two weeks.\"","o":["A. lend","B. borrow","C. keep","D. return"],"a":"C","e":"keep表「保留」可与时间段(how long)连用；lend/borrow为短暂动词不可与时间段连用；return表「归还」与two weeks矛盾。"},{"i":21,"s":"\"How much did the new phone ___ you?\" \"About three thousand yuan.\"","o":["A. spend","B. pay","C. take","D. cost"],"a":"D","e":"cost主语为物(the phone)；spend/paid主语为人；take主语为it或事物。sth cost sb money为固定结构。"},{"i":22,"s":"\"When did you ___ Beijing?\" \"We got there at noon by high-speed train.\"","o":["A. reach","B. arrive","C. come","D. leave"],"a":"A","e":"reach直接接地点名词；arrive需加in/at；come to才接地点；leave表「离开」与got there矛盾。"},{"i":23,"s":"\"Who ___ the computer?\" \"I think it was invented by some American scientists.\"","o":["A. discovered","B. found","C. invented","D. created"],"a":"C","e":"答语中「was invented」直接呼应问句；discovered表「发现」已有之物；found表「找到」；created表「创作」不强调首次。对computer问「发明」。"},{"i":24,"s":"\"Our class ___ Class Two in the football game!\" \"That is great news!\"","o":["A. won","B. beat","C. lost","D. hit"],"a":"B","e":"beat+对手表「击败」；won+比赛/奖品不接对手；lost表「输给」与great news矛盾；hit表「击打」不用于比赛语境。"},{"i":25,"s":"\"Did you ___ my invitation to the party?\" \"Yes, I would love to come!\"","o":["A. receive","B. accept","C. refuse","D. send"],"a":"B","e":"accept表「接受」(愿意去)；receive表「收到」(未必接受)；refuse表「拒绝」与yes矛盾；send表「发送」方向相反。答语I would love to come表接受。"},{"i":26,"s":"\"Why did you ___ your hand in class?\" \"Because I knew the answer.\"","o":["A. raise","B. rise","C. lift","D. put"],"a":"A","e":"raise one's hand为固定搭配表「举手」；rise不及物；lift表「举起」重物；put up也可表举手但选项仅put不完整。"},{"i":27,"s":"\"Will your parents ___ you go to the concert?\" \"I'm not sure yet.\"","o":["A. make","B. ask","C. let","D. have"],"a":"C","e":"let sb do表「允许」意愿许可；make/have sb do表「迫使」语气过强；ask sb to do语法不通(缺to)。家长允许用let最自然。"},{"i":28,"s":"\"Please ___ me to call my mother after school,\" the boy said to his teacher.","o":["A. remember","B. forget","C. remind","D. think"],"a":"C","e":"remind sb to do表「提醒某人做某事」；remember/forget后接to do主语自身记忆；think不接sb to do。请别人提醒自己用remind。"},{"i":29,"s":"\"How many students will ___ the sports meeting?\" \"About two hundred.\"","o":["A. join","B. attend","C. enter","D. take part in"],"a":"D","e":"take part in+活动表「参加」；join+组织；attend+会议/典礼较正式；enter+空间/比赛。体育运动会为活动用take part in。"},{"i":30,"s":"\"Who ___ you English last year?\" \"Miss Wang did. She was very patient.\"","o":["A. learned","B. studied","C. taught","D. trained"],"a":"C","e":"teach sb+学科表「教某人某学科」；learned/studied主语应为自己学；trained表「训练」技能。问「谁教你英语」用teach。"},{"i":31,"s":"The little boy was careful not to ___ the glass cup on the table.","o":["A. hurt","B. damage","C. break","D. destroy"],"a":"C","e":"break+易碎品(glass cup)表「打碎」；hurt表「伤害」人或感情；damage表「损坏」功能；destroy表「彻底摧毁」程度过重。"},{"i":32,"s":"\"I wonder if this strange machine can really ___ gold from sand,\" the man said.","o":["A. accept","B. receive","C. separate","D. divide"],"a":"C","e":"separate A from B表「将A与B分开」；divide表「分成若干份」；accept/receive不搭配from。从沙子中分离金子用separate。"},{"i":33,"s":"Thousands of visitors come to Jiangxi to ___ the beauty of Lushan Mountain every year.","o":["A. visit","B. enjoy","C. reach","D. see"],"a":"B","e":"enjoy the beauty表「欣赏美景」固定表达；visit接地点；reach表「到达」无审美义；see不能搭配beauty作「欣赏」义。","t":"庐山是江西著名风景区，以云海、瀑布和历代诗词题刻闻名于世。"},{"i":34,"s":"Artists in Jingdezhen can ___ beautiful cups and plates from common clay.","o":["A. discover","B. invent","C. create","D. find"],"a":"C","e":"create表「创造」(从原材料创作艺术品)；discover表「发现」已有之物；invent表「发明」机器或方法；find表「找到」。陶瓷艺术家创造用create。","t":"景德镇是江西瓷都，以千年制瓷历史和精美的青花瓷闻名世界。"},{"i":35,"s":"If you go to Poyang Lake in winter, you can ___ thousands of wild birds there.","o":["A. watch","B. look","C. see","D. notice"],"a":"C","e":"see表「看见」强调结果；watch表「观看」有意识观察；look不及物；notice表「无意间注意到」。去鄱阳湖能「看见」大量候鸟，强调亲眼所见结果。","t":"鄱阳湖是中国最大淡水湖，每年冬季吸引数十万只候鸟越冬，是观鸟胜地。"},{"i":36,"s":"\"I ___ whether he will come to the meeting or not,\" the manager said worriedly.","o":["A. wonder","B. guess","C. suppose","D. doubt"],"a":"A","e":"wonder表「想知道/不确定」与or not搭配表达疑虑；guess/suppose表「猜测」带有一定把握与worriedly矛盾；doubt表「怀疑」不相信。"},{"i":37,"s":"\"I didn't ___ him to pass the exam, but he made it!\" she exclaimed happily.","o":["A. hope","B. wish","C. expect","D. want"],"a":"C","e":"expect sb to do表「预期某人会做」与but转折呼应；hope不接sb to do；wish接sb to do不自然且常表愿望；want表意愿非预期。"},{"i":38,"s":"The heavy rain may ___ the crops in the field if it doesn't stop soon.","o":["A. hurt","B. damage","C. break","D. destroy"],"a":"B","e":"damage表「损害」功能或价值可修复；destroy表「彻底毁坏」不可修复，暴雨一般非彻底毁灭；hurt表「伤害」生物；break表「打碎」。may表示可能损害用damage。"},{"i":39,"s":"\"The cake looks too sweet. Does it ___ good?\" \"Not really. It needs more sugar.\"","o":["A. taste","B. sound","C. smell","D. feel"],"a":"A","e":"taste good表「尝起来好」，cake为食物对应味觉；sound对应听觉；smell对应嗅觉；feel对应触觉。回答needs more sugar进一步确认味觉线索。"},{"i":40,"s":"\"How did you ___ the old book you lost ten years ago?\" \"By accident at a street market.\"","o":["A. search","B. look for","C. find","D. discover"],"a":"C","e":"find表「找到」(结果)与lost形成完整闭环；search/look for表「寻找」(过程)未体现结果；discover表「发现」前所未知之物。答语by accident强调偶然找到。"},{"i":41,"s":"\"How long does it ___ to fly from Nanchang to Beijing?\" \"About two hours.\"","o":["A. cost","B. take","C. spend","D. pay"],"a":"B","e":"It takes time to do sth固定句型；cost主语为物/服务；spend主语为人；pay主语为人且对象为金钱。形式主语It与时间搭配唯一用take。"},{"i":42,"s":"\"The sign ___ that the museum is closed on Mondays,\" the tour guide explained.","o":["A. tells","B. speaks","C. says","D. talks"],"a":"C","e":"say表「写着/显示」用于告示牌、通知等文字内容；tell接人；speak/talk不用于文字内容描述。The sign says为固定表达。"},{"i":43,"s":"\"Be careful not to ___ the baby when you pick her up,\" the nurse warned softly.","o":["A. break","B. damage","C. hurt","D. destroy"],"a":"C","e":"hurt表「伤害」适用于人或动物身体；break/damage/destroy适用于物品。抱起婴儿时小心不要弄疼她，hurt最恰当。"},{"i":44,"s":"\"Your room is too dark. Why don't you ___ the light?\" \"Okay, I will.\"","o":["A. turn on","B. open","C. start","D. begin"],"a":"A","e":"turn on the light固定搭配表「开灯」；open the light为中式英语错误表达；start/begin the light不符合英语搭配习惯。"},{"i":45,"s":"The strong wind last night ___ several windows of our classroom building.","o":["A. hurt","B. broke","C. damaged","D. destroyed"],"a":"B","e":"break+window为固定搭配表「打破」玻璃窗；damaged强调功能损害；destroyed程度过重指彻底毁坏；hurt仅用于有生命对象。风打破玻璃窗用broke。"},{"i":46,"s":"Many students go to Jinggangshan every year to ___ about the history of the Red Army.","o":["A. study","B. learn","C. teach","D. train"],"a":"B","e":"learn about表「了解/学习关于」；study强调系统研究过于正式；teach表「教」方向错误；train表「训练」。学生了解革命历史用learn about。","t":"井冈山是江西革命圣地，被誉为「中国革命的摇篮」，每年吸引大量学生前往研学。"},{"i":47,"s":"The two friends haven't seen each other for years but they still ___ in touch.","o":["A. keep","B. stay","C. hold","D. remain"],"a":"B","e":"stay in touch为固定搭配表「保持联系」；keep in touch亦可用但stay更强调状态的持续；hold/remain不用于此搭配。"},{"i":48,"s":"\"I'm trying to ___ weight, so I run five kilometers every morning,\" she explained.","o":["A. lose","B. drop","C. fall","D. reduce"],"a":"A","e":"lose weight为固定搭配表「减肥」；reduce亦可但需接宾语(reduce my weight)；drop/fall无此搭配。每天跑步为减肥行为用lose weight。"},{"i":49,"s":"\"Please ___ your voice. The baby is sleeping in the next room,\" whispered the mother.","o":["A. lower","B. drop","C. fall","D. reduce"],"a":"A","e":"lower one's voice为固定搭配表「压低声音」；drop/fall不用于voice搭配；reduce表「减少」与voice不构成自然搭配。有婴儿睡觉需压低声音。"},{"i":50,"s":"At Bailudong Academy, students once ___ from great teachers and discussed big ideas together.","o":["A. studied","B. learned","C. taught","D. trained"],"a":"B","e":"learn from sb表「向某人学习」；studied一般不接from；taught表「教」方向错误；trained from不符合搭配。书院学生向大师学习用learn from。","t":"白鹿洞书院位于江西庐山，是中国古代四大书院之首，朱熹曾在此讲学，是宋代最高学府。"}]},{"id":"adjadv","n":"形容词/副词词义辨析","d":"六年考频2/6（2022、2025）","dd":"前句场景→后句形/副匹配，四选项同词性、同语义场。覆盖情绪/评价/性格/方式等类别。对话体≥50%。","q":[{"i":1,"s":"The room was not clean. It looked very ____.","o":["A. dirty","B. quiet","C. bright","D. warm"],"a":"A","e":"前句「not clean」直接对应 dirty。quiet/bright/warm 不能与 not clean 形成同义替换。"},{"i":2,"s":"He got full marks in the exam. His parents felt very ____.","o":["A. angry","B. proud","C. tired","D. worried"],"a":"B","e":"考满分→父母应为骄傲。proud 正确。angry/tired/worried 与满分结果不符。"},{"i":3,"s":"Please keep ____. The baby is sleeping in the room.","o":["A. loud","B. fast","C. quiet","D. bright"],"a":"C","e":"婴儿在睡觉→需保持安静。quiet 正确。loud 相反，fast/bright 无关。"},{"i":4,"s":"She always says please and thank you. She is a ____ girl.","o":["A. clever","B. funny","C. strong","D. polite"],"a":"D","e":"经常说请和谢谢→有礼貌。polite 正确。clever/funny/strong 与礼貌用语无关。"},{"i":5,"s":"\"Why are your clothes wet?\" \"It rained suddenly and I got ____ on the way home.\"","o":["A. wet","B. warm","C. cool","D. dry"],"a":"A","e":"下雨→衣服湿了。wet 正确。dry 相反，warm/cool 与下雨结果无关。"},{"i":6,"s":"\"What happened to the boy?\" \"He lost his toy and looked very ____.\"","o":["A. happy","B. sad","C. excited","D. calm"],"a":"B","e":"丢了玩具→伤心。sad 正确。happy/excited 与丢失东西情感相反，calm 不能对应丢玩具的失落感。"},{"i":7,"s":"The street was ____ at midnight. No one was around.","o":["A. busy","B. noisy","C. silent","D. crowded"],"a":"C","e":"半夜+没人→一片寂静。silent 正确。busy/noisy/crowded 与没人直接矛盾。"},{"i":8,"s":"\"This chair is too ____. Can I have a softer one?\" \"Of course.\"","o":["A. soft","B. big","C. light","D. hard"],"a":"D","e":"要更软的→当前太硬。hard 正确。soft 与要求相反，big/light 与软硬无关。"},{"i":9,"s":"\"How do you feel about the trip?\" \"I am really ____. I can't wait to go!\"","o":["A. tired","B. excited","C. bored","D. worried"],"a":"B","e":"「can't wait」→迫不及待，兴奋。excited 正确。tired/bored/worried 与迫不及待矛盾。"},{"i":10,"s":"The box was so ____ that I could not carry it alone.","o":["A. heavy","B. light","C. small","D. clean"],"a":"A","e":"搬不动→太重。heavy 正确。light 相反，small/clean 与搬不动无关。"},{"i":11,"s":"\"Be careful with that knife. It is very ____.\" \"Don't worry, I know.\"","o":["A. heavy","B. new","C. light","D. sharp"],"a":"D","e":"小心刀→因为锋利。sharp 正确。heavy/light/new 不构成小心的警告理由。"},{"i":12,"s":"\"I can't hear the teacher clearly.\" \"Move to the front. We are too ____ from the blackboard.\"","o":["A. close","B. near","C. far","D. short"],"a":"C","e":"听不清+建议往前→现在太远。far 正确。close/near 与往前移矛盾，short 不描述距离。"},{"i":13,"s":"\"What's the weather like today?\" \"It's very ____. You need a warm coat.\"","o":["A. hot","B. cold","C. cool","D. dry"],"a":"B","e":"需要厚外套→天气冷。cold 正确。hot 不需要外套，cool 不构成加厚外套的理由。"},{"i":14,"s":"The homework was very ____. Everyone finished it in ten minutes.","o":["A. hard","B. long","C. easy","D. boring"],"a":"C","e":"十分钟全做完→作业简单。easy 正确。hard 十分钟做不完，long/boring 与快速完成无因果。"},{"i":15,"s":"\"Did you enjoy the party?\" \"Yes! The music was great and everyone was ____.\"","o":["A. happy","B. angry","C. quiet","D. sleepy"],"a":"A","e":"enjoy + great music→开心。happy 正确。angry/quiet/sleepy 与派对氛围不符。"},{"i":16,"s":"\"How was the movie last night?\" \"It was ____. I almost fell asleep.\"","o":["A. exciting","B. boring","C. interesting","D. funny"],"a":"B","e":"快睡着了→电影无聊。boring 正确。exciting/interesting/funny 不会让人睡着。"},{"i":17,"s":"\"You look very ____ today. What happened?\" \"I didn't sleep well.\"","o":["A. excited","B. happy","C. relaxed","D. tired"],"a":"D","e":"没睡好→看起来累。tired 正确。excited/happy/relaxed 与没睡好的状态矛盾。"},{"i":18,"s":"\"Have you climbed Lushan Mountain?\" \"Yes! The view from the top was ____.\"","o":["A. wonderful","B. terrible","C. ordinary","D. boring"],"a":"A","e":"庐山以美景闻名，感叹语气需正面形容词。wonderful 正确。其余三项均为负面评价。","t":"江西庐山以云海日出闻名，wonderful 形容登顶后的壮丽风光"},{"i":19,"s":"\"I have nothing to do at home.\" \"You sound ____. Why not go for a walk?\"","o":["A. busy","B. bored","C. excited","D. relaxed"],"a":"B","e":"无事可做→无聊。bored 正确。busy 是无事可做的反义，excited/relaxed 需特定事件触发。"},{"i":20,"s":"\"What should I wear to meet the head teacher?\" \"Something that looks ____.\"","o":["A. funny","B. young","C. serious","D. colorful"],"a":"C","e":"见校长需端庄得体。serious 正确。funny/colorful 太随意，young 与见面场合无关。"},{"i":21,"s":"\"Why do you look so ____?\" \"I stayed up late finishing the report.\"","o":["A. tired","B. happy","C. nervous","D. excited"],"a":"A","e":"熬夜→疲惫。tired 正确。happy/excited 与熬夜结果不符，nervous 需紧张事件触发而非熬夜。"},{"i":22,"s":"\"Mom, can I eat the soup now?\" \"Wait. It is still too ____.\"","o":["A. cold","B. sweet","C. hot","D. salty"],"a":"C","e":"妈妈让等→太烫。hot 正确。cold 不需要等，sweet/salty 等也没用。"},{"i":23,"s":"\"How do you like your new teacher?\" \"He is ____ but always fair to us.\"","o":["A. friendly","B. strict","C. funny","D. quiet"],"a":"B","e":"but 转折说明前半句有保留态度。strict but fair 是固定搭配。friendly/funny 无需 but 转折。"},{"i":24,"s":"\"Did you hear a noise outside last night?\" \"Yes. It sounded very ____.\"","o":["A. sweet","B. soft","C. normal","D. strange"],"a":"D","e":"特意提到半夜异响→声音奇怪/不寻常。strange 正确。sweet/soft/normal 不能解释为何特意提及。"},{"i":25,"s":"\"Which school should I pick?\" \"This is a very ____ choice. Think carefully.\"","o":["A. easy","B. small","C. important","D. quick"],"a":"C","e":"「think carefully」→决定重大，需慎重。important 正确。easy/small/quick 不能呼应认真思考的必要性。"},{"i":26,"s":"\"I got 100 on the math test!\" \"Really? That is ____! Well done!\"","o":["A. terrible","B. common","C. normal","D. amazing"],"a":"D","e":"考满分+感叹语气→令人惊叹。amazing 正确。terrible 相反，common/normal 不足以回应满分的惊喜。"},{"i":27,"s":"\"Did Peter finish the race after he fell?\" \"Yes, he got up and kept going. He was ____.\"","o":["A. brave","B. lucky","C. fast","D. tall"],"a":"A","e":"跌倒后爬起来继续跑→勇敢。brave 正确。lucky/fast/tall 不反映跌倒后坚持的精神品质。"},{"i":28,"s":"\"English novels are too ____ for me.\" \"Try this one. It's written in simple words.\"","o":["A. exciting","B. difficult","C. relaxing","D. useful"],"a":"B","e":"推荐简单版本→原版太难。difficult 正确。exciting/relaxing/useful 不能被简单词汇反驳。"},{"i":29,"s":"The two sisters look very ____. I cannot tell who is older.","o":["A. different","B. tall","C. similar","D. young"],"a":"C","e":"分不清谁大→长得太像。similar 正确。different 应容易区分，tall/young 与分辨年龄无关。"},{"i":30,"s":"\"What is special about Wugong Mountain in Jiangxi?\" \"Its grassland is ____ all year round.\"","o":["A. beautiful","B. dry","C. quiet","D. small"],"a":"A","e":"武功山以高山草甸闻名，必选正面形容词。beautiful 正确。dry/quiet/small 不能描述其草甸之美。","t":"江西武功山以十万亩高山草甸闻名，beautiful 呼应其四季草甸之美"},{"i":31,"s":"\"How do you keep your room so ____?\" \"I spend five minutes tidying it each day.\"","o":["A. messy","B. small","C. dark","D. tidy"],"a":"D","e":"每天收拾→房间整洁。tidy 正确。messy 相反，small/dark 与收拾无关。"},{"i":32,"s":"\"Would you like some water?\" \"Yes, please. I am really ____ after the run.\"","o":["A. hungry","B. thirsty","C. sleepy","D. angry"],"a":"B","e":"要喝水→口渴。thirsty 正确。hungry 需食物，sleepy 需睡觉，angry 与跑步后要水无关。"},{"i":33,"s":"\"What do you think of the plan?\" \"It sounds ____. Let's give it a try.\"","o":["A. silly","B. risky","C. strange","D. great"],"a":"D","e":"「let's try it」→赞同计划。great 正确。silly/risky/strange 不会引出尝试建议。"},{"i":34,"s":"\"Why is Tom so quiet today?\" \"He is ____ because his pet dog is sick.\"","o":["A. excited","B. happy","C. worried","D. angry"],"a":"C","e":"宠物狗生病→担心。worried 正确。excited/happy 与生病相反，angry 无对象。"},{"i":35,"s":"\"I heard you got lost in the forest.\" \"Yes, but I stayed ____ and found the way out.\"","o":["A. silly","B. calm","C. sleepy","D. weak"],"a":"B","e":"迷路后找到出路→需要冷静。calm 正确。silly/sleepy/weak 不能帮助找到出路。"},{"i":36,"s":"\"Everyone is so quiet in the classroom.\" \"We are all ____ about the coming exam.\"","o":["A. nervous","B. relaxed","C. bored","D. angry"],"a":"A","e":"考前全班安静→紧张。nervous 正确。relaxed 与考前状态不符，bored/angry 无考前提及。"},{"i":37,"s":"\"Where is the nearest bus stop?\" \"I am not ____. You'd better ask someone else.\"","o":["A. sure","B. wrong","C. tired","D. quiet"],"a":"A","e":"建议问别人→自己不确定。sure 正确。wrong 表示确定但错了，与问别人的逻辑不符。"},{"i":38,"s":"\"Should we start the work today or tomorrow?\" \"It is ____ that we start right now.\"","o":["A. impossible","B. strange","C. necessary","D. possible"],"a":"C","e":"「start right now」的强调语气→必须马上开始。necessary 正确。possible 语气太弱，impossible 相反。"},{"i":39,"s":"\"How should I take this medicine?\" \"Do ____ what the doctor told you.\"","o":["A. carelessly","B. loudly","C. happily","D. exactly"],"a":"D","e":"遵医嘱需严格按剂量和时间。exactly 正确。carelessly 危险，loudly/happily 与服药方式无关。"},{"i":40,"s":"\"I can't follow what you said. Could you speak more ____?\" \"Of course.\"","o":["A. loudly","B. clearly","C. quickly","D. quietly"],"a":"B","e":"「follow」是理解而非音量问题→需更清晰。clearly 正确。loudly 解决音量而非理解，quickly/quietly 会加重问题。"},{"i":41,"s":"\"Do you think David is ____?\" \"Yes. He never takes what is not his.\"","o":["A. careless","B. honest","C. clever","D. funny"],"a":"B","e":"不拿别人的东西→诚实。honest 正确。careless 是粗心不是品德，clever/funny 与不贪无关。"},{"i":42,"s":"\"Have you been to Jingdezhen in Jiangxi?\" \"Yes, the art works there are truly ____.\"","o":["A. rough","B. plain","C. ordinary","D. beautiful"],"a":"D","e":"景德镇瓷器精美绝伦，感叹语气需正面评价。beautiful 正确。rough/plain/ordinary 与景德镇工艺声誉矛盾。","t":"江西景德镇以千年瓷器工艺闻名世界，beautiful 呼应瓷器的精美绝伦"},{"i":43,"s":"\"What should I take for the evening walk?\" \"A jacket. It gets ____ after the sun goes down.\"","o":["A. cool","B. hot","C. bright","D. dry"],"a":"A","e":"日落+带夹克→变凉。cool 正确。hot 不需夹克，bright/dry 不构成带外套理由。"},{"i":44,"s":"\"Why did the boss choose Amy for the job?\" \"She works ____ and makes few mistakes.\"","o":["A. carelessly","B. loudly","C. carefully","D. quickly"],"a":"C","e":"少犯错→工作仔细。carefully 正确。carelessly 与少错矛盾，loudly/quickly 不能解释少错。"},{"i":45,"s":"\"Is your grandpa still working?\" \"Yes, he is ____ and full of energy at eighty.\"","o":["A. weak","B. lazy","C. energetic","D. silent"],"a":"C","e":"「full of energy」→精力充沛。energetic 正确。weak 与充满精力相反，lazy/silent 不能呼应。"},{"i":46,"s":"\"How was the cake?\" \"It was ____. I'd like another piece but I'm full.\"","o":["A. delicious","B. terrible","C. bitter","D. salty"],"a":"A","e":"想再吃但饱了→好吃才吃多到饱。delicious 正确。terrible/bitter/salty 不可能吃多到饱。"},{"i":47,"s":"\"Are you moving to Shanghai next month?\" \"Yes, but I feel ____ to leave my friends.\"","o":["A. happy","B. sad","C. lucky","D. excited"],"a":"B","e":"离开朋友→难过。sad 正确。happy/excited/lucky 与离别情感不符。"},{"i":48,"s":"\"Any advice before I make the decision?\" \"Think ____ and don't rush into it.\"","o":["A. quickly","B. loudly","C. simply","D. carefully"],"a":"D","e":"「don't rush」→慎重、仔细。carefully 正确。quickly 与不着急矛盾，loudly/simply 与慎重决策无关。"},{"i":49,"s":"\"Why do many people visit Jinggangshan every year?\" \"It is an ____ place in China's history.\"","o":["A. important","B. ordinary","C. modern","D. quiet"],"a":"A","e":"井冈山在中国历史上有重要地位。important 正确。ordinary/modern/quiet 与历史纪念地定位不符。","t":"江西井冈山是中国革命摇篮，important 呼应其不可替代的历史地位"},{"i":50,"s":"\"Have you tried the oranges from Gannan in Jiangxi?\" \"Yes! They taste very ____ and juicy.\"","o":["A. sour","B. sweet","C. bitter","D. strange"],"a":"B","e":"赣南脐橙以甘甜多汁闻名。sweet 正确。sour/bitter 与优质脐橙口感矛盾，strange 不用于形容水果自然风味。","t":"江西赣南脐橙以甘甜多汁闻名全国，sweet 呼应脐橙口感特征"}]},{"id":"present_cont","n":"现在进行时","d":"六年考频3/6（2020、2023、2024）","dd":"同一动词词根 × 四种时态。近年趋势：淡化now等显性标志词，通过对话隐含线索暗示动作正在进行。覆盖Listen!/Look!感官提示、问-答逻辑。","q":[{"i":1,"s":"Listen! The girl ____ an English song in the next room.","o":["A. is singing","B. was singing","C. sings","D. sang"],"a":"A","e":"「Listen!」是现在进行时典型信号词，指向正在发生的动作。B-过去进行时（过去某刻正在唱），C-一般现在时（习惯性），D-一般过去时（已唱完）。"},{"i":2,"s":"Look! The boys ____ basketball on the playground right now.","o":["A. play","B. are playing","C. were playing","D. will play"],"a":"B","e":"「Look!」+「right now」双信号锁定此刻正在打篮球。A-一般现在时（习惯），C-过去进行时，D-一般将来时。"},{"i":3,"s":"Be quiet! Your father ____ an important phone call at the moment.","o":["A. was making","B. made","C. is making","D. makes"],"a":"C","e":"「Be quiet!」+「at the moment」表明说话瞬间正在打电话。A-过去进行时，B-一般过去时，D-一般现在时（习惯性）。"},{"i":4,"s":"Don't go out now. It ____ very hard outside.","o":["A. rains","B. rained","C. will rain","D. is raining"],"a":"D","e":"「now」明确指向此刻正在下雨——不要现在出门的原因。A-一般现在时（常态），B-一般过去时，C-一般将来时。"},{"i":5,"s":"Hurry up! Everyone ____ for you at the bus stop right now.","o":["A. is waiting","B. was waiting","C. waits","D. waited"],"a":"A","e":"「Hurry up!」催促+「right now」说明大家正在等候。B-过去进行时，C-一般现在时（习惯），D-一般过去时。"},{"i":6,"s":"Shh! The baby ____ in the bedroom. Don't wake her up.","o":["A. slept","B. is sleeping","C. was sleeping","D. sleeps"],"a":"B","e":"「Shh!」+「Don't wake」共同指向婴儿此刻正在睡觉。A-一般过去时，C-过去进行时，D-一般现在时（习惯）。"},{"i":7,"s":"Look! The sun ____ over Lushan Mountain right now.","o":["A. was rising","B. rose","C. is rising","D. rises"],"a":"C","e":"「Look!」+「right now」指向庐山日出正在升起的瞬间。A-过去进行时，B-一般过去时，D-一般现在时（自然规律）。","t":"以庐山日出为场景，融入江西地理文化元素。"},{"i":8,"s":"It is seven o'clock now. My mother ____ dinner in the kitchen.","o":["A. cooks","B. cooked","C. will cook","D. is cooking"],"a":"D","e":"「seven o'clock now」点明此刻时间，妈妈正在做饭。A-一般现在时（日常习惯），B-一般过去时，C-一般将来时。"},{"i":9,"s":"Please be quiet. I ____ to the news on the radio now.","o":["A. am listening","B. was listening","C. listen","D. will listen"],"a":"A","e":"「now」标记此刻正在收听新闻。B-过去进行时，C-一般现在时（习惯），D-一般将来时。"},{"i":10,"s":"Don't talk to him. He ____ a difficult math problem now.","o":["A. solves","B. is solving","C. was solving","D. will solve"],"a":"B","e":"「Don't talk」暗示他此刻正在解题——打扰正在做困难事情的人不合理。A-一般现在时，C-过去进行时，D-一般将来时。"},{"i":11,"s":"The children ____ a big snowman in the yard at this moment.","o":["A. were making","B. made","C. are making","D. make"],"a":"C","e":"「at this moment」是现在进行时明确信号词。A-过去进行时，B-一般过去时，D-一般现在时（习惯）。"},{"i":12,"s":"Look at the sky! The birds ____ south for the winter now.","o":["A. fly","B. flew","C. will fly","D. are flying"],"a":"D","e":"「Look!」+「now」双信号指向鸟儿正在南飞。A-一般现在时（自然规律），B-一般过去时，C-一般将来时。"},{"i":13,"s":"My little brother ____ a letter to his pen pal right now.","o":["A. is writing","B. was writing","C. writes","D. wrote"],"a":"A","e":"「right now」直接指向此刻正在写信。B-过去进行时，C-一般现在时（习惯），D-一般过去时。"},{"i":14,"s":"She cannot answer the phone. She ____ a shower at the moment.","o":["A. takes","B. is taking","C. took","D. was taking"],"a":"B","e":"「cannot answer」解释当前无法接电话的原因+「at the moment」指向正在洗澡。A-一般现在时，C-一般过去时，D-过去进行时。"},{"i":15,"s":"Wait a moment! I ____ my keys. I cannot find them.","o":["A. looked for","B. will look for","C. am looking for","D. look for"],"a":"C","e":"「Wait」说明说话人此刻正在找东西，动作与说话同时进行。A-一般过去时，B-一般将来时，D-一般现在时（习惯）。"},{"i":16,"s":"— Why are you so quiet? — I ____ about the English test tomorrow.","o":["A. thought","B. think","C. was thinking","D. am thinking"],"a":"D","e":"问句「are you」点明现在时语境，答句描述此刻正在进行的心理活动。A-一般过去时，B-一般现在时（习惯），C-过去进行时。"},{"i":17,"s":"— Where is your sister? — She ____ the flowers in the garden.","o":["A. is watering","B. was watering","C. waters","D. watered"],"a":"A","e":"问句用「is」询问当前位置，答句说明她正在浇花——位置与动作同步。B-过去进行时，C-一般现在时（习惯），D-一般过去时。"},{"i":18,"s":"— May I speak to Mr. Wang? — Sorry, he ____ a meeting right now.","o":["A. has","B. is having","C. had","D. was having"],"a":"B","e":"打电话场景+「right now」说明王先生此刻正在开会，无法接听。A-一般现在时（习惯），C-一般过去时，D-过去进行时。"},{"i":19,"s":"— Can I use your bike today? — Sorry, my brother ____ it to school.","o":["A. was riding","B. rode","C. is riding","D. rides"],"a":"C","e":"借车被拒——弟弟正骑着去学校，车不在。A-过去进行时，B-一般过去时，D-一般现在时（习惯）。"},{"i":20,"s":"— What is that loud noise? — The workers ____ the road outside.","o":["A. repaired","B. repair","C. will repair","D. are repairing"],"a":"D","e":"问句听到噪音，答句解释工人正在修路——动作与听到的声音同步。A-一般过去时，B-一般现在时（习惯），C-一般将来时。"},{"i":21,"s":"— Is Tom in his room? — Yes, he ____ his homework there now.","o":["A. is doing","B. does","C. did","D. was doing"],"a":"A","e":"问当前位置+答句「now」说明他此刻正在做作业。B-一般现在时（习惯），C-一般过去时，D-过去进行时。"},{"i":22,"s":"— Why isn't she coming to dinner? — She ____ her hands in the bathroom.","o":["A. washed","B. is washing","C. washes","D. will wash"],"a":"B","e":"问句「isn't coming」奠定现在进行时语境，答句延续同一时间框架——正在洗手。A-一般过去时，C-一般现在时，D-一般将来时。"},{"i":23,"s":"— Can you help me with this box? — Wait. I ____ the dishes now.","o":["A. did","B. will do","C. am doing","D. was doing"],"a":"C","e":"「Wait」+「now」表明说话人此刻正在洗碗，稍后帮忙。A-一般过去时，B-一般将来时，D-过去进行时。"},{"i":24,"s":"— Where are the children? — They ____ a game in the living room.","o":["A. played","B. play","C. were playing","D. are playing"],"a":"D","e":"问句用「are」问现在位置，答句说明孩子们正在玩游戏——动作与询问同步。A-一般过去时，B-一般现在时，C-过去进行时。"},{"i":25,"s":"— Why are you under the desk? — I ____ my lost pen everywhere.","o":["A. am looking for","B. looked for","C. was looking for","D. look for"],"a":"A","e":"问句「are you」暗示当前状态，答句延续此刻正在找笔。B-一般过去时，C-过去进行时，D-一般现在时。"},{"i":26,"s":"— Let's go out and play. — Not now. I ____ an interesting book.","o":["A. read","B. am reading","C. was reading","D. will read"],"a":"B","e":"「Not now」拒绝当前邀请，因为此刻正在读书——动作正在发生。A-一般现在时，C-过去进行时，D-一般将来时。"},{"i":27,"s":"— Why is the door open? — Dad ____ the car in the garage.","o":["A. cleaned","B. cleans","C. is cleaning","D. was cleaning"],"a":"C","e":"问句问当前状态原因，答句解释爸爸正在车库洗车——动作与门开的状态同步。A-一般过去时，B-一般现在时，D-过去进行时。"},{"i":28,"s":"— Do you know where Anna is? — She ____ her trip with her mother.","o":["A. plans","B. planned","C. was planning","D. is planning"],"a":"D","e":"问句问位置，答句说明Anna正在和妈妈规划旅行——当前正在进行的活动。A-一般现在时，B-一般过去时，C-过去进行时。"},{"i":29,"s":"— Is your father back home? — No, he ____ his car to the office now.","o":["A. is driving","B. was driving","C. drives","D. drove"],"a":"A","e":"问「回来了吗」答「正在开车去办公室」——「now」锁定此刻正在发生的动作。B-过去进行时，C-一般现在时，D-一般过去时。"},{"i":30,"s":"— Why are you carrying an umbrella? — It ____ outside. Look at the window.","o":["A. rained","B. is raining","C. was raining","D. rains"],"a":"B","e":"问句「are carrying」奠定现在时+答句「Look」说明外面正在下雨。A-一般过去时，C-过去进行时，D-一般现在时。"},{"i":31,"s":"— Can you turn down the TV? — Sorry, I ____ an important basketball match.","o":["A. watched","B. will watch","C. am watching","D. was watching"],"a":"C","e":"请求降低音量被拒——因为正在看关键比赛，不能错过。A-一般过去时，B-一般将来时，D-过去进行时。"},{"i":32,"s":"— Where is Lily now? — She ____ her clothes for the school trip.","o":["A. packs","B. packed","C. was packing","D. is packing"],"a":"D","e":"问句用「is」问现在位置，答句说明她正在为学校旅行打包。A-一般现在时，B-一般过去时，C-过去进行时。"},{"i":33,"s":"— What's that noise on your phone? — Oh, I ____ a short video. I'll turn it off.","o":["A. am watching","B. was watching","C. watch","D. will watch"],"a":"A","e":"问句听到声音+答句正在看视频——动作与说话时刻同步发生。B-过去进行时，C-一般现在时，D-一般将来时。"},{"i":34,"s":"— Are you free this afternoon? — No, I ____ for the English exam right now.","o":["A. prepare","B. am preparing","C. was preparing","D. will prepare"],"a":"B","e":"问是否有空，答句「right now」说明此刻正在备考，没空。A-一般现在时，C-过去进行时，D-一般将来时。"},{"i":35,"s":"— Why is the kitchen so messy? — My sister ____ a birthday cake for our mother.","o":["A. made","B. makes","C. is making","D. was making"],"a":"C","e":"问句描述当前厨房乱的状态，答句解释姐姐正在做蛋糕——动作与凌乱状态同步。A-一般过去时，B-一般现在时，D-过去进行时。"},{"i":36,"s":"— Can you hear that strange sound? — Yes, the wind ____ very hard outside.","o":["A. blows","B. blew","C. will blow","D. is blowing"],"a":"D","e":"「Can you hear」指向当前听觉，答句描述风正猛烈吹——无明确信号词但动作显然正在发生。A-一般现在时，B-一般过去时，C-一般将来时。"},{"i":37,"s":"— I smell something nice. What is it? — My grandma ____ chicken soup for us.","o":["A. cooks","B. was cooking","C. will cook","D. is cooking"],"a":"D","e":"闻到味道说明烹饪正在进行——感官线索锁定进行时，无now但动作已开始且未结束。A-一般现在时，B-过去进行时，C-一般将来时。"},{"i":38,"s":"— What is that artist doing? — He ____ a beautiful cup in Jingdezhen now.","o":["A. is making","B. was making","C. makes","D. made"],"a":"A","e":"问句「is doing」已奠定现在进行时语境，答句延续同一框架——正在制作瓷杯。B-过去进行时，C-一般现在时，D-一般过去时。","t":"以景德镇手工制瓷为场景，融入江西千年瓷都文化元素。"},{"i":39,"s":"— Is your mother busy? — Yes, she ____ the house all morning.","o":["A. cleans","B. is cleaning","C. cleaned","D. was cleaning"],"a":"B","e":"问句用「is」问现在状态，「all morning」包含此刻正在持续的清扫动作。A-一般现在时，C-一般过去时，D-过去进行时。"},{"i":40,"s":"— The phone is ringing. Can you get it? — Sorry, I ____ my hands now.","o":["A. was washing","B. washed","C. am washing","D. wash"],"a":"C","e":"电话正在响，答句「正在洗手」——为什么不能接电话的同步解释。A-过去进行时，B-一般过去时，D-一般现在时。"},{"i":41,"s":"— The school is so quiet today. — All the students ____ Tengwang Pavilion for a trip.","o":["A. visit","B. were visiting","C. will visit","D. are visiting"],"a":"D","e":"第一句描述学校当前安静，第二句解释学生们正在参观滕王阁——状态与动作因果关系。A-一般现在时，B-过去进行时，C-一般将来时。","t":"以滕王阁为研学旅行目的地，融入南昌标志性历史文化景点。"},{"i":42,"s":"— You look tired. What's wrong? — I ____ for a big test these days.","o":["A. am studying","B. was studying","C. study","D. studied"],"a":"A","e":"「You look tired」描述当前状态+「these days」近期持续进行——正在备考导致疲劳。B-过去进行时，C-一般现在时，D-一般过去时。"},{"i":43,"s":"— Can I borrow your dictionary? — Sorry, I ____ it myself.","o":["A. use","B. am using","C. was using","D. used"],"a":"B","e":"借字典被拒——因为自己正在用，对话逻辑锁定此刻动作。无now但现场情景必然为进行时。A-一般现在时，C-过去进行时，D-一般过去时。"},{"i":44,"s":"— That sounds so beautiful! — Someone ____ a folk song from Jiangxi next door.","o":["A. was singing","B. sang","C. is singing","D. sings"],"a":"C","e":"「sounds」为现在时+隔壁歌声显然正在发生——听觉线索与说话时刻同步。A-过去进行时，B-一般过去时，D-一般现在时。","t":"以江西民歌为听觉场景，融入赣鄱音乐文化元素。"},{"i":45,"s":"— The river ____ very fast after the rain. — We should stay away from it.","o":["A. runs","B. ran","C. was running","D. is running"],"a":"D","e":"大雨之后河水正在快速流动——当前危险状态，建议远离。动作隐含「此刻」意义但无显性时间词。A-一般现在时，B-一般过去时，C-过去进行时。"},{"i":46,"s":"— Don't disturb your brother. — Oh, he ____ for his final exam upstairs.","o":["A. is studying","B. was studying","C. studies","D. studied"],"a":"A","e":"「Don't disturb」暗示他此刻正在做需要专注的事——备考。勿打扰的逻辑前提是动作正在进行。B-过去进行时，C-一般现在时，D-一般过去时。"},{"i":47,"s":"— The water ____. Turn off the fire. — OK, I will make the tea now.","o":["A. boils","B. is boiling","C. was boiling","D. boiled"],"a":"B","e":"「Turn off the fire」说明水正在沸腾——关火动作紧随进行中的状态。A-一般现在时，C-过去进行时，D-一般过去时。"},{"i":48,"s":"— The fruit at the market tastes so fresh. — Farmers ____ Gannan oranges on the hills these days.","o":["A. were picking","B. picked","C. are picking","D. pick"],"a":"C","e":"「these days」指近期正在进行的收获季节——当前阶段进行时用法，不限于说话瞬间但属于现阶段。A-过去进行时，B-一般过去时，D-一般现在时。","t":"以赣南脐橙采摘季为场景，融入
