<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>中考英语 · 综合练习</title>
<style>
:root {
  --bg: #FDFBF7; --card: #fff; --text: #2c2418; --sub: #3a3028;
  --muted: #8a8070; --gold: #b8a080; --gold-d: #9b7d5a; --gold-l: #f7f3eb;
  --border: #e0d6c8; --green: #4a7a40; --green-bg: #e6f0e2;
  --red: #b84a3a; --red-bg: #fce6e0; --blue: #4a6fa5;
}
* { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; -webkit-text-size-adjust:100%; }
body {
  font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  background:var(--bg); color:var(--text); line-height:1.6;
  min-height:100dvh; display:flex; justify-content:center;
}
#app { width:100%; max-width:540px; padding:12px; padding-bottom:env(safe-area-inset-bottom,12px); }

/* Version tabs */
.ver-bar { display:flex; gap:0; margin-bottom:4px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.ver-btn { flex-shrink:0; padding:8px 14px; border:none; background:transparent; font-size:14px; font-weight:700; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:color .2s,border-color .2s; -webkit-tap-highlight-color:transparent; }
.ver-btn.active { color:var(--gold-d); border-bottom-color:var(--gold); }

/* Type tabs */
.tab-bar { display:flex; gap:0; margin-bottom:12px; border:1px solid var(--border); border-radius:10px; overflow:hidden; background:var(--card); }
.tab-btn { flex:1; padding:9px 0; border:none; background:var(--card); font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; transition:background .2s,color .2s; -webkit-tap-highlight-color:transparent; }
.tab-btn + .tab-btn { border-left:1px solid var(--border); }
.tab-btn.active { background:var(--gold); color:#fff; }

/* Landing */
.landing-header { text-align:center; padding:12px 0 8px; }
.landing-header h1 { font-size:18px; color:var(--text); margin-bottom:2px; }
.landing-header p { font-size:12px; color:var(--muted); }
.cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding-bottom:24px; }
.cat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; cursor:pointer; transition:border-color .2s,box-shadow .2s; -webkit-tap-highlight-color:transparent; display:flex; flex-direction:column; gap:4px; min-height:80px; }
.cat-card:active, .cat-card:hover { border-color:var(--gold); box-shadow:0 2px 8px rgba(184,160,128,.15); }
.cat-card .cat-name { font-size:14px; font-weight:700; color:var(--text); }
.cat-card .cat-desc { font-size:10px; color:var(--muted); line-height:1.4; flex:1; }
.cat-card .cat-stat { font-size:10px; color:var(--gold-d); margin-top:2px; }
.cat-card .cat-genre-tag { display:inline-block; font-size:9px; padding:2px 6px; border-radius:4px; background:var(--gold-l); color:var(--gold-d); align-self:flex-start; }
.cat-card.empty-card { opacity:0.4; cursor:default; }
.cat-card.empty-card:active, .cat-card.empty-card:hover { border-color:var(--border); box-shadow:none; }

/* Quiz */
.quiz-top { display:flex; align-items:center; gap:10px; padding:8px 0 12px; }
.btn-back { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:12px; color:var(--text); cursor:pointer; -webkit-tap-highlight-color:transparent; flex-shrink:0; }
.btn-back:active { background:var(--gold-l); }
.quiz-title { font-size:14px; font-weight:700; flex:1; }
.progress-wrap { padding:0 0 12px; }
.progress-text { font-size:11px; color:var(--muted); margin-bottom:4px; }
.progress-bar { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:var(--gold); border-radius:3px; transition:width .3s; }

/* SC quiz */
.q-stem-display { font-family:Georgia,"Times New Roman",serif; font-size:16px; line-height:1.6; padding:14px; background:var(--card); border-radius:10px; border:1px solid var(--border); margin-bottom:12px; text-align:center; }
.q-stem-display .blank { border-bottom:2px dashed var(--gold); padding:0 24px; }
.options-wrap { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.opt-btn { display:flex; align-items:center; gap:8px; width:100%; min-height:48px; padding:10px 12px; border:1.5px solid var(--border); border-radius:10px; background:var(--card); font-size:14px; color:var(--text); cursor:pointer; transition:background .15s,border-color .15s; -webkit-tap-highlight-color:transparent; text-align:left; }
.opt-btn:active { background:var(--gold-l); }
.opt-letter { width:26px; height:26px; border-radius:50%; background:var(--gold-l); color:var(--gold-d); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.opt-btn.correct { background:var(--green-bg); border-color:var(--green); }
.opt-btn.correct .opt-letter { background:var(--green); color:#fff; }
.opt-btn.wrong { background:var(--red-bg); border-color:var(--red); }
.opt-btn.wrong .opt-letter { background:var(--red); color:#fff; }
.opt-btn.reveal { border-color:var(--green); }
.opt-btn:disabled { pointer-events:none; }
.feedback { background:var(--card); border-radius:10px; padding:12px; margin-bottom:12px; border:1px solid var(--border); display:none; }
.feedback.show { display:block; }
.feedback .fb-result { font-size:14px; font-weight:700; margin-bottom:4px; }
.feedback .fb-result.good { color:var(--green); }
.feedback .fb-result.bad { color:var(--red); }
.feedback .fb-explain { font-size:12px; color:var(--sub); line-height:1.5; }
.feedback .fb-tags { font-size:11px; color:var(--gold-d); margin-top:4px; }
.btn-next { width:100%; min-height:48px; border:none; border-radius:10px; background:var(--gold); color:#fff; font-size:15px; font-weight:700; cursor:pointer; transition:background .2s; display:none; -webkit-tap-highlight-color:transparent; }
.btn-next.show { display:block; }
.btn-next:active { background:var(--gold-d); }

/* Cloze B */
.cloze-passage { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:14px; font-family:Georgia,"Times New Roman",serif; font-size:16px; line-height:1.9; }
.cloze-bank-ref { background:var(--gold-l); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:14px; position:sticky; top:8px; z-index:10; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.cloze-bank-ref-label { font-size:11px; color:var(--muted); margin-bottom:6px; }
.cloze-bank-ref-words { display:flex; flex-wrap:wrap; gap:6px; }
.bank-ref-word { padding:5px 10px; border:1px solid var(--border); border-radius:6px; background:var(--card); font-size:13px; color:var(--text); font-family:Georgia,"Times New Roman",serif; }
.cloze-blank { display:inline; min-width:60px; padding:2px 6px; margin:0 2px; border-bottom:2px dashed var(--gold); color:var(--gold-d); font-weight:600; white-space:nowrap; }
.cloze-blank.correct-blank { border-bottom-color:var(--green); color:var(--green); background:var(--green-bg); }
.cloze-blank.wrong-blank { border-bottom-color:var(--red); color:var(--red); background:var(--red-bg); }
.cloze-input { display:inline; min-width:60px; padding:2px 6px; margin:0 2px; border:none; border-bottom:2px solid var(--gold); font-family:Georgia,"Times New Roman",serif; font-size:16px; line-height:1.9; color:var(--gold-d); font-weight:600; background:var(--gold-l); border-radius:0; outline:none; -webkit-appearance:none; white-space:nowrap; cursor:text; -webkit-tap-highlight-color:transparent; }
.cloze-input:focus { border-bottom-color:var(--blue); background:rgba(74,111,165,.08); }
.cloze-submit { width:100%; min-height:48px; border:none; border-radius:10px; background:var(--border); color:#fff; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:12px; -webkit-tap-highlight-color:transparent; }
.cloze-submit.ready { background:var(--gold); }
.cloze-submit.ready:active { background:var(--gold-d); }
.cloze-submit:disabled { pointer-events:none; }
.cloze-fb-item { margin-bottom:4px; font-size:12px; padding:4px 0; border-bottom:1px solid var(--border); }

/* Vocab A - sentence fill */
.vocab-a-bank { background:var(--gold-l); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:14px; position:sticky; top:8px; z-index:10; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.vocab-a-bank-label { font-size:11px; color:var(--muted); margin-bottom:6px; }
.vocab-a-bank-words { display:flex; flex-wrap:wrap; gap:6px; }
.bank-pill { display:inline-block; padding:6px 14px; border:1.5px solid var(--border); border-radius:20px; background:var(--card); font-size:13px; color:var(--text); font-family:Georgia,"Times New Roman",serif; font-weight:600; }
.vocab-a-sentences { display:flex; flex-direction:column; gap:12px; }
.vocab-a-sentence { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; font-family:Georgia,"Times New Roman",serif; font-size:15px; line-height:1.7; }
.vocab-a-sentence .s-num { display:inline-block; width:22px; height:22px; border-radius:50%; background:var(--gold-l); color:var(--gold-d); font-size:11px; font-weight:700; text-align:center; line-height:22px; margin-right:8px; flex-shrink:0; }
.vocab-a-input { display:inline-block; min-width:80px; padding:2px 8px; margin:0 4px; border:none; border-bottom:2px solid var(--gold); font-family:Georgia,"Times New Roman",serif; font-size:15px; line-height:1.7; color:var(--gold-d); font-weight:600; background:var(--gold-l); border-radius:0; outline:none; -webkit-appearance:none; }
.vocab-a-input:focus { border-bottom-color:var(--blue); background:rgba(74,111,165,.08); }
.vocab-a-submit { width:100%; min-height:48px; border:none; border-radius:10px; background:var(--border); color:#fff; font-size:15px; font-weight:700; cursor:pointer; margin-top:12px; -webkit-tap-highlight-color:transparent; }
.vocab-a-submit.ready { background:var(--gold); }

/* Vocab B - passage with Chinese hints */
.vocab-b-passage { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:14px; font-family:Georgia,"Times New Roman",serif; font-size:16px; line-height:2.2; }
.vocab-b-blank-wrap { display:inline-block; position:relative; margin:0 2px; }
.vocab-b-hint { font-size:10px; color:var(--gold-d); display:block; text-align:center; line-height:1; margin-bottom:1px; }
.vocab-b-input { display:inline-block; min-width:70px; padding:2px 6px; border:none; border-bottom:2px solid var(--gold); font-family:Georgia,"Times New Roman",serif; font-size:16px; line-height:1.5; color:var(--gold-d); font-weight:600; background:var(--gold-l); border-radius:0; outline:none; -webkit-appearance:none; text-align:center; }
.vocab-b-input:focus { border-bottom-color:var(--blue); background:rgba(74,111,165,.08); }

/* Grammar fill */
.grammar-passage { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:14px; font-family:Georgia,"Times New Roman",serif; font-size:16px; line-height:2.2; }
.grammar-blank-wrap { display:inline-block; margin:0 2px; }
.grammar-hint { font-size:9px; color:var(--muted); display:block; text-align:center; line-height:1; margin-bottom:1px; }
.grammar-input { display:inline-block; min-width:70px; padding:2px 6px; border:none; border-bottom:2px solid var(--gold); font-family:Georgia,"Times New Roman",serif; font-size:16px; line-height:1.5; color:var(--gold-d); font-weight:600; background:var(--gold-l); border-radius:0; outline:none; -webkit-appearance:none; text-align:center; }
.grammar-input:focus { border-bottom-color:var(--blue); background:rgba(74,111,165,.08); }
.grammar-input.no-hint { border-bottom-style:solid; border-bottom-color:var(--red); background:rgba(184,74,58,.05); }

/* Score/results */
.results-wrap { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.results-wrap .score { font-size:48px; font-weight:900; color:var(--gold-d); }
.results-wrap .score.good { color:var(--green); }
.results-wrap .score.bad { color:var(--red); }
.results-wrap .score-label { font-size:13px; color:var(--muted); margin:4px 0 12px; }
.results-wrap .btn-restart { width:100%; min-height:48px; border:none; border-radius:10px; background:var(--gold); color:#fff; font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; }

/* Modal */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:center; justify-content:center; padding:24px; }
.modal-box { background:var(--card); border-radius:14px; padding:24px; width:100%; max-width:380px; box-shadow:0 8px 32px rgba(0,0,0,.15); }
.modal-box h2 { font-size:17px; margin-bottom:12px; color:var(--text); }
.modal-box p { font-size:13px; color:var(--muted); margin-bottom:8px; line-height:1.6; }
.modal-box .btn-row { display:flex; gap:10px; margin-top:16px; }
.modal-box .btn-row button { flex:1; min-height:44px; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; }
.btn-primary { background:var(--gold); color:#fff; }
.btn-secondary { background:var(--gold-l); color:var(--gold-d); border:1px solid var(--border); }

/* Error book */
.err-list { padding:0; }
.err-item { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:8px; }
.err-item .err-stem { font-size:14px; color:var(--text); margin-bottom:6px; }
.err-item .err-detail { font-size:11px; color:var(--muted); }
.err-item .err-detail .wrong { color:var(--red); font-weight:600; }
.err-item .err-detail .correct { color:var(--green); font-weight:600; }
</style>
</head>

var ALL_DATA = {"jx":{"sc":{"conjunctions":{"id":"conjunctions","n":"连词辨析","d":"六年必考（2020-2025每年必考）","dd":"覆盖并列、转折、因果、条件、让步、时间六种逻辑关系。对话体≥60%。课标(八)连词。","q":[{"s":"Students can learn something about history ____ they go to the Marquis of Haihun's Tomb.","o":["A. whatever","B. however","C. whoever","D. whenever"],"a":"D","e":"whenever无论何时。go to...提示时间状语从句。","t":"🏛 2025江西中考第25题"},{"s":"You want me to do all the work ____ you sit at home doing nothing.","o":["A. while","B. unless","C. if","D. because"],"a":"A","e":"while然而，表对比关系。","t":"🏛 2024江西中考第27题"},{"s":"Mary cut her knee badly, ____ she didn't cry.","o":["A. but","B. and","C. so","D. or"],"a":"A","e":"but但是，表转折。","t":"🏛 2023江西中考第28题"},{"s":"You will be late for school ____ you don't hurry up.","o":["A. although","B. because","C. if","D. unless"],"a":"C","e":"if如果，条件状语从句。","t":"📋 真题模式·条件"},{"s":"You won't pass the exam ____ you study harder.","o":["A. although","B. if","C. because","D. unless"],"a":"D","e":"unless除非=if...not。","t":"📋 真题模式·条件"},{"s":"____ you keep practicing, you will improve your English.","o":["A. Although","B. Unless","C. If","D. Before"],"a":"C","e":"If如果，条件句。","t":"📋 真题模式·条件"},{"s":"I won't go to the party ____ I am invited.","o":["A. when","B. because","C. unless","D. although"],"a":"C","e":"unless除非。不被邀请就不去。","t":"📋 真题模式·条件"},{"s":"____ it was raining hard, the farmers kept working.","o":["A. Although","B. If","C. Because","D. Unless"],"a":"A","e":"Although虽然，让步状语从句。","t":"📋 真题模式·让步"},{"s":"____ he is young, he knows a lot about science.","o":["A. If","B. Although","C. Because","D. When"],"a":"B","e":"Although虽然。年轻但懂得多。","t":"📋 真题模式·让步"},{"s":"____ the sun was shining, it wasn't very warm.","o":["A. If","B. Because","C. Although","D. Since"],"a":"C","e":"Although虽然。","t":"📋 真题模式·让步"},{"s":"____ he had no money, he still bought a gift for his mother.","o":["A. If","B. Though","C. Since","D. Because"],"a":"B","e":"Though虽然=Although。","t":"📋 真题模式·让步"},{"s":"____ it rains tomorrow, we will still go d protect the environment ____ we can have a better future.","o":["A. even though","B. so that","C. as if","D. as soon as"],"a":"B","e":"so that以便，表目的。","t":"📋 真题模式·目的"},{"s":"He got up early ____ he could catch the first bus.","o":["A. unless","B. so that","C. because","D. although"],"a":"B","e":"so that以便。","t":"📋 真题模式·目的"},{"s":"You can either stay at home ____ go shopping with me.","o":["A. but","B. and","C. so","D. or"],"a":"D","e":"or或者。either...or...固定搭配。","t":"📋 真题模式·选择"},{"s":"I like reading ____ my brother likes playing basketball.","o":["A. unless","B. while","C. because","D. until"],"a":"B","e":"while而，表对比。","t":"📋 基于2024#27 while"},{"s":"Hurry up, ____ you will miss the bus.","o":["A. or","B. so","C. but","D. and"],"a":"A","e":"or否则。祈使句+or表警告。","t":"📋 真题模式·警告"},{"s":"Work hard, ____ you will succeed.","o":["A. and","B. but","C. or","D. so"],"a":"A","e":"and那么。祈使句+and表结果。","t":"📋 真题模式·结果"},{"s":"Not only he but also his parents ____ interested in music.","o":["A. are","B. is","C. was","D. were"],"a":"A","e":"not only...but also就近原则，parents是复数。","t":"📋 课标扩展·并列"},{"s":"____ Tom ____ Jack has been to the Great Wall.","o":["A. Both; and","B. Not; but","C. Neither; nor","D. Either; or"],"a":"C","e":"Neither...nor既不……也不，谓语就近原则has。","t":"📋 课标扩展·并列"},{"s":"You must read the instructions ____ you use the machine.","o":["A. until","B. while","C. after","D. before"],"a":"D","e":"before在……之前。","t":"📋 真题模式·时间"},{"s":"She was reading a book ____ her mother was cooking.","o":["A. before","B. when","C. while","D. after"],"a":"C","e":"while而，表两个动作同时进行。","t":"📋 真题模式·对比"},{"s":"He didn't come to the party, ____ did he call to explain.","o":["A. but","B. so","C. nor","D. and"],"a":"C","e":"nor也不。倒装结构。","t":"📋 课标扩展·否定并列"},{"s":"We had just fallen asleep ____ someone knocked at the door.","o":["A. before","B. when","C. while","D. after"],"a":"B","e":"when就在这时。had just done...when...。","t":"📋 真题模式·时间"},{"s":"____ you grow older, you will understand your parents better.","o":[" d","B. are having","C. have","D. were having"],"a":"D","e":"过去进行时were having。at this time yesterday。","t":"📋 课标·过去进行时"},{"s":"—I called at 8:00 but no answer. —Sorry, I ____ a shower then.","o":["A. have taken","B. was taking","C. take","D. took"],"a":"B","e":"过去进行时was taking。then=at 8:00。","t":"📋 课标·过去进行时"},{"s":"He ____ a letter when I entered the room.","o":["A. writes","B. wrote","C. was writing","D. has written"],"a":"C","e":"过去进行时was writing。","t":"📋 课标·过去进行时"},{"s":"I ____ the book already. It's very interesting.","o":["A. have read","B. read","C. will read","D. am reading"],"a":"A","e":"现在完成时have read。already提示。","t":"📋 课标·现在完成时"},{"s":"She ____ in Nanchang since 2020.","o":["A. has lived","B. will live","C. lived","D. lives"],"a":"A","e":"现在完成时has lived。since 2020。","t":"📋 课标·现在完成时"},{"s":"—____ you ever ____ to Beijing? —Yes, twice.","o":["A. Have; been","B. Did; go","C. Will; go","D. Do; go"],"a":"A","e":"现在完成时have been to。ever提问经历。","t":"📋 课标·现在完成时"},{"s":"My brother ____ the army for three years.","o":["A. is in","B. joined","C. has been in","D. has joined"],"a":"C","e":"has been in。join是短暂动词不能与for连用。","t":"📋 课标·现完短暂动词"},{"s":"I ____ my keys. I can't open the door now.","o":["A. lose","B. will lose","C. have lost","D. lost"],"a":"C","e":"现在完成时have lost。对现在造成影响。","t":"📋 课标·现在完成时"},{"s":"Great changes ____ in my hometown in the past ten years.","o":["A. took place","B. take place","C. will take place","D. have taken place"],"a":"D","e":"现在完成时have taken place。in the past+时间段。","t":"📋 课标·现在完成时"},{"s":"He ____ to London. He will be back next week.","o":["A. went","B. goes","C. has been","D. has gone"],"a":"D","e":"has gone去了(未回) vs has been去过(已回)。","t":"📋 课标·现完辨析"},{"s":"How long ____ you ____ English?","o":["A. have; learned","B. do; learn","C. did; learn","D. were; learning"],"a":"A","e":"have learned。How long提问时间段用现在完成时。","t":"📋 课标·现在完成时"},{"s":"We ____ each other since we were children.","o":["A. have known","B. will know","C. knew","D. know"],"a":"A","e":"现在完成时have known。since从句。","t":"📋 课标·现在完成时"},{"s":"My sister ____ a book about Chinese history these days.","o":["A. has read","B. read","C. is reading","D. reads"],"a":"C","e":"现在进行时is reading。these days近期持续。","t":"📋 课标·现在进行时"},{"s":"He ____ to school by bike every day, but today he ____ the bus.","o":["A. goes; is taking","B. goes; takes","C. is going; is taking","D. is going; takes"],"a":"A","e":"every day一般现在时goes，today特殊现在进行时is taking。","t":"📋 课标·时态辨析"},{"s":"If it ____ tomorrow, we will stay at home.","o":["A. is raining","B. rains","C. will rain","D. rained"],"a":"B","e":"一般现在时rains。if条件句用现在时表将来。","t":"📋 课标·条件句时态"},{"s":"We won't go out until the rain ____.","o":["A. is stopping","B. stops","C. stopped","D. will stop"],"a":"B","e":"一般现在时stops。until从句用现在时。","t":"📋 课标·until从句时态"},{"s":"He ____ in the factory since he left school.","o":["A. is working","B. has worked","C. worked","D. works"],"a":"B","e":"现在完成时has worked。since从句。","t":"📋 课标·现在完成时"},{"s":"It's the best film I ____ ever ____.","o":["A. did; see","B. was; seeing","C. have; seen","D. will; see"],"a":"C","e":"现在完成时have seen。It's the best...ever经典句型。","t":"📋 课标·现在完成时"},{"s":"—Do you know when he ____? —When he ____, I'll tell you.","o":["A. will come; comes","B. comes; will come","C. will come; will come","D. comes; comes"],"a":"A","e":"when宾语从句用将来时，when状语从句用现在时。","t":"📋 课标·时态辨析"},{"s":"The old man ____ for two years.","o":["A. has died","B. is dying","C. died","D. has been dead"],"a":"D","e":"has been dead。die短暂动词不能延续。","t":"📋 课标·现完短暂动词"},{"s":"By the time I got to the station, the train ____.","o":["A. leaves","B. has left","C. left","D. had left"],"a":"D","e":"过去完成时had left。got提示过去，火车在到站前离开。","t":"📋 课标·时态辨析"},{"s":"She ____ in this city for ten years and she loves it here.","o":["A. is living","B. has lived","C. lived","D. lives"],"a":"B","e":"现在完成时has lived。for+时间段，and loves说明仍在持续。","t":"📋 课标·现在完成时"},{"s":"While I ____ along the street, I met an old friend.","o":["A. walk","B. have walked","C. was walking","D. walked"],"a":"C","e":"过去进行时was walking。while+过去进行，met打断。","t":"📋 课标·过去进行时"},{"s":"Nobody ____ what happened to him yesterday.","o":["A. knew","B. knows","C. has known","D. is knowing"],"a":"B","e":"一般现在时knows。静态动词know不用进行时。","t":"📋 课标·一般现在时"},{"s":"These kinds of plants ____ well in warm weather.","o":["A. grow","B. grew","C. have grown","D. are growing"],"a":"A","e":"一般现在时grow。客观规律。","t":"📋 课标·一般现在时"},{"s":"The train ____ at 8:00 tomorrow morning, so we should leave early.","o":["A. leaves","B. is leaving","C. left","D. is going to leave"],"a":"A","e":"一般现在时leaves表时刻表。","t":"📋 课标·一般现在时表将来"},{"s":"—You look tired. —Yes, I ____ non-stop all morning.","o":["A. will work","B. worked","C. have been working","D. work"],"a":"C","e":"现在完成进行时have been working。强调持续不停。","t":"📋 课标·时态扩展"},{"s":"By next month, he ____ here for exactly five years.","o":["A. has worked","B. will have worked","C. worked","D. works"],"a":"B","e":"将来完成时will have worked。By+将来时间+for+时间段。","t":"📋 课标·时态扩展"}],"ps":50},"prepositions":{"id":"prepositions","n":"介词辨析","d":"六年考五次（2020/22-25）","dd":"时间介词(at/on/in)、地点介词、方式介词、短语介词。课标(七)介词。注意to作介词vs不定式区分。","q":[{"s":"We usually have lunch ____ 12:00 at school.","o":["A. on","B. at","C. for","D. in"],"a":"B","e":"at+具体时间点。","t":"📋 课标·时间介词"},{"s":"I was born ____ July 15, 2010.","o":["A. at","B. for","C. on","D. in"],"a":"C","e":"on+具体日期。","t":"📋 课标·时间介词"},{"s":"My father always goes to work ____ the morning.","o":["A. for","B. on","C. in","D. at"],"a":"C","e":"in the morning。","t":"📋 课标·时间介词"},{"s":"The meeting will be held ____ Friday afternoon.","o":["A. for","B. at","C. in","D. on"],"a":"D","e":"on+某天上午/下午。","t":"📋 课标·时间介词"},{"s":"He got up early ____ the morning of June 1st.","o":["A. on","B. in","C. for","D. at"],"a":"A","e":"on+具体某天早上。","t":"📋 课标·时间介词"},{"s":"We go to school ____ Monday to Friday.","o":["A. on","B. in","C. from","D. at"],"a":"C","e":"from...to从……到。","t":"📋 课标·时间介词"},{"s":"She has waited ____ two hours.","o":["A. at","B. on","C. since","D. for"],"a":"D","e":"for+时间段。","t":"📋 课标·时间介词"},{"s":"He has been here ____ 2018.","o":["A. in","B. at","C. since","D. for"],"a":"C","e":"since+时间起点。","t":"📋 课标·时间介词"},{"s":"I often go swimming ____ summer.","o":["A. at","B. for","C. on","D. in"],"a":"D","e":"in+季节。","t":"📋 课标·时间介词"},{"s":"The bank is ____ the post office and the hospital.","o":["A. in","B. among","C. between","D. at"],"a":"C","e":"between两者之间。","t":"📋 课标·地点介词"},{"s":"There is a bridge ____ the river.","o":["A. between","B. in","C. over","D. on"],"a":"C","e":"over在……正上方。","t":"📋 课标·地点介词"},{"s":"She arrived ____ the airport at 6:00.","o":["A. on","B. in","C. to","D. at"],"a":"D","e":"arrive at+小地点。","t":"📋 课标·地点介词"},{"s":"He arrived ____ Beijing yesterday.","o":["A. in","B. on","C. at","D. to"],"a":"A","e":"arrive in+大地点。","t":"📋 课标·地点介词"},{"s":"Let's meet ____ the school gate at 8:00.","o":["A. in","B. on","C. to","D. at"],"a":"D","e":"at the school gate具体点。","t":"📋 课标·地点介词"},{"s":"Put your books ____ the desk.","o":["A. at","B. in","C. on","D. between"],"a":"C","e":"on the desk在桌面上。","t":"📋 课标·地点介词"},{"s":"There is a bird ____ the tree.","o":["A. in","B. over","C. on","D. at"],"a":"A","e":"in the tree在树上(非树本身)。","t":"📋 课标·地点介词"},{"s":"He looked ____ the window and saw a cat.","o":["A. across","B. out of","C. over","D. into"],"a":"B","e":"look out of朝外看。","t":"📋 课标·短语介词"},{"s":"A car passed ____ the village.","o":["A. through","B. in","C. across","D. over"],"a":"A","e":"through从内部穿过。","t":"📋 课标·地点介词"},{"s":"Walk ____ the bridge and you will see the park.","o":["A. through","B. in","C. over","D. across"],"a":"D","e":"across从表面穿过。","t":"📋 课标·地点介词"},{"s":"I like to travel ____ train.","o":["A. in","B. by","C. with","D. on"],"a":"B","e":"by+交通工具。","t":"📋 课标·方式介词"},{"s":"They went to the park ____ foot.","o":["A. with","B. by","C. in","D. on"],"a":"D","e":"on foot步行。","t":"📋 课标·方式介词"},{"s":"I often communicate with my friends ____ email.","o":["A. by","B. on","C. in","D. for"],"a":"A","e":"by email通过邮件。","t":"📋 课标·方式介词"},{"s":"He cut the paper ____ a knife.","o":["A. by","B. for","C. in","D. with"],"a":"D","e":"with+工具。","t":"📋 课标·方式介词"},{"s":"She wrote the letter ____ English.","o":["A. on","B. with","C. by","D. in"],"a":"D","e":"in+语言。","t":"📋 课标·方式介词"},{"s":"We are proud ____ our great country.","o":["A. of","B. with","C. for","D. in"],"a":"A","e":"be proud of。","t":"📋 课标·短语介词"},{"s":"Jingdezhen is famous ____ its porcelain.","o":["A. as","B. for","C. in","D. with"],"a":"B","e":"be famous for以……著名。","t":"📋 课标·短语介词"},{"s":"He is good ____ playing basketball.","o":["A. in","B. with","C. at","D. for"],"a":"C","e":"be good at擅长。","t":"📋 课标·短语介词"},{"s":"Don't forget to turn ____ the lights when you leave.","o":["A. up","B. on","C. down","D. off"],"a":"D","e":"turn off关掉。","t":"📋 课标·动词短语"},{"s":"Thank you ____ helping me with my English.","o":["A. to","B. for","C. with","D. about"],"a":"B","e":"thank sb. for doing。","t":"📋 课标·短语介词"},{"s":"We should take care ____ the environment.","o":["A. of","B. with","C. about","D. for"],"a":"A","e":"take care of照顾。","t":"📋 课标·短语介词"},{"s":"He is interested ____ science and technology.","o":["A. for","B. about","C. in","D. at"],"a":"C","e":"be interested in。","t":"📋 课标·短语介词"},{"s":"She is different ____ her sister.","o":["A. from","B. of","C. to","D. with"],"a":"A","e":"be different from。","t":"📋 课标·短语介词"},{"s":"Why not go out for a walk instead ____ staying at home?","o":["A. of","B. with","C. from","D. in"],"a":"A","e":"instead of代替。","t":"📋 课标·短语介词"},{"s":"He left ____ saying a word.","o":["A. with","B. without","C. by","D. for"],"a":"B","e":"without没有。","t":"📋 课标·短语介词"},{"s":"We should be kind ____ others.","o":["A. with","B. to","C. for","D. of"],"a":"B","e":"be kind to。","t":"📋 课标·短语介词"},{"s":"____ my surprise, he passed the exam.","o":["A. For","B. With","C. In","D. To"],"a":"D","e":"to one's surprise。","t":"📋 课标·短语介词"},{"s":"I paid 50 yuan ____ the book.","o":["A. for","B. to","C. on","D. with"],"a":"A","e":"pay...for支付。","t":"📋 课标·短语介词"},{"s":"Please fill the glass ____ water.","o":["A. with","B. from","C. of","D. in"],"a":"A","e":"fill...with。","t":"📋 课标·短语介词"},{"s":"Don't laugh ____ others when they make mistakes.","o":["A. to","B. for","C. with","D. at"],"a":"D","e":"laugh at嘲笑。","t":"📋 课标·短语介词"},{"s":"She is afraid ____ dogs.","o":["A. with","B. to","C. of","D. for"],"a":"C","e":"be afraid of害怕。","t":"📋 课标·短语介词"},{"s":"We should spend more time ____ our family.","o":["A. to","B. with","C. for","D. of"],"a":"B","e":"spend time with sb.。","t":"📋 课标·短语介词"},{"s":"He succeeded ____ passing the exam through hard work.","o":["A. in","B. for","C. on","D. with"],"a":"A","e":"succeed in doing。","t":"📋 课标·短语介词"},{"s":"Please introduce yourself ____ the class.","o":["A. about","B. for","C. with","D. to"],"a":"D","e":"introduce...to。","t":"📋 课标·短语介词"},{"s":"He is always strict ____ himself.","o":["A. for","B. to","C. in","D. with"],"a":"D","e":"be strict with sb.。","t":"📋 课标·短语介词"},{"s":"The room is full ____ students.","o":["A. in","B. for","C. of","D. with"],"a":"C","e":"be full of充满。","t":"📋 课标·短语介词"},{"s":"I am looking forward ____ hearing from you.","o":["A. at","B. with","C. for","D. to"],"a":"D","e":"look forward to(to是介词)。","t":"📋 课标·to陷阱"},{"s":"She is busy ____ her homework.","o":["A. of","B. for","C. with","D. to"],"a":"C","e":"be busy with忙于。","t":"📋 课标·短语介词"},{"s":"What's wrong ____ your bike?","o":["A. of","B. to","C. with","D. for"],"a":"C","e":"What's wrong with...。","t":"📋 课标·短语介词"},{"s":"____ the help of the teacher, I passed the exam.","o":["A. In","B. For","C. Under","D. With"],"a":"D","e":"with the help of。","t":"📋 课标·短语介词"},{"s":"We are getting ready ____ the final exam.","o":["A. for","B. with","C. to","D. about"],"a":"A","e":"get ready for。","t":"📋 课标·短语介词"}]},"modals":{"id":"modals","n":"情态动词","d":"六年考五次（2020-23/25）","dd":"can/could/may/must/should/need。核心: must(必须) vs have to(不得不)、mustn't(禁止) vs needn't(不必)、推测语气强弱。课标(二)5.情态动词。","q":[{"s":"—____ I borrow your pen? —Of course. Here you are.","o":["A. Must","B. May","C. Need","D. Should"],"a":"B","e":"May表请求许可。","t":"📋 课标·请求"},{"s":"—____ I use your phone? —Yes, of course.","o":["A. Should","B. May","C. Need","D. Must"],"a":"B","e":"May表请求许可。","t":"📋 课标·许可"},{"s":"____ you please help me carry the box?","o":["A. Should","B. Could","C. Must","D. Need"],"a":"B","e":"Could表委婉请求。","t":"📋 课标·委婉"},{"s":"—____ I have a look at your new watch? —Sure.","o":["A. Must","B. Need","C. Should","D. May"],"a":"D","e":"May表请求。","t":"📋 课标·请求"},{"s":"Students ____ obey the school rules.","o":["A. can","B. might","C. may","D. must"],"a":"D","e":"must必须，表义务。","t":"📋 课标·义务"},{"s":"You ____ smoke here. It's not allowed.","o":["A. can't","B. may not","C. needn't","D. mustn't"],"a":"D","e":"mustn't禁止。","t":"📋 课标·禁止"},{"s":"Drivers ____ wear seat belts while driving.","o":["A. can","B. may","C. might","D. must"],"a":"D","e":"must必须(法律规定)。","t":"📋 课标·义务"},{"s":"You ____ be quiet in the library.","o":["A. may","B. must","C. might","D. can"],"a":"B","e":"must必须(规则)。","t":"📋 课标·规则"},{"s":"You ____ play football in the street. It's dangerous.","o":["A. mustn't","B. shouldn't","C. needn't","D. may not"],"a":"A","e":"mustn't禁止。","t":"📋 课标·禁止"},{"s":"—Must I finish the work today? —No, you ____.","o":["A. needn't","B. mustn't","C. can't","D. shouldn't"],"a":"A","e":"Must提问否定用needn't。","t":"📋 课标·must回答"},{"s":"You ____ worry about me. I'm fine.","o":["A. can't","B. mustn't","C. shouldn't","D. needn't"],"a":"D","e":"needn't不必。","t":"📋 课标·不必"},{"s":"We ____ wait for him. He may not come.","o":["A. mustn't","B. shouldn't","C. needn't","D. can't"],"a":"C","e":"needn't不必等。","t":"📋 课标·不必"},{"s":"She ____ be at home. Her light is on.","o":["A. can","B. may","C. must","D. should"],"a":"C","e":"must肯定推测(有证据)。","t":"📋 课标·推测"},{"s":"The book ____ be Tom's. His name is on it.","o":["A. can","B. must","C. may","D. should"],"a":"B","e":"must肯定推测(有证据)。","t":"📋 课标·推测"},{"s":"—Where is Jack? —He ____ be in the library. I'm not sure.","o":["A. must","B. may","C. can","D. need"],"a":"B","e":"may可能(不确定)。","t":"📋 课标·可能"},{"s":"That man ____ be our teacher. He has gone to Beijing.","o":["A. should","B. may","C. can't","D. must"],"a":"C","e":"can't否定推测。","t":"📋 课标·否定推测"},{"s":"He ____ be over sixty, but he looks very young.","o":["A. may","B. must","C. can","D. need"],"a":"B","e":"must推测(与but young反差)。","t":"📋 课标·推测"},{"s":"There's no light on. They ____ be at home.","o":["A. should","B. can't","C. must","D. may"],"a":"B","e":"can't否定推测。没有灯说明不在。","t":"📋 课标·否定推测"},{"s":"You ____ be tired after working for so long.","o":["A. need","B. must","C. may","D. can"],"a":"B","e":"must肯定推测。","t":"📋 课标·推测"},{"s":"—Can you play the piano? —Yes, I ____.","o":["A. can","B. need","C. must","D. may"],"a":"A","e":"can表能力。","t":"📋 课标·能力"},{"s":"He ____ speak English when he was five.","o":["A. may","B. can","C. could","D. must"],"a":"C","e":"could表过去能力。","t":"📋 课标·过去能力"},{"s":"—Can you swim? —I ____ when I was young, but now I ____.","o":["A. could; can't","B. can; couldn't","C. can; can't","D. could; can"],"a":"A","e":"could过去能，can't现在不能。","t":"📋 课标·能力对比"},{"s":"We ____ help each other and learn from each other.","o":["A. need","B. should","C. may","D. must"],"a":"B","e":"should应该，表建议。","t":"📋 课标·建议"},{"s":"It's raining hard. You ____ take an umbrella.","o":["A. should","B. can","C. must","D. may"],"a":"A","e":"should建议。","t":"📋 课标·建议"},{"s":"—I have a headache. —You ____ see a doctor.","o":["A. must","B. may","C. should","D. can"],"a":"C","e":"should建议。","t":"📋 课标·建议"},{"s":"You ____ eat too much junk food.","o":["A. may not","B. mustn't","C. shouldn't","D. needn't"],"a":"C","e":"shouldn't不应该(建议)。","t":"📋 课标·建议否定"},{"s":"We ____ to be polite to the old.","o":["A. need","B. ought","C. should","D. must"],"a":"B","e":"ought to应该。","t":"📋 课标·ought to"},{"s":"—____ I leave the room now? —No, you ____ stay until 5:00.","o":["A. May; must","B. Can; may","C. Must; may","D. May; can"],"a":"A","e":"May表请求许可；must表必须。","t":"📋 课标·辨析"},{"s":"You ____ drive after drinking alcohol. It's against the law.","o":["A. needn't","B. shouldn't","C. mustn't","D. may not"],"a":"C","e":"mustn't禁止(法律)。","t":"📋 课标·禁止"},{"s":"—Need I bring my ID card? —Yes, you ____.","o":["A. may","B. need","C. can","D. must"],"a":"D","e":"Need提问肯定答must。(否定答needn't)。","t":"📋 课标·need回答"},{"s":"We ____ be able to finish the work on time if we work together.","o":["A. need","B. should","C. can","D. must"],"a":"B","e":"should be able to应该能。","t":"📋 课标·推测"},{"s":"—Is that man our new headmaster? —It ____ be him. He's much taller.","o":["A. must","B. may","C. should","D. can't"],"a":"D","e":"can't否定推测(与描述不符)。","t":"📋 课标·否定推测"},{"s":"He ____ have gone to Shanghai. I saw him just now in the library.","o":["A. can't","B. might","C. must","D. may"],"a":"A","e":"can't否定推测(刚看到)。","t":"📋 课标·否定推测"},{"s":"You ____ worry. Everything will be fine.","o":["A. can't","B. shouldn't","C. needn't","D. mustn't"],"a":"C","e":"needn't不必。","t":"📋 课标·不必"},{"s":"We ____ keep the windows open to let fresh air in.","o":["A. must","B. may","C. should","D. can"],"a":"C","e":"should建议。","t":"📋 课标·建议"},{"s":"—Must I return the book tomorrow? —No, you ____. You can keep it longer.","o":["A. shouldn't","B. mustn't","C. needn't","D. can't"],"a":"C","e":"Must问否定用needn't。","t":"📋 课标·must回答"},{"s":"Every student ____ wear a school uniform on Monday.","o":["A. must","B. can","C. may","D. might"],"a":"A","e":"must必须(校规)。","t":"📋 课标·义务"},{"s":"There's someone knocking. It ____ be Jim. He said he'd come.","o":["A. need","B. should","C. must","D. can"],"a":"C","e":"must推测(他说过要来)。","t":"📋 课标·推测"},{"s":"The little girl ____ dress herself now. She's only three.","o":["A. may","B. can","C. can't","D. must"],"a":"C","e":"can't表能力不足。","t":"📋 课标·能力否定"},{"s":"You ____ park your car here. Look at the sign 'No Parking'.","o":["A. shouldn't","B. mustn't","C. may not","D. needn't"],"a":"B","e":"mustn't禁止(有No Parking标志)。","t":"📋 课标·禁止"},{"s":"We ____ learn from our mistakes and do better next time.","o":["A. may","B. can","C. should","D. need"],"a":"C","e":"should应该。","t":"📋 课标·建议"},{"s":"—Could I watch TV now? —Yes, you ____.","o":["A. could","B. should","C. can","D. must"],"a":"C","e":"Could提问表委婉，肯定答can。","t":"📋 课标·could回答"},{"s":"The toy car ____ move by itself. Maybe the battery is dead.","o":["A. can","B. must","C. can't","D. may"],"a":"C","e":"can't不能(没电了)。","t":"📋 课标·能力否定"},{"s":"Children ____ play with fire. It's extremely dangerous.","o":["A. can't","B. shouldn't","C. mustn't","D. needn't"],"a":"C","e":"mustn't绝对禁止。","t":"📋 课标·禁止"},{"s":"If you don't feel well, you ____ go to the hospital.","o":["A. may","B. can","C. should","D. must"],"a":"C","e":"should建议。","t":"📋 课标·建议"},{"s":"—Must I take the medicine now? —No, you ____. You can take it after dinner.","o":["A. mustn't","B. can't","C. needn't","D. shouldn't"],"a":"C","e":"needn't不必现在。","t":"📋 课标·must回答"},{"s":"You ____ be right, but I still want to check it myself.","o":["A. may","B. can","C. must","D. need"],"a":"A","e":"may可能(不确定)。","t":"📋 课标·可能"},{"s":"Zhang Guimei ____ have given up many times, but she never did.","o":["A. can","B. could","C. should","D. must"],"a":"B","e":"could have done本可以但没做。","t":"📋 课标·虚拟"},{"s":"People ____ throw rubbish everywhere. We should protect the environment.","o":["A. needn't","B. can't","C. mustn't","D. may not"],"a":"C","e":"mustn't禁止。","t":"📋 课标·禁止"},{"s":"This math problem ____ be very difficult. Everyone in class got it right.","o":["A. may","B. can't","C. must","D. should"],"a":"B","e":"can't否定推测(大家都对了)。","t":"📋 课标·否定推测"}]},"pronouns":{"id":"pronouns","n":"代词辨析","d":"六年考四次（2020/21/23/25）","dd":"人称代词/物主代词/反身代词/不定代词/指示代词。课标(五)代词6类全。注意形容词性vs名词性物主代词区分。","q":[{"s":"—Is this ____ book? —No, ____ is over there.","o":["A. yours; my","B. your; mine","C. your; my","D. yours; mine"],"a":"B","e":"your+名词; mine名词性物主代词独立使用。","t":"📋 课标·物主代词"},{"s":"—Are these ____ bags? —No, they're not ____.","o":["A. your; my","B. yours; my","C. you; me","D. your; mine"],"a":"D","e":"your+名词; mine=my bags。","t":"📋 课标·物主代词"},{"s":"We must protect the earth. It's ____ home.","o":["A. ours","B. we","C. us","D. our"],"a":"D","e":"our+名词。","t":"📋 课标·物主代词"},{"s":"This is not ____ pen. ____ is blue.","o":["A. mine; My","B. mine; Mine","C. my; My","D. my; Mine"],"a":"D","e":"my+名词; Mine名词性物主代词。","t":"📋 课标·物主代词"},{"s":"—Whose bag is this? —It's ____.","o":["A. her","B. hers","C. she's","D. she"],"a":"B","e":"hers名词性物主代词=her bag。","t":"📋 课标·物主代词"},{"s":"My brother is a doctor. ____ works in a big hospital.","o":["A. He","B. They","C. It","D. She"],"a":"A","e":"he指代my brother。","t":"📋 课标·人称代词"},{"s":"The students are in the classroom. ____ are having a lesson.","o":["A. It","B. They","C. She","D. He"],"a":"B","e":"they指代复数students。","t":"📋 课标·人称代词"},{"s":"Mrs. Wang teaches ____ English. We all like ____.","o":["A. our; hers","B. us; her","C. ours; her","D. we; she"],"a":"B","e":"us宾格作宾语; her宾格作宾语。","t":"📋 课标·人称代词"},{"s":"My parents bought ____ a new computer for my birthday.","o":["A. I","B. my","C. mine","D. me"],"a":"D","e":"me宾格作间接宾语。","t":"📋 课标·人称代词"},{"s":"Help ____ to some fish, children.","o":["A. you","B. your","C. yourselves","D. yourself"],"a":"C","e":"yourselves反身代词复数。children提示复数。","t":"📋 课标·反身代词"},{"s":"I taught ____ how to play the guitar last summer.","o":["A. me","B. myself","C. my","D. mine"],"a":"B","e":"myself反身代词。teach oneself自学。","t":"📋 课标·反身代词"},{"s":"The boy hurt ____ when he fell off the bike.","o":["A. he","B. himself","C. him","D. his"],"a":"B","e":"himself反身代词。hurt oneself伤到自己。","t":"📋 课标·反身代词"},{"s":"She made the cake by ____. Nobody helped her.","o":["A. she","B. hers","C. herself","D. her"],"a":"C","e":"by herself独自。","t":"📋 课标·反身代词"},{"s":"We enjoyed ____ at the party last night.","o":["A. ours","B. ourselves","C. our","D. us"],"a":"B","e":"enjoy oneself玩得开心。","t":"📋 课标·反身代词"},{"s":"I have two brothers. ____ of them are teachers.","o":["A. Neither","B. None","C. Both","D. All"],"a":"C","e":"both两者都。","t":"📋 课标·不定代词"},{"s":"Would you like ____ to drink?","o":["A. everything","B. anything","C. something","D. nothing"],"a":"C","e":"something用于期待肯定回答的疑问句。","t":"📋 课标·不定代词"},{"s":"I didn't see ____ in the room.","o":["A. everybody","B. nobody","C. somebody","D. anybody"],"a":"D","e":"anybody用于否定句。","t":"📋 课标·不定代词"},{"s":"____ of the students has his own book.","o":["A. All","B. Every","C. Both","D. Each"],"a":"D","e":"Each强调个体，谓语用单数has。","t":"📋 课标·不定代词"},{"s":"—Is there ____ in today's newspaper? —No, ____ special.","o":["A. anything; nothing","B. something; anything","C. anything; something","D. nothing; anything"],"a":"A","e":"anything疑问句，nothing否定。","t":"📋 课标·不定代词"},{"s":"—When shall we meet again? —____ day is OK.","o":["A. One","B. Another","C. Any","D. Some"],"a":"C","e":"Any任何(肯定句)。","t":"📋 课标·不定代词"},{"s":"There are two apples on the table. You can take ____.","o":["A. either","B. both","C. all","D. neither"],"a":"A","e":"either两者中任一。","t":"📋 课标·不定代词"},{"s":"I looked for my keys ____, but couldn't find them.","o":["A. somewhere","B. anywhere","C. everywhere","D. nowhere"],"a":"C","e":"everywhere到处。","t":"📋 课标·不定代词"},{"s":"____ knows the answer to this question.","o":["A. Nobody","B. Somebody","C. Everybody","D. Anybody"],"a":"A","e":"Nobody没人知道(根据语境)。","t":"📋 课标·不定代词"},{"s":"The twins look the same. I can't tell one from ____.","o":["A. another","B. others","C. the other","D. other"],"a":"C","e":"one...the other一个……另一个(两者)。","t":"📋 课标·不定代词"},{"s":"Some students like English, ____ like math.","o":["A. others","B. the other","C. another","D. other"],"a":"A","e":"others泛指其他(复数)。","t":"📋 课标·不定代词"},{"s":"____ is important to keep healthy.","o":["A. One","B. This","C. That","D. It"],"a":"D","e":"It作形式主语。","t":"📋 课标·形式主语"},{"s":"—Who is knocking at the door? —____ must be Jim.","o":["A. That","B. He","C. This","D. It"],"a":"D","e":"It指代不明身份的人。","t":"📋 课标·it"},{"s":"I find ____ difficult to learn English well.","o":["A. one","B. it","C. that","D. this"],"a":"B","e":"it作形式宾语。","t":"📋 课标·形式宾语"},{"s":"The weather in Beijing is colder than ____ in Shanghai.","o":["A. one","B. that","C. it","D. this"],"a":"B","e":"that指代前文同类事物(weather)。","t":"📋 课标·指示代词"},{"s":"She lost her pen, so she bought ____.","o":["A. it","B. that","C. this","D. one"],"a":"D","e":"one泛指同类事物中的一件。","t":"📋 课标·替代词"},{"s":"____ of the two books is interesting. I don't like ____.","o":["A. Either; both","B. Both; either","C. Neither; both","D. Neither; either"],"a":"D","e":"Neither两者都不; either用于否定句表'也'。","t":"📋 课标·不定代词"},{"s":"—Are there any apples in the fridge? —No, there are ____.","o":["A. none","B. nothing","C. no one","D. neither"],"a":"A","e":"none指代不可数/复数(苹果)。","t":"📋 课标·不定代词"},{"s":"Please help ____ to some cakes, everyone.","o":["A. yourselves","B. you","C. yourself","D. your"],"a":"A","e":"yourselves复数反身代词。everyone提示复数。","t":"📋 课标·反身代词"},{"s":"____ is too late to change your answer now.","o":["A. This","B. That","C. One","D. It"],"a":"D","e":"It作形式主语。","t":"📋 课标·形式主语"},{"s":"Don't just wait for ____ to help you. Do it ____.","o":["A. anyone; yourself","B. others; yourself","C. someone; you","D. others; you"],"a":"B","e":"others别人; yourself你自己。","t":"📋 课标·代词综合"},{"s":"—Can I have ____ to drink? I'm thirsty. —Sorry, there's ____ left.","o":["A. anything; nothing","B. something; anything","C. something; nothing","D. anything; something"],"a":"C","e":"something表请求; nothing表没有。","t":"📋 课标·不定代词"},{"s":"The population of China is larger than ____ of Japan.","o":["A. this","B. it","C. those","D. that"],"a":"D","e":"that指代population。","t":"📋 课标·指示代词"},{"s":"Between you and ____, I don't think he is telling the truth.","o":["A. me","B. my","C. mine","D. I"],"a":"A","e":"between是介词后接宾格me。","t":"📋 课标·人称代词"},{"s":"We should be proud of ____. We did a great job.","o":["A. ourselves","B. our","C. us","D. ours"],"a":"A","e":"ourselves反身代词。be proud of oneself。","t":"📋 课标·反身代词"},{"s":"Don't worry. There is ____ wrong with your car.","o":["A. anything","B. everything","C. nothing","D. something"],"a":"C","e":"nothing wrong没问题(别担心提示)。","t":"📋 课标·不定代词"},{"s":"I have ____ to tell you. Please listen carefully.","o":["A. important something","B. nothing important","C. something important","D. important nothing"],"a":"C","e":"something important。形容词修饰不定代词后置。","t":"📋 课标·不定代词"},{"s":"—Do you have a pen? —Sorry, I don't have ____.","o":["A. this","B. one","C. it","D. that"],"a":"B","e":"one泛指任何一支笔。","t":"📋 课标·替代词"},{"s":"____ can learn English well if ____ work hard.","o":["A. Anyone; they","B. Everyone; he","C. Someone; he","D. Anyone; he"],"a":"A","e":"Anyone任何人; they指代anyone(口语)。","t":"📋 课标·不定代词"},{"s":"His words made ____ think about my own mistakes.","o":["A. me","B. my","C. I","D. mine"],"a":"A","e":"me宾格作make的宾语。","t":"📋 课标·人称代词"},{"s":"—Is this ____ iPhone? —No, ____ is black.","o":["A. yours; my","B. your; my","C. your; mine","D. yours; mine"],"a":"C","e":"your+名词; mine=my iPhone。","t":"📋 课标·物主代词"},{"s":"The children enjoyed ____ at the amusement park.","o":["A. them","B. theirs","C. their","D. themselves"],"a":"D","e":"enjoyed themselves玩得开心。","t":"📋 课标·反身代词"},{"s":"____ but a fool would believe such a lie.","o":["A. No one","B. Nothing","C. Nobody","D. None"],"a":"D","e":"None but只有=nobody but。","t":"📋 课标·不定代词"},{"s":"I don't like this shirt. Can you show me ____?","o":["A. other","B. another","C. others","D. the other"],"a":"B","e":"another另一件(三者以上不定)。","t":"📋 课标·不定代词"},{"s":"We should always think of ____ before ____.","o":["A. others; ourselves","B. another; ourselves","C. the other; us","D. others; us"],"a":"A","e":"others别人; ourselves自己。think of先人后己。","t":"📋 课标·代词综合"},{"s":"Our classroom is bigger than ____.","o":["A. theirs","B. their","C. them","D. they"],"a":"A","e":"theirs=their classroom。比较的对象一致。","t":"📋 课标·物主代词"}]},"passive":{"id":"passive","n":"被动语态","d":"六年考四次（2020/22/24/25）","dd":"be+done结构。三个时态被动+情态动词被动。注意无被动动词(taste/happen/take place)和系动词。课标(四)被动语态。","q":[{"s":"Jingdezhen Porcelain ____ in Paris last month.","o":["A. is shown","B. was shown","C. will be shown","D. showed"],"a":"B","e":"一般过去时被动was shown。last month。","t":"🏛 2025江西中考第28题"},{"s":"Ted preferred pop music when he ____ about his favorite music.","o":["A. asks","B. was asked","C. is asked","D. asked"],"a":"B","e":"一般过去时被动was asked。","t":"🏛 2024江西中考第25题"},{"s":"English ____ widely in the world today.","o":["A. is speaking","B. spoke","C. is spoken","D. speaks"],"a":"C","e":"一般现在时被动is spoken。","t":"📋 课标·现时被动"},{"s":"These books ____ by children all over the world.","o":["A. are loved","B. love","C. loved","D. are loving"],"a":"A","e":"一般现在时被动are loved。","t":"📋 课标·现时被动"},{"s":"The classroom ____ by the students every day.","o":["A. cleaned","B. cleans","C. is cleaning","D. is cleaned"],"a":"D","e":"一般现在时被动is cleaned。","t":"📋 课标·现时被动"},{"s":"Tea ____ in many parts of China.","o":["A. grew","B. is grown","C. is growing","D. grows"],"a":"B","e":"一般现在时被动is grown。茶被种植。","t":"📋 课标·现时被动"},{"s":"Our school ____ by trees and flowers.","o":["A. surrounded","B. is surrounded","C. is surrounding","D. surrounds"],"a":"B","e":"一般现在时被动is surrounded。学校被环绕。","t":"📋 课标·现时被动"},{"s":"Paper ____ from wood.","o":["A. is made","B. made","C. is making","D. makes"],"a":"A","e":"一般现在时被动is made。纸由木头制成。","t":"📋 课标·现时被动"},{"s":"The bridge ____ in 2005.","o":["A. is built","B. built","C. was built","D. builds"],"a":"C","e":"一般过去时被动was built。","t":"📋 课标·过时被动"},{"s":"The letter ____ to my friend yesterday.","o":["A. sends","B. was sent","C. is sent","D. sent"],"a":"B","e":"一般过去时被动was sent。","t":"📋 课标·过时被动"},{"s":"Many trees ____ on the hill last spring.","o":["A. plant","B. were planted","C. are planted","D. planted"],"a":"B","e":"一般过去时被动were planted。","t":"📋 课标·过时被动"},{"s":"The window ____ by Tom yesterday.","o":["A. was broken","B. breaks","C. is broken","D. broke"],"a":"A","e":"一般过去时被动was broken。","t":"📋 课标·过时被动"},{"s":"The 29th Olympic Games ____ in Beijing in 2008.","o":["A. holds","B. held","C. was held","D. is held"],"a":"C","e":"一般过去时被动was held。","t":"📋 课标·过时被动"},{"s":"The car accident ____ at the corner last night.","o":["A. was happened","B. is happened","C. happened","D. happens"],"a":"C","e":"happen无被动形式。","t":"📋 课标·无被动"},{"s":"A new library ____ in our school next year.","o":["A. will build","B. will be built","C. builds","D. is built"],"a":"B","e":"一般将来时被动will be built。","t":"📋 课标·将时被动"},{"s":"The work ____ in two days.","o":["A. finishes","B. will finish","C. will be finished","D. is finished"],"a":"C","e":"一般将来时被动will be finished。","t":"📋 课标·将时被动"},{"s":"The sports meeting ____ if it rains tomorrow.","o":["A. will be put off","B. will put off","C. puts off","D. is put off"],"a":"A","e":"一般将来时被动will be put off。","t":"📋 课标·将时被动"},{"s":"The flowers ____ every day in summer.","o":["A. must watered","B. must be watered","C. must water","D. are watering"],"a":"B","e":"情态动词被动must be watered。","t":"📋 课标·情态被动"},{"s":"Waste paper ____ away. It can be recycled.","o":["A. are thrown","B. shouldn't be thrown","C. should throw","D. shouldn't throw"],"a":"B","e":"情态被动shouldn't be thrown。","t":"📋 课标·情态被动"},{"s":"The work ____ before Friday.","o":["A. can finished","B. can finish","C. finishes","D. can be finished"],"a":"D","e":"can be finished情态被动。","t":"📋 课标·情态被动"},{"s":"Teenagers ____ to smoke.","o":["A. should not allow","B. are not allow","C. should not be allowed","D. should not allowed"],"a":"C","e":"情态被动should not be allowed。","t":"📋 课标·情态被动"},{"s":"The food ____ delicious. It ____ up quickly.","o":["A. tastes; ate","B. is tasted; was eaten","C. is tasted; ate","D. tastes; was eaten"],"a":"D","e":"taste系动词无被动; was eaten被动。","t":"📋 课标·无被动动词"},{"s":"Great changes ____ in my hometown since 2010.","o":["A. were taken place","B. have taken place","C. have been taken place","D. took place"],"a":"B","e":"take place无被动。","t":"📋 课标·无被动动词"},{"s":"The pen ____ well. It ____ out already.","o":["A. is written; has been sold","B. writes; has been sold","C. writes; has sold","D. is written; has sold"],"a":"B","e":"write  lot of money ____ on the project so far.","o":["A. spent","B. spends","C. has been spent","D. is spent"],"a":"C","e":"现在完成时被动has been spent。so far。","t":"📋 课标·现完被动"},{"s":"The baby ____ by his grandmother while his parents work.","o":["A. is looking after","B. looked after","C. looks after","D. is looked after"],"a":"D","e":"一般现在时被动is looked after。","t":"📋 课标·现时被动"},{"s":"The plan ____ at the meeting right now.","o":["A. discusses","B. has discussed","C. is being discussed","D. is discussing"],"a":"C","e":"现在进行时被动is being discussed。right now。","t":"📋 课标·现进被动"},{"s":"He fell off the bike but he ____.","o":["A. doesn't hurt","B. didn't hurt","C. wasn't hurt","D. isn't hurt"],"a":"C","e":"一般过去时被动wasn't hurt。他没受伤。","t":"📋 课标·过时被动"},{"s":"The window ____ open for some fresh air.","o":["A. can be left","B. can left","C. can leave","D. leaves"],"a":"A","e":"情态被动can be left。","t":"📋 课标·情态被动"}]},"comparative":{"id":"comparative","n":"形容词/副词比较等级","d":"六年考四次（2021-24）","dd":"as...as同级比较、比较级+than、最高级。注意much/a lot/a little修饰比较级。课标(三)2/(四)2。","q":[{"s":"Spending pocket money on books is ____ than on dresses.","o":["A. more meaningful","B. the most meaningful","C. meaningful","D. most meaningful"],"a":"A","e":"比较级more meaningful。than。","t":"🏛 2025江西中考第27题"},{"s":"If everyone does this, it would be ____.","o":["A. cleanest","B. clean","C. the cleanest","D. cleaner"],"a":"D","e":"比较级cleaner。","t":"🏛 2024江西中考第26题"},{"s":"Shanghai is much ____ than my hometown.","o":["A. more big","B. bigger","C. big","D. biggest"],"a":"B","e":"比较级bigger。","t":"📋 课标·单音节"},{"s":"This problem is ____ than that one.","o":["A. more difficult","B. most difficult","C. the most difficult","D. difficult"],"a":"A","e":"比较级more difficult。多音节词。","t":"📋 课标·多音节"},{"s":"Tom runs ____ than any other student in his class.","o":["A. fastest","B. faster","C. fast","D. the fastest"],"a":"B","e":"比较级faster。than any other用比较级表最高级。","t":"📋 课标·比较表最高"},{"s":"He is a little ____ than me.","o":["A. tall","B. taller","C. tallest","D. the tallest"],"a":"B","e":"比较级taller。a little修饰。","t":"📋 课标·修饰比较"},{"s":"Her voice sounds ____ than before.","o":["A. sweeter","B. more sweet","C. sweet","D. sweetest"],"a":"A","e":"比较级sweeter。单音节+er。","t":"📋 课标·单音节"},{"s":"This street is ____ than that one.","o":["A. wider","B. more wide","C. wide","D. widest"],"a":"A","e":"比较级wider。","t":"📋 课标·单音节"},{"s":"He is getting ____ and ____ in his studies.","o":["A. best; best","B. better; better","C. good; good","D. well; well"],"a":"B","e":"比较级+and+比较级：越来越好。","t":"📋 课标·越来越"},{"s":"The weather is getting ____ and ____.","o":["A. coldest; coldest","B. cold; cold","C. more cold; more cold","D. colder; colder"],"a":"D","e":"colder and colder越来越冷。","t":"📋 课标·越来越"},{"s":"____ you work, ____ results you will get.","o":["A. Hard; good","B. The hard; the good","C. The harder; the better","D. Harder; better"],"a":"C","e":"the+比较级, the+比较级：越……越……。","t":"📋 课标·the more"},{"s":"____ we get together, ____ we will be.","o":["A. More; happier","B. The more; the happier","C. The most; the happiest","D. Much; happy"],"a":"B","e":"the+比较级, the+比较级。","t":"📋 课标·the more"},{"s":"The ____ you listen, the ____ you will understand.","o":["A. more; better","B. many; well","C. most; best","D. more; more"],"a":"A","e":"the more...the better。副词的the more结构。","t":"📋 课标·the more"},{"s":"Lucy is the ____ girl in our class.","o":["A. tall","B. more tall","C. tallest","D. taller"],"a":"C","e":"最高级tallest。in our class。","t":"📋 课标·最高级"},{"s":"The Yellow River is the second ____ river in China.","o":["A. longer","B. longest","C. more long","D. long"],"a":"B","e":"the+序数词+最高级。","t":"📋 课标·最高级"},{"s":"China has the ____ population in the world.","o":["A. more large","B. larger","C. largest","D. large"],"a":"C","e":"最高级largest。in the world。","t":"📋 课标·最高级"},{"s":"This is ____ movie I have ever seen.","o":["A. exciting","B. most exciting","C. the most exciting","D. more exciting"],"a":"C","e":"the most exciting。I have ever seen提示最高级。","t":"📋 课标·最高级"},{"s": "},{"s":"This year we have ____ rain than last year.","o":["A. most","B. more","C. much","D. many"],"a":"B","e":"more更多。many/much→more→most。","t":"📋 课标·不规则"},{"s":"The situation is getting ____ than we thought.","o":["A. worst","B. worse","C. bad","D. badly"],"a":"B","e":"worse更糟。bad→worse→worst。","t":"📋 课标·不规则"},{"s":"He lives ____ from school than anyone else.","o":["A. far","B. farther","C. farthest","D. more far"],"a":"B","e":"farther/further更远。far→farther。","t":"📋 课标·不规则"},{"s":"Which subject do you like ____, English or math?","o":["A. the best","B. well","C. better","D. best"],"a":"C","e":"两者比较用比较级better。","t":"📋 课标·两者比较"},{"s":"This question is ____ more difficult than that one.","o":["A. a bit","B. many","C. a lot of","D. a few"],"a":"A","e":"a bit修饰比较级。","t":"📋 课标·修饰比较"},{"s":"The population of Shanghai is ____ than that of Nanjing.","o":["A. more","B. less","C. smaller","D. larger"],"a":"D","e":"population用large/small修饰，上海比南京大。","t":"📋 课标·搭配"},{"s":"He feels ____ today than yesterday.","o":["A. more good","B. better","C. more well","D. best"],"a":"B","e":"well的比较级是better(身体好)。","t":"📋 课标·不规则"},{"s":"She is ____ of the two sisters.","o":["A. the more beautiful","B. the most beautiful","C. most beautiful","D. more beautiful"],"a":"A","e":"the+比较级限定两者。","t":"📋 课标·两者比较"},{"s":"With years, he became ____ and ____ in teaching.","o":["A. more experienced; more experienced","B. experienced; experienced","C. most experienced; most experienced","D. more; less"],"a":"A","e":"more and more+多音节词。","t":"📋 课标·越来越"},{"s":"There are ____ students in our class than in yours.","o":["A. many","B. more","C. much","D. most"],"a":"B","e":"more可数比较级。","t":"📋 课标·不规则"},{"s":"Jim jumps ____ than any other boy in his class.","o":["A. high","B. higher","C. the highest","D. highest"],"a":"B","e":"副词比较级higher。than any other。","t":"📋 课标·比较表最高"},{"s":"I have never seen a ____ lake than this one.","o":["A. most beautiful","B. more beautiful","C. beautiful","D. the most beautiful"],"a":"B","e":"比较级在否定句中表最高级含义。","t":"📋 课标·比较表最高"},{"s":"The more you practice, ____ mistakes you will make.","o":["A. the few","B. fewer","C. the fewer","D. the fewest"],"a":"C","e":"the+比较级。mistakes可数用fewer。","t":"📋 课标·the more"},{"s":"It was very hot yesterday, but it's ____ today.","o":["A. much hot","B. more hot","C. even hotter","D. more hotter"],"a":"C","e":"even+比较级hotter。","t":"📋 课标·修饰比较"},{"s":"She is becoming ____ in her class.","o":["A. popular and popular","B. the more popular","C. more and more popular","D. most popular"],"a":"C","e":"多音节词用more and more+原级。","t":"📋 课标·越来越"},{"s":"This is ____ information I've ever got.","o":["A. valuable","B. more and more valuable","C. the most valuable","D. more valuable"],"a":"C","e":"最高级the most valuable。I've ever got。","t":"📋 课标·最高级"},{"s":"The boy is ____ than his brother, but not ____ in his family.","o":["A. cleverer; the cleverest","B. cleverer; cleverest","C. clever; the cleverest","D. more clever; cleverest"],"a":"A","e":"比较级cleverer+the cleverest最高级。","t":"📋 课标·综合"},{"s":"Nothing is ____ than health.","o":["A. more important","B. most important","C. the most important","D. important"],"a":"A","e":"比较级表最高级：健康最重要。","t":"📋 课标·比较表最高"}]},"nouns":{"id":"nouns","n":"名词词义辨析","d":"三年考三次（2021/23/25）","dd":"名词语境选词，选项为同一语义场的四个名词。重点区分近义名词在不同语境中的用法。课标词汇知识·语境选词。","q":[{"s":"I like acting and I'm in the ____ group at school.","o":["A. theater","B. sports","C. art","D. music"],"a":"A","e":"theater戏剧。acting对应theater。","t":"🏛 2024江西中考第21题"},{"s":"She gets up early every morning. It's a good ____.","o":["A. rule","B. hobby","C. habit","D. plan"],"a":"C","e":"habit习惯。get up early是好习惯。","t":"🏛 2025江西中考第21题"},{"s":"We should develop good learning ____.","o":["A. ways","B. habits","C. methods","D. hobbies"],"a":"B","e":"learning habits学习习惯。","t":"📋 课标·语境选词"},{"s":"Reading is my favorite ____. I enjoy it very much.","o":["A. habit","B. subject","C. sport","D. hobby"],"a":"D","e":"hobby爱好。enjoy提示是爱好非习惯。","t":"📋 课标·语境选词"},{"s":"He has a strong ____ of direction.","o":["A. meaning","B. sense","C. idea","D. feeling"],"a":"B","e":"sense of direction方向感。","t":"📋 课标·词汇搭配"},{"s":"The ____ of this activity is to help students relax.","o":["A. purpose","B. result","C. reason","D. cause"],"a":"A","e":"purpose目的。to help表目的。","t":"📋 课标·语境选词"},{"s":"It's a ____ of time to argue with him.","o":["A. use","B. lack","C. loss","D. waste"],"a":"D","e":"a waste of time浪费时间。","t":"📋 课标·词汇搭配"},{"s":"We had a ____ about our future plans last night.","o":["A. introduction","B. discussion","C. decision","D. suggestion"],"a":"B","e":"discussion讨论。","t":"📋 课标·语境选词"},{"s":"Could you give me some ____ on how to learn English?","o":["A. idea","B. suggestion","C. news","D. advice"],"a":"D","e":"advice建议(不可数)。some+不可数。","t":"📋 课标·词汇辨析"},{"s":"He made a big ____ in the exam because he was careless.","o":["A. mistake","B. decision","C. plan","D. progress"],"a":"A","e":"make a mistake犯错。careless提示。","t":"📋 课标·语境选词"},{"s":"There is no ____ that he will win the first prize.","o":["A. way","B. use","C. need","D. doubt"],"a":"D","e":"no doubt毫无疑问。","t":"📋 课标·词汇搭配"},{"s":"The old man told us an interesting ____ about his life.","o":["A. story","B. information","C. message","D. news"],"a":"A","e":"story故事。an+可数名词，news不可数。","t":"📋 课标·词汇辨析"},{"s":"I want to have a ____ with you about your study.","o":["A. sentence","B. word","C. text","D. passage"],"a":"B","e":"have a word with sb.与某人谈谈。","t":"📋 课标·词汇搭配"},{"s":"She won the first ____ in the singing competition.","o":["A. praise","B. price","C. place","D. prize"],"a":"D","e":"prize奖品。区分price价格。","t":"📋 课标·词汇辨析"},{"s":"We should pay more ____ to our pronunciation.","o":["A. money","B. energy","C. attention","D. time"],"a":"C","e":"pay attention to注意。","t":"📋 课标·词汇搭配"},{"s":"It is a great ____ to be invited to speak here.","o":["A. pleasure","B. chance","C. honor","D. success"],"a":"C","e":"honor荣誉。be invited提示。","t":"📋 课标·语境选词"},{"s":"The doctor gave me some ____ on how to keep healthy.","o":["A. message","B. information","C. advice","D. suggestion"],"a":"C","e":"advice建议(不可数)。","t":"📋 课标·词汇辨析"},{"s":"He has the ____ to solve this difficult problem.","o":["A. interest","B. ability","C. habit","D. chance"],"a":"B","e":"ability能力。solve difficult problem需要能力。","t":"📋 课标·语境选词"},{"s":"We should make full ____ of our time.","o":["A. work","B. use","C. fun","D. job"],"a":"B","e":"make use of利用。","t":"📋 课标·词汇搭配"},{"s":"The ____ between the two cities is about 200 kilometers.","o":["A. distance","B. way","C. space","D. road"],"a":"A","e":"distance距离。200 kilometers提示。","t":"📋 课标·语境选词"},{"s":"Thank you for your ____. I had a wonderful time.","o":["A. information","B. invention","C. introduction","D. invitation"],"a":"D","e":"invitation邀请。had a wonderful time提示被邀请。","t":"📋 课标·语境选词"},{"s":"He has made great ____ in English this term.","o":["A. decision","B. progress","C. difference","D. mistake"],"a":"B","e":"make progress进步(不可数)。","t":"📋 课标·词汇搭配"},{"s":"Don't make ____ of the disabled. It's impolite.","o":["A. use","B. fun","C. room","D. sure"],"a":"B","e":"make fun of取笑。","t":"📋 课标·词汇搭配"},{"s":"It's a good ____ to keep a diary in English.","o":["A. manner","B. method","C. way","D. means"],"a":"C","e":"a good way好方法。最常见搭配。","t":"📋 课标·词汇辨析"},{"s":"There's no ____ in crying over the past mistakes.","o":["A. way","B. reason","C. point","D. meaning"],"a":"C","e":"There's no point in doing做……没意义。","t":"📋 课标·词汇搭配"},{"s":"Can you give me a ____? I don't know what to do.","o":["A. suggestion","B. message","C. information","D. news"],"a":"A","e":"suggestion建议(可数)。a+可数。","t":"📋 课标·词汇辨析"},{"s":"His ____ of humor makes him popular among his friends.","o":["A. feeling","B. heart","C. spirit","D. sense"],"a":"D","e":"sense of humor幽默感。","t":"📋 课标·词汇搭配"},{"s":"We need to find a ____ to this problem as soon as possible.","o":["A. reply","B. question","C. solution","D. answer"],"a":"C","e":"solution to the problem问题的解决方案。","t":"📋 课标·词汇辨析"},{"s":"She has a beautiful ____. She sings very well.","o":["A. music","B. sound","C. noise","D. voice"],"a":"D","e":"voice嗓音(人)。sings说明是嗓音。","t":"📋 课标·词汇辨析"},{"s":"The ____ of the fire was a broken electric wire.","o":["A. cause","B. excuse","C. reason","D. result"],"a":"A","e":"cause起因(直接导致)。reason理由(解释)。","t":"📋 课标·词汇辨析"},{"s":"Many people lost their ____ in the earthquake.","o":["A. living","B. lives","C. live","D. life"],"a":"B","e":"lose one's life丧生。many people→复数lives。","t":"📋 课标·词汇辨析"},{"s":"What's your ____ on this matter?","o":["A. thought","B. opinion","C. idea","D. mind"],"a":"B","e":"opinion看法。on this matter提示。","t":"📋 课标·词汇辨析"},{"s":"Look at the ____ on his face. He must be very happy.","o":["A. expression","B. impression","C. depression","D. pressure"],"a":"A","e":"expression表情。on his face提示。","t":"📋 课标·语境选词"},{"s":"We should do everything for the ____ of our country.","o":["A. good","B. development","C. benefit","D. interest"],"a":"A","e":"for the good of为……的利益。","t":"📋 课标·词汇搭配"},{"s":"He is a man of great ____. Everyone respects him.","o":["A. courage","B. energy","C. power","D. strength"],"a":"A","e":"courage勇气。respect提示。","t":"📋 课标·语境选词"},{"s":"Could you please do me a ____?","o":["A. favor","B. hand","C. support","D. help"],"a":"A","e":"do sb. a favor帮个忙。","t":"📋 课标·词汇搭配"},{"s":"The ____ to success is hard work and patience.","o":["A. path","B. key","C. way","D. road"],"a":"B","e":"key to success成功的关键。","t":"📋 课标·词汇搭配"},{"s":"He doesn't have the ____ to lift the heavy box.","o":["A. energy","B. force","C. strength","D. power"],"a":"C","e":"strength力气(身体力量)。lift heavy box提示。","t":"📋 课标·词汇辨析"},{"s":"Let me give you a piece of ____: be honest.","o":["A. advice","B. suggestion","C. idea","D. information"],"a":"A","e":"a piece of advice一条建议。","t":"📋 课标·词汇辨析"},{"s":"His dream finally came ____ when he won the first prize.","o":["A. reality","B. real","C. truth","D. true"],"a":"D","e":"come true实现(梦想)。","t":"📋 课标·词汇搭配"},{"s":"The ____ of doing morning exercises is clear to everyone.","o":["A. importance","B. difference","C. use","D. advantage"],"a":"A","e":"importance重要性。clear to everyone提示。","t":"📋 课标·语境选词"},{"s":"She showed great ____ in dealing with the difficult situation.","o":["A. wisdom","B. knowledge","C. information","D. news"],"a":"A","e":"wisdom智慧。dealing with difficult situation需要智慧。","t":"📋 课标·语境选词"},{"s":"We should respect different ____ around the world.","o":["A. traditions","B. habits","C. customs","D. cultures"],"a":"D","e":"cultures文化。around the world提示全球文化。","t":"📋 课标·语境选词"},{"s":"The ____ of this book is to help beginners learn Chinese.","o":["A. purpose","B. result","C. cause","D. effect"],"a":"A","e":"purpose目的。to help表目的。","t":"📋 课标·语境选词"},{"s":"Every ____ has its own advantages and disadvantages.","o":["A. story","B. coin","C. side","D. thing"],"a":"B","e":"Every coin has two sides每个硬币有两面。","t":"📋 课标·词汇搭配"},{"s":"He is thinking about the ____ of life while sitting by the river.","o":["A. meaning","B. method","C. way","D. style"],"a":"A","e":"meaning of life生命的意义。","t":"📋 课标·语境选词"},{"s":"I have a ____ that we will meet again someday.","o":["A. sense","B. feeling","C. thought","D. idea"],"a":"B","e":"have a feeling有种感觉。","t":"📋 课标·词汇搭配"},{"s":"Please accept my ____ for being late.","o":["A. apology","B. suggestion","C. thanks","D. invitation"],"a":"A","e":"apology道歉。for being late提示。","t":"📋 课标·语境选词"},{"s":"He failed because of a ____ of experience.","o":["A. waste","B. need","C. loss","D. lack"],"a":"D","e":"lack of缺乏。failed because提示。","t":"📋 课标·词汇搭配"},{"s":"The ____ in the room is very hot. Let's open the window.","o":["A. weather","B. temperature","C. heat","D. air"],"a":"B","e":"temperature温度。hot提示温度。","t":"📋 课标·语境选词"}]},"verbs":{"id":"verbs","n":"动词词义辨析","d":"六年考四次（2020-23）","dd":"四个动词不同词义，依赖宾语搭配和上下文语义。核心区分：动作动词/状态动词/动词短语。课标(二)1-4动词。","q":[{"s":"Mozart ____ many pieces of beautiful music.","o":["A. found","B. discovered","C. invented","D. created"],"a":"D","e":"created创作。Mozart创造音乐。","t":"🏛 2025江西中考第24题"},{"s":"We should ____ the differences between the two words.","o":["A. pay","B. look","C. notice","D. watch"],"a":"C","e":"notice注意到。","t":"📋 课标·语境选词"},{"s":"Can you ____ the heavy box for me?","o":["A. bring","B. fetch","C. take","D. carry"],"a":"D","e":"carry搬运(负重)。","t":"📋 课标·语境选词"},{"s":"I like to ____ my free time with my family.","o":["A. cost","B. pay","C. take","D. spend"],"a":"D","e":"spend time with sb.。","t":"📋 课标·词汇搭配"},{"s":"He ____ a new way to solve the problem.","o":["A. created","B. discovered","C. found","D. invented"],"a":"C","e":"found找到(已有事物)。","t":"📋 课标·语境选词"},{"s":"Please ____ the words with the pictures.","o":["A. match","B. connect","C. add","D. join"],"a":"A","e":"match匹配。","t":"📋 课标·语境选词"},{"s":"The story ____ us that honesty is important.","o":["A. tells","B. talks","C. speaks","D. says"],"a":"A","e":"tell告诉。tell sb.+从句。","t":"📋 课标·词汇搭配"},{"s":"He ____ the ball to his teammate.","o":["A. shot","B. passed","C. threw","D. kicked"],"a":"C","e":"threw扔。","t":"📋 课标·语境选词"},{"s":"The workers are ____ a new bridge over the river.","o":["A. making","B. doing","C. building","D. producing"],"a":"C","e":"build建造(大工程)。","t":"📋 课标·语境选词"},{"s":"She ____ her keys everywhere but couldn't find them.","o":["A. found","B. searched","C. discovered","D. looked for"],"a":"B","e":"searched搜寻(接地点)。looked for也是找但接对象。","t":"📋 课标·词汇辨析"},{"s":"He ____ to finish the work before Friday.","o":["A. tried","B. wanted","C. managed","D. hoped"],"a":"C","e":"managed to do设法成功做到。","t":"📋 课标·词汇辨析"},{"s":"The baby can ____ himself now.","o":["A. wear","B. dress","C. put on","D. have on"],"a":"B","e":"dress oneself自己穿衣。","t":"📋 课标·词汇搭配"},{"s":"Would you please ____ this form first?","o":["A. fill in","B. take off","C. write down","D. put on"],"a":"A","e":"fill in填写(表格)。","t":"📋 课标·词汇搭配"},{"s":"I ____ a lot from this experience.","o":["A. studied","B. knew","C. learned","D. understood"],"a":"C","e":"learned学到。从经验中学。","t":"📋 课标·语境选词"},{"s":"The teacher asked us to ____ the new words in the dictionary.","o":["A. look after","B. look up","C. look for","D. look at"],"a":"B","e":"look up查阅(字典)。","t":"📋 课标·词汇搭配"},{"s":"He ____ me to have a try.","o":["A. made","B. encouraged","C. had","D. let"],"a":"B","e":"encouraged鼓励。encourage sb. to do。","t":"📋 课标·词汇搭配"},{"s":"We should ____ the good ones from the bad ones.","o":["A. divide","B. separate","C. tell","D. choose"],"a":"C","e":"tell...from区分。","t":"📋 课标·词汇搭配"},{"s":"She ____ her mother in many ways.","o":["A. runs after","B. cares for","C. takes after","D. looks like"],"a":"C","e":"takes after与……相像(性格/外貌)。","t":"📋 课标·词汇辨析"},{"s":"The government ____ to build more schools in rural areas.","o":["A. expects","B. plans","C. hopes","D. wishes"],"a":"B","e":"plans to do计划做。","t":"📋 课标·语境选词"},{"s":"He ____ the invitation to the party because he was busy.","o":["A. refused","B. agreed","C. received","D. accepted"],"a":"A","e":"refused拒绝。busy说明拒绝了。","t":"📋 课标·词汇辨析"},{"s":"Can you ____ me what time the meeting starts?","o":["A. speak","B. say","C. talk","D. tell"],"a":"D","e":"tell告诉。tell sb.+从句。","t":"📋 课标·词汇搭配"},{"s":"The thief ____ from the police.","o":["A. ran away","B. took off","C. put away","D. gave up"],"a":"A","e":"ran away逃跑。thief+police提示。","t":"📋 课标·词汇搭配"},{"s":"Please ____ the lights before you leave the room.","o":["A. turn up","B. turn down","C. turn off","D. turn on"],"a":"C","e":"turn off关掉。leave时关灯。","t":"📋 课标·词汇搭配"},{"s":"She ____ a new idea for the project.","o":["A. came up with","B. kept up with","C. caught up with","D. put up with"],"a":"A","e":"came up with想出。","t":"📋 课标·词汇搭配"},{"s":"The old man ____ the children in the neighborhood.","o":["A. looks for","B. looks like","C. looks at","D. looks after"],"a":"D","e":"looks after照看。","t":"📋 课标·词汇搭配"},{"s":"I ____ you to come to my birthday party.","o":["A. expect","B. hope","C. wish","D. want"],"a":"D","e":"want sb. to do想某人做。hope不能接sb. to do。","t":"📋 课标·词汇辨析"},{"s":"Don't ____ the newspaper away. I haven't read it yet.","o":["A. take","B. throw","C. put","D. give"],"a":"B","e":"throw away扔掉。","t":"📋 课标·词汇搭配"},{"s":"She ____ her bag and left without saying a word.","o":["A. took off","B. gave away","C. put down","D. picked up"],"a":"D","e":"picked up拿起。left提示先拿起包。","t":"📋 课标·词汇搭配"},{"s":"We need to ____ the problem before it gets worse.","o":["A. look at","B. deal with","C. talk about","D. think of"],"a":"B","e":"deal with处理。","t":"📋 课标·词汇搭配"},{"s":"He ____ from his chair and walked to the window.","o":["A. rose","B. lifted","C. picked","D. raised"],"a":"A","e":"rose站起来(不及物)。","t":"📋 课标·词汇辨析"},{"s":"The teacher ____ the students to be quiet.","o":["A. spoke","B. talked","C. told","D. said"],"a":"C","e":"told告诉。tell sb. to do。","t":"📋 课标·词汇搭配"},{"s":"Would you ____ my seat for a moment?","o":["A. hold","B. take","C. save","D. keep"],"a":"D","e":"keep保留。keep my seat保留座位。","t":"📋 课标·语境选词"},{"s":"He ____ a lot of money on books every month.","o":["A. takes","B. spends","C. pays","D. costs"],"a":"B","e":"spends花费。spend money on sth.。","t":"📋 课标·词汇搭配"},{"s":"The picture ____ me of my childhood.","o":["A. memorizes","B. recalls","C. reminds","D. remembers"],"a":"C","e":"reminds提醒。remind sb. of sth.。","t":"📋 课标·词汇搭配"},{"s":"Children should ____ their parents when they are old.","o":["A. look after","B. look like","C. look up","D. look for"],"a":"A","e":"look after照顾。","t":"📋 课标·语境选词"},{"s":"She ____ the glass with hot water.","o":["A. put","B. made","C. full","D. filled"],"a":"D","e":"filled装满。fill...with。","t":"📋 课标·词汇搭配"},{"s":"Can you ____ the difference between the two pictures?","o":["A. speak","B. tell","C. say","D. talk"],"a":"B","e":"tell the difference辨别差异。","t":"📋 课标·词汇搭配"},{"s":"He ____ his seat to an old man on the bus.","o":["A. gave","B. supplied","C. offered","D. provided"],"a":"C","e":"offered主动提供。offer seat to让座。","t":"📋 课标·语境选词"},{"s":"I can't ____ the noise anymore. It's too loud.","o":["A. hear","B. listen","C. stand","D. feel"],"a":"C","e":"stand忍受。can't stand无法忍受。","t":"📋 课标·语境选词"},{"s":"The police are ____ the cause of the fire.","o":["A. looking for","B. looking into","C. looking up","D. looking after"],"a":"B","e":"looking into调查。","t":"📋 课标·词汇搭配"},{"s":"We must ____ the truth of this matter.","o":["A. invent","B. look for","C. find out","D. discover"],"a":"C","e":"find out查明(经过努力)。","t":"📋 课标·词汇辨析"},{"s":"He ____ his fear and jumped into the river to save the boy.","o":["A. beat","B. overcame","C. won","D. defeated"],"a":"B","e":"overcame克服(恐惧)。","t":"📋 课标·语境选词"},{"s":"It's important to ____ a balance between work and rest.","o":["A. take","B. make","C. keep","D. do"],"a":"C","e":"keep a balance保持平衡。","t":"📋 课标·词汇搭配"},{"s":"The firemen ____ the fire in two hours.","o":["A. put on","B. put out","C. put off","D. put away"],"a":"B","e":"put out扑灭(火)。","t":"📋 课标·词汇搭配"},{"s":"He ____ his voice so that everyone could hear him.","o":["A. lifted","B. raised","C. picked","D. rose"],"a":"B","e":"raised提高(及物)。","t":"📋 课标·词汇辨析"},{"s":"Please ____ that you turn off all the lights.","o":["A. make sure","B. be sure","C. work out","D. find out"],"a":"A","e":"make sure确保(接从句)。","t":"📋 课标·词汇搭配"},{"s":"He ____ his promise and returned the money on time.","o":["A. stayed","B. saved","C. held","D. kept"],"a":"D","e":"kept his promise遵守诺言。","t":"📋 课标·词汇搭配"},{"s":"Don't ____ your time on video games.","o":["A. cost","B. waste","C. spend","D. take"],"a":"B","e":"waste浪费。Don't提示不要浪费。","t":"📋 课标·语境选词"},{"s":"Can you ____ this English sentence into Chinese?","o":["A. turn","B. change","C. make","D. translate"],"a":"D","e":"translate翻译。translate...into。","t":"📋 课标·词汇搭配"},{"s":"She ____ her face with her hands and began to cry.","o":["A. put","B. placed","C. covered","D. hid"],"a":"C","e":"covered覆盖。cover...with。","t":"📋 课标·语境选词"}]},"adjadv":{"id":"adjadv","n":"形容词/副词词义辨析","d":"六年考四次（2022-25）","dd":"-ed/-ing形容词、频度副词、方式副词。注意hard/hardly经典陷阱、系动词+adj。课标(三)/(四)。","q":[{"s":"—Can you help me with housework? —Sure, but I'm ____ right now.","o":["A. lazy","B. busy","C. tired","D. free"],"a":"B","e":"busy忙。but转折。","t":"🏛 2024江西中考第23题"},{"s":"After many years of trying, I ____ achieved my dream.","o":["A. nearly","B. usually","C. hardly","D. finally"],"a":"D","e":"finally终于。","t":"🏛 2025江西中考第23题"},{"s":"—Has Bob arrived yet? —No, he'll be here ____.","o":["A. early","B. fast","C. quickly","D. soon"],"a":"D","e":"soon不久。he'll be here提示将来。","t":"🏛 2024江西中考第22题"},{"s":"The girl is ____ and she always helps others.","o":["A. honest","B. brave","C. clever","D. kind"],"a":"D","e":"kind善良。always helps提示。","t":"📋 课标·语境选词"},{"s":"He felt ____ after running for an hour.","o":["A. tired","B. hungry","C. thirsty","D. bored"],"a":"A","e":"tired累的。after running提示。","t":"📋 课标·语境选词"},{"s":"This book is so ____ that I can't stop reading.","o":["A. difficult","B. important","C. interesting","D. boring"],"a":"C","e":"interesting有趣的。can't stop说明。","t":"📋 课标·-ing/-ed形容词"},{"s":"I'm ____ in learning English. It's ____.","o":["A. interested; interesting","B. interesting; interested","C. interested; interested","D. interesting; interesting"],"a":"A","e":"人interested; 物interesting。","t":"📋 课标·-ing/-ed形容词"},{"s":"The ____ man lost his way in the dark forest.","o":["A. afraid","B. frightening","C. frightened","D. scary"],"a":"C","e":"frightened感到害怕的(修饰人)。","t":"📋 课标·-ing/-ed形容词"},{"s":"She was ____ to hear the good news.","o":["A. interesting","B. exciting","C. excited","D. surprised"],"a":"C","e":"excited兴奋的(人)。","t":"📋 课标·-ing/-ed形容词"},{"s":"The movie was so ____ that I fell asleep.","o":["A. exciting","B. boring","C. bored","D. excited"],"a":"B","e":"boring无聊的(物)。fell asleep说明无聊。","t":"📋 课标·-ing/-ed形容词"},{"s":"I was ____ at his words. I couldn't believe it.","o":["A. exciting","B. excited","C. surprising","D. surprised"],"a":"D","e":"surprised惊讶的(人)。couldn't believe。","t":"📋 课标·-ing/-ed形容词"},{"s":"The price is too ____. I can't afford it.","o":["A. low","B. cheap","C. expensive","D. high"],"a":"D","e":"price用high/low修饰。","t":"📋 课标·词汇搭配"},{"s":"He is ____ enough to pass the exam.","o":["A. brave","B. strong","C. clever","D. kind"],"a":"C","e":"clever聪明。adj+enough to do。","t":"📋 课标·词汇句式"},{"s":"It's ____ to learn English well.","o":["A. difficult","B. interesting","C. important","D. possible"],"a":"C","e":"important重要。学好英语很重要。","t":"📋 课标·语境选词"},{"s":"Be ____! The glass is easy to break.","o":["A. useful","B. hopeful","C. helpful","D. careful"],"a":"D","e":"careful小心。easy to break提示。","t":"📋 课标·语境选词"},{"s":"The question is so ____ that no one can answer it.","o":["A. simple","B. difficult","C. different","D. easy"],"a":"B","e":"difficult困难的。no one can answer说明难。","t":"📋 课标·语境选词"},{"s":"She is ____ with her students and they all love her.","o":["A. strict","B. patient","C. bored","D. angry"],"a":"B","e":"patient耐心的。they all love her提示。","t":"📋 课标·语境选词"},{"s":"The soup tastes ____. You are a good cook.","o":["A. terrible","B. delicious","C. strange","D. sweet"],"a":"B","e":"delicious美味的。good cook提示。","t":"📋 课标·感官动词+adj"},{"s":"This coat is too small. Can you show me a ____ one?","o":["A. cheaper","B. smaller","C. prettier","D. larger"],"a":"D","e":"larger更大的。too small说明要更大的。","t":"📋 课标·语境选词"},{"s":"He is ____. He always tells the truth.","o":["A. kind","B. brave","C. honest","D. clever"],"a":"C","e":"honest诚实。always tells the truth提示。","t":"📋 课标·语境选词"},{"s":"He runs really ____. He won the race.","o":["A. quick","B. rapid","C. fast","D. slow"],"a":"C","e":"fast快。won the race提示。","t":"📋 课标·副词辨析"},{"s":"I ____ go to bed before 10 p.m.","o":["A. usually","B. seldom","C. always","D. never"],"a":"A","e":"usually通常。","t":"📋 课标·频度副词"},{"s":"She answered the question ____ and got full marks.","o":["A. correctly","B. slowly","C. wrongly","D. quickly"],"a":"A","e":"correctly正确。full marks提示。","t":"📋 课标·副词辨析"},{"s":"He works very ____, so he always does well in exams.","o":["A. hardly","B. careful","C. hard","D. good"],"a":"C","e":"hard努力。does well说明努力。","t":"📋 课标·hard/hardly陷阱"},{"s":"I could ____ believe my eyes when I saw the result.","o":["A. hardly","B. nearly"
