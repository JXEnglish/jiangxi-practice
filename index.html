function startSCQuiz(catId) {
  var cat = ALL_DATA[ST.ver][ST.tab][catId];
  ST.catIdx = catId;
  ST.mode = 'full';
  ST.curIdx = 0;
  ST.answers = {};
  ST.feedbackShown = false;
  // Timer
  ST.timerStart = Date.now();
  ST.timerElapsed = 0;
  if (ST.timerInterval) { clearInterval(ST.timerInterval); }
  ST.timerInterval = setInterval(updateTimerDisplay, 1000);

  var allIds = cat.q.map(function(_, i) { return i; });
  if (cat.ps && allIds.length > cat.ps) allIds = shuffle(allIds).slice(0, cat.ps);
  ST.shuffled = shuffle(allIds);
  ST.view = 'quiz';
  renderSCQuiz();
  window.scrollTo(0, 0);
}

function renderSCQuiz() {
  var app = document.getElementById('app');
  app.innerHTML = '';
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var total = ST.shuffled.length;
  var done = Object.keys(ST.answers).length;
  var progress = total > 0 ? Math.round(ST.curIdx / total * 100) : 0;

  // Top bar
  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { clearSession(); renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, cat.n),
    H('button', {className:'nav-grid-btn', onClick: function() { showNavGrid(); }}, (ST.curIdx + 1) + '/' + total + ' ▾'),
    H('div', {id:'timer-display', className:'timer-display'}, '00:00'),
  ]));

  // Progress
  app.appendChild(H('div', {className:'progress-wrap'}, [
    H('div', {className:'progress-text'}, '第 ' + (ST.curIdx + 1) + '/' + total + ' 题 · 已答 ' + done + ' 题'),
    H('div', {className:'progress-bar'}, [
      H('div', {className:'progress-fill', style:'width:' + progress + '%'})
    ])
  ]));

  var qIdx = ST.shuffled[ST.curIdx];
  var q = cat.q[qIdx];
  var answered = ST.answers.hasOwnProperty(qIdx);

  // Stem
  var stemDiv = H('div', {className:'q-stem-display'});
  var stemHtml = q.s.replace(/_(3,)/g, '<span class="blank"></span>');
  stemDiv.innerHTML = stemHtml;
  app.appendChild(stemDiv);

  // Options
  var optsWrap = H('div', {className:'options-wrap'});
  q.o.forEach(function(opt, oi) {
    var letter = String.fromCharCode(65 + oi);
    var isCorrect = letter === q.a;
    var userAnswer = ST.answers[qIdx];
    var isSelected = userAnswer === letter;

    var cls = 'opt-btn';
    if (ST.feedbackShown && answered) {
      if (isCorrect) cls += ' correct';
      else if (isSelected) cls += ' wrong';
    }
    if (isSelected && !ST.feedbackShown) cls += ' selected';

    var btn = H('button', {
      className: cls,
      onClick: function() {
        // Allow changing answer before feedback is shown
        ST.answers[qIdx] = letter;
        ST.feedbackShown = false;
        saveSession();
        renderSCQuiz();
        window.scrollTo(0, 0);
      }
    }, [
      H('span', {className:'opt-letter'}, letter),
      H('span', null, opt.replace(/^[A-D]\.\s*/, ''))
    ]);
    optsWrap.appendChild(btn);
  });
  app.appendChild(optsWrap);

  // Keyboard hint (practice mode only)
  if (!ST.feedbackShown && ST.quizMode === 'practice') {
    app.appendChild(H('div', {className:'key-hint'}, '按 A / B / C / D 选择答案'));
  }

  // Feedback (only after clicking Next, practice mode only)
  if (ST.feedbackShown && answered && ST.quizMode === 'practice') {
    var isRight = ST.answers[qIdx] === q.a;
    var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
    var refText = verLabel(ST.ver) + ' · ' + (cat.n || '') + ' · ' + (cat.dd || cat.g || '');
    var fb = H('div', {className:'feedback show'}, [
      H('div', {className:'fb-result ' + (isRight ? 'good' : 'bad')}, isRight ? '✅ 回答正确' : '❌ 回答错误'),
      H('div', {className:'fb-explain'}, q.e),
      H('div', {className:'fb-ref'}, '📖 课本出处：' + refText)
    ]);
    app.appendChild(fb);
  }

  // Next button
  if (answered) {
    var isLast = ST.curIdx >= total - 1;
    var nextLabel;
    if (ST.quizMode === 'exam') {
      nextLabel = isLast ? '提交试卷' : '下一题 →';
    } else {
      nextLabel = ST.feedbackShown ? (ST.curIdx < total - 1 ? '下一题 →' : '查看结果') : '确认答案 · Enter';
    }

    var nextBtn = H('button', {
      className: 'btn-next show',
      onClick: function() {
        if (ST.quizMode === 'exam') {
          if (isLast) {
            // Save all errors before showing results
            var cat2 = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
            ST.shuffled.forEach(function(qi) {
              if (ST.answers.hasOwnProperty(qi) && ST.answers[qi] !== cat2.q[qi].a) {
                saveError({
                  qIdx: qi, catIdx: ST.catIdx,
                  stem: cat2.q[qi].s, userAnswer: ST.answers[qi], correctAnswer: cat2.q[qi].a,
                  explain: cat2.q[qi].e, time: new Date().toLocaleString('zh-CN')
                });
              }
            });
            showSCResults();
          } else {
            ST.curIdx++;
            saveSession();
            renderSCQuiz();
            window.scrollTo(0, 0);
          }
        } else {
          if (!ST.feedbackShown) {
            ST.feedbackShown = true;
            var isCorrectNow = ST.answers[qIdx] === q.a;
            if (!isCorrectNow) saveError({
              qIdx: qIdx, catIdx: ST.catIdx,
              stem: q.s, userAnswer: ST.answers[qIdx], correctAnswer: q.a,
              explain: q.e, time: new Date().toLocaleString('zh-CN')
            });
            saveSession();
            renderSCQuiz();
            window.scrollTo(0, 0);
          } else {
            ST.feedbackShown = false;
            if (ST.curIdx < total - 1) {
              ST.curIdx++;
              renderSCQuiz();
              window.scrollTo(0, 0);
            } else {
              showSCResults();
            }
          }
        }
      }
    }, nextLabel);
    app.appendChild(nextBtn);
  }
}

function showExamReview() {
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var total = ST.shuffled.length;
  var correct = 0;
  ST.shuffled.forEach(function(qIdx) {
    if (ST.answers[qIdx] === cat.q[qIdx].a) correct++;
  });

  var app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { showSCResults(); }}, '← 返回结果'),
    H('div', {className:'quiz-title'}, cat.n + ' · 详细反馈'),
  ]));

  var list = H('div', {className:'review-list'});
  ST.shuffled.forEach(function(qIdx, i) {
    var q = cat.q[qIdx];
    var userAns = ST.answers[qIdx];
    var isRight = userAns === q.a;
    var userLetter = userAns || '未答';
    var item = H('div', {className:'review-item'}, [
      H('div', {className:'rv-num'}, '第' + (i + 1) + '题 · ' + (isRight ? '✅ 正确' : '❌ 错误')),
      H('div', {className:'rv-stem'}, q.s.replace(/_(3,)/g, '____')),
      H('div', {className:'rv-answer'}, [
        H('span', {style:'color:' + (isRight ? 'var(--green)' : 'var(--red)')}, '你的答案: ' + userLetter),
        !isRight ? H('span', {style:'color:var(--green);margin-left:8px;'}, '正确答案: ' + q.a) : null,
      ]),
      H('div', {className:'rv-explain'}, q.e)
    ]);

  });
  app.appendChild(list);

  app.appendChild(H('button', {
    className:'btn-next show',
    onClick: function() { showSCResults(); }
  }, '返回结果'));

  window.scrollTo(0, 0);
}

function showSCResults() {
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var total = ST.shuffled.length;
  var correct = 0;
  ST.shuffled.forEach(function(qIdx) {
    if (ST.answers[qIdx] === cat.q[qIdx].a) correct++;
  });
  var score = correct;
  var pct = total > 0 ? Math.round(correct / total * 100) : 0;

  // Stop timer
  if (ST.timerInterval) { clearInterval(ST.timerInterval); ST.timerInterval = null; }
  var elapsed = ST.timerElapsed + (Date.now() - (ST.timerStart || Date.now()));
  var mins = Math.floor(elapsed / 60000);
  var secs = Math.floor((elapsed % 60000) / 1000);
  var timeStr = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');

  saveStats(pkey(), ST.catIdx, score, total);
  clearSession();

  var app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { clearSession(); renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, cat.n + ' · 结果'),
  ]));

  // Save exam errors at result time
  if (ST.quizMode === 'exam') {
    ST.shuffled.forEach(function(qi) {
      if (ST.answers.hasOwnProperty(qi) && ST.answers[qi] !== cat.q[qi].a) {
        saveError({
          qIdx: qi, catIdx: ST.catIdx,
          stem: cat.q[qi].s, userAnswer: ST.answers[qi], correctAnswer: cat.q[qi].a,
          explain: cat.q[qi].e, time: new Date().toLocaleString('zh-CN')
        });
      }
    });
  }

  var cls = pct >= 80 ? 'good' : (pct < 60 ? 'bad' : '');
  app.appendChild(H('div', {className:'results-wrap'}, [
    H('div', {className:'score ' + cls}, correct + '/' + total),
    
    H('div', {style:'font-size:13px;color:var(--muted);margin-top:4px;'}, '用时 ' + timeStr),
    H('button', {className:'btn-restart', onClick: function() { startSCQuiz(ST.catIdx); }}, '重新练习'),
    ST.quizMode === 'exam' ? H('button', {className:'btn-restart', style:'background:var(--blue);margin-top:6px;', onClick: function() { showExamReview(); }}, '查看详细反馈') : null,
    H('button', {className:'btn-restart', style:'background:var(--gold-l);color:var(--gold-d);margin-top:6px;', onClick: function() { clearSession(); renderLanding(); }}, '返回列表'),
  ]));

  // Confetti for high scores
  if (pct >= 80) {
    var colors = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4'];
    var confetti = H('div', {className:'confetti-container'});
    for (var i = 0; i < 40; i++) {
      confetti.appendChild(H('div', {className:'confetti-piece', style:
        'left:' + Math.random() * 100 + '%;' +
        'animation-delay:' + Math.random() * 2 + 's;' +
        'animation-duration:' + (2 + Math.random() * 3) + 's;' +
        'background:' + colors[Math.floor(Math.random() * colors.length)] + ';'
      }));
    }
    app.appendChild(confetti);
  }

  window.scrollTo(0, 0);
}

function startFillQuiz(idx) {
  ST.catIdx = idx;
  ST.view = 'quiz';
  if (ST.tab === 'cloze') { ST.clozeTexts = {}; ST.clozeSubmitted = false; }
  else if (ST.tab === 'vocab_a') { ST.vocabATexts = {}; ST.vocabASubmitted = false; }
  else if (ST.tab === 'vocab_b') { ST.vocabBTexts = {}; ST.vocabBSubmitted = false; }
  else if (ST.tab === 'grammar') { ST.grammarTexts = {}; ST.grammarSubmitted = false; }

  if (ST.tab === 'cloze') renderClozeQuiz();
  else if (ST.tab === 'vocab_a') renderVocabAQuiz();
  else if (ST.tab === 'vocab_b') renderVocabBQuiz();
  else if (ST.tab === 'grammar') renderGrammarQuiz();
  window.scrollTo(0, 0);
}

// ---- CLOZE B ----
function renderClozeQuiz() {
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { clearSession(); renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, cat.n),
  ]));

  // Word bank (sticky)
  var bankDiv = H('div', {className:'cloze-bank-ref'}, [
    H('div', {className:'cloze-bank-ref-label'}, '词库（在空格中填入单词的正确形式）'),
    H('div', {className:'cloze-bank-ref-words'},
      cat.bank.map(function(w) { return H('span', {className:'bank-ref-word'}, w); })
    ),
  ]);
  app.appendChild(bankDiv);

  // Passage with blanks
  var passageDiv = H('div', {className:'cloze-passage'});
  var parts = cat.passage.split(/(__\d+__)/g);
  parts.forEach(function(part) {
    var m = part.match(/^__(\d+)__$/);
    if (m) {
      var bn = parseInt(m[1]) - 1;
      var input = H('input', {
        className: 'cloze-input',
        type: 'text',
        autocomplete: 'off',
        autocorrect: 'off',
        autocapitalize: 'off',
        spellcheck: false,
        value: ST.clozeTexts[bn] || '',
        disabled: ST.clozeSubmitted,
        onInput: function(e) { ST.clozeTexts[bn] = e.target.value; saveSession(); }
      });
      passageDiv.appendChild(input);
    } else {
      passageDiv.appendChild(document.createTextNode(part));
    }
  });
  app.appendChild(passageDiv);

  // Submit
  var allFilled = cat.answers.every(function(_, j) { return ST.clozeTexts[j] && ST.clozeTexts[j].trim(); });
  var submitBtn = H('button', {
    className: 'cloze-submit' + (allFilled && !ST.clozeSubmitted ? ' ready' : ''),
    disabled: ST.clozeSubmitted,
    onClick: function() {
      var filled = cat.answers.every(function(_, j) { return ST.clozeTexts[j] && ST.clozeTexts[j].trim(); });
      if (!filled || ST.clozeSubmitted) return;
      ST.clozeSubmitted = true;
      saveSession();
      renderClozeQuiz();
      window.scrollTo(0, 0);
    }
  }, ST.clozeSubmitted ? '已提交' : '提交答案');
  app.appendChild(submitBtn);

  // Feedback after submit
  if (ST.clozeSubmitted) {
    var correct = 0;
    var total = cat.answers.length;
    cat.answers.forEach(function(_, j) {
      var userAns = (ST.clozeTexts[j] || '').trim();
      if (userAns === cat.inflections[j]) correct++;
    });
    saveStats(pkey(), cat.id, correct, total);

    var fbDiv = H('div', {className:'feedback show'});
    fbDiv.appendChild(H('div', {className:'fb-result ' + (correct === total ? 'good' : (correct < total * 0.6 ? 'bad' : ''))},
      '得分: ' + correct + '/' + total + ' (' + Math.round(correct / total * 100) + '%)'));
    cat.answers.forEach(function(_, j) {
      var userAns = (ST.clozeTexts[j] || '').trim();
      var right = userAns === cat.inflections[j];
      if (!right) saveError({
        qIdx: j, catIdx: ST.catIdx,
        stem: cat.passage, userAnswer: userAns || '未填',
        correctAnswer: cat.inflections[j],
        explain: cat.explain[j], time: new Date().toLocaleString('zh-CN')
      });
      var item = H('div', {className:'cloze-fb-item'}, [
        right ? '✅ ' : '❌ ',
        H('span', null, '空' + (j + 1) + ': '),
        H('span', {style:'color:' + (right ? 'var(--green)' : 'var(--red)')}, userAns || '未填'),
        !right ? H('span', {style:'color:var(--green)'}, ' → ' + cat.inflections[j]) : null,
        H('br'),
        H('span', {style:'font-size:11px;color:var(--muted)'}, cat.explain[j])
      ]);
      fbDiv.appendChild(item);
    });
    app.appendChild(fbDiv);

    app.appendChild(H('button', {
      className:'btn-next show',
      onClick: function() { clearSession(); renderLanding(); }
    }, '返回列表'));
    app.appendChild(H('button', {
      className:'btn-next show',
      style:'background:var(--gold-l);color:var(--gold-d);margin-top:4px;',
      onClick: function() { ST.clozeTexts = {}; ST.clozeSubmitted = false; saveSession(); renderClozeQuiz(); }
    }, '重新填写'));
  }
}

// ---- Shared fill-in feedback ----
function renderFillFeedback(app, answers, explains, texts, catId) {
  var correct = 0;
  var total = answers.length;
  answers.forEach(function(a, j) {
    var userAns = (texts[j] || '').trim();
    if (userAns === a) correct++;
    else saveError({
      qIdx: j, catIdx: ST.catIdx,
      stem: '', userAnswer: userAns || '未填',
      correctAnswer: a, explain: explains[j],
      time: new Date().toLocaleString('zh-CN')
    });
  });
  if (catId) saveStats(pkey(), catId, correct, total);

  var fbDiv = H('div', {className:'feedback show'});
  fbDiv.appendChild(H('div', {className:'fb-result ' + (correct === total ? 'good' : (correct < total * 0.6 ? 'bad' : ''))},
    '得分: ' + correct + '/' + total + ' (' + Math.round(correct / total * 100) + '%)'));
  answers.forEach(function(a, j) {
    var userAns = (texts[j] || '').trim();
    var right = userAns === a;
    var item = H('div', {className:'cloze-fb-item'}, [
      right ? '✅ ' : '❌ ',
      H('span', null, '空' + (j + 1) + ': '),
      H('span', {style:'color:' + (right ? 'var(--green)' : 'var(--red)')}, userAns || '未填'),
      !right ? H('span', {style:'color:var(--green)'}, ' → ' + a) : null,
      H('br'),
      H('span', {style:'font-size:11px;color:var(--muted)'}, explains[j])
    ]);
    fbDiv.appendChild(item);
  });
  app.appendChild(fbDiv);

  app.appendChild(H('button', {
    className:'btn-next show',
    onClick: function() { clearSession(); renderLanding(); }
  }, '返回列表'));
  app.appendChild(H('button', {
    className:'btn-next show',
    style:'background:var(--gold-l);color:var(--gold-d);margin-top:4px;',
    onClick: function() {
      if (ST.tab === 'cloze') { ST.clozeTexts = {}; ST.clozeSubmitted = false; }
      else if (ST.tab === 'vocab_a') { ST.vocabATexts = {}; ST.vocabASubmitted = false; }
      else if (ST.tab === 'vocab_b') { ST.vocabBTexts = {}; ST.vocabBSubmitted = false; }
      else if (ST.tab === 'grammar') { ST.grammarTexts = {}; ST.grammarSubmitted = false; }
      saveSession();
      if (ST.tab === 'cloze') renderClozeQuiz();
      else if (ST.tab === 'vocab_a') renderVocabAQuiz();
      else if (ST.tab === 'vocab_b') renderVocabBQuiz();
      else if (ST.tab === 'grammar') renderGrammarQuiz();
    }
  }, '重新填写'));
}

// ============================================================
// ERROR BOOK
// ============================================================
function renderErrorBook() {
  var allErrors = [];
  Object.keys(VERSIONS).forEach(function(v) {
    Object.keys(VERSIONS[v].tabs).forEach(function(t) {
      try {
        var key = 'jxmulti_' + v + '_' + t + '_errors';
        var errors = JSON.parse(localStorage.getItem(key) || '[]');
        errors.forEach(function(e) { e._ver = v; e._tab = t; });
        allErrors = allErrors.concat(errors);
      } catch(e) {}
    });
  });

  var app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(H('div', {className:'quiz-top'}, [
    H('button', {className:'btn-back', onClick: function() { renderLanding(); }}, '← 返回'),
    H('div', {className:'quiz-title'}, '错题本 (' + allErrors.length + '题)'),
    allErrors.length > 0 ? H('button', {
      className:'btn-back',
      style:'color:var(--red)',
      onClick: function() {
        Object.keys(VERSIONS).forEach(function(v) {
          Object.keys(VERSIONS[v].tabs).forEach(function(t) {
            localStorage.removeItem('jxmulti_' + v + '_' + t + '_errors');
          });
        });
        renderErrorBook();
      }
    }, '清空') : null
  ]));

  if (allErrors.length === 0) {
    app.appendChild(H('div', {className:'results-wrap'}, [
      H('div', {style:'font-size:14px;color:var(--muted);padding:20px;'}, '暂无错题，继续加油！')
    ]));
    return;
  }

  var list = H('div', {className:'err-list'});
  allErrors.reverse().forEach(function(e) {
    var verName = VERSIONS[e._ver] ? VERSIONS[e._ver].n : e._ver;
    var item = H('div', {className:'err-item'}, [
      H('div', {className:'err-stem'}, '[' + verName + '] ' + (e.stem || '题' + (e.qIdx + 1))),
      H('div', {className:'err-detail'}, [
        H('span', {className:'wrong'}, e.userAnswer || '未填'),
        ' → ',
        H('span', {className:'correct'}, e.correctAnswer),
      ]),
      e.explain ? H('div', {className:'err-detail', style:'margin-top:4px;color:var(--muted)'}, e.explain) : null,
      e.time ? H('div', {style:'font-size:10px;color:var(--muted);margin-top:2px;'}, e.time) : null
    ]);
    list.appendChild(item);
  });
  app.appendChild(list);
}

function showResumeModal(session) {
  var overlay = H('div', {className:'modal-overlay', onClick: function(e) { if (e.target === overlay) overlay.remove(); }});
  var box = H('div', {className:'modal-box'}, [
    H('h2', null, '恢复未完成的练习'),
    H('p', null, '检测到你有未完成的练习，是否继续？'),
    H('div', {className:'btn-row'}, [
      H('button', {
        className:'btn-primary',
        onClick: function() {
          overlay.remove();
          if (session.tab === 'sc') resumeSCQuiz(session);
          else {
            ST.catIdx = session.catIdx;
            ST.view = 'quiz';
            if (session.tab === 'cloze') { ST.clozeTexts = session.clozeTexts || {}; ST.clozeSubmitted = session.clozeSubmitted || false; }
            else if (session.tab === 'vocab_a') { ST.vocabATexts = session.vocabATexts || {}; ST.vocabASubmitted = session.vocabASubmitted || false; }
            else if (session.tab === 'vocab_b') { ST.vocabBTexts = session.vocabBTexts || {}; ST.vocabBSubmitted = session.vocabBSubmitted || false; }
            else if (session.tab === 'grammar') { ST.grammarTexts = session.grammarTexts || {}; ST.grammarSubmitted = session.grammarSubmitted || false; }
            if (ST.tab === 'cloze') renderClozeQuiz();
            else if (ST.tab === 'vocab_a') renderVocabAQuiz();
            else if (ST.tab === 'vocab_b') renderVocabBQuiz();
            else if (ST.tab === 'grammar') renderGrammarQuiz();
          }
        }
      }, '继续'),
      H('button', {
        className:'btn-secondary',
        onClick: function() { overlay.remove(); clearSession(); }
      }, '重新开始'),
    ])
  ]);
  document.body.appendChild(overlay);
}

function resumeSCQuiz(session) {
  ST.view = 'quiz';
  ST.catIdx = session.catIdx;
  ST.mode = session.mode || 'full';
  ST.shuffled = session.shuffled || [];
  ST.curIdx = session.curIdx || 0;
  ST.answers = session.answers || {};
  ST.feedbackShown = false;
  renderSCQuiz();
  window.scrollTo(0, 0);
}

// ============================================================
// INIT
// ============================================================
function updateTimerDisplay() {
  var display = document.getElementById('timer-display');
  if (!display || !ST.timerStart) return;
  var elapsed = ST.timerElapsed + (Date.now() - ST.timerStart);
  var mins = Math.floor(elapsed / 60000);
  var secs = Math.floor((elapsed % 60000) / 1000);
  display.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
}

// ============================================================
// NAVIGATION GRID
// ============================================================
function showNavGrid() {
  var cat = ALL_DATA[ST.ver][ST.tab][ST.catIdx];
  var total = ST.shuffled.length;

  var overlay = H('div', {className:'modal-overlay', onClick: function(e) { if (e.target === overlay) overlay.remove(); }});
  var box = H('div', {className:'modal-box'});
  box.appendChild(H('h2', null, '题目导航 · ' + total + '题'));

  var legend = H('div', {className:'nav-legend'}, [
    H('span', null, '● 当前'), ' ',
    H('span', {style:'color:var(--green)'}, '● 正确'), ' ',
    H('span', {style:'color:var(--red)'}, '● 错误'), ' ',
    H('span', {style:'color:var(--muted)'}, '● 未答')
  ]);
  box.appendChild(legend);

  var grid = H('div', {className:'nav-grid'});
  ST.shuffled.forEach(function(qIdx, i) {
    var userAns = ST.answers[qIdx];
    var dotCls = 'nav-dot';
    if (i === ST.curIdx) {
      dotCls += ' current';
    } else if (userAns !== undefined) {
      dotCls += userAns === cat.q[qIdx].a ? ' correct' : ' wrong';
    } else {
      dotCls += ' unanswered';
    }

    var dot = H('div', {
      className: dotCls,
      onClick: (function(targetIdx) {
        return function() {
          overlay.remove();
          ST.curIdx = targetIdx;
          ST.feedbackShown = false;
          renderSCQuiz();
          window.scrollTo(0, 0);
        };
      })(i)
    }, '' + (i + 1));
    grid.appendChild(dot);
  });
  box.appendChild(grid);

  box.appendChild(H('button', {
    className:'btn-primary',
    style:'width:100%;margin-top:12px;',
    onClick: function() { overlay.remove(); }
  }, '关闭'));

  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function init() {
  ST.quizMode = loadQuizMode();
  var resume = checkResume();
  if (resume) {
    renderLanding();
    showResumeModal(resume);
  } else {
    renderLanding();
  }
}

document.addEventListener('DOMContentLoaded', init);

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (ST.view !== 'quiz') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  var key = e.key.toLowerCase();

  // SC mode: A/B/C/D to select answer
  if (ST.tab === 'sc' && !ST.feedbackShown) {
    var idx = 'abcd'.indexOf(key);
    if (idx >= 0) {
      var buttons = document.querySelectorAll('.opt-btn');
      if (buttons[idx]) { buttons[idx].click(); }
      return;
    }
  }

  // Enter = Next / Confirm / Submit
  if (key === 'enter') {
    var nextBtn = document.querySelector('.btn-next.show');
    if (nextBtn) { nextBtn.click(); return; }
    // Fill-in types: click submit if available
    var submitBtn = document.querySelector('.cloze-submit.ready, .vocab-a-submit.ready');
    if (submitBtn && !submitBtn.disabled) { submitBtn.click(); }
  }
});
</script>
