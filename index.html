o"],"a":"A","e":"warm enough to do 足够温暖可以……。","t":"📋 rj8b_U1语法"},{"s":"___ is the traditional art of beautiful handwriting with a brush.","o":["A. Calligraphy","B. Yoga","C. Stroke","D. Poem"],"a":"A","e":"calligraphy 书法。","t":"📋 rj8b_U1词汇"},{"s":"The police warned people ___ near the broken bridge.","o":["A. not going","B. not go","C. not to go","D. don't go"],"a":"C","e":"warn sb not to do 警告某人不要做某事。不定式否定：not to do。","t":"📋 rj8b_U1语法"},{"s":"The doctor told him ___ more exercise and eat less junk food.","o":["A. doing","B. to do","C. did","D. do"],"a":"B","e":"tell sb to do 告诉某人做某事。","t":"📋 rj8b_U1语法"},{"s":"Would you like me ___ you carry those heavy books?","o":["A. helping","B. helped","C. to help","D. help"],"a":"C","e":"would like sb to do 想让某人做某事。","t":"📋 rj8b_U1语法"},{"s":"She wrote a beautiful ___ about the spring rain.","o":["A. ink","B. stroke","C. fear","D. poem"],"a":"D","e":"poem 诗。","t":"📋 rj8b_U1词汇"},{"s":"The guide taught us ___ a fire without matches in the forest.","o":["A. made","B. to make","C. making","D. make"],"a":"B","e":"teach sb to do 教某人做某事。","t":"📋 rj8b_U1语法"},{"s":"I opened the window ___ some fresh air into the stuffy room.","o":["A. to let","B. letted","C. letting","D. let"],"a":"A","e":"to do 表目的：开窗是为了让空气进来。","t":"📋 rj8b_U1语法"},{"s":"The bag was ___ heavy for the old lady to carry by herself.","o":["A. such","B. very","C. so","D. too"],"a":"D","e":"too...to 太……而不能。","t":"📋 rj8b_U1语法"},{"s":"Before you travel to another country, make sure your ___ is still valid.","o":["A. coin","B. poem","C. fear","D. express"],"a":"A","e":"旅行必备物品。coin。","t":"📋 rj8b_U1逻辑"},{"s":"The coach told the team ___ practising even when they felt tired.","o":["A. to keep","B. kept","C. keeping","D. keep"],"a":"A","e":"tell sb to do 告诉某人做某事。","t":"📋 rj8b_U1语法"},{"s":"It's a wonderful feeling ___ someone you care about smile with joy.","o":["A. see","B. seeing","C. saw","D. to see"],"a":"D","e":"It's...to do，to see 是真正主语。","t":"📋 rj8b_U1语法"},{"s":"He felt ___ when he had to give a speech in front of the whole school.","o":["A. thankful","B. scared","C. single","D. sore"],"a":"B","e":"scared 害怕的。","t":"📋 rj8b_U1词汇"},{"s":"He ran ___ slowly to catch up with the other players on the field.","o":["A. such","B. very","C. so","D. too"],"a":"D","e":"too slowly to catch up 太慢追不上。","t":"📋 rj8b_U1语法"},{"s":"The coach encouraged us ___ harder in the second half of the game.","o":["A. to try","B. trying","C. try","D. tried"],"a":"A","e":"encourage sb to do。to do 作宾补。","t":"📋 rj8b_U1语法"},{"s":"We should learn to ___ our screen time so it doesn't take over our lives.","o":["A. instructor","B. enough","C. reduce","D. manage"],"a":"D","e":"语境暗示\"控制/限制\"类动词。管理。","t":"📋 rj8b_U1逻辑"},{"s":"It is not polite ___ loudly in the library.","o":["A. to talk","B. talk","C. talking","D. talked"],"a":"A","e":"It's adj + to do，to do 是真正主语。","t":"📋 rj8b_U1语法"},{"s":"They rushed to the station ___ the last train to the city.","o":["A. catch","B. to catch","C. caught","D. catching"],"a":"B","e":"to do 表目的：赶去车站是为了赶火车。","t":"📋 rj8b_U1语法"},{"s":"She is old ___ to take care of herself when her parents are at work.","o":["A. enough","B. too","C. so","D. very"],"a":"A","e":"adj + enough to do 足够……可以。","t":"📋 rj8b_U1语法"},{"s":"The teacher asked us ___ the new words three times.","o":["A. repeat","B. repeated","C. repeating","D. to repeat"],"a":"D","e":"ask sb to do 要求某人做某事。to do 作宾语补足语。","t":"📋 rj8b_U1语法"},{"s":"He volunteered ___ the elderly lady carry her shopping bags home.","o":["A. helped","B. to help","C. help","D. helping"],"a":"B","e":"volunteer to do 自愿做某事。to do 表目的。","t":"📋 rj8b_U1语法"},{"s":"Each ___ in Chinese characters must be written in the right order.","o":["A. poem","B. stroke","C. ink","D. fear"],"a":"B","e":"stroke 笔画。","t":"📋 rj8b_U1词汇"},{"s":"Many people practice ___ to relax both body and mind.","o":["A. calligraphy","B. yoga","C. outing","D. ski"],"a":"B","e":"yoga 瑜伽。","t":"📋 rj8b_U1词汇"},{"s":"Learning to ___ your time well is an important life skill.","o":["A. control","B. express","C. manage","D. reduce"],"a":"C","e":"manage 管理。manage time 管理时间。","t":"📋 rj8b_U1词汇"},{"s":"The doctor said my ___ was not serious, but I should still rest for a day.","o":["A. scared","B. stress","C. outing","D. stroke"],"a":"B","e":"上下文暗示身体部位/健康问题 → 下义词。stress。","t":"📋 rj8b_U1逻辑"}]},"rj8b_U2":{"id":"rj8b_U2","n":"U2 · Stay Healthy","d":"情态动词 should/could 表建议; 反身代词 · 40词 · 48题","dd":"情态动词 should/could 表建议; 反身代词","ps":35,"q":[{"s":"If you have a ___, you should drink more warm water and rest.","o":["A. fever","B. hurt","C. himself","D. injury"],"a":"B","e":"语境暗示常见病症。伤害。","t":"📋 rj8b_U2逻辑"},{"s":"She hadn't eaten anything all day, so she felt very ___ by the afternoon.","o":["A. could","B. weak","C. anxiety","D. stomach"],"a":"B","e":"so表因果：没吃饭→身体状态如何。虚弱的。","t":"📋 rj8b_U2逻辑"},{"s":"If you want to stay healthy, you ___ ride a bike to school instead of taking the bus.","o":["A. could","B. must","C. need","D. have to"],"a":"A","e":"could 委婉地提出健康建议。","t":"📋 rj8b_U2语法"},{"s":"We ___ eat more vegetables and less junk food to keep fit.","o":["A. should","B. need to be","C. must to","D. could to"],"a":"A","e":"should 表示健康饮食建议。","t":"📋 rj8b_U2语法"},{"s":"You ___ wash your hands before every meal to stay healthy.","o":["A. can to","B. should","C. need","D. must to"],"a":"B","e":"should 表示应该做的健康习惯。","t":"📋 rj8b_U2语法"},{"s":"You ___ skip breakfast. It's the most important meal of the day.","o":["A. should","B. needn't to","C. can't to","D. shouldn't"],"a":"D","e":"shouldn't skip breakfast 不应该跳过早餐。","t":"📋 rj8b_U2语法"},{"s":"I cut ___ while cooking dinner last night.","o":["A. himself","B. myself","C. yourself","D. herself"],"a":"B","e":"myself 我自己。反身代词与主语I保持一致。","t":"📋 rj8b_U2语法"},{"s":"Before you travel to another country, make sure your ___ is still valid.","o":["A. x-ray","B. cold","C. bleed","D. herself"],"a":"A","e":"旅行必备物品。x-ray。","t":"📋 rj8b_U2逻辑"},{"s":"We ___ better hurry, or we'll miss the last bus home.","o":["A. could","B. would","C. had","D. should"],"a":"C","e":"had better do 最好做某事。","t":"📋 rj8b_U2语法"},{"s":"He ___ eat so much junk food. It's bad for his health.","o":["A. shouldn't","B. should","C. doesn't need","D. mustn't to"],"a":"A","e":"shouldn't 表示\"不应该\"。","t":"📋 rj8b_U2语法"},{"s":"You ___ drink more water when you have a fever.","o":["A. need to be","B. can to be","C. should","D. must to"],"a":"C","e":"should + 动词原形表示建议。","t":"📋 rj8b_U2语法"},{"s":"My ___ always tells me to believe in myself. I really value her advice.","o":["A. should","B. suffer","C. herself","D. dentist"],"a":"D","e":"物主代词her暗示女性角色。牙医。","t":"📋 rj8b_U2逻辑"},{"s":"The doctor gave me some ___ for my cough and said I should rest.","o":["A. test","B. pill","C. medicine","D. fever"],"a":"C","e":"medicine 药。take medicine 服药。","t":"📋 rj8b_U2词汇"},{"s":"___ I take this medicine before or after meals?","o":["A. Must","B. Should","C. Need","D. Could"],"a":"B","e":"Should I...? 询问建议。","t":"📋 rj8b_U2语法"},{"s":"We ___ throw rubbish into the river. It pollutes the water.","o":["A. can't to","B. shouldn't","C. must","D. should"],"a":"B","e":"shouldn't 表示\"不应该\"，用于否定建议。","t":"📋 rj8b_U2语法"},{"s":"He caught a bad ___ and had to miss a whole week of school.","o":["A. fever","B. flu","C. cough","D. cold"],"a":"B","e":"flu 流感。catch a flu 得流感。","t":"📋 rj8b_U2词汇"},{"s":"She ___ better not eat that — it's been sitting in the fridge for a week.","o":["A. had","B. would","C. should","D. could"],"a":"A","e":"had better not do 最好不要做。","t":"📋 rj8b_U2语法"},{"s":"He ___ better take the medicine on time if he wants to get better soon.","o":["A. would","B. could","C. should","D. had"],"a":"D","e":"had better do 最好做某事。常用于给出强烈建议。","t":"📋 rj8b_U2语法"},{"s":"You ___ ask your teacher for help if you don't understand the grammar point.","o":["A. could","B. must","C. need","D. have to"],"a":"A","e":"could 用于给出建议\"可以……\"。","t":"📋 rj8b_U2语法"},{"s":"His throat was ___ from shouting too much at the football game.","o":["A. weak","B. sore","C. runny","D. painful"],"a":"B","e":"sore 疼痛的。sore throat 喉咙痛。","t":"📋 rj8b_U2词汇"},{"s":"The children worked together to ___ the classroom after the party was over.","o":["A. yourselves","B. should","C. medicine","D. clear"],"a":"D","e":"上下文暗示清洁类动词。clear。","t":"📋 rj8b_U2逻辑"},{"s":"— I can't sleep well at night. What ___ I do?\n— You ___ try drinking warm milk before bed.","o":["A. should; should","B. could; could","C. need; need","D. must; must"],"a":"A","e":"should 用于询问和给出建议。","t":"📋 rj8b_U2语法"},{"s":"— I'm bored at home alone.\n— You ___ call your friends and invite them over.","o":["A. need","B. must","C. could","D. have to"],"a":"C","e":"could 用于回应对方，给出建议。","t":"📋 rj8b_U2语法"},{"s":"Don't worry about us. We can take care of ___.","o":["A. yourselves","B. ourselves","C. himself","D. themselves"],"a":"B","e":"take care of ourselves 照顾我们自己。","t":"📋 rj8b_U2语法"},{"s":"The doctor said my ___ was not serious, but I should still rest for a day.","o":["A. hurt","B. health","C. obesity","D. yourselves"],"a":"B","e":"上下文暗示身体部位/健康问题 → 下义词。健康。","t":"📋 rj8b_U2逻辑"},{"s":"He tried to hide his ___ after losing the competition, but his eyes gave it away.","o":["A. anxiety","B. himself","C. herself","D. sore"],"a":"A","e":"语境暗示负面情绪名词 → 下义词。焦虑。","t":"📋 rj8b_U2逻辑"},{"s":"The little boy is too young to look after ___.","o":["A. yourself","B. herself","C. itself","D. himself"],"a":"D","e":"look after himself 照顾他自己。boy → himself。","t":"📋 rj8b_U2语法"},{"s":"She has a high ___ and needs to stay in bed for a couple of days.","o":["A. fever","B. flu","C. pain","D. cough"],"a":"A","e":"fever 发烧。high fever 高烧。","t":"📋 rj8b_U2词汇"},{"s":"I woke up with a terrible ___ this morning and my mother took me to the doctor.","o":["A. headache","B. infection","C. anxiety","D. pain"],"a":"A","e":"上义词 health problem → 下义词具体症状。头痛。","t":"📋 rj8b_U2逻辑"},{"s":"You ___ better take an umbrella with you. It looks like it's going to rain.","o":["A. would","B. had","C. should","D. could"],"a":"B","e":"had better do sth 最好做某事。","t":"📋 rj8b_U2语法"},{"s":"If you have a ___, you should go to the dentist as soon as possible.","o":["A. stomachache","B. toothache","C. headache","D. backache"],"a":"B","e":"toothache 牙痛。dentist提示看牙医。","t":"📋 rj8b_U2词汇"},{"s":"She taught ___ how to play the guitar from online videos.","o":["A. herself","B. himself","C. itself","D. yourself"],"a":"A","e":"teach oneself 自学。herself 她自己。","t":"📋 rj8b_U2语法"},{"s":"We enjoyed ___ very much at the beach party last weekend.","o":["A. ourselves","B. themselves","C. myself","D. yourselves"],"a":"A","e":"enjoy ourselves 玩得开心。We → ourselves。","t":"📋 rj8b_U2语法"},{"s":"The ___ said I need to brush my teeth more carefully.","o":["A. patient","B. doctor","C. dentist","D. visitor"],"a":"C","e":"dentist 牙科医生。","t":"📋 rj8b_U2词汇"},{"s":"The ___ I ordered online arrived today. It was even better than I expected.","o":["A. bleed","B. sore","C. pressure","D. hurt"],"a":"C","e":"it指代空格物品。压力。","t":"📋 rj8b_U2逻辑"},{"s":"The doctor asked the ___ to take the medicine three times a day.","o":["A. doctor","B. patient","C. dentist","D. visitor"],"a":"B","e":"patient 病人。","t":"📋 rj8b_U2词汇"},{"s":"The doctor told me to take the ___ three times a day after meals.","o":["A. suffer","B. health","C. treatment","D. infection"],"a":"C","e":"语境暗示药物/治疗。治疗。","t":"📋 rj8b_U2逻辑"},{"s":"She has a ___ nose and has been sneezing all morning.","o":["A. weak","B. runny","C. painful","D. sore"],"a":"B","e":"runny 流鼻涕的。runny nose 流鼻涕。","t":"📋 rj8b_U2词汇"},{"s":"— What should I get for my mother's birthday?\n— You ___ buy her a warm scarf. She loves wearing scarves.","o":["A. must","B. have to","C. need","D. could"],"a":"D","e":"could 可以，用于委婉建议。","t":"📋 rj8b_U2语法"},{"s":"She ___ take a short break after studying for two hours without rest.","o":["A. should","B. must to","C. needs to be","D. could to"],"a":"A","e":"should 表示建议。","t":"📋 rj8b_U2语法"},{"s":"My ___ hurts — I think I ate too much ice cream.","o":["A. stomach","B. elbow","C. throat","D. cheek"],"a":"A","e":"stomach 胃；腹部。","t":"📋 rj8b_U2词汇"},{"s":"My ___ told me an interesting story before I went to sleep. I love her so much.","o":["A. symptom","B. stress","C. bleed","D. patient"],"a":"D","e":"her/she指代空格（女性）。病人。","t":"📋 rj8b_U2逻辑"},{"s":"Children ___ drink coffee — it's not good for their growing bodies.","o":["A. needn't to","B. mustn't to","C. shouldn't","D. should"],"a":"C","e":"shouldn't 表示不应该，比mustn't语气委婉。","t":"📋 rj8b_U2语法"},{"s":"You ___ try reading before bed. It might help you fall asleep faster.","o":["A. could","B. have to","C. need","D. must"],"a":"A","e":"could + 动词原形表示建议\"可以试试\"，语气比should委婉。","t":"📋 rj8b_U2语法"},{"s":"The doctor sent him for an ___ to check if the bone was broken.","o":["A. X-ray","B. pill","C. test","D. medicine"],"a":"A","e":"X-ray X射线检查。","t":"📋 rj8b_U2词汇"},{"s":"Help ___ to some cake, everyone. There's plenty more.","o":["A. yourselves","B. themselves","C. ourselves","D. yourself"],"a":"A","e":"help yourselves 随便吃/用。everyone → 复数 yourselves。","t":"📋 rj8b_U2语法"},{"s":"You ___ stay up too late the night before an important exam.","o":["A. mustn't to","B. should","C. don't need","D. shouldn't"],"a":"D","e":"shouldn't 表示不应该做某事。","t":"📋 rj8b_U2语法"},{"s":"We ___ ignore the doctor's advice about getting enough sleep.","o":["A. should","B. shouldn't","C. mustn't to","D. don't need"],"a":"B","e":"shouldn't ignore 不应该忽视。","t":"📋 rj8b_U2语法"}]},"rj8b_U3":{"id":"rj8b_U3","n":"U3 · Growing Up","d":"连词 although, until, so that · 23词 · 43题","dd":"连词 although, until, so that","ps":35,"q":[{"s":"He decided to go on the school trip ___ his parents were worried about his safety.","o":["A. although","B. until","C. unless","D. so that"],"a":"A","e":"although 尽管（= even though）。","t":"📋 rj8b_U3语法"},{"s":"She kept practicing the piano ___ she was very tired.","o":["A. unless","B. so that","C. although","D. until"],"a":"C","e":"although 虽然（可与though互换，although更正式）。","t":"📋 rj8b_U3语法"},{"s":"Write down the new words in your notebook ___ you can review them later.","o":["A. until","B. although","C. so that","D. so...that"],"a":"C","e":"so that 表示目的\"为了\"。","t":"📋 rj8b_U3语法"},{"s":"I ___ understand the meaning of the story ___ I read it a second time.","o":["A. don't; so that","B. didn't; until","C. won't; until","D. didn't; although"],"a":"B","e":"not...until 直到第二次读才理解。","t":"📋 rj8b_U3语法"},{"s":"She took notes carefully in class ___ she could review them before the exam.","o":["A. although","B. until","C. so that","D. unless"],"a":"C","e":"so that 以便。注意与so...that（如此……以至于）的区别。","t":"📋 rj8b_U3语法"},{"s":"She didn't realize her mistake ___ her teacher pointed it out.","o":["A. so that","B. until","C. unless","D. although"],"a":"B","e":"not...until 直到……才意识到。","t":"📋 rj8b_U3语法"},{"s":"My parents ___ let me go out ___ I cleaned my room.","o":["A. didn't; although","B. didn't; until","C. don't; unless","D. won't; so that"],"a":"B","e":"not...until 直到打扫完才让出去。","t":"📋 rj8b_U3语法"},{"s":"He tried to hide his ___ after losing the competition, but his eyes gave it away.","o":["A. so that","B. upset","C. coach","D. anger"],"a":"D","e":"语境暗示负面情绪名词 → 下义词。anger。","t":"📋 rj8b_U3逻辑"},{"s":"The little boy was crying because he had lost his favourite ___.","o":["A. ring","B. fault","C. didn't","D. apologize"],"a":"A","e":"丢失的物品→语境暗示具体物件。ring。","t":"📋 rj8b_U3逻辑"},{"s":"___ he is only twelve, he can take care of his younger sister very well.","o":["A. Until","B. Although","C. So that","D. As soon as"],"a":"B","e":"Although + 从句，表示\"虽然……但是……\"。","t":"📋 rj8b_U3语法"},{"s":"She felt ___ when her best friend moved to another city.","o":["A. mad","B. upset","C. shocked","D. lonely"],"a":"D","e":"lonely 孤独的；寂寞的。","t":"📋 rj8b_U3词汇"},{"s":"Could you ___ me on which after-school club would be best?","o":["A. forgive","B. advise","C. apologize","D. control"],"a":"B","e":"advise 建议；劝告。advise sb on sth 就某事给某人建议。","t":"📋 rj8b_U3词汇"},{"s":"It wasn't my ___ that the vase broke — the cat knocked it over.","o":["A. emotion","B. anger","C. solution","D. fault"],"a":"D","e":"fault 过错；责任。It's not my fault 不是我的错。","t":"📋 rj8b_U3词汇"},{"s":"She felt a mix of ___ — happy, sad, and nervous all at once.","o":["A. emotions","B. angers","C. faults","D. solutions"],"a":"A","e":"emotion 情绪；情感。","t":"📋 rj8b_U3词汇"},{"s":"He didn't understand the question at all, so he felt ___ when the teacher called his name.","o":["A. coach","B. pressure","C. so that","D. shocked"],"a":"D","e":"so表因果：不懂问题→被叫时的感受。shocked。","t":"📋 rj8b_U3逻辑"},{"s":"He was completely ___ when he saw the birthday surprise.","o":["A. shocked","B. thankful","C. hurtful","D. negative"],"a":"A","e":"shocked 震惊的。","t":"📋 rj8b_U3词汇"},{"s":"Save some money each month ___ you'll have enough for the summer trip.","o":["A. so that","B. although","C. unless","D. until"],"a":"A","e":"so that 引导目的状语。","t":"📋 rj8b_U3语法"},{"s":"Before you travel to another country, make sure your ___ is still valid.","o":["A. pressure","B. thankful","C. apologize","D. don't"],"a":"A","e":"旅行必备物品。pressure。","t":"📋 rj8b_U3逻辑"},{"s":"He was really ___ when he found out his friends went without him.","o":["A. shocked","B. upset","C. lonely","D. mad"],"a":"B","e":"upset 难过的；沮丧的。","t":"📋 rj8b_U3词汇"},{"s":"She was deeply ___ for all the support her teachers had given her.","o":["A. thankful","B. gentle","C. willing","D. joyful"],"a":"A","e":"thankful 感谢的；感激的。","t":"📋 rj8b_U3词汇"},{"s":"She got up early ___ she could catch the first bus to school.","o":["A. so that","B. although","C. unless","D. until"],"a":"A","e":"so that 以便/为了（引导目的状语从句）。","t":"📋 rj8b_U3语法"},{"s":"I asked my mother for a ___, and she gave it to me with a warm smile.","o":["A. until","B. so that","C. although","D. present"],"a":"D","e":"it指代空格，说明是物品。present。","t":"📋 rj8b_U3逻辑"},{"s":"It takes strength to ___ someone who has hurt you.","o":["A. forgive","B. apologize","C. control","D. advise"],"a":"A","e":"forgive 原谅；宽恕。不规则：forgave, forgiven。","t":"📋 rj8b_U3词汇"},{"s":"I want to ___ for what I said — it was wrong and I'm sorry.","o":["A. apologize","B. forgive","C. control","D. advise"],"a":"A","e":"apologize 道歉。apologize for 为……道歉。","t":"📋 rj8b_U3词汇"},{"s":"We should learn to ___ our screen time so it doesn't take over our lives.","o":["A. control","B. ring","C. coach","D. so that"],"a":"A","e":"语境暗示\"控制/限制\"类动词。control。","t":"📋 rj8b_U3逻辑"},{"s":"My ___ told me an interesting story before I went to sleep. I love her so much.","o":["A. present","B. didn't","C. coach","D. although"],"a":"C","e":"her/she指代空格（女性）。coach。","t":"📋 rj8b_U3逻辑"},{"s":"Keep going straight ___ you see a red building on your left.","o":["A. although","B. so that","C. unless","D. until"],"a":"D","e":"until 直到……（引导时间状语）。","t":"📋 rj8b_U3语法"},{"s":"A true friend is someone you can always ___ no matter what happens.","o":["A. forgive","B. emotions","C. although","D. ring"],"a":"A","e":"人际关系类动词。原谅。","t":"📋 rj8b_U3逻辑"},{"s":"___ the old man lives alone, he never feels lonely.","o":["A. Until","B. Unless","C. So that","D. Although"],"a":"D","e":"Although 引导让步从句。","t":"📋 rj8b_U3语法"},{"s":"The little boy ___ stop crying ___ he saw his mother.","o":["A. didn't; until","B. did; until","C. doesn't; although","D. won't; so that"],"a":"A","e":"not...until 直到……才。","t":"📋 rj8b_U3语法"},{"s":"He didn't go to bed ___ he finished all his homework.","o":["A. although","B. until","C. unless","D. so that"],"a":"B","e":"not...until 直到……才。","t":"📋 rj8b_U3语法"},{"s":"___ it was raining hard, they still went to school on time.","o":["A. Until","B. So that","C. Unless","D. Although"],"a":"D","e":"Although 虽然/尽管，引导让步状语从句。不与but连用。","t":"📋 rj8b_U3语法"},{"s":"The ___ I ordered online arrived today. It was even better than I expected.","o":["A. so that","B. ring","C. solution","D. present"],"a":"C","e":"it指代空格物品。solution。","t":"📋 rj8b_U3逻辑"},{"s":"___ English is difficult, I won't give up learning it.","o":["A. Until","B. As soon as","C. Although","D. Unless"],"a":"C","e":"Although 虽然，引导从句。","t":"📋 rj8b_U3语法"},{"s":"Learning to ___ your anger is an important part of growing up.","o":["A. manage","B. express","C. control","D. advise"],"a":"C","e":"control 控制。control anger 控制愤怒。","t":"📋 rj8b_U3词汇"},{"s":"We need to find a ___ to this problem before it gets any worse.","o":["A. fault","B. solution","C. anger","D. emotion"],"a":"B","e":"solution 解决办法。","t":"📋 rj8b_U3词汇"},{"s":"He spoke slowly and clearly ___ everyone could understand him.","o":["A. so that","B. although","C. unless","D. until"],"a":"A","e":"so that + 从句表示\"以便……\"。","t":"📋 rj8b_U3语法"},{"s":"We won't start the meeting ___ everyone is here.","o":["A. although","B. so that","C. until","D. unless"],"a":"C","e":"until 直到……才。not...until。","t":"📋 rj8b_U3语法"},{"s":"___ my grandfather is over 70, he still exercises every morning.","o":["A. Although","B. As soon as","C. Until","D. So that"],"a":"A","e":"Although + 从句表示虽然。注意：Although和but不能同时用。","t":"📋 rj8b_U3语法"},{"s":"It's better to stay positive than to let ___ thoughts take over.","o":["A. gentle","B. thankful","C. joyful","D. negative"],"a":"D","e":"negative 消极的。","t":"📋 rj8b_U3词汇"},{"s":"I waited for my friend ___ it got dark, but she never showed up.","o":["A. although","B. so that","C. until","D. unless"],"a":"C","e":"until 直到……（表示动作持续到某个时间点）。","t":"📋 rj8b_U3语法"},{"s":"We ___ realize how much we had grown ___ we looked at old photos.","o":["A. didn't; until","B. won't; so that","C. don't; unless","D. didn't; although"],"a":"A","e":"not...until 直到看老照片才意识到。","t":"📋 rj8b_U3语法"},{"s":"You ___ know the value of health ___ you lose it.","o":["A. won't; although","B. don't; unless","C. don't; until","D. didn't; so that"],"a":"C","e":"not...until 直到失去才知道。","t":"📋 rj8b_U3语法"}]},"rj8b_U4":{"id":"rj8b_U4","n":"U4 · The Wonders of Nature","d":"形容词/副词比较级与最高级复习; 大数字表达 · 33词 · 47题","dd":"形容词/副词比较级与最高级复习; 大数字表达","ps":35,"q":[{"s":"Every morning, my grandfather takes a walk in the ___ near our home.","o":["A. cliff","B. kilometres","C. taller","D. risky"],"a":"A","e":"语境暗示户外场所。悬崖。","t":"📋 rj8b_U4逻辑"},{"s":"After dinner, I helped my mother wash the dishes in the ___.","o":["A. bottom","B. ladder","C. depth","D. survive"],"a":"A","e":"语境暗示家庭场所。底部。","t":"📋 rj8b_U4逻辑"},{"s":"She sings ___ than any other girl in the school choir.","o":["A. beautifuller","B. beautifully","C. more beautifully","D. most beautifully"],"a":"C","e":"多音节副词比较级：more + 副词 + than。","t":"📋 rj8b_U4语法"},{"s":"Mount Qomolangma is about 8,848 ___ high.","o":["A. miles","B. kilometres","C. thousand","D. metres"],"a":"D","e":"8,848 metres high 具体高度。","t":"📋 rj8b_U4语法"},{"s":"My younger sister is getting ___ every year. Soon she'll be as tall as me.","o":["A. taller","B. tallest","C. tall","D. more tall"],"a":"A","e":"单音节比较级：tall → taller。","t":"📋 rj8b_U4语法"},{"s":"The train is ___ than the bus, but it's also more expensive.","o":["A. fast","B. fastest","C. more fast","D. faster"],"a":"D","e":"单音节比较级：fast → faster。","t":"📋 rj8b_U4语法"},{"s":"Only a small number of people managed to ___ the terrible earthquake.","o":["A. measure","B. dive","C. survive","D. wonder"],"a":"C","e":"survive 生存；存活。","t":"📋 rj8b_U4词汇"},{"s":"From the top of the mountain, the town ___ looked like a tiny model.","o":["A. outside","B. above","C. below","D. inside"],"a":"C","e":"below 在……下面。","t":"📋 rj8b_U4词汇"},{"s":"___ of people visit the Great Wall every single year.","o":["A. Two million","B. The million","C. Million","D. Millions"],"a":"D","e":"Millions of 成百上千万的。millions of + 名词。","t":"📋 rj8b_U4语法"},{"s":"Niagara Falls is a world-famous ___ on the border of two countries.","o":["A. surface","B. waterfall","C. desert","D. bottom"],"a":"B","e":"waterfall 瀑布。","t":"📋 rj8b_U4词汇"},{"s":"The Yellow River is the second ___ river in China.","o":["A. long","B. most long","C. longer","D. longest"],"a":"D","e":"the + 序数词 + 最高级表示\"第几……\"。","t":"📋 rj8b_U4语法"},{"s":"This problem is ___ than the last one. I can't solve it alone.","o":["A. difficult","B. more difficult","C. most difficult","D. difficulter"],"a":"B","e":"多音节词比较级：more + difficult。","t":"📋 rj8b_U4语法"},{"s":"We need to ___ the room carefully before we buy any furniture.","o":["A. dive","B. measure","C. survive","D. wonder"],"a":"B","e":"measure 测量。","t":"📋 rj8b_U4词汇"},{"s":"We spent the whole afternoon at the ___ near the river. It is the best place in town.","o":["A. unusual","B. distance","C. high","D. waterfall"],"a":"D","e":"it指代场所。瀑布。","t":"📋 rj8b_U4逻辑"},{"s":"There are over eight ___ people living in this city.","o":["A. millions of","B. millions","C. million of","D. million"],"a":"D","e":"eight million 具体数字 + million（不加s，不加of）。","t":"📋 rj8b_U4语法"},{"s":"The ___ I ordered online arrived today. It was even better than I expected.","o":["A. ladder","B. billion","C. million","D. taller"],"a":"A","e":"it指代空格物品。ladder。","t":"📋 rj8b_U4逻辑"},{"s":"He got ___ score in the whole grade on the final exam.","o":["A. higher","B. high","C. the most high","D. the highest"],"a":"D","e":"最高级：the + highest。","t":"📋 rj8b_U4语法"},{"s":"The bridge cost over two ___ dollars to build.","o":["A. hundreds","B. hundred","C. hundred of","D. hundreds of"],"a":"B","e":"two hundred 具体数字 + hundred（不加s）。","t":"📋 rj8b_U4语法"},{"s":"My ___ told me an interesting story before I went to sleep. I love her so much.","o":["A. kilometres","B. climber","C. survive","D. high"],"a":"B","e":"her/she指代空格（女性）。climber。","t":"📋 rj8b_U4逻辑"},{"s":"My grandfather walks ___ than he did five years ago.","o":["A. most slowly","B. slowlier","C. more slowly","D. slowly"],"a":"C","e":"副词比较级：more + 副词 + than。","t":"📋 rj8b_U4语法"},{"s":"The ___ from my home to school is about three kilometers.","o":["A. mile","B. surface","C. distance","D. depth"],"a":"C","e":"distance 距离。","t":"📋 rj8b_U4词汇"},{"s":"The hikers had to ___ for three hours through the heavy rain to reach camp.","o":["A. walk","B. swim","C. fly","D. dive"],"a":"A","e":"walk 徒步行走。","t":"📋 rj8b_U4词汇"},{"s":"She runs ___ than anyone else in her class.","o":["A. fast","B. fastest","C. more fast","D. faster"],"a":"D","e":"单音节形容词比较级：adj + er。","t":"📋 rj8b_U4语法"},{"s":"China has a population of more than 1.4 ___.","o":["A. billions","B. billion","C. million","D. millions"],"a":"B","e":"1.4 billion 14亿。具体数字+billion（不加s）。","t":"📋 rj8b_U4语法"},{"s":"The film today was ___ than the one we saw last week.","o":["A. exciting","B. excitng","C. most exciting","D. more exciting"],"a":"D","e":"多音节比较级：more + adj + than。","t":"📋 rj8b_U4语法"},{"s":"That was ___ movie I have ever seen. I almost fell asleep.","o":["A. boring","B. the boringest","C. more boring","D. the most boring"],"a":"D","e":"多音节最高级：the most + adj。","t":"📋 rj8b_U4语法"},{"s":"This is one of ___ cities I have ever visited.","o":["A. the more beautiful","B. more beautiful","C. beautiful","D. the most beautiful"],"a":"D","e":"one of the + 最高级 + 名词复数。","t":"📋 rj8b_U4语法"},{"s":"It is quite ___ to see snow in this part of the country in April.","o":["A. cubic","B. northern","C. unusual","D. historical"],"a":"C","e":"unusual 不寻常的。","t":"📋 rj8b_U4词汇"},{"s":"The Yangtze River is about 6,300 ___ long.","o":["A. kilometres","B. millions","C. thousands","D. hundreds"],"a":"A","e":"6,300 kilometres 具体数字。注意kilometre用复数。","t":"📋 rj8b_U4语法"},{"s":"The weather today is even ___ than it was yesterday.","o":["A. more bad","B. bad","C. worse","D. worst"],"a":"C","e":"bad的比较级不规则：worse。","t":"📋 rj8b_U4语法"},{"s":"This summer is ___ than last summer. We need the air conditioner every day.","o":["A. hottest","B. hot","C. more hot","D. hotter"],"a":"D","e":"单音节比较级双写末尾辅音：hot → hotter。","t":"📋 rj8b_U4语法"},{"s":"He dreams of becoming a mountain ___ and climbing the world's highest peaks.","o":["A. visitor","B. instructor","C. diver","D. climber"],"a":"D","e":"climber 攀登者；登山者。","t":"📋 rj8b_U4词汇"},{"s":"After dinner, I helped my mother wash the dishes in the ___.","o":["A. billion","B. millions","C. more fluently","D. cliff"],"a":"D","e":"语境暗示家庭场所。悬崖。","t":"📋 rj8b_U4逻辑"},{"s":"This is ___ decision I have ever made in my life.","o":["A. the importantest","B. more important","C. the most important","D. important"],"a":"C","e":"多音节最高级：the :"单音节最高级：the + adj + est。","t":"📋 rj8b_U4语法"},{"s":"Of all the seasons, winter is the ___ one for me.","o":["A. most cold","B. coldest","C. colder","D. cold"],"a":"B","e":"单音节最高级：the + adj + est。","t":"📋 rj8b_U4语法"},{"s":"The ___ I ordered online arrived today. It was even better than I expected.","o":["A. depth","B. thousands","C. desert","D. ladder"],"a":"D","e":"it指代空格物品。ladder。","t":"📋 rj8b_U4逻辑"}]},"rj8b_U5":{"id":"rj8b_U5","n":"U5 · Nature's Temper","d":"过去进行时 was/were doing · 40词 · 51题","dd":"过去进行时 was/were doing","ps":35,"q":[{"s":"He ___ attention during the lesson. He was looking out the window.","o":["A. doesn't pay","B. didn't pay","C. hasn't paid","D. wasn't paying"],"a":"D","e":"过去进行时否定，表示当时不在注意听讲。","t":"📋 rj8b_U5语法"},{"s":"The ___ I ordered online arrived today. It was even better than I expected.","o":["A. truck","B. was","C. was taking","D. were having"],"a":"A","e":"it指代空格物品。truck。","t":"📋 rj8b_U5逻辑"},{"s":"What ___ you ___ at this time last Sunday morning?","o":["A. did; do","B. have; done","C. are; doing","D. were; doing"],"a":"D","e":"at this time last Sunday 过去具体时间，用过去进行时。","t":"📋 rj8b_U5语法"},{"s":"She ___ a novel in her room when she heard a strange noise outside.","o":["A. was reading","B. is reading","C. has read","D. read"],"a":"A","e":"was reading when she heard... 过去进行时 + when + 一般过去时。","t":"📋 rj8b_U5语法"},{"s":"A terrible ___ hit the small village last summer, destroying many houses.","o":["A. flood","B. beat","C. roof","D. were"],"a":"A","e":"上义词 disaster → 下义词具体灾害。洪水。","t":"📋 rj8b_U5逻辑"},{"s":"The forest ___ destroyed over 5,000 hectares of land before it was put out.","o":["A. tsunami","B. earthquake","C. tornado","D. wildfire"],"a":"D","e":"wildfire 野火。wild + fire。","t":"📋 rj8b_U5词汇"},{"s":"A huge ___ hit the coast, destroying hundreds of homes near the beach.","o":["A. tsunami","B. tornado","C. typhoon","D. landslide"],"a":"A","e":"tsunami 海啸。","t":"📋 rj8b_U5词汇"},{"s":"The ___ I ordered online arrived today. It was even better than I expected.","o":["A. truck","B. rescue","C. beat","D. typhoon"],"a":"A","e":"it指代空格物品。truck。","t":"📋 rj8b_U5逻辑"},{"s":"She ___ when the alarm went off — she was already awake.","o":["A. hasn't slept","B. wasn't sleeping","C. didn't sleep","D. doesn't sleep"],"a":"B","e":"过去进行时否定：was/were + not + doing。","t":"📋 rj8b_U5语法"},{"s":"___ it still ___ when you left the office?","o":["A. Is; raining","B. Has; rained","C. Did; rain","D. Was; raining"],"a":"D","e":"过去进行时疑问句：Was it raining...?","t":"📋 rj8b_U5语法"},{"s":"Loud ___ and bright lightning filled the sky during the summer storm.","o":["A. wave","B. thunder","C. froth","D. alarm"],"a":"B","e":"thunder 雷；雷声。","t":"📋 rj8b_U5词汇"},{"s":"While I ___ for the bus, I saw the accident happen.","o":["A. was waiting","B. am waiting","C. have waited","D. waited"],"a":"A","e":"while从句用过去进行时。","t":"📋 rj8b_U5语法"},{"s":"Before you travel to another country, make sure your ___ is still valid.","o":["A. roof","B. was listening","C. were having","D. was blowing"],"a":"A","e":"旅行必备物品。roof。","t":"📋 rj8b_U5逻辑"},{"s":"My ___ always tells me to believe in myself. I really value her advice.","o":["A. volunteer","B. was doing","C. was","D. were having"],"a":"A","e":"物主代词her暗示女性角色。志愿者。","t":"📋 rj8b_U5逻辑"},{"s":"She ___ to music when her mother asked her a question.","o":["A. is listening","B. was listening","C. listened","D. has listened"],"a":"B","e":"过去某一时刻正在进行的动作 + when 打断。","t":"📋 rj8b_U5语法"},{"s":"We spent the whole afternoon at the ___ near the river. It is the best place in town.","o":["A. was sleeping","B. neighbourhood","C. scream","D. wasn't sleeping"],"a":"B","e":"it指代场所。neighbourhood。","t":"📋 rj8b_U5逻辑"},{"s":"She let out a loud ___ when she saw the snake in the garden.","o":["A. alarm","B. wave","C. thunder","D. scream"],"a":"D","e":"scream 尖叫。","t":"📋 rj8b_U5词汇"},{"s":"The strong wind ___ against the windows all through the night.","o":["A. scream","B. beat","C. warn","D. rescue"],"a":"B","e":"beat 敲；打。不规则：beat, beaten。","t":"📋 rj8b_U5词汇"},{"s":"What ___ your sister ___ when you got home yesterday?","o":["A. has; done","B. is; doing","C. was; doing","D. did; do"],"a":"C","e":"when you got home 是过去的某个时间点。","t":"📋 rj8b_U5语法"},{"s":"Firefighters worked through the night to ___ people trapped in the building.","o":["A. scream","B. warn","C. beat","D. rescue"],"a":"D","e":"rescue 救援；营救。","t":"📋 rj8b_U5词汇"},{"s":"While the band ___ on stage, all the lights suddenly went out.","o":["A. has performed","B. performed","C. is performing","D. was performing"],"a":"D","e":"was performing while... 过去进行时描述背景场景。","t":"📋 rj8b_U5语法"},{"s":"The teacher came in while we ___ about the weekend plans.","o":["A. have talked","B. were talking","C. are talking","D. talked"],"a":"B","e":"was/were + doing 过去某一时刻正进行的动作。","t":"📋 rj8b_U5语法"},{"s":"We ___ a picnic in the park when it suddenly began to pour.","o":["A. had","B. have had","C. were having","D. are having"],"a":"C","e":"were having when it began to pour。","t":"📋 rj8b_U5语法"},{"s":"We spent the whole afternoon at the ___ near the river. It is the best place in town.","o":["A. neighbourhood","B. having","C. were running","D. volunteer"],"a":"A","e":"it指代场所。neighbourhood。","t":"📋 rj8b_U5逻辑"},{"s":"During the heavy ___, the school cancelled all outdoor activities.","o":["A. heatwave","B. snowstorm","C. rainstorm","D. wildfire"],"a":"B","e":"snowstorm 暴风雪。snow + storm。","t":"📋 rj8b_U5词汇"},{"s":"The teacher ___ the grammar point on the board while we took notes.","o":["A. was explaining","B. is explaining","C. has explained","D. explained"],"a":"A","e":"was explaining while... 过去进行时表示背景动作。","t":"📋 rj8b_U5语法"},{"s":"They ___ a maths lesson at 10 am last Monday.","o":["A. had","B. are having","C. were having","D. have had"],"a":"C","e":"at 10 am last Monday 过去具体时间点。","t":"📋 rj8b_U5语法"},{"s":"The loud ___ woke everyone in the village at three in the morning.","o":["A. thunder","B. alarm","C. wave","D. scream"],"a":"B","e":"alarm 警报。","t":"📋 rj8b_U5词汇"},{"s":"The long ___ caused all the crops in the field to die from lack of water.","o":["A. wildfire","B. drought","C. landslide","D. flood"],"a":"B","e":"drought 旱灾；干旱。","t":"📋 rj8b_U5词汇"},{"s":"She ___ a book when the lights suddenly went out.","o":["A. has read","B. was reading","C. read","D. is reading"],"a":"B","e":"when打断：长动作（过去进行时）+ when + 短动作（一般过去时）。","t":"📋 rj8b_U5语法"},{"s":"The students ___ loudly when the teacher walked into the classroom.","o":["A. were talking","B. talked","C. are talking","D. have talked"],"a":"A","e":"when打断：were talking when the teacher walked in。","t":"📋 rj8b_U5语法"},{"s":"My mum ___ dinner in the kitchen while I was finishing my maths homework.","o":["A. has cooked","B. was cooking","C. is cooking","D. cooked"],"a":"B","e":"was cooking while... 两个过去动作同时进行。","t":"📋 rj8b_U5语法"},{"s":"At 7 o'clock this morning, she ___ breakfast with her family.","o":["A. has eaten","B. ate","C. was eating","D. is eating"],"a":"C","e":"at 7 o'clock this morning 过去时间点，用过去进行时。","t":"📋 rj8b_U5语法"},{"s":"Before you travel to another country, make sure your ___ is still valid.","o":["A. roof","B. were talking","C. was walking","D. was taking"],"a":"A","e":"旅行必备物品。roof。","t":"📋 rj8b_U5逻辑"},{"s":"They ___ basketball on the school playground when it began to rain heavily.","o":["A. were playing","B. have played","C. are playing","D. played"],"a":"A","e":"were playing when... 过去进行时被打断。","t":"📋 rj8b_U5语法"},{"s":"My ___ always tells me to believe in myself. I really value her advice.","o":["A. wasn't paying","B. was listening","C. relative","D. was"],"a":"C","e":"物主代词her暗示女性角色。relative。","t":"📋 rj8b_U5逻辑"},{"s":"My mother was cooking dinner while my father ___ the house.","o":["A. was cleaning","B. is cleaning","C. has cleaned","D. cleaned"],"a":"A","e":"while表示两个动作并行，都用过去进行时。","t":"📋 rj8b_U5语法"},{"s":"The wind ___ hard when the old tree finally fell down.","o":["A. is blowing","B. was blowing","C. has blown","D. blew"],"a":"B","e":"过去进行时描述\"正在吹\"的背景动作。","t":"📋 rj8b_U5语法"},{"s":"People ___ for safety while the storm was getting closer.","o":["A. have run","B. are running","C. ran","D. were running"],"a":"D","e":"while + 两个过去进行时表示同时进行的动作。","t":"📋 rj8b_U5语法"},{"s":"What ___ you ___ at 8 o'clock last night?","o":["A. were; doing","B. did; do","C. are; doing","D. have; done"],"a":"A","e":"过去具体时间点 at 8 o'clock last night，用过去进行时。","t":"📋 rj8b_U5语法"},{"s":"My ___ told me an interesting story before I went to sleep. I love her so much.","o":["A. relative","B. volunteer","C. rescue","D. earthquake"],"a":"A","e":"her/she指代空格（女性）。relative。","t":"📋 rj8b_U5逻辑"},{"s":"We couldn't go to the park yesterday because a heavy ___ was falling.","o":["A. drought","B. was taking","C. volunteer","D. snowstorm"],"a":"D","e":"语境暗示自然天气现象。暴风雪。","t":"📋 rj8b_U5逻辑"},{"s":"At this time yesterday, I ___ an English test in the classroom.","o":["A. am taking","B. was taking","C. have taken","D. took"],"a":"B","e":"at this time yesterday 是过去具体时间，用过去进行时。","t":"📋 rj8b_U5语法"},{"s":"My ___ told me an interesting story before I went to sleep. I love her so much.","o":["A. was","B. was sleeping","C. was taking","D. volunteer"],"a":"D","e":"her/she指代空格（女性）。志愿者。","t":"📋 rj8b_U5逻辑"},{"s":"Heavy rain for three days caused a serious ___ in the river valley.","o":["A. drought","B. snowstorm","C. flood","D. wildfire"],"a":"C","e":"flood 洪水。","t":"📋 rj8b_U5词汇"},{"s":"Tourists were ___ to stay away from the beach because of the huge waves.","o":["A. warned","B. rescued","C. screamed","D. beaten"],"a":"A","e":"warn 警告。warn sb of sth 警告某人某事。","t":"📋 rj8b_U5词汇"},{"s":"While they ___ outside, it started to rain heavily.","o":["A. play","B. have played","C. played","D. were playing"],"a":"D","e":"while引导从句，两个动作同时进行。","t":"📋 rj8b_U5语法"},{"s":"I ___ an email to my pen pal when the Internet suddenly went down.","o":["A. wrote","B. have written","C. was writing","D. am writing"],"a":"C","e":"was writing when... 过去进行时 + when 打断。","t":"📋 rj8b_U5语法"},{"s":"I called you at noon but you didn't answer. ___ you ___ lunch?","o":["A. Are; having","B. Were; having","C. Did; have","D. Have; had"],"a":"B","e":"过去进行时疑问：Were/Was + 主语 + doing?","t":"📋 rj8b_U5语法"},{"s":"The ___ shook the whole city, and many old buildings collapsed.","o":["A. earthquake","B. typhoon","C. tsunami","D. tornado"],"a":"A","e":"earthquake 地震。earth + quake。","t":"📋 rj8b_U5词汇"},{"s":"At 9 last night, my father ___ the evening news in the living room.","o":["A. is watching","B. watched","C. has watched","D. was watching"],"a":"D","e":"at 9 last night 过去具体时间点，用过去进行时。","t":"📋 rj8b_U5语法"}]},"rj8b_U6":{"id":"rj8b_U6","n":"U6 · Crossing Cultures","d":"连词 so...that, unless, as soon as · 21词 · 42题","dd":"连词 so...that, unless, as soon as","ps":35,"q":[{"s":"The tourist was completely ___ by the subway map and got on the wrong train.","o":["A. confused","B. confusing","C. embarrassed","D. embarrassing"],"a":"A","e":"confused 困惑的（人的感受）。","t":"📋 rj8b_U6词汇"},{"s":"The music was ___ loud ___ we couldn't hear each other talking.","o":["A. such; that","B. so; that","C. very; that","D. too; to"],"a":"B","e":"so + adj + that。","t":"📋 rj8b_U6语法"},{"s":"She gently ___ her tired eyes and took a short break from reading.","o":["A. rubbed","B. shook","C. bumped","D. bowed"],"a":"A","e":"rub 摩擦；揉。","t":"📋 rj8b_U6词汇"},{"s":"The film was ___ interesting ___ I watched it three times.","o":["A. too; to","B. such; that","C. so; that","D. very; that"],"a":"C","e":"so + adj + that 如此……以至于。","t":"📋 rj8b_U6语法"},{"s":"I was ___ moved by the story ___ tears came to my eyes.","o":["A. very; that","B. such; that","C. too; to","D. so; that"],"a":"D","e":"so moved that... 如此感动以至于……。","t":"📋 rj8b_U6语法"},{"s":"In some countries, it is ___ to arrive a few minutes late for a dinner party.","o":["A. unless","B. such","C. fork","D. as soon as"],"a":"C","e":"语境暗示文化习俗特点。叉子。","t":"📋 rj8b_U6逻辑"},{"s":"I'll call you ___ I get home safely.","o":["A. so that","B. unless","C. as soon as","D. although"],"a":"C","e":"as soon as 一……就。主将从现。","t":"📋 rj8b_U6语法"},{"s":"In Japan, it's polite to ___ when you greet someone, rather than shake hands.","o":["A. bump","B. hug","C. bow","D. rub"],"a":"C","e":"bow 鞠躬。","t":"📋 rj8b_U6词汇"},{"s":"In many Western countries, people ___ hands when they meet someone for the first time.","o":["A. bump","B. rub","C. bow","D. shake"],"a":"D","e":"shake 握手。shake hands 握手。","t":"📋 rj8b_U6词汇"},{"s":"She started to cry ___ she heard the bad news.","o":["A. as soon as","B. unless","C. until","D. although"],"a":"A","e":"as soon as 一听到就哭了。","t":"📋 rj8b_U6语法"},{"s":"The instructions for the new game were so ___ that nobody understood what to do.","o":["A. confused","B. embarrassing","C. embarrassed","D. confusing"],"a":"D","e":"confusing 令人困惑的（事物属性）。-ing结尾修饰事物。","t":"📋 rj8b_U6词汇"},{"s":"The ___ I ordered online arrived today. It was even better than I expected.","o":["A. as soon as","B. fork","C. rubbed","D. correctly"],"a":"B","e":"it指代空格物品。叉子。","t":"📋 rj8b_U6逻辑"},{"s":"The baby won't fall asleep ___ you tell her a bedtime story.","o":["A. if","B. until","C. although","D. unless"],"a":"D","e":"unless = if...not。","t":"📋 rj8b_U6语法"},{"s":"The children ran to the door ___ they saw their father coming back.","o":["A. unless","B. as soon as","C. until","D. although"],"a":"B","e":"as soon as 一看到就跑了过去。","t":"📋 rj8b_U6语法"},{"s":"In some countries, it is ___ to arrive a few minutes late for a dinner party.","o":["A. correctly","B. rub","C. chopsticks","D. confused"],"a":"B","e":"语境暗示文化习俗特点。摩擦。","t":"📋 rj8b_U6逻辑"},{"s":"He accidentally ___ into an old friend at the shopping mall yesterday.","o":["A. bumped","B. shook","C. rubbed","D. bowed"],"a":"A","e":"bump 碰；撞。bump into 偶遇。","t":"📋 rj8b_U6词汇"},{"s":"In Japan, ___ is a common way to greet people instead of shaking hands.","o":["A. palm","B. shake","C. bow","D. bumped"],"a":"C","e":"上义词 greeting → 下义词具体礼仪。鞠躬。","t":"📋 rj8b_U6逻辑"},{"s":"Don't promise anything ___ you are completely sure you can do it.","o":["A. unless","B. if","C. although","D. until"],"a":"A","e":"unless 除非。Don't promise unless you're sure。","t":"📋 rj8b_U6语法"},{"s":"He didn't understand the question at all, so he felt ___ when the teacher called his name.","o":["A. confused","B. shake","C. kiss","D. chopsticks"],"a":"A","e":"so表因果：不懂问题→被叫时的感受。困惑的。","t":"📋 rj8b_U6逻辑"},{"s":"She was ___ tired ___ she fell asleep as soon as her head touched the pillow.","o":["A. such; that","B. so; that","C. very; that","D. too; that"],"a":"B","e":"so + adj + that 结果状语从句。","t":"📋 rj8b_U6语法"},{"s":"It is ___ how quickly children can learn to use a new language.","o":["A. embarrassing","B. confused","C. surprising","D. confusing"],"a":"C","e":"surprising 出人意料的。","t":"📋 rj8b_U6词汇"},{"s":"___ the bell rang, the students rushed out of the classroom.","o":["A. As soon as","B. Unless","C. So that","D. Although"],"a":"A","e":"As soon as 一……就……。","t":"📋 rj8b_U6语法"},{"s":"She felt really ___ when she forgot all her lines during the school play.","o":["A. embarrassed","B. confused","C. surprising","D. confusing"],"a":"A","e":"embarrassed 尴尬的（人的感受）。-ed结尾修饰人。","t":"📋 rj8b_U6词汇"},{"s":"___ it rains tomorrow, we'll go hiking as planned.","o":["A. If","B. Unless","C. Although","D. Until"],"a":"B","e":"Unless 除非。Unless it rains = If it doesn't rain。","t":"📋 rj8b_U6语法"},{"s":"Before you travel to another country, make sure your ___ is still valid.","o":["A. receive","B. chopstick","C. fork","D. correctly"],"a":"B","e":"旅行必备物品。筷子。","t":"📋 rj8b_U6逻辑"},{"s":"The math problem was ___ difficult ___ nobody in the class could solve it.","o":["A. so; that","B. such; that","C. too; to","D. very; that"],"a":"A","e":"so + adj + that 如此困难以至于没人能解。","t":"📋 rj8b_U6语法"},{"s":"___ you finish your homework, you can go out and play.","o":["A. So that","B. Unless","C. As soon as","D. Although"],"a":"C","e":"As soon as 主将从现。","t":"📋 rj8b_U6语法"},{"s":"You won't pass the exam ___ you study harder.","o":["A. until","B. unless","C. if","D. although"],"a":"B","e":"unless = if...not 除非/如果不。","t":"📋 rj8b_U6语法"},{"s":"It was ___ hot a day ___ we decided to go swimming.","o":["A. so; that","B. very; that","C. too; to","D. such; that"],"a":"A","e":"so + adj + a/an + 名词 + that。","t":"📋 rj8b_U6语法"},{"s":"In China, people traditionally use ___ to eat, not knives and forks.","o":["A. palms","B. chopsticks","C. forks","D. fists"],"a":"B","e":"chopstick 筷子。常以复数形式出现。","t":"📋 rj8b_U6词汇"},{"s":"It was ___ a beautiful sunset ___ everyone stopped to take photos.","o":["A. very; that","B. such; that","C. too; to","D. so; that"],"a":"B","e":"such + a/an + adj + 名词 + that。","t":"📋 rj8b_U6语法"},{"s":"He gave his mother a warm ___ before leaving for his first day at the new school.","o":["A. bump","B. kiss","C. hug","D. bow"],"a":"C","e":"hug 拥抱。give sb a hug 拥抱某人。","t":"📋 rj8b_U6词汇"},{"s":"She told ___ an interesting story ___ all the children listened quietly.","o":["A. so; that","B. very; that","C. too; to","D. such; that"],"a":"D","e":"such an interesting story that...。","t":"📋 rj8b_U6语法"},{"s":"The situation was ___, but everyone stayed calm and helped each other.","o":["A. confused","B. confusing","C. kiss","D. as soon as"],"a":"B","e":"but表转折，虽困难但冷静→空格是困难含义。confusing。","t":"📋 rj8b_U6逻辑"},{"s":"The little girl gave her grandmother a ___ on the cheek before running off.","o":["A. hug","B. bump","C. bow","D. kiss"],"a":"D","e":"kiss 亲吻。","t":"📋 rj8b_U6词汇"},{"s":"Before you travel to another country, make sure your ___ is still valid.","o":["A. surprising","B. rub","C. chopstick","D. rubbed"],"a":"C","e":"旅行必备物品。筷子。","t":"📋 rj8b_U6逻辑"},{"s":"He ran ___ fast ___ nobody could catch up with him.","o":["A. very; that","B. such; that","C. too; to","D. so; that"],"a":"D","e":"so + adv + that 如此快以至于追不上。","t":"📋 rj8b_U6语法"},{"s":"She held the tiny bird gently in the ___ of her hand before letting it fly.","o":["A. fist","B. cheek","C. palm","D. elbow"],"a":"C","e":"palm 手掌。","t":"📋 rj8b_U6词汇"},{"s":"They are ___ good friends ___ they share everything with each other.","o":["A. too; to","B. very; that","C. such; that","D. so; that"],"a":"C","e":"such + adj + 复数名词 + that。","t":"📋 rj8b_U6语法"},{"s":"We'll begin the meeting ___ Mr. Wang arrives.","o":["A. although","B. so that","C. as soon as","D. unless"],"a":"C","e":"as soon as 一……就。主句将来时，从句一般现在时。","t":"📋 rj8b_U6语法"},{"s":"___ we protect the environment, many animals will disappear.","o":["A. Unless","B. Until","C. Although","D. If"],"a":"A","e":"Unless we protect... = If we don't protect...。","t":"📋 rj8b_U6语法"},{"s":"You can't truly understand another culture ___ you experience it yourself.","o":["A. unless","B. if","C. although","D. until"],"a":"A","e":"unless 除非亲身体验。","t":"📋 rj8b_U6语法"}]},"rj8b_U7":{"id":"rj8b_U7","n":"U7 · A Good Read","d":"现在完成时 already/yet/ever/never/just · 42词 · 43题","dd":"现在完成时 already/yet/ever/never/just","ps":35,"q":[{"s":"I ___ this movie ___. Please don't tell me the ending.","o":["A. haven't seen; yet","B. won't see; ever","C. didn't see; already","D. don't see; just"],"a":"A","e":"yet表示\"还\"，用于现在完成时否定句。","t":"📋 rj8b_U7语法"},{"s":"— Have you started your project ___?\n— Yes, I've ___ finished the first part.","o":["A. yet; already","B. already; yet","C. yet; just","D. just; yet"],"a":"A","e":"yet用于疑问句\"已经……了吗\"，already用于肯定回答。","t":"📋 rj8b_U7语法"},{"s":"She hadn't eaten anything all day, so she felt very ___ by the afternoon.","o":["A. weak","B. painful","C. have been","D. come"],"a":"A","e":"so表因果：没吃饭→身体状态如何。weak。","t":"📋 rj8b_U7逻辑"},{"s":"My ___ always tells me to believe in myself. I really value her advice.","o":["A. finished","B. since","C. hasn't","D. detective"],"a":"D","e":"物主代词her暗示女性角色。detective。","t":"📋 rj8b_U7逻辑"},{"s":"He ___ never ___ to a live concert before. Tonight will be his first time.","o":["A. was; been","B. has; been","C. is; being","D. did; be"],"a":"B","e":"has never been to 从未去过。现在完成时 + never。","t":"📋 rj8b_U7语法"},{"s":"She ___ never ___ a horse before, so she was very excited at the farm.","o":["A. did; ride","B. does; ride","C. has; ridden","D. is; riding"],"a":"C","e":"has never ridden 从未骑过。","t":"📋 rj8b_U7语法"},{"s":"We ___ already ___ the museum, so let's visit somewhere different today.","o":["A. are; visiting","B. have; visited","C. do; visit","D. did; visit"],"a":"B","e":"have already visited 已经参观过。already + 现在完成时。","t":"📋 rj8b_U7语法"},{"s":"I ___ just ___ back from the library. The books are still in my bag.","o":["A. was; come","B. did; came","C. have; come","D. am; coming"],"a":"C","e":"just表示\"刚刚\"，用于现在完成时。","t":"📋 rj8b_U7语法"},{"s":"My ___ told me an interesting story before I went to sleep. I love her so much.","o":["A. detective","B. have","C. hasn't","D. have known"],"a":"A","e":"her/she指代空格（女性）。detective。","t":"📋 rj8b_U7逻辑"},{"s":"The writer's new ___ novel keeps readers guessing who the real criminal is.","o":["A. mystery","B. adventure","C. fantasy","D. fiction"],"a":"A","e":"mystery 悬疑小说；神秘的事物。","t":"📋 rj8b_U7词汇"},{"s":"Great changes ___ in our village over the past ten years.","o":["A. have happened","B. did happen","C. happened","D. are happening"],"a":"A","e":"over the past ten years 在过去十年中，用现在完成时。","t":"📋 rj8b_U7语法"},{"s":"I ___ my keys somewhere. Can you help me look for them?","o":["A. am losing","B. lost","C. did lose","D. have lost"],"a":"D","e":"have lost 对现在有影响（找不到钥匙）。","t":"📋 rj8b_U7语法"},{"s":"She ___ never ___ Chinese painting before. Today is her first time.","o":["A. is; trying","B. has; tried","C. does; try","D. did; try"],"a":"B","e":"never + 现在完成时表示\"从未做过某事\"。","t":"📋 rj8b_U7语法"},{"s":"___ she ever ___ Indian food before?","o":["A. Is; trying","B. Has; tried","C. Did; try","D. Does; try"],"a":"B","e":"Has she ever tried... 她曾经尝试过……吗？","t":"📋 rj8b_U7语法"},{"s":"I ___ not ___ my English teacher since I graduated from middle school.","o":["A. have; seen","B. did; see","C. do; see","D. am; seeing"],"a":"A","e":"have not seen...since... 自从……以来没见过。","t":"📋 rj8b_U7语法"},{"s":"The story reached an exciting ___ that kept every reader on edge.","o":["A. effect","B. climax","C. summary","D. introduction"],"a":"B","e":"climax 高潮；极点。","t":"📋 rj8b_U7词汇"},{"s":"She ___ just ___ the good news and she's jumping with joy.","o":["A. has; heard","B. is; hearing","C. was; heard","D. did; hear"],"a":"A","e":"has just heard 刚刚听说。","t":"📋 rj8b_U7语法"},{"s":"I borrowed a ___ from the school library. It talks about the history of ancient China.","o":["A. mystery","B. come","C. returned","D. selfish"],"a":"A","e":"上义词 reading material→下义词。神秘。","t":"📋 rj8b_U7逻辑"},{"s":"This is the best film I ___ ever ___.","o":["A. was; seen","B. did; see","C. have; seen","D. am; seeing"],"a":"C","e":"have ever seen 曾经看过的。","t":"📋 rj8b_U7语法"},{"s":"___ you ___ the news? A new library will open near our school.","o":["A. Are; hearing","B. Do; hear","C. Have; heard","D. Did; hear"],"a":"C","e":"Have you heard the news? 现在完成时询问。","t":"📋 rj8b_U7语法"},{"s":"I ___ never ___ such a beautiful sunset in my life.","o":["A. was; seen","B. am; seeing","C. did; see","D. have; seen"],"a":"D","e":"have never seen 从未见过。","t":"📋 rj8b_U7语法"},{"s":"The book had a deep ___ on how I think about friendship and growing up.","o":["A. summary","B. climax","C. effect","D. adventure"],"a":"C","e":"effect 影响；结果。effect on 对……的影响。","t":"📋 rj8b_U7词汇"},{"s":"My favourite ___ has over 400 pages, but I finished it in just three days.","o":["A. been","B. introduction","C. tried","D. fiction"],"a":"D","e":"上下文暗示长篇读物→下义词。小说。","t":"📋 rj8b_U7逻辑"},{"s":"She hasn't ___ a single word since the meeting started an hour ago.","o":["A. saying","B. say","C. says","D. said"],"a":"D","e":"hasn't said...since... 现在完成时否定句 + since。","t":"📋 rj8b_U7语法"},{"s":"___ he ___ the book to the library ___?","o":["A. Has; returned; yet","B. Is; returning; just","C. Did; return; yet","D. Does; return; already"],"a":"A","e":"现在完成时疑问句 + yet 表示\"已经……了吗\"。","t":"📋 rj8b_U7语法"},{"s":"After reading the book, he wrote a short ___ to share his thoughts online.","o":["A. summary","B. introduction","C. climax","D. build-up"],"a":"A","e":"summary 总结；概要。","t":"📋 rj8b_U7词汇"}, ity"],"a":"D","e":"responsibility 责任。","t":"📋 wy8a_U5词汇"},{"s":"I opened the window ___ some fresh air into the stuffy room.","o":["A. let","B. to let","C. letting","D. letted"],"a":"B","e":"to do 表目的：开窗是为了让空气进来。","t":"📋 wy8a_U5语法"},{"s":"The water isn't warm ___ to go swimming in the lake.","o":["A. enough","B. very","C. so","D. too"],"a":"A","e":"warm enough to do 足够温暖可以……。","t":"📋 wy8a_U5语法"},{"s":"We should learn to ___ our screen time so it doesn't take over our lives.","o":["A. sign","B. click","C. picnic","D. limit"],"a":"D","e":"语境暗示\"控制/限制\"类动词。限制，限定。","t":"📋 wy8a_U5逻辑"},{"s":"It is not polite ___ loudly in the library.","o":["A. talk","B. talking","C. talked","D. to talk"],"a":"D","e":"It's adj + to do，to do 是真正主语。","t":"📋 wy8a_U5语法"},{"s":"Every morning, my grandfather takes a walk in the ___ near our home.","o":["A. responsibility","B. basic","C. station","D. click"],"a":"C","e":"语境暗示户外场所。车站。","t":"📋 wy8a_U5逻辑"},{"s":"The word for \"避免\" in this unit is ___.","o":["A. personal","B. careless","C. avoid","D. limit"],"a":"C","e":"avoid 避免。","t":"📋 wy8a_U5词汇"},{"s":"Don't be so ___ when you cross the road. Always look both ways.","o":["A. sign","B. fool","C. basic","D. packet"],"a":"C","e":"语境暗示粗心/不安全行为。基础的，基本的，根本的。","t":"📋 wy8a_U5逻辑"},{"s":"The word for \"不小心的，粗心的，疏忽的\" in this unit is ___.","o":["A. basic","B. aware","C. private","D. careless"],"a":"D","e":"careless 不小心的，粗心的，疏忽的。","t":"📋 wy8a_U5词汇"},{"s":"She turned off the TV ___ on her homework better.","o":["A. focusing","B. focused","C. focus","D. to focus"],"a":"D","e":"to do 表目的：关电视是为了更专注。","t":"📋 wy8a_U5语法"},{"s":"You should keep your ___ information safe when you use public computers.","o":["A. citizen","B. cheese","C. packet","D. urgent"],"a":"D","e":"语境暗示隐私/安全类形容词。紧急的，急迫的。","t":"📋 wy8a_U5逻辑"},{"s":"A true friend is someone you can always ___ no matter what happens.","o":["A. trust","B. cyberbullying","C. behave","D. law"],"a":"A","e":"人际关系类动词。信任，信赖，相信。","t":"📋 wy8a_U5逻辑"},{"s":"The doctor said my 词汇"},{"s":"The word for \"荣幸，光荣\" in this unit is ___.","o":["A. tsunami","B. historical","C. reaction","D. honour"],"a":"D","e":"honour 荣幸，光荣。","t":"📋 wy8a_U6词汇"},{"s":"It was wrong of him ___ to his mother about the test results.","o":["A. to lie","B. lying","C. lied","D. lie"],"a":"A","e":"It's adj of sb to do 句型。","t":"📋 wy8a_U6语法"},{"s":"He didn't understand the question at all, so he felt ___ when the teacher called his name.","o":["A. sand","B. lost","C. reaction","D. coach"],"a":"B","e":"so表因果：不懂问题→被叫时的感受。不复存在的；不再拥有的。","t":"📋 wy8a_U6逻辑"},{"s":"He checked his answers twice ___ sure there were no careless mistakes.","o":["A. make","B. to make","C. making","D. made"],"a":"B","e":"to do 表目的：检查两遍是为了确保无误。","t":"📋 wy8a_U6语法"},{"s":"The word for \"反应\" in this unit is ___.","o":["A. warning","B. wound","C. reaction","D. terrible"],"a":"C","e":"reaction 反应。","t":"📋 wy8a_U6词汇"},{"s":"The word for \"(有关)历史的\" in this unit is ___.","o":["A. reaction","B. historical","C. lost","D. tsunami"],"a":"B","e":"historical (有关)历史的。","t":"📋 wy8a_U6词汇"},{"s":"She turned off the TV ___ on her homework better.","o":["A. to focus","B. focusing","C. focus","D. focused"],"a":"A","e":"to do 表目的：关电视是为了更专注。","t":"📋 wy8a_U6语法"},{"s":"The word for \"不舒服的\" in this unit is ___.","o":["A. danger","B. honour","C. reaction","D. uncomfortable"],"a":"D","e":"uncomfortable 不舒服的。","t":"📋 wy8a_U6词汇"},{"s":"We spent the whole afternoon at the ___ near the river. It is the best place in town.","o":["A. ground","B. coach","C. warning","D. university"],"a":"D","e":"it指代场所。大学。","t":"📋 wy8a_U6逻辑"},{"s":"The doctor told him ___ more exercise and eat less junk food.","o":["A. do","B. doing","C. did","D. to do"],"a":"D","e":"tell sb to do 告诉某人做某事。","t":"📋 wy8a_U6语法"},{"s":"My ___ always tells me to believe in myself. I really value her advice.","o":["A. heroine","B. fashion","C. bleed","D. coach"],"a":"D","e":"物主代词her暗示女性角色。公共马车，四轮大马车。","t":"📋 wy8a_U6逻辑"},{"s":"She is old ___ to take care of herself when her parents are at work.","o":["A. so","B. enough","C. very","D. too"],"a":"B","e":"adj + enough to do 足够……可以。","t":"📋 wy8a_U6语法"},{"s":"The police warned people ___ near the broken bridge.","o":["A. not going","B. don't go","C. not to go","D. not go"],"a":"C","e":"warn sb not to do 警告某人不要做某事。不定式否定：not to do。","t":"📋 wy8a_U6语法"},{"s":"The word for \"伤痛，伤害\" in this unit is ___.","o":["A. reaction","B. historical","C. wound","D. lost"],"a":"C","e":"wound 伤痛，伤害。","t":"📋 wy8a_U6词汇"},{"s":"The word for \"危险\" in this unit is ___.","o":["A. lost","B. honour","C. danger","D. encouraging"],"a":"C","e":"danger 危险。","t":"📋 wy8a_U6词汇"}]}},"vocab_a":[{"id":"wy8a_U1_vocab_a","n":"U1 词汇运用A","d":"方框选词填空·每词限用一次·8题","g":"📋 同步训练","bank":["suppose","birthmark","bright","strawberry","crowded","disaster","therefore","cover"],"sentences":[{"s":"I ___ you have already finished your homework since you look so relaxed.","a":"suppose"},{"s":"The baby had a small brown ___ on her left arm, shaped like a tiny heart.","a":"birthmark"},{"s":"The sun is too ___ — I need to put on my sunglasses before I go outside.","a":"bright"},{"s":"She picked a red ___ from the garden and ate it with a little sugar on top.","a":"strawberry"},{"s":"The subway was so ___ during rush hour that I could barely move my arms.","a":"crowded"},{"s":"The earthquake was the worst natural ___ the country had experienced in over fifty years.","a":"disaster"},{"s":"He studied hard for the exam; ___, he got the highest score in the class.","a":"therefore"},{"s":"The heavy snow will ___ the ground by morning, turning the whole city white.","a":"cover"}],"explain":["第1题应填 suppose — v.想，认为，I suppose you have。","第2题应填 birthmark — n.胎记，a small brown birthmark。","第3题应填 bright — adj.鲜艳的，too bright。","第4题应填 strawberry — n.草莓，a red strawberry。","第5题应填 crowded — adj.拥挤的，so crowded。","第6题应填 disaster — n.灾难，a natural disaster。","第7题应填 therefore — adv.因此，所以。","第8题应填 cover — v.遮盖，snow will cover the ground。"]},{"id":"wy8a_U2_vocab_a","n":"U2 et out。过去进行时描述当时天气。","t":"📋 wy8b_U5语法"},{"s":"I ___ my first poem when I was nine years old.","o":["A. write","B. wrote","C. have written","D. am writing"],"a":"B","e":"when I was nine 明确过去时间点，用一般过去时 wrote。","t":"📋 wy8b_U5语法"}]},"wy8b_U6":{"id":"wy8b_U6","n":"U6 · Travel","d":"间接引语/宾语从句; 现在完成时综合 · 30词 · 42题","dd":"间接引语/宾语从句; 现在完成时综合","ps":25,"q":[{"s":"The word for \"在……之中（三者及以上）\" in this unit is ___.","o":["A. crazy","B. among","C. resource","D. underground"],"a":"B","e":"among 在……之中（三者及以上）。","t":"📋 wy8b_U6词汇"},{"s":"The word for \"村民\" in this unit is ___.","o":["A. energy","B. desert","C. canal","D. villager"],"a":"D","e":"villager 村民。","t":"📋 wy8b_U6词汇"},{"s":"She ___ in this city ___ she was born.","o":["A. lives; for","B. lived; when","C. has lived; since","D. is living; from"],"a":"C","e":"since表示\"自从\"，后面接过去时间点。","t":"📋 wy8b_U6语法"},{"s":"I ___ this mobile phone ___ three years, and it still works well.","o":["A. am using; since","B. have used; for","C. used; since","D. use; for"],"a":"B","e":"for + 时间段。have used...for three years。","t":"📋 wy8b_U6语法"},{"s":"The train ___ just ___ the station. You'll have to wait for the next one.","o":["A. was; left","B. has; left","C. is; leaving","D. did; leave"],"a":"B","e":"has just left 刚刚离开。just + 现在完成时。","t":"📋 wy8b_U6语法"},{"s":"My father ___ smoking since the doctor warned him about his health last year.","o":["A. hasn't smoked","B. didn't smoke","C. won't smoke","D. doesn't smoke"],"a":"A","e":"hasn't smoked since... 现在完成时否定 + since 表示“自……以来没抽过”。","t":"📋 wy8b_U6语法"},{"s":"We ___ not ___ our new neighbours yet. They moved in last week.","o":["A. are; meeting","B. do; meet","C. did; meet","D. have; met"],"a":"D","e":"have not met...yet 还没有见到。","t":"📋 wy8b_U6语法"},{"s":"Schools were closed because of the heavy ___ that covered the roads in ice.","o":["A. shortage","B. rainfall","C. increase","D. wisdom"],"a":"B","e":"语境暗示自然天气/灾害 → 下义词。降雨量。","t":"📋 wy8b_U6逻辑"},{"s":"I ___ already ___ the book you lent me. It was wonderful!","o":["A. have; read","B. was; read","C. am; reading","D. did; read"],"a":"A","e":"have already done 已经做过某事。","t":"📋 wy8b_U6语法"},{"s":"My ___ always tells me to believe in myself. I really value her advice.","o":["A. province","B. underground","C. energy","D. villager"],"a":"D","e":"物主代词her暗示女性角色。村民。","t":"📋 wy8b_U6逻辑"},{"s":"The word for \"短缺；不足\" in this unit is ___.","o":["A. desert","B. shortage","C. beekeeping","D. east"],"a":"B","e":"shortage 短缺；不足。","t":"📋 wy8b_U6词汇"},{"s":"How long ___ she ___ in this hospital? — For about ten years.","o":["A. is; working","B. did; work","C. has; worked","D. does; work"],"a":"C","e":"How long has she worked... 询问持续多长时间。","t":"📋 wy8b_U6语法"},{"s":"Before you travel to another country, make sure your ___ is still valid.","o":["A. province","B. especially","C. survive","D. resource"],"a":"D","e":"旅行必备物品。资源。","t":"📋 wy8b_U6逻辑"},{"s":"___ your brother ever ___ Indian food? He seems to like spicy dishes.","o":["A. Did; try","B. Does; try","C. Has; tried","D. Is; trying"],"a":"C","e":"Has he ever tried... 询问经历。","t":"📋 wy8b_U6语法"},{"s":"The word for \"资源\" in this unit is ___.","o":["A. among","B. below","C. especially","D. resource"],"a":"D","e":"resource 资源。","t":"📋 wy8b_U6词汇"},{"s":"The word for \"西方；向西\" in this unit is ___.","o":["A. crazy","B. environment","C. among","D. west"],"a":"D","e":"west 西方；向西。","t":"📋 wy8b_U6词汇"},{"s":"A lot ___ to my hometown ___ the new bridge was built.","o":["A. has changed; since","B. is changing; from","C. changed; when","D. changes; for"],"a":"A","e":"since + 从句（一般过去时），主句用现在完成时。","t":"📋 wy8b_U6语法"},{"s":"She ___ in the school band ___ she was in Grade 7.","o":["A. has played; since","B. plays; for","C. is playing; from","D. played; when"],"a":"A","e":"has played...since... 现在完成时 + since + 过去时间点。","t":"📋 wy8b_U6语法"},{"s":"I ___ the film twice already, but I don't mind watching it again with you.","o":["A. did watch","B. have watched","C. watched","D. am watching"],"a":"B","e":"have watched twice already。次数 + already 用现在完成时。","t":"📋 wy8b_U6语法"},{"s":"The ___ I ordered online arrived today. It was even better than I expected.","o":["A. calendar","B. survive","C. wheat","D. rainfall"],"a":"A","e":"it指代空格物品。日历。","t":"📋 wy8b_U6逻辑"},{"s":"The word for \"能量；精力\" in this unit is ___.","o":["A. charge","B. energy","C. below","D. wheat"],"a":"B","e":"energy 能量；精力。","t":"📋 wy8b_U6词汇"},{"s":"She ___ in the same neighbourhood ___ she started primary school.","o":["A. lives; for","B. is living; from","C. has lived; since","D. lived; when"],"a":"C","e":"has lived...since... 从过去持续到现在。","t":"📋 wy8b_U6语法"},{"s":"The word for \"甜美地\" in this unit is ___.","o":["A. energetic","B. wheat","C. sweetly","D. shortage"],"a":"C","e":"sweetly 甜美地。","t":"📋 wy8b_U6词汇"},{"s":"The word for \"在……下面；在下面\" in this unit is ___.","o":["A. arrival","B. charge","C. west","D. below"],"a":"D","e":"below 在……下面；在下面。","t":"📋 wy8b_U6词汇"},{"s":"They ___ good friends ___ more than ten years now.","o":["A. were; since","B. are; for","C. have; since","D. have been; for"],"a":"D","e":"have been...for + 时间段。","t":"📋 wy8b_U6语法"},{"s":"We ___ each other since we graduated from primary school.","o":["A. didn't see","B. won't see","C. don't see","D. haven't seen"],"a":"D","e":"haven't seen...since... 自……以来从未见面。","t":"📋 wy8b_U6语法"},{"s":"After dinner, I helped my mother wash the dishes in the ___.","o":["A. countryside","B. arrival","C. midsummer","D. among"],"a":"A","e":"语境暗示家庭场所。乡下；乡村。","t":"📋 wy8b_U6逻辑"},{"s":"He ___ his homework, so now he can relax and watch TV.","o":["A. did finish","B. has finished","C. finished","D. is finishing"],"a":"B","e":"has finished → 结果影响现在（可以放松）。","t":"📋 wy8b_U6语法"},{"s":"I ___ just ___ a wonderful idea for the school project!","o":["A. have; had","B. am; having","C. do; have","D. did; have"],"a":"A","e":"have just had 刚刚有了。just + 现在完成时。","t":"📋 wy8b_U6语法"},{"s":"Every morning, my grandfather takes a walk in the ___ near our home.","o":["A. desert","B. underground","C. midsummer","D. sweetly"],"a":"A","e":"语境暗示户外场所。沙漠。","t":"📋 wy8b_U6逻辑"},{"s":"The word for \"疯狂的\" in this unit is ___.","o":["A. crazy","B. wheat","C. west","D. among"],"a":"A","e":"crazy 疯狂的。","t":"📋 wy8b_U6词汇"},{"s":"The word for \"养蜂\" in this unit is ___.","o":["A. beekeeping","B. desert","C. react","D. especially"],"a":"A","e":"beekeeping 养蜂。","t":"📋 wy8b_U6词汇"},{"s":"The children ___ just ___ their hands, so they are ready to eat now.","o":["A. are; washing","B. did; wash","C. do; wash","D. have; washed"],"a":"D","e":"have just washed 刚刚洗过。just + 现在完成时。","t":"📋 wy8b_U6语法"},{"s":"My parents ___ never ___ abroad, but they plan to visit Europe next year.","o":["A. did; be","B. have; been","C. do; go","D. are; going"],"a":"B","e":"have never been abroad 从未出过国。","t":"📋 wy8b_U6语法"},{"s":"We spent the whole afternoon at the ___ near the river. It is the best place in town.","o":["A. environment","B. react","C. province","D. charge"],"a":"C","e":"it指代场所。省份。","t":"📋 wy8b_U6逻辑"},{"s":"The word for \"东方；向东\" in this unit is ___.","o":["A. east","B. resource","C. charge","D. increase"],"a":"A","e":"east 东方；向东。","t":"📋 wy8b_U6词汇"},{"s":"The word for \"精力充沛的\" in this unit is ___.","o":["A. beekeeping","B. energetic","C. sweetly","D. countryside"],"a":"B","e":"energetic 精力充沛的。","t":"📋 wy8b_U6词汇"},{"s":"The word for \"乡下；乡村\" in this unit is ___.","o":["A. countryside","B. charge","C. energetic","D. increase"],"a":"A","e":"countryside 乡下；乡村。","t":"📋 wy8b_U6词汇"},{"s":"The children ___ already ___ their rooms, so they can go out to play.","o":["A. do; clean","B. are; cleaning","C. did; clean","D. have; cleaned"],"a":"D","e":"have already cleaned 已经打扫完。","t":"📋 wy8b_U6语法"},{"s":"He ___ his schoolbag somewhere, and now he can't find his homework.","o":["A. left","B. did leave","C. has left","D. is leaving"],"a":"C","e":"has left 对现在有影响（找不到书包）。","t":"📋 wy8b_U6语法"},{"s":"The word for \"智慧\" in this unit is ___.","o":["A. west","B. wisdom","C. arrival","D. wheat"],"a":"B","e":"wisdom 智慧 e watching the evening news.","a":"sofa"},{"s":"We went ___ in the mountains last winter and it was the most exciting sport I've ever tried.","a":"skiing"},{"s":"I made a ___ to myself that I would practise English every morning this summer.","a":"promise"},{"s":"It is impolite to ___ someone when they are speaking — wait until they finish.","a":"interrupt"},{"s":"I had a long ___ with my best friend about our plans for the future.","a":"conversation"}],"explain":["第1题应填 tonight — adv.今晚，a meteor shower tonight。","第2题应填 lamp — n.灯，the desk lamp。","第3题应填 blouse — n.女士宽松短衫，a new white blouse。","第4题应填 sofa — n.长沙发，on the sofa。","第5题应填 skiing — n.滑雪运动，went skiing。","第6题应填 promise — n.承诺，make a promise。","第7题应填 interrupt — v.打断，interrupt someone。","第8题应填 conversation — n.谈话，a long conversation。"]},{"id":"wy8b_U3_vocab_a","n":"U3 词汇运用A","d":"方框选词填空·每词限用一次·8题","g":"📋 同步训练","bank":["director","drama","leader","role","freeze","silence","awful","advise"],"sentences":[{"s":"The ___ of the film shouted \"Action!\" and the actors began to perform.","a":"director"},{"s":"Our school's ___ club is putting on a wonderful play about Chinese history next month.","a":"drama"},{"s":"Martin was chosen as the team ___ because everyone trusted his judgement.","a":"leader"},{"s":"She was so happy to get the lead ___ in the school musical — she had practised for weeks.","a":"role"},{"s":"When I walked onto the stage and saw hundreds of people watching, I seemed to ___ with fear.","a":"freeze"},{"s":"The teacher waited for complete ___ before she began to speak to the class.","a":"silence"},{"s":"The food at that restaurant was ___ — I couldn't even finish half of my meal.","a":"awful"},{"s":"My father would ___ you to save some money each month rather than spend it all at once.","a":"advise"}],"explain":["第1题应填 director — n.导演，the director shouted \"Action!\"。","第2题应填 drama — n.戏剧，the drama club。","第3题应填 leader — n.领导者，the team leader。","第4题应填 role — n.角色，the lead role。","第5题应填 freeze — v.突然 var ST = {
  ver: 'jx',
  tab: 'sc',
  view: 'landing',
  catIdx: -1,
  mode: 'full',
  shuffled: [],
  curIdx: 0,
  answers: {},
  feedbackShown: false,
  quizMode: 'practice',
  catStats: {},
  clozeTexts: {},
  clozeSubmitted: false,
  // Vocab A
  vocabATexts: {},
  vocabASubmitted: false,
  // Vocab B
  vocabBTexts: {},
  vocabBSubmitted: false,
  // Grammar
  grammarTexts: {},
  grammarSubmitted: false,
};

function H(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    if (k === 'className') el.className = attrs[k];
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else el.setAttribute(k, attrs[k]);
  }
  if (children) {
    if (typeof children === 'string') el.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) {
      if (typeof c === 'string') el.appendChild(document.createTextNode(c));
      else if (c) el.appendChild(c);
    });
  }
  return el;
}

function skey() { return 'jxmulti_' + ST.ver + '_' + ST.tab + '_session'; }
function pkey() { return 'jxmulti_' + ST.ver + '_' + ST.tab + '_practice'; }
function ekey() { return 'jxmulti_' + ST.ver + '_' + ST.tab + '_errors'; }
function mkey() { return 'jxmulti_quizMode'; }
function saveQuizMode() {
  try { localStorage.setItem(mkey(), ST.quizMode); } catch(e) {}
}
function loadQuizMode() {
  try { return localStorage.getItem(mkey()) || 'practice'; } catch(e) { return 'practice'; }
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ============================================================
// SESSION
// ============================================================
function saveSession() {
  try {
    var s = { timestamp: Date.now(), ver: ST.ver, tab: ST.tab };
    if (ST.tab === 'sc') {
      s.catIdx = ST.catIdx; s.mode = ST.mode; s.shuffled = ST.shuffled;
      s.curIdx = ST.curIdx; s.answers = ST.answers;
    } else if (ST.tab === 'cloze') {
      s.catIdx = ST.catIdx; s.clozeTexts = ST.clozeTexts;
      s.clozeSubmitted = ST.clozeSubmitted;
    } else if (ST.tab === 'vocab_a') {
      s.catIdx = ST.catIdx; s.vocabATexts = ST.vocabATexts;
      s.vocabASubmitted = ST.vocabASubmitted;
    } else if (ST.tab === 'vocab_b') {
      s.catIdx = ST.catIdx; s.vocabBTexts = ST.vocabBTexts;
      s.vocabBSubmitted = ST.vocabBSubmitted;
    } else if (ST.tab === 'grammar') {
      s.catIdx = ST.catIdx; s.grammarTexts = ST.grammarTexts;
      s.grammarSubmitted = ST.grammarSubmitted;
    }
    localStorage.setItem(skey(), JSON.stringify(s));
  } catch(e) {}
}

function loadStats(statsKey) {
  try {
    var raw = localStorage.getItem(statsKey);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function verLabel(v) {
  return {'jx':'江西中考','rj8b':'人教版八下','wy8a':'外研版八上','wy8b':'外研版八下'}[v] || v;
}

function saveStats(statsKey, catId, score, total) {
  try {
    var s = loadStats(statsKey);
    if (!s[catId] || score > s[catId].score || (score === s[catId].score && total < s[catId].total)) {
      s[catId] = { score: score, total: total, time: Date.now() };
    }
    localStorage.setItem(statsKey, JSON.stringify(s));
  } catch(e) {}
}

function saveError(qData) {
  try {
    var errors = JSON.parse(localStorage.getItem(ekey()) || '[]');
    var exists = errors.some(function(e) {
      return e.qIdx === qData.qIdx && e.catIdx === qData.catIdx;
    });
    if (!exists) {
      errors.push(qData);
      localStorage.setItem(ekey(), JSON.stringify(errors));
    }
  } catch(e) {}
}

function clearSession() {
  localStorage.removeItem(skey());
  saveQuizMode();
  ST.view = 'landing'; ST.catIdx = -1; ST.curIdx = 0;
  ST.answers = {}; ST.feedbackShown = false;
  ST.clozeTexts = {}; ST.clozeSubmitted = false;
  ST.vocabATexts = {}; ST.vocabASubmitted = false;
  ST.vocabBTexts = {}; ST.vocabBSubmitted = false;
  ST.grammarTexts = {}; ST.grammarSubmitted = false;
}

function checkResume() {
  try {
    var raw = localStorage.getItem(skey());
    if (!raw) return null;
    var s = JSON.parse(raw);
    if (Date.now() - s.timestamp > 86400000) { localStorage.removeItem(skey()); return null; }
    if (s.ver !== ST.ver || s.tab !== ST.tab) return null;
    if (s.tab === 'sc' && s.catIdx >= 0 && s.shuffled && s.shuffled.length > 0 && s.curIdx < s.shuffled.length) return s;
    if (s.tab !== 'sc' && s.catIdx >= 0 && !s[s.tab + 'Submitted']) return s;
    return null;
  } catch(e) { return null; }
}

function renderLanding() {
  var app = document.getElementById('app');
  app.innerHTML = '';
  var verCfg = VERSIONS[ST.ver];
  var tabs = verCfg.tabs;
  var tabKeys = Object.keys(tabs);
  if (!tabKeys.includes(ST.tab)) ST.tab = tabKeys[0];

  // Version tabs
  var verBar = H('div', {className:'ver-bar'});
  Object.keys(VERSIONS).forEach(function(v) {
    var btn = H('button', {
      className: 'ver-btn' + (v === ST.ver ? ' active' : ''),
      onClick: function() { if (v !== ST.ver) { ST.ver = v; ST.tab = Object.keys(VERSIONS[v].tabs)[0]; ST.view = 'landing'; clearSession(); renderLanding(); } }
    }, VERSIONS[v].n);
    verBar.appendChild(btn);
  });
  app.appendChild(verBar);

  // Type tabs
  var tabBar = H('div', {className:'tab-bar'});
  tabKeys.forEach(function(t) {
    var btn = H('button', {
      className: 'tab-btn' + (t === ST.tab ? ' active' : ''),
      onClick: function() { if (t !== ST.tab) { ST.tab = t; ST.view = 'landing'; clearSession(); renderLanding(); } }
    }, tabs[t].icon + ' ' + tabs[t].n);
    tabBar.appendChild(btn);
  });
  app.appendChild(tabBar);

  // Mode toggle
  var modeBar = H('div', {className:'mode-toggle-bar'});
  ['practice', 'exam'].forEach(function(m) {
    var btn = H('button', {
      className: 'mode-toggle-btn' + (ST.quizMode === m ? ' active' : ''),
      onClick: (function(mode) { return function() { ST.quizMode = mode; saveQuizMode(); renderLanding(); }; })(m)
    }, m === 'practice' ? '📝 练习模式' : '📋 考试模式');
    modeBar.appendChild(btn);
  });
  app.appendChild(modeBar);

  // Header
  var header = H('div', {className:'landing-header'}, [
    H('h1', null, verCfg.n),
    H('p', null, verCfg.desc)
  ]);
  app.appendChild(header);

  // Category grid
  var data = ALL_DATA[ST.ver][ST.tab];
  var grid = H('div', {className:'cat-grid'});

  if (ST.tab === 'sc') {
    var cats = Object.keys(data);
    if (cats.length === 0) {
      var emptyCard = H('div', {className:'cat-card empty-card'}, [
        H('div', {className:'cat-name'}, '即将上线'),
        H('div', {className:'cat-desc'}, '题库正在建设中')
      ]);
      emptyCard.style.gridColumn = '1 / -1';
      grid.appendChild(emptyCard);
    } else {
      cats.forEach(function(cid) {
        var cat = data[cid];
        var stats = loadStats(pkey());
        var stat = stats[cid];
        var card = H('div', {
          className: 'cat-card',
          onClick: function() { startSCQuiz(cid); }
        }, [
          H('div', {className:'cat-name'}, cat.n),
          H('div', {className:'cat-desc'}, cat.d),
          stat ? H('div', {className:'cat-stat'}, '最佳: ' + stat.score + '/' + stat.total) : null
        ]);
        grid.appendChild(card);
      });
    }
  } else {
    // Cloze / VocabA / VocabB / Grammar - array data
    var items = data;
    if (!items || items.length === 0) {
      var emptyCard = H('div', {className:'cat-card empty-card'}, [
        H('div', {className:'cat-name'}, '即将上线'),
        H('div', {className:'cat-desc'}, '题库正在建设中')
      ]);
      emptyCard.style.gridColumn = '1 / -1';
      grid.appendChild(emptyCard);
    } else {
      items.forEach(function(item, idx) {
        var stats = loadStats(pkey());
        var stat = stats[item.id];
        var card = H('div', {
          className: 'cat-card',
          onClick: function() { startFillQuiz(idx); }
        }, [
          H('div', {className:'cat-name'}, item.n),
          H('div', {className:'cat-desc'}, item.d),
          item.g ? H('span', {className:'cat-genre-tag'}, item.g) : null,
          stat ? H('div', {className:'cat-stat'}, '最佳: ' + stat.score + '/' + stat.total) : null
        ]);
        grid.appendChild(card);
      });
    }
  }
  app.appendChild(grid);
}
