江西农业文化。"},{"i":49,"s":"— Why is the dog barking? — Someone ____ at the front door.","o":["A. knocks","B. is knocking","C. knocked","D. was knocking"],"a":"B","e":"狗正在叫说明有人正在敲门——因果关系锁定进行时，敲门与犬吠同时发生。A-一般现在时，C-一般过去时，D-过去进行时。"},{"i":50,"s":"— The light is still on in the library. — Some students ____ for the exam there.","o":["A. were preparing","B. prepared","C. are preparing","D. prepare"],"a":"C","e":"灯还亮着说明学生们此刻正在图书馆备考——从可见状态推理进行中的不可见动作。A-过去进行时，B-一般过去时，D-一般现在时。"}]},{"id":"passive","n":"被动语态","d":"六年考频3/6（2020、2022、2024）","dd":"主动/被动 × 时态交叉矩阵。关键判断：主语为物、by+施动者、及物动词缺宾语。覆盖一般现在/一般过去/一般将来/情态动词被动。","q":[{"i":1,"s":"Fine porcelain cups and plates ______ in Jingdezhen every day.","o":["A. are made","B. were made","C. make","D. made"],"a":"A","e":"主语porcelain cups是物，「被制作」的承受者；every day表明一般现在时，用are made。","t":"景德镇瓷器"},{"i":2,"s":"— What language ______ in Canada? — English and French.","o":["A. speaks","B. is spoken","C. was spoken","D. spoke"],"a":"B","e":"主语language是「被说」的承受者；询问客观事实用一般现在时被动is spoken。"},{"i":3,"s":"— Where are the oranges from? — They ______ in Gannan, Jiangxi.","o":["A. grow","B. grew","C. are grown","D. were grown"],"a":"C","e":"主语they指oranges，是「被种植」的承受者；陈述产地事实用一般现在时被动are grown。","t":"赣南脐橙"},{"i":4,"s":"The new bridge over the wide river ______ of stone and steel.","o":["A. builds","B. was built","C. built","D. is built"],"a":"D","e":"主语bridge是物，「被建造」的承受者；陈述桥的材质是客观事实，用一般现在时被动is built。"},{"i":5,"s":"— This app ______ by students everywhere. — Yes, it is very helpful.","o":["A. is used","B. was used","C. uses","D. used"],"a":"A","e":"主语app是物，「被使用」的承受者；陈述当前普遍情况用一般现在时被动is used。"},{"i":6,"s":"— Where can I buy the books? — They ______ in every big store.","o":["A. sell","B. are sold","C. were sold","D. sold"],"a":"B","e":"主语they指books，是「被售卖」的承受者；陈述当前事实用一般现在时被动are sold。"},{"i":7,"s":"Rice ______ in many parts of southern China every year.","o":["A. grows","B. was grown","C. is grown","D. grew"],"a":"C","e":"主语rice是物，「被种植」的承受者；every year表明一般现在时，用is grown。"},{"i":8,"s":"— Your desk is so tidy! — It ______ clean after every class.","o":["A. keeps","B. was kept","C. kept","D. is kept"],"a":"D","e":"主语it指desk，是「被保持」的承受者；after every class提示一般现在时，用is kept。"},{"i":9,"s":"These old trees ______ by the villagers every spring.","o":["A. are watered","B. were watered","C. water","D. watered"],"a":"A","e":"主语trees是「被浇水」的承受者；every spring表明一般现在时习惯动作，用are watered。"},{"i":10,"s":"— When does the meeting start? — It ______ in Room 201 every Monday.","o":["A. holds","B. is held","C. was held","D. held"],"a":"B","e":"主语it指meeting，是「被举行」的承受者；every Monday提示一般现在时，用is held。"},{"i":11,"s":"— Who cleans the blackboard here? — It ______ by the students on duty.","o":["A. cleans","B. was cleaned","C. is cleaned","D. cleaned"],"a":"C","e":"主语it指blackboard，是「被擦」的承受者；陈述日常安排用一般现在时被动is cleaned。"},{"i":12,"s":"The dinner in our school canteen ______ fresh every day.","o":["A. cooks","B. was cooked","C. cooked","D. is cooked"],"a":"D","e":"主语dinner是「被烹饪」的承受者；every day提示一般现在时，用is cooked。"},{"i":13,"s":"The classrooms on the second floor ______ every afternoon.","o":["A. are cleaned","B. were cleaned","C. clean","D. cleaned"],"a":"A","e":"主语classrooms是「被打扫」的承受者；every afternoon提示一般现在时，用are cleaned。"},{"i":14,"s":"— I like this park. — Yes, beautiful flowers ______ everywhere here.","o":["A. find","B. are found","C. were found","D. found"],"a":"B","e":"主语flowers是「被发现/找到」的承受者；陈述当前状态用一般现在时被动are found。"},{"i":15,"s":"Young trees ______ along the road every spring in our town.","o":["A. plant","B. were planted","C. planted","D. are planted"],"a":"D","e":"主语trees是「被种植」的承受者；every spring提示一般现在时习惯动作，用are planted。"},{"i":16,"s":"Bailudong Academy ______ in the Song Dynasty long ago.","o":["A. was built","B. is built","C. built","D. builds"],"a":"A","e":"主语书院是「被建造」的承受者；Song Dynasty和long ago提示过去时间，用was built。","t":"白鹿洞书院"},{"i":17,"s":"— What a nice gift! — It ______ to me on my birthday last week.","o":["A. gives","B. was given","C. is given","D. gave"],"a":"B","e":"主语it指gift，是「被给」的承受者；last week提示过去时间，用was given。"},{"i":18,"s":"— Did you hear the story? — Yes, we ______ about it in class yesterday.","o":["A. tell","B. are told","C. were told","D. told"],"a":"C","e":"主语we是「被告知」的承受者；yesterday提示过去时间，用were told。"},{"i":19,"s":"— Where is the letter? — It ______ to my pen pal last Monday.","o":["A. sends","B. is sent","C. sent","D. was sent"],"a":"D","e":"主语it指letter，是「被寄出」的承受者；last Monday提示过去时间，用was sent。"},{"i":20,"s":"The birthday cake ______ by my grandmother two hours ago.","o":["A. was made","B. is made","C. made","D. makes"],"a":"A","e":"主语cake是「被制作」的承受者；two hours ago提示过去时间，用was made。"},{"i":21,"s":"— Why are you so happy? — I ______ to Lily's party last night.","o":["A. invite","B. was invited","C. am invited","D. invited"],"a":"B","e":"主语I是「被邀请」的承受者；last night提示过去时间，用was invited。"},{"i":22,"s":"— Do you know the book? — Yes, it ______ by Lu Xun in 1920.","o":["A. writes","B. is written","C. was written","D. wrote"],"a":"C","e":"主语it指book，是「被写」的承受者；in 1920提示过去时间，用was written。"},{"i":23,"s":"— Where was the cat? — It ______ under the bed by my mother.","o":["A. finds","B. is found","C. found","D. was found"],"a":"D","e":"主语it指cat，是「被发现」的承受者；对话暗示过去发生的事，用was found。"},{"i":24,"s":"The sports meeting ______ on the school playground last Friday.","o":["A. was held","B. is held","C. held","D. holds"],"a":"A","e":"主语meeting是「被举行」的承受者；last Friday提示过去时间，用was held。"},{"i":25,"s":"These sweet oranges ______ in Gannan last autumn.","o":["A. grow","B. were grown","C. are grown","D. grew"],"a":"B","e":"主语oranges是「被种植」的承受者；last autumn提示过去时间，用were grown。","t":"赣南脐橙"},{"i":26,"s":"— The chicken tastes great! — It ______ by my father this morning.","o":["A. cooks","B. is cooked","C. was cooked","D. cooked"],"a":"C","e":"主语it指chicken，是「被烹饪」的承受者；this morning提示过去时间，用was cooked。"},{"i":27,"s":"— Can I get a ticket? — Sorry, they ______ out two days ago.","o":["A. sell","B. are sold","C. sold","D. were sold"],"a":"D","e":"主语they指tickets，是「被卖光」的承受者；two days ago提示过去时间，用were sold。"},{"i":28,"s":"The whole house ______ by my mother before the guests arrived.","o":["A. was cleaned","B. is cleaned","C. cleaned","D. cleans"],"a":"A","e":"主语house是「被打扫」的承受者；before guests arrived提示过去时间，用was cleaned。"},{"i":29,"s":"— Who taught you English? — It ______ by Miss Li three years ago.","o":["A. teaches","B. was taught","C. is taught","D. taught"],"a":"B","e":"主语it指English，是「被教」的承受者；three years ago提示过去时间，用was taught。"},{"i":30,"s":"The secret ______ well by everyone in the village for years.","o":["A. keeps","B. is kept","C. was kept","D. kept"],"a":"C","e":"主语secret是「被保守」的承受者；for years提示过去持续状态，用was kept。"},{"i":31,"s":"A new hospital for children ______ in our city next year.","o":["A. will be built","B. is built","C. will build","D. was built"],"a":"A","e":"主语hospital是「被建造」的承受者；next year提示将来时间，用will be built。"},{"i":32,"s":"— When is the concert? — It ______ in the school hall next Sunday.","o":["A. holds","B. will be held","C. is held","D. held"],"a":"B","e":"主语it指concert，是「被举行」的承受者；next Sunday提示将来时间，用will be held。"},{"i":33,"s":"— Who will speak first? — A short talk ______ by our headmaster.","o":["A. gives","B. is given","C. will be given","D. was given"],"a":"C","e":"主语talk是「被给出」的承受者；will speak暗示将来时，用will be given。"},{"i":34,"s":"— Has the package arrived? — No, it ______ to you tomorrow afternoon.","o":["A. sends","B. is sent","C. sent","D. will be sent"],"a":"D","e":"主语it指package，是「被寄送」的承受者；tomorrow afternoon提示将来时间，用will be sent。"},{"i":35,"s":"The final decision about the school trip ______ by the headmaster soon.","o":["A. will be made","B. is made","C. will make","D. was made"],"a":"A","e":"主语decision是「被做出」的承受者；soon提示将来时间，用will be made。"},{"i":36,"s":"A new subject called AI Basics ______ in our school next term.","o":["A. teaches","B. will be taught","C. is taught","D. taught"],"a":"B","e":"主语subject是「被教授」的承受者；next term提示将来时间，用will be taught。"},{"i":37,"s":"— Who will do the report? — It ______ by three students together next week.","o":["A. writes","B. is written","C. will be written","D. wrote"],"a":"C","e":"主语it指report，是「被写」的承受者；next week提示将来时间，用will be written。"},{"i":38,"s":"— I like these T-shirts. — They ______ online from next month.","o":["A. sell","B. are sold","C. sold","D. will be sold"],"a":"D","e":"主语they指T-shirts，是「被售卖」的承受者；from next month提示将来时间，用will be sold。"},{"i":39,"s":"More trees and flowers ______ around the new library this spring.","o":["A. will be planted","B. are planted","C. will plant","D. were planted"],"a":"A","e":"主语trees and flowers是「被种植」的承受者；this spring提示将来时间，用will be planted。"},{"i":40,"s":"— What is the empty room for? — It ______ as a reading room next month.","o":["A. uses","B. will be used","C. is used","D. used"],"a":"B","e":"主语it指room，是「被使用」的承受者；next month提示将来时间，用will be used。"},{"i":41,"s":"— Mom, can I go out to play? — Your homework ______ first.","o":["A. finishes","B. is finished","C. must be finished","D. was finished"],"a":"C","e":"主语homework是「被完成」的承受者；语境表必须、义务，用must be finished。"},{"i":42,"s":"This special green tea ______ on Lushan Mountain in Jiangxi.","o":["A. finds","B. is found","C. found","D. can be found"],"a":"D","e":"主语tea是「被找到」的承受者；表可能性用can be found。","t":"庐山云雾茶"},{"i":43,"s":"The kitchen floor ______ every day to keep it shining.","o":["A. should be cleaned","B. is cleaned","C. should clean","D. was cleaned"],"a":"A","e":"主语floor是「被打扫」的承受者；表建议、应该，用should be cleaned。"},{"i":44,"s":"— Can I tell him the secret? — No, he ______ the truth right now.","o":["A. tells","B. must be told","C. is told","D. told"],"a":"B","e":"主语he是「被告知」的承受者；语境表必须，用must be told。"},{"i":45,"s":"— This tool looks strange. — It ______ to cut thick paper easily.","o":["A. uses","B. is used","C. can be used","D. was used"],"a":"C","e":"主语it指tool，是「被使用」的承受者；表用途/可能性用can be used。"},{"i":46,"s":"— The children need help. — Every child ______ a fair chance at school.","o":["A. gives","B. is given","C. gave","D. should be given"],"a":"D","e":"主语child是「被给予」的承受者；表建议、应该，用should be given。"},{"i":47,"s":"Your hands ______ before you sit down at the dinner table.","o":["A. must be washed","B. are washed","C. must wash","D. were washed"],"a":"A","e":"主语hands是「被洗」的承受者；表必须、规定，用must be washed。"},{"i":48,"s":"— Look at the mountain! — The top of it ______ from our classroom window.","o":["A. sees","B. can be seen","C. is seen","D. saw"],"a":"B","e":"主语top是「被看见」的承受者；表可能性用can be seen。"},{"i":49,"s":"The old stories from Jinggangshan ______ by the young generation forever.","o":["A. remembers","B. are remembered","C. should be remembered","D. remembered"],"a":"C","e":"主语stories是「被记住」的承受者；表应该、义务，用should be remembered。","t":"井冈山故事"},{"i":50,"s":"— The report is not ready yet. — It ______ to the office by Friday afternoon.","o":["A. sends","B. is sent","C. sent","D. must be sent"],"a":"D","e":"主语it指report，是「被发送」的承受者；by Friday表截止、必须，用must be sent。"}]},{"id":"modals","n":"情态动词","d":"六年考频3/6（2021、2023、2025）","dd":"四情态同框，不同语义功能。覆盖能力/允许/义务/推测/建议/请求。关键区分：must(肯定95%) vs may(可能50%) vs can't(不可能)。","q":[{"i":1,"s":"My little sister ____ play the piano very well.","o":["A. can","B. must","C. may","D. should"],"a":"A","e":"can表示「能力」，妹妹具备弹钢琴的能力。"},{"i":2,"s":"You ____ smoke in this room. Look at the sign.","o":["A. can","B. must","C. may","D. should"],"a":"B","e":"mustn't表示「禁止」，标志牌提示室内禁止吸烟。"},{"i":3,"s":"You look tired. You ____ go to bed early tonight.","o":["A. can","B. must","C. should","D. may"],"a":"C","e":"should表示「建议」，根据对方疲惫状态给出早睡建议。"},{"i":4,"s":"____ I use your dictionary? I left mine at home.","o":["A. need","B. must","C. should","D. may"],"a":"D","e":"may表示「请求允许」，正式礼貌地征求对方同意。"},{"i":5,"s":"Tom ____ swim, so he never goes to the deep pool.","o":["A. can't","B. mustn't","C. shouldn't","D. may not"],"a":"A","e":"can't表示「不具备能力」，Tom不会游泳所以不去深水区。"},{"i":6,"s":"Students ____ wear their school uniforms every Monday.","o":["A. can","B. must","C. may","D. would"],"a":"B","e":"must表示「义务/强制要求」，校规要求学生穿校服。"},{"i":7,"s":"When my grandpa was young, he ____ run very fast.","o":["A. can","B. must","C. could","D. should"],"a":"C","e":"could表示「过去的能力」，爷爷年轻时能跑得很快。"},{"i":8,"s":"It is raining outside. I ____ take my umbrella.","o":["A. can","B. must","C. should","D. have to"],"a":"D","e":"have to表示「外部客观需要」，下雨这一外部因素迫使带伞。"},{"i":9,"s":"You ____ finish the work today. Tomorrow is fine.","o":["A. needn't","B. mustn't","C. can't","D. shouldn't"],"a":"A","e":"needn't表示「不必/没有必要性」，今天不必完成。"},{"i":10,"s":"You ____ eat or drink in the school library.","o":["A. can","B. must","C. may","D. will"],"a":"B","e":"mustn't表示「禁止」，图书馆规则禁止饮食。"},{"i":11,"s":"We ____ turn off the lights when we leave the room.","o":["A. can","B. must","C. should","D. may"],"a":"C","e":"should表示「建议/应当」，离开房间时应当关灯。"},{"i":12,"s":"____ I open the window? It is really hot in here.","o":["A. must","B. need","C. should","D. can"],"a":"D","e":"can表示「请求允许」(非正式)，征求对方同意开窗。"},{"i":13,"s":"You ____ keep quiet when you are in the hospital.","o":["A. must","B. can","C. may","D. might"],"a":"A","e":"must表示「强制义务」，医院环境要求必须保持安静。"},{"i":14,"s":"You ____ park your car here. Read the sign, please.","o":["A. should","B. can't","C. must","D. need"],"a":"B","e":"can't表示「禁止」(标志牌用语)，此处不许停车。"},{"i":15,"s":"Take a coat with you. It ____ get cold this evening.","o":["A. can","B. must","C. may","D. need"],"a":"C","e":"may表示「可能性」，今晚可能会变冷。"},{"i":16,"s":"Excuse me, ____ you tell me the way to the post office?","o":["A. may","B. must","C. should","D. could"],"a":"D","e":"Could you...? 表示「礼貌请求」，比Can you...?更委婉。"},{"i":17,"s":"You ____ finish your homework before dinner, said Mum.","o":["A. must","B. can","C. may","D. would"],"a":"A","e":"must表示母亲发出的「强制要求」，饭前必须完成作业。"},{"i":18,"s":"You ____ take this medicine three times a day, the doctor said.","o":["A. can","B. should","C. must","D. may"],"a":"B","e":"should表示医生的「建议」，一日三次服药是医嘱而非强制。"},{"i":19,"s":"____ you like a glass of water after the long walk?","o":["A. can","B. must","C. would","D. may"],"a":"C","e":"Would you like...? 是「礼貌提供」固定句型。"},{"i":20,"s":"Sorry, I can't play now. I ____ help my dad clean the garden.","o":["A. can","B. may","C. should","D. have to"],"a":"D","e":"have to表示「外部义务」，帮爸爸打扫是外部安排的任务。"},{"i":21,"s":"____ you speak any foreign language besides English and Chinese?","o":["A. can","B. must","C. should","D. may"],"a":"A","e":"can表示「能力」，询问对方是否具备说外语的能力。"},{"i":22,"s":"You ____ run across the busy street, the mother told her son.","o":["A. can","B. must","C. may","D. need"],"a":"B","e":"mustn't表示母亲发出的「禁止」，绝对不能横穿马路。"},{"i":23,"s":"I am not sure if he will come. He ____ be busy at work.","o":["A. can","B. must","C. might","D. should"],"a":"C","e":"might表示「可能性较低」(约30%)，不确定他是否会来。"},{"i":24,"s":"Don't worry about your bag. I ____ keep an eye on it.","o":["A. can","B. may","C. should","D. will"],"a":"D","e":"will表示「意愿/承诺」，说话人主动承诺会照看包。"},{"i":25,"s":"____ I use your phone for a minute? Mine has no power.","o":["A. could","B. must","C. should","D. would"],"a":"A","e":"Could I...? 表示「礼貌请求允许」，比Can I...?更客气。"},{"i":26,"s":"____ we bring a small gift when we visit her new house?","o":["A. can","B. should","C. may","D. would"],"a":"B","e":"Should we...? 表示「征求建议」，询问是否应当带礼物。"},{"i":27,"s":"____ I leave a message for Mr. Wang, please?","o":["A. must","B. will","C. may","D. need"],"a":"C","e":"May I...? 表示「正式请求允许」，用于正式场合征求许可。"},{"i":28,"s":"In China, you ____ be eighteen to get a driving license.","o":["A. can","B. may","C. should","D. must"],"a":"D","e":"must表示法律规定的「强制条件」，18岁是法定要求。"},{"i":29,"s":"Look, the light in her room is on. She ____ be at home now.","o":["A. must","B. can","C. may","D. would"],"a":"A","e":"must be表示「肯定推测」(约95%)，灯光亮着是有力证据。"},{"i":30,"s":"You ____ eat more fresh fruit and less junk food every day.","o":["A. can","B. should","C. may","D. would"],"a":"B","e":"should表示「建议」，给出健康饮食的具体建议。"},{"i":31,"s":"You ____ try joining the school English club this term.","o":["A. must","B. need","C. could","D. will"],"a":"C","e":"could表示「委婉提议」，建议对方尝试加入英语社团。"},{"i":32,"s":"My brother ____ read and write when he was only four years old.","o":["A. should","B. must","C. may","D. could"],"a":"D","e":"could表示「过去的能力」，弟弟四岁时就能读写。"},{"i":33,"s":"____ you mind opening the window? It is a bit stuffy here.","o":["A. would","B. should","C. must","D. can"],"a":"A","e":"Would you mind...? 是「非常礼貌的请求」固定句型。"},{"i":34,"s":"That man ____ be our head teacher. He looks too young.","o":["A. mustn't","B. can't","C. shouldn't","D. needn't"],"a":"B","e":"can't be表示「否定推测」(不可能)，太年轻不可能是班主任。"},{"i":35,"s":"Before you use the machine, you ____ read the instructions carefully.","o":["A. can","B. may","C. should","D. might"],"a":"C","e":"should表示「建议」，使用机器前应当仔细阅读说明。"},{"i":36,"s":"The ground is wet with puddles. It ____ have rained last night.","o":["A. can","B. may","C. should","D. must"],"a":"D","e":"must have done表示「对过去的肯定推测」，积水是强证据。"},{"i":37,"s":"He ____ be in Beijing now. I saw him in Nanchang an hour ago.","o":["A. can't","B. mustn't","C. needn't","D. shouldn't"],"a":"A","e":"can't be表示「否定推测」，一小时前在南昌不可能在北京。"},{"i":38,"s":"I don't know where Miss Li is. She ____ be in the teachers' office.","o":["A. must","B. may","C. can","D. should"],"a":"B","e":"may be表示「可能性推测」(约50%)，不确定但有可能。"},{"i":39,"s":"The sky looks cloudy. It ____ rain later this afternoon.","o":["A. can","B. must","C. might","D. need"],"a":"C","e":"might表示「较低可能性」(约30%)，多云不一定下雨。"},{"i":40,"s":"During the trip to Jinggangshan, students ____ follow the guide closely.","o":["A. can","B. may","C. would","D. must"],"a":"D","e":"must表示研学旅行中的「强制要求」，学生必须跟紧导游。","t":"井冈山研学旅行安全规则"},{"i":41,"s":"Visitors ____ touch the china artworks in the Jingdezhen museum.","o":["A. shouldn't","B. must","C. needn't","D. wouldn't"],"a":"B","e":"mustn't表示博物馆内的「严格禁止」，不得触碰瓷器展品。","t":"景德镇陶瓷博物馆参观须知"},{"i":42,"s":"If you travel to Jiangxi, you ____ visit the beautiful Lushan Mountain.","o":["A. can","B. should","C. may","D. must"],"a":"B","e":"should表示「推荐/建议」，去江西旅游时推荐游览庐山。","t":"庐山旅游推荐"},{"i":43,"s":"You ____ take a warm coat when hiking Wugong Mountain at night.","o":["A. can","B. may","C. should","D. might"],"a":"C","e":"should表示「实用性建议」，夜爬武功山应当带保暖外套。","t":"武功山夜间登山准备建议"},{"i":44,"s":"____ you tell me how I can get to the Tengwang Pavilion, please?","o":["A. can","B. must","C. should","D. could"],"a":"D","e":"Could you...? 表示「礼貌问路请求」，比Can you...?更委婉。","t":"滕王阁游客问路场景"},{"i":45,"s":"Tom looks so excited. He ____ have got some good news today.","o":["A. must","B. may","C. should","D. might"],"a":"A","e":"must have done表示「对过去的肯定推测」，兴奋表情是强证据。"},{"i":46,"s":"You ____ eat too much sugar every day. It is bad for your teeth.","o":["A. can't","B. should","C. mustn't","D. needn't"],"a":"B","e":"shouldn't表示「建议不要做」，吃太多糖对牙齿不好。"},{"i":47,"s":"____ I have a look at your new family photo? It sounds interesting.","o":["A. must","B. would","C. may","D. need"],"a":"C","e":"May I...? 表示「正式请求允许」，礼貌地请求看照片。"},{"i":48,"s":"We ____ hurry to the cinema. The film starts in one hour.","o":["A. needn't","B. mustn't","C. can't","D. shouldn't"],"a":"A","e":"needn't表示「不必/没有必要性」，还有一个小时不必赶。"},{"i":49,"s":"That ____ be the right answer. I checked the book and it is different.","o":["A. mustn't","B. shouldn't","C. needn't","D. can't"],"a":"D","e":"can't be表示「否定推测」，核对书本后确定答案不可能正确。"},{"i":50,"s":"We ____ do everything we can to protect the environment around us.","o":["A. can","B. may","C. must","D. would"],"a":"C","e":"must表示「强烈的道德义务」，保护环境是每个人的责任。"}]},{"id":"perfect","n":"现在完成时","d":"六年考频1/6（2023）","dd":"同词根四时态，关键判断：过去动作对现在的影响或持续。覆盖since+时间点/for+时间段、already/yet/ever/never、have gone to/been to。","q":[{"i":1,"s":"She ___ English since she was six years old.","o":["A. has studied","B. studied","C. will study","D. studies"],"a":"A","e":"「since+时间点」表示从六岁持续到现在，用现在完成时。"},{"i":2,"s":"— How long have you lived here? — I ___ here since 2015.","o":["A. lived","B. have lived","C. live","D. will live"],"a":"B","e":"「since 2015」是时间起点，问句与答句时态呼应，均用现在完成时。"},{"i":3,"s":"Mr. Wang ___ in this school since he graduated from college.","o":["A. will teach","B. teaches","C. has taught","D. taught"],"a":"C","e":"「since he graduated」是过去时间点，教书动作从毕业持续到现在，用现在完成时。"},{"i":4,"s":"— Is Tom still playing? — Yes, he ___ the piano since breakfast.","o":["A. is playing","B. will play","C. played","D. has played"],"a":"D","e":"「since breakfast」表示从早餐持续到现在，动作仍可能继续，用现在完成时。"},{"i":5,"s":"— Your English is great! — Thanks. I ___ it since primary school.","o":["A. have learned","B. learned","C. will learn","D. learn"],"a":"A","e":"「since primary school」表示从小学持续到现在，动作有延续性，用现在完成时。"},{"i":6,"s":"My brother ___ in Beijing since he left college in 2020.","o":["A. worked","B. has worked","C. works","D. will work"],"a":"B","e":"「since he left college」是时间起点，工作从2020年延续到说话时，用现在完成时。"},{"i":7,"s":"— How long have you known Mary? — I ___ her for ten years.","o":["A. will know","B. know","C. have known","D. knew"],"a":"C","e":"「for ten years」是时间段，认识的动作从十年前持续到现在，用现在完成时。"},{"i":8,"s":"The Greens ___ this old clock for more than twenty years.","o":["A. keep","B. will keep","C. kept","D. have kept"],"a":"D","e":"「for more than twenty years」是时间段，保存的动作延续到现在，用现在完成时。"},{"i":9,"s":"— You play the guitar so well! — Thanks. I ___ it for eight years.","o":["A. have played","B. played","C. will play","D. play"],"a":"A","e":"「for eight years」是时间段，弹吉他持续了八年到现在，用现在完成时。"},{"i":10,"s":"Tom and I ___ good friends for more than five years.","o":["A. were","B. have been","C. are","D. will be"],"a":"B","e":"「for more than five years」是时间段，友情状态从过去持续到说话时，用现在完成时。"},{"i":11,"s":"— Do you like your job? — Yes. I ___ for this company since 2019.","o":["A. will work","B. worked","C. have worked","D. work"],"a":"C","e":"「since 2019」是时间起点，工作从2019年持续到现在，用现在完成时。"},{"i":12,"s":"The old man ___ alone since his wife passed away.","o":["A. lives","B. will live","C. lived","D. has lived"],"a":"D","e":"「since his wife passed away」是时间点，独居状态从过去持续到现在，用现在完成时。"},{"i":13,"s":"— Let's go to the cinema. — I ___ the film already.","o":["A. have seen","B. saw","C. will see","D. see"],"a":"A","e":"「already」是现在完成时标志词，表示电影已经看过，影响现在的决定。"},{"i":14,"s":"— Don't forget your homework. — I ___ it already.","o":["A. did","B. have done","C. do","D. will do"],"a":"B","e":"「already」表示作业已完成，强调对现在没有负担的结果，用现在完成时。"},{"i":15,"s":"— Can I borrow your dictionary? — Sorry, I ___ it to Lily already.","o":["A. will lend","B. lend","C. have lent","D. lent"],"a":"C","e":"「already」表示已借出，过去动作影响现在（书不在手边），用现在完成时。"},{"i":16,"s":"— Have you finished your report? — Not yet. I ___ it.","o":["A. didn't finish","B. won't finish","C. don't finish","D. haven't finished"],"a":"D","e":"「yet」用于现在完成时否定句，表示报告还没完成，问句也为现在完成时呼应。"},{"i":17,"s":"— Is dinner ready? — No, Mom ___ cooking yet.","o":["A. hasn't started","B. didn't start","C. doesn't start","D. won't start"],"a":"A","e":"「yet」用于现在完成时否定句，表示妈妈还没开始做饭。"},{"i":18,"s":"— Where is your brother? — He ___ home yet. He is still at school.","o":["A. didn't come","B. hasn't come","C. doesn't come","D. won't come"],"a":"B","e":"「yet」用于现在完成时否定句，表示还没有回家，与后文「still at school」呼应。"},{"i":19,"s":"— You look so happy! — I ___ just ___ a letter from my pen pal.","o":["A. will ... receive","B. am ... receiving","C. have ... received","D. was ... receiving"],"a":"C","e":"「just」表示刚刚收到信，强调现在的结果（开心），用现在完成时。"},{"i":20,"s":"— Why is the room so clean? — I ___ just ___ it.","o":["A. was ... cleaning","B. will ... clean","C. am ... cleaning","D. have ... cleaned"],"a":"D","e":"「just」表示刚刚打扫完，强调现在的结果（房间干净），用现在完成时。"},{"i":21,"s":"— Is Lucy at home? — No, she ___ just ___ to the supermarket.","o":["A. has ... gone","B. did ... go","C. will ... go","D. does ... go"],"a":"A","e":"「just」表示刚刚去超市，过去动作对现在的影响（人不在家），用现在完成时。"},{"i":22,"s":"— ___ you ever ___ to Shanghai? — No, never.","o":["A. Did ... go","B. Have ... been","C. Do ... go","D. Will ... go"],"a":"B","e":"「ever」用于现在完成时疑问句，询问是否有过某经历，答句「never」也是标志。"},{"i":23,"s":"— ___ you ever ___ the Great Wall? — Yes, I went there last year.","o":["A. Did ... visit","B. Will ... visit","C. Have ... visited","D. Do ... visit"],"a":"C","e":"「ever」用于现在完成时，问是否曾经去过长城，答句「went last year」为具体时间用过去时。"},{"i":24,"s":"I ___ never ___ such a beautiful sunset before.","o":["A. did ... see","B. will ... see","C. do ... see","D. have ... seen"],"a":"D","e":"「never」与现在完成时连用，表示从未见过如此美景，「before」进一步提示。"},{"i":25,"s":"— Would you like to try skiing? — I ___ it. I'm a little afraid.","o":["A. have never tried","B. never tried","C. will never try","D. never try"],"a":"A","e":"「never」与现在完成时连用，表示至今从未尝试过，影响现在的态度。"},{"i":26,"s":"— Is this book interesting? — I don't know. I ___ it yet.","o":["A. didn't read","B. haven't read","C. don't read","D. won't read"],"a":"B","e":"「yet」用于现在完成时否定句，表示还没读过，所以不知道有不有趣。"},{"i":27,"s":"My sister ___ never ___ by plane. She is very excited about her first flight.","o":["A. will ... travel","B. does ... travel","C. has ... traveled","D. did ... travel"],"a":"C","e":"「never」表示从未坐过飞机，强调至今为止的经历，用现在完成时。"},{"i":28,"s":"— Where is Tom? I can't find him. — He ___ to Beijing on business.","o":["A. went","B. will go","C. goes","D. has gone"],"a":"D","e":"「has gone to」表示去了还没回来，人不在说话现场，与「can't find him」呼应。"},{"i":29,"s":"— Have you ever been to London? — Yes, I ___ there twice.","o":["A. have been","B. went","C. will go","D. go"],"a":"A","e":"「have been to」表示去过已回，与「twice」次数连用，用现在完成时。"},{"i":30,"s":"— Is Mr. Li in the office? — No, he ___ to Shanghai. He'll be back next Monday.","o":["A. went","B. has gone","C. goes","D. will go"],"a":"B","e":"「has gone to」表示去了还没回来，后文「下周一回来」确认人不在。"},{"i":31,"s":"— You know a lot about Japan. — Yes. I ___ there three times.","o":["A. will go","B. go","C. have been","D. went"],"a":"C","e":"「have been to」表示去过已回，与「three times」次数连用，用现在完成时。"},{"i":32,"s":"— Where is your father? — He ___ in the garden for two hours.","o":["A. worked","B. will work","C. works","D. has been"],"a":"D","e":"「has been in」表示一直待在花园，与「for two hours」时间段连用，用现在完成时。"},{"i":33,"s":"This is the best film I ___ ever ___.","o":["A. have ... seen","B. did ... see","C. will ... see","D. do ... see"],"a":"A","e":"「最高级 + ever」是现在完成时典型句型，表示至今为止的经历。"},{"i":34,"s":"— How was the concert? — It was the most wonderful one I ___ ever ___ to.","o":["A. went","B. have ... been","C. go","D. will ... go"],"a":"B","e":"「最高级 + ever + 现在完成时」表示至今最棒的一次经历。"},{"i":35,"s":"This is the first time I ___ such a delicious cake.","o":["A. will eat","B. eat","C. have eaten","D. ate"],"a":"C","e":"「This is the first time + 现在完成时」是固定句型，表示第一次做某事。"},{"i":36,"s":"It is the most interesting book I ___ in my life.","o":["A. read","B. will read","C. am reading","D. have read"],"a":"D","e":"「It is + 最高级 + 现在完成时」表示生命中最有趣的书，经历涵盖至今。"},{"i":37,"s":"This is the longest river I ___ ever ___.","o":["A. have ... seen","B. did ... see","C. will ... see","D. do ... see"],"a":"A","e":"「最高级 + ever + 现在完成时」表示至今见过的最长河流。"},{"i":38,"s":"— Do you like the dish? — Yes! It's the best one I ___.","o":["A. ever had","B. have ever had","C. will ever have","D. ever have"],"a":"B","e":"「最高级 + ever + 现在完成时」表示至今吃过最好吃的菜。"},{"i":39,"s":"Farmers in Gannan ___ oranges for many years and they are now famous.","o":["A. will grow","B. grow","C. have grown","D. grew"],"a":"C","e":"「for many years」是时间段，种植从过去持续到现在，用现在完成时。","t":"赣南脐橙——江西特产，「for many years」提示现在完成时表达持续至今的种植。"},{"i":40,"s":"— I can't find my keys. — Oh, I think you ___ them.","o":["A. lose","B. will lose","C. lost","D. have lost"],"a":"D","e":"无显性标志词，但语境强调过去丢失对现在的影响（找不到），用现在完成时。"},{"i":41,"s":"Great changes ___ in my hometown over the years.","o":["A. have taken place","B. took place","C. will take place","D. take place"],"a":"A","e":"「over the years」表示多年来的变化，过去变化影响现在面貌，用现在完成时。"},{"i":42,"s":"— Why can't she walk? — She ___ her leg. The doctor says she needs rest.","o":["A. breaks","B. has broken","C. will break","D. broke"],"a":"B","e":"无显性标志词，但摔断腿的过去动作直接影响现在（不能走路），用现在完成时。"},{"i":43,"s":"— Is the new library open? — Yes, it ___ for about a month.","o":["A. will be open","B. is open","C. has been open","D. was open"],"a":"C","e":"「for about a month」是时间段，开放状态从一个月前持续到现在，用现在完成时。"},{"i":44,"s":"So far, the students ___ more than five hundred English words.","o":["A. learn","B. will learn","C. learned","D. have learned"],"a":"D","e":"「so far」是现在完成时标志词，表示到目前为止的结果，用现在完成时。"},{"i":45,"s":"— Where have you been? I ___ for you for an hour!","o":["A. have been waiting","B. waited","C. will wait","D. wait"],"a":"A","e":"「have been waiting」是现在完成进行时，强调等待从一小时前持续到现在且还在等。"},{"i":46,"s":"It ___ for three days. I hope it stops soon.","o":["A. rained","B. has been raining","C. will rain","D. rains"],"a":"B","e":"「has been raining」是现在完成进行时，雨下了三天持续到现在还没停。"},{"i":47,"s":"It ___ more than 1,300 years since Tengwang Pavilion was first built.","o":["A. will be","B. is","C. has been","D. was"],"a":"C","e":"「It has been + 时间段 + since」是固定句型，表示滕王阁建至今已过1300多年。","t":"滕王阁——江南三大名楼，建于唐代，「It has been...since」句型表达时间跨度。"},{"i":48,"s":"It ___ over 1,000 years since Jingdezhen began making ceramics.","o":["A. is","B. will be","C. was","D. has been"],"a":"D","e":"「It has been + 时间段 + since」固定句型，表示景德镇制瓷已逾千年。","t":"景德镇——千年瓷都，「It has been...since」句型表达制瓷历史的跨度。"},{"i":49,"s":"It ___ two years since I first visited Lushan Mountain.","o":["A. has been","B. is","C. will be","D. was"],"a":"A","e":"「It has been + 时间段 + since」固定句型，表示初次游览庐山已过两年。","t":"庐山——江西名山，「It has been...since」句型表达游览经历的间隔。"},{"i":50,"s":"It ___ five years since the environment around Poyang Lake began to improve.","o":["A. is","B. has been","C. will be","D. was"],"a":"B","e":"「It has been + 时间段 + since」固定句型，表示鄱阳湖环境改善已持续五年。","t":"鄱阳湖——中国最大淡水湖，「It has been...since」句型表达生态改善的时间跨度。"}]},{"id":"prepositions","n":"介词辨析","d":"六年考频3/6（2021、2022、2025）","dd":"四介词同框，同一语法位置不同语义/搭配。覆盖时间介词、地点介词、固定搭配（be good at/look after/pay for等）。","q":[{"i":1,"s":"The English class starts ____ 8 o'clock every morning.","o":["A. at","B. in","C. on","D. for"],"a":"A","e":"具体时间点前用 at，at 8 o'clock 是固定搭配。"},{"i":2,"s":"My younger sister was born ____ June, 2008, in a small town.","o":["A. at","B. in","C. on","D. for"],"a":"B","e":"月份前用 in，in June 表示「在六月」。"},{"i":3,"s":"We don't go to school ____ Saturday or Sunday.","o":["A. at","B. in","C. on","D. for"],"a":"C","e":"具体某一天前用 on，on Saturday 表示「在周六」。"},{"i":4,"s":"There are forty-five students ____ our classroom right now.","o":["A. at","B. on","C. for","D. in"],"a":"D","e":"封闭空间内用 in，in the classroom 表示「在教室里」。"},{"i":5,"s":"Please put the book ____ the desk after you finish reading.","o":["A. on","B. in","C. at","D. for"],"a":"A","e":"物体表面用 on，on the desk 表示「在书桌上」。"},{"i":6,"s":"I'll wait for you ____ the school gate at four o'clock.","o":["A. in","B. at","C. on","D. for"],"a":"B","e":"小地点前用 at，at the school gate 表示「在校门口」。"},{"i":7,"s":"My father has worked in this company ____ twenty years.","o":["A. at","B. in","C. for","D. on"],"a":"C","e":"时间段前用 for，for twenty years 表示动作持续了二十年。"},{"i":8,"s":"The library is ____ the science building and the dining hall.","o":["A. on","B. at","C. in","D. between"],"a":"D","e":"between A and B 表示「在两者之间」。"},{"i":9,"s":"A: Where are you ____? B: I'm from Jiangxi. I moved here last month.","o":["A. from","B. in","C. at","D. on"],"a":"A","e":"be from 表示「来自」，询问某人来自哪里。"},{"i":10,"s":"The post office is right ____ the supermarket on Main Street.","o":["A. among","B. beside","C. between","D. opposite"],"a":"B","e":"beside 表示「在...旁边」，指紧邻的位置关系。"},{"i":11,"s":"Please don't talk loudly ____ the movie. It is impolite.","o":["A. at","B. on","C. during","D. until"],"a":"C","e":"during 表示「在...期间」，during the movie 指看电影的过程中。"},{"i":12,"s":"The hospital is just ____ the police station. You won't miss it.","o":["A. among","B. between","C. beside","D. opposite"],"a":"D","e":"opposite 表示「在...对面」，opposite the police station 即警察局对面。"},{"i":13,"s":"A: Has Mr. Wang taught here ____ he graduated? B: Yes, ten years ago.","o":["A. since","B. for","C. in","D. at"],"a":"A","e":"since 表示「自从」，后接时间起点，常与现在完成时连用。"},{"i":14,"s":"She is the tallest girl ____ all the students in our class.","o":["A. between","B. among","C. in","D. on"],"a":"B","e":"among 用于三者及以上，among all the students 表示「在所有学生中」。"},{"i":15,"s":"You must stay here ____ your parents come to pick you up.","o":["A. at","B. for","C. until","D. during"],"a":"C","e":"until 表示「直到...为止」，stay until... 表示等到某个时刻。"},{"i":16,"s":"A: Are you good ____ playing basketball? B: Not really. I prefer swimming.","o":["A. at","B. in","C. for","D. on"],"a":"A","e":"be good at 是固定搭配，表示「擅长...」，后接名词或动名词。"},{"i":17,"s":"A: What is your brother interested ____? B: He loves painting and drawing.","o":["A. at","B. in","C. on","D. for"],"a":"B","e":"be interested in 是固定搭配，表示「对...感兴趣」。"},{"i":18,"s":"A: Your son won first prize! B: Yes, we are very proud ____ him.","o":["A. for","B. at","C. of","D. in"],"a":"C","e":"be proud of 是固定搭配，表示「为...感到骄傲」。"},{"i":19,"s":"Jingdezhen is famous ____ its porcelain all over the world.","o":["A. as","B. for","C. at","D. in"],"a":"B","e":"be famous for 表示「因...而出名」，后接出名的原因。","t":"景德镇以瓷器闻名世界"},{"i":20,"s":"A: Can you look ____ the blackboard? B: Sure, Miss Li.","o":["A. at","B. for","C. after","D. up"],"a":"A","e":"look at 表示「看」，look at the blackboard 即「看黑板」。"},{"i":21,"s":"A: What do you usually do after school? B: I like to listen ____ music.","o":["A. at","B. for","C. to","D. on"],"a":"C","e":"listen to 是固定搭配，表示「听」，后接听的对象。"},{"i":22,"s":"A: Don't wait ____ me. I may be late. B: It's okay. Take your time.","o":["A. at","B. to","C. on","D. for"],"a":"D","e":"wait for 是固定搭配，表示「等待」某人或某物。"},{"i":23,"s":"A: Can I ask you ____ some advice about my study? B: Of course.","o":["A. about","B. to","C. with","D. for"],"a":"D","e":"ask for 表示「请求、索要」，ask for advice 即「请求建议」。"},{"i":24,"s":"A: Who paid ____ the dinner last night? B: My father did.","o":["A. at","B. for","C. on","D. to"],"a":"B","e":"pay for 是固定搭配，表示「为...付款」。"},{"i":25,"s":"A: Does the train usually arrive ____ time? B: Yes, never late.","o":["A. at","B. in","C. on","D. for"],"a":"C","e":"on time 表示「准时」，强调按照预定时间到达。"},{"i":26,"s":"A: How do you go to school every day? B: I usually go ____ bike.","o":["A. by","B. on","C. in","D. with"],"a":"A","e":"by + 交通工具表示出行方式，by bike 即「骑自行车」。"},{"i":27,"s":"A: Do you take the bus to the park? B: No, I go ____ foot.","o":["A. in","B. by","C. with","D. on"],"a":"D","e":"on foot 是固定搭配表示「步行」，注意不用 by foot。"},{"i":28,"s":"A: Can you sing this song ____ English? B: Yes, it's my favorite.","o":["A. with","B. by","C. in","D. on"],"a":"C","e":"in + 语言表示「用某种语言」，in English 即「用英语」。"},{"i":29,"s":"A: When did you start learning the piano? B: ____ the age of six.","o":["A. In","B. At","C. On","D. For"],"a":"B","e":"at the age of 是固定搭配，表示「在...岁时」。"},{"i":30,"s":"We tried many ways to solve the problem. ____ the end, we made it.","o":["A. In","B. At","C. On","D. By"],"a":"A","e":"in the end 表示「最终、最后」，强调结局，不与 of 连用。"},{"i":31,"s":"You will find the post office ____ the end of the street.","o":["A. in","B. at","C. on","D. by"],"a":"B","e":"at the end of 表示「在...的尽头」，后接地点名词。"},{"i":32,"s":"A: How did you finish the work so fast? B: ____ the help of my friends.","o":["A. In","B. Under","C. With","D. By"],"a":"C","e":"with the help of 是固定搭配，表示「在...的帮助下」。"},{"i":33,"s":"A: Is your new school different ____ the old one? B: Yes, much bigger.","o":["A. with","B. from","C. to","D. as"],"a":"B","e":"be different from 是固定搭配，表示「与...不同」。"},{"i":34,"s":"Your handwriting is very similar ____ your sister's. I can't tell them apart.","o":["A. to","B. as","C. with","D. from"],"a":"A","e":"be similar to 是固定搭配，表示「与...相似」。"},{"i":35,"s":"A: The garden is full ____ beautiful flowers. B: Yes, spring is here.","o":["A. of","B. with","C. for","D. in"],"a":"A","e":"be full of 是固定搭配，表示「充满...」。"},{"i":36,"s":"A: What are you doing under the desk? B: I'm looking ____ my pen.","o":["A. at","B. for","C. after","D. up"],"a":"B","e":"look for 表示「寻找」，look at 是「看」，look after 是「照顾」。"},{"i":37,"s":"A: Can you look ____ my cat while I'm away? B: Sure, I will.","o":["A. at","B. for","C. after","D. up"],"a":"C","e":"look after 表示「照顾」，与 take care of 同义。"},{"i":38,"s":"A: I don't know this word. B: You can look it ____ in the dictionary.","o":["A. at","B. for","C. after","D. up"],"a":"D","e":"look up 表示「查阅」，look up a word 即「查单词」。"},{"i":39,"s":"A: Do you agree ____ what he said? B: Not really. I think differently.","o":["A. on","B. to","C. with","D. about"],"a":"C","e":"agree with 后接人或观点，表示「同意」；agree on 后接事项。"},{"i":40,"s":"A: What are they talking ____? B: They are talking about the trip.","o":["A. with","B. to","C. for","D. about"],"a":"D","e":"talk about 表示「谈论」，talk to/with 表示「与...交谈」。"},{"i":41,"s":"A: What do you think ____ the new movie? B: It's great. I love it.","o":["A. over","B. of","C. about","D. for"],"a":"B","e":"think of 用于询问看法，What do you think of... 是常用句型。"},{"i":42,"s":"A: He never cares ____ other people's feelings. B: He just hides it.","o":["A. of","B. for","C. with","D. about"],"a":"D","e":"care about 表示「关心、在乎」，后接人或事物。"},{"i":43,"s":"A: When did you arrive ____ Nanchang? B: Last Friday evening.","o":["A. at","B. in","C. on","D. to"],"a":"B","e":"arrive in 后接大地点（城市/国家），arrive at 后接小地点。"},{"i":44,"s":"Lushan is famous ____ its sea of clouds and beautiful sunrises.","o":["A. as","B. at","C. in","D. for"],"a":"D","e":"be famous for 表示「因...而出名」，庐山以云海闻名。","t":"庐山以云海日出著称"},{"i":45,"s":"Poyang Lake, China's largest lake, is ____ Jiangxi Province.","o":["A. on","B. at","C. of","D. in"],"a":"D","e":"在省份等大范围区域内用 in，in Jiangxi Province 即「在江西省」。","t":"鄱阳湖位于江西省，是中国第一大淡水湖"},{"i":46,"s":"A: When was Bailudong Academy first built? B: ____ the Southern Tang Dynasty.","o":["A. in","B. on","C. at","D. since"],"a":"A","e":"in + 朝代表示「在...朝代」，in the Song Dynasty 即「在宋朝」。","t":"白鹿洞书院始建于南唐，位于江西庐山"},{"i":47,"s":"You can get to Tengwang Pavilion ____ bus or by subway.","o":["A. by","B. on","C. in","D. with"],"a":"A","e":"by + 交通工具表示出行方式，by bus 即「乘公交车」。","t":"滕王阁位于南昌，可乘公交或地铁前往"},{"i":48,"s":"These books don't belong ____ me. They are from the school library.","o":["A. for","B. with","C. to","D. at"],"a":"C","e":"belong to 是固定搭配，表示「属于」，不可用进行时。"},{"i":49,"s":"A: Don't compare yourself ____ others. B: You're right. I'll be myself.","o":["A. to","B. as","C. with","D. for"],"a":"C","e":"compare with 表示「与...比较」，强调对比差异。"},{"i":50,"s":"A: This math problem is too hard. B: Let's deal ____ it together.","o":["A. of","B. about","C. on","D. with"],"a":"D","e":"deal with 是固定搭配，表示「处理、应对」问题或困难。"}]},{"id":"pronouns","n":"代词辨析","d":"六年考频3/6（2020、2021、2023）","dd":"四代词不同语法功能同框。覆盖人称主格/宾格、物主形/名、反身、不定、指示替代。关键：判断代词在句中的成分。","q":[{"i":1,"s":"He is the tallest boy in our class, the monitor said.","o":["A. He","B. Him","C. His","D. Himself"],"a":"A","e":"主语位置需要主格代词he。him是宾格，his是物主代词，himself是反身代词，均不能作主语。"},{"i":2,"s":"Can you tell me the way to the hospital? the old man asked.","o":["A. I","B. me","C. my","D. mine"],"a":"B","e":"动词tell后接宾格代词me作间接宾语。I是主格，my需修饰名词，mine是名词性物主代词不能作宾语。"},{"i":3,"s":"Our school has a big library with many books, Li Ming said.","o":["A. We","B. Us","C. Our","D. Ours"],"a":"C","e":"名词school前需形容词性物主代词our修饰。we/us是主/宾格，ours是名词性物主代词后不接名词。"},{"i":4,"s":"They come from a small village in the mountains, the visitors said.","o":["A. They","B. Them","C. Their","D. Theirs"],"a":"A","e":"主语位置需主格代词they。them是宾格，their需修饰名词，theirs是名词性物主代词独立使用。"},{"i":5,"s":"Please wait for her at the school gate, the teacher told us.","o":["A. she","B. her","C. hers","D. herself"],"a":"B","e":"介词for后接宾格代词her。she是主格，hers是名词性物主代词，herself是反身代词语义不当。"},{"i":6,"s":"Did you enjoy yourself at the summer camp? my mother asked me.","o":["A. you","B. your","C. yours","D. yourself"],"a":"D","e":"enjoy oneself是固定搭配，表示「玩得开心」。主语you对应的反身代词是yourself。"},{"i":7,"s":"I have never been to Beijing before, the little girl said.","o":["A. I","B. Me","C. My","D. Mine"],"a":"A","e":"主语位置需主格代词I。Me是宾格，My需修饰名词，Mine是名词性物主代词独立使用。"},{"i":8,"s":"His uncle is a famous writer in the city, Tom told us.","o":["A. He","B. Him","C. His","D. Himself"],"a":"C","e":"名词uncle前用形容词性物主代词his修饰。he/him是主/宾格，himself是反身代词不能修饰名词。"},{"i":9,"s":"Can you teach us how to make dumplings? the children asked.","o":["A. we","B. us","C. our","D. ours"],"a":"B","e":"动词teach接双宾语，间接宾语用宾格us。we是主格，our需修饰名词，ours是名词性物主代词。"},{"i":10,"s":"The students put their bags under the seats before class.","o":["A. they","B. them","C. their","D. theirs"],"a":"C","e":"名词bags前用形容词性物主代词their修饰。they/them是主/宾格，theirs是名词性物主代词不能修饰名词。"},{"i":11,"s":"The little cat cleaned itself carefully after the meal.","o":["A. it","B. its","C. that","D. itself"],"a":"D","e":"主语the cat和宾语指向同一对象，用反身代词itself表示「给自己清理」。it/its/that均不能表达反射动作。"},{"i":12,"s":"My father bought a new bicycle for my birthday, Peter said.","o":["A. My","B. Me","C. Mine","D. Myself"],"a":"A","e":"名词father前用形容词性物主代词my。Me是宾格，Mine是名词性物主代词，Myself是反身代词。"},{"i":13,"s":"The blue sweater on the sofa is hers, the girl explained.","o":["A. she","B. her","C. herself","D. hers"],"a":"D","e":"空后无名词，用名词性物主代词hers表示「她的毛衣」。she/her需接名词或作宾语，herself语义不当。"},{"i":14,"s":"I saw the twins yesterday and greeted them at the gate.","o":["A. they","B. them","C. their","D. theirs"],"a":"B","e":"动词greeted后接宾格代词them指代the twins。they是主格，their需修饰名词，theirs是名词性物主代词。"},{"i":15,"s":"The baby panda is playing with its mother in the zoo.","o":["A. it","B. itself","C. its","D. this"],"a":"C","e":"名词mother前用形容词性物主代词its修饰。it是主/宾格，itself是反身代词，this是指示代词。"},{"i":16,"s":"We really enjoyed ourselves at the music festival last night.","o":["A. us","B. our","C. ours","D. ourselves"],"a":"D","e":"enjoy oneself是固定搭配，主语we对应的反身代词是ourselves。us/our/ours均不能构成该搭配。"},{"i":17,"s":"The old man taught himself to use the smart phone at home.","o":["A. himself","B. him","C. his","D. he"],"a":"A","e":"teach oneself表示「自学」，主语the old man对应反身代词himself。him/his/he均不能表达自学含义。"},{"i":18,"s":"Who helped you clean the room? I did it myself, Jack said.","o":["A. I","B. myself","C. me","D. my"],"a":"B","e":"反身代词myself强调「我亲自完成的」，主语I和强调对象一致。I/me/my均不能表达强调语气。"},{"i":19,"s":"Is this pink schoolbag yours? No, it is not mine, she said.","o":["A. you","B. your","C. yours","D. yourself"],"a":"C","e":"空后无名词，用名词性物主代词yours表示「你的书包」。your需接名词，you/yourself不能表物主。"},{"i":20,"s":"The girl looked at herself in the mirror and smiled happily.","o":["A. she","B. her","C. hers","D. herself"],"a":"D","e":"主语the girl和宾语指向同一人，用反身代词herself表示「看她自己」。she/her/hers不能表达反射动作。"},{"i":21,"s":"My brother cut himself while cooking in the kitchen, Mom said.","o":["A. himself","B. him","C. his","D. he"],"a":"A","e":"主语my brother和宾语同一人，用反身代词himself表「割伤自己」。him/his/he均不能表反射动作。"},{"i":22,"s":"The students prepared themselves well for the important exam.","o":["A. they","B. themselves","C. them","D. their"],"a":"B","e":"prepare oneself表示「让自己做好准备」。主语the students对应反身代词themselves。they/them/their不能表反射。"},{"i":23,"s":"I do not have any money with me right now, sorry.","o":["A. some","B. few","C. any","D. a few"],"a":"C","e":"否定句中用any表示「任何」。some用于肯定句，few/a few只修饰可数名词，money为不可数名词。"},{"i":24,"s":"Are there any good restaurants near here? the tourist asked.","o":["A. some","B. many","C. much","D. any"],"a":"D","e":"一般疑问句中用any表示「一些」。some用于肯定句或表请求/建议的问句，many/much语义不当。"},{"i":25,"s":"Someone is knocking at the door. Go and see who it is.","o":["A. Someone","B. Anyone","C. Everyone","D. No one"],"a":"A","e":"肯定句表示「有人」用Someone。Anyone用于疑问/否定，Everyone表「每个人」，No one表否定与语境矛盾。"},{"i":26,"s":"Is there anything interesting in the newspaper today? Dad asked.","o":["A. something","B. anything","C. everything","D. nothing"],"a":"B","e":"一般疑问句中用anything表示「任何东西」。something用于肯定句，everything/nothing与疑问语气不符。"},{"i":27,"s":"Has anybody seen my English book? the boy asked the class.","o":["A. somebody","B. everybody","C. anybody","D. nobody"],"a":"C","e":"疑问句中用anybody表示「有人」。somebody用于肯定句，everybody/nobody语义不当。"},{"i":28,"s":"There is nothing wrong with your bike. It works fine.","o":["A. something","B. anything","C. everything","D. nothing"],"a":"D","e":"后句说「运转正常」，前句应表示「没问题」用nothing。something/anything/everything语义矛盾。"},{"i":29,"s":"I lost my pen. I need to buy a new one tomorrow.","o":["A. one","B. it","C. that","D. this"],"a":"A","e":"one指代「同类不同物」，指任意一支新笔。it指同一支笔(已丢失不能买同一支)，that/this不适用。"},{"i":30,"s":"The weather in Nanchang is hotter than that in Kunming.","o":["A. one","B. that","C. it","D. this"],"a":"B","e":"比较结构中用that替代前文的不可数名词weather，避免重复。one替代可数名词，it/this不用于比较结构。"},{"i":31,"s":"Your bedroom is much bigger than mine. I like it a lot.","o":["A. that","B. one","C. mine","D. this"],"a":"C","e":"空后无名词，需名词性物主代词mine表示「我的卧室」。that/one/this均不能表达物主关系。"},{"i":32,"s":"Both of my parents are teachers. They work very hard.","o":["A. All","B. Either","C. Neither","D. Both"],"a":"D","e":"parents是两个人，用Both表示「两者都」。All用于三者以上，Either表「任一」，Neither表「两者都不」。"},{"i":33,"s":"All the students in our class passed the difficult exam.","o":["A. All","B. Both","C. Either","D. Neither"],"a":"A","e":"班级学生是三者以上，用All表示「全部都」。Both只用于两者，Either/Neither也不适用多数。"},{"i":34,"s":"You can take either the blue pen or the black one.","o":["A. both","B. either","C. neither","D. none"],"a":"B","e":"两者中任选其一用either...or...结构。both表两者都，neither表两者都不，none用于三者以上。"},{"i":35,"s":"Neither of the two answers is correct. Please try again.","o":["A. Both","B. Either","C. Neither","D. None"],"a":"C","e":"两个答案都错用Neither，后接单数谓语is。Both表都正确，Either表任一正确，None用于三者以上。"},{"i":36,"s":"There are few apples left. We need to buy some more.","o":["A. few","B. a few","C. little","D. a little"],"a":"A","e":"后句说需要买，说明苹果「几乎没有」，用few表否定含义。a few表「有几个」无需再买，little修饰不可数。"},{"i":37,"s":"I have a few friends here. We often play basketball together.","o":["A. a few","B. few","C. a little","D. much"],"a":"A","e":"后句说一起打球，说明「有几个朋友」，用a few表肯定含义。few表几乎没有，a little/much修饰不可数。"},{"i":38,"s":"There is little milk at home. Please buy some on your way.","o":["A. few","B. little","C. a little","D. many"],"a":"B","e":"后句说需要买，说明牛奶「几乎没有」，milk不可数用little。few/a few修饰可数名词。"},{"i":39,"s":"We still have a little time. Let us finish the work now.","o":["A. few","B. little","C. a little","D. many"],"a":"C","e":"后句说现在完成工作，说明「还有一点时间」，time不可数用a little。few/little表否定，many修饰可数。"},{"i":40,"s":"This cake is delicious. May I have another piece? the boy asked.","o":["A. another","B. other","C. others","D. the other"],"a":"A","e":"another表示「再一，又一」，指三者以上中再来一块。the other用于两者中的另一个，other/others用法不当。"},{"i":41,"s":"I have two brothers. One is a doctor, the other is a teacher.","o":["A. another","B. the other","C. other","D. others"],"a":"B","e":"两者中一个用one，另一个用the other。another用于三者以上的另一个，other/others不能用于此结构。"},{"i":42,"s":"Some students like singing. Others prefer dancing after school.","o":["A. another","B. other","C. the other","D. others"],"a":"D","e":"others泛指「其他的人」，与前句Some形成Some...others...结构。another表单数，the other表两者中另一个。"},{"i":43,"s":"The two friends often help each other with their homework.","o":["A. one another","B. themselves","C. each other","D. ourselves"],"a":"C","e":"两个人之间「互相」用each other。one another多用于三者以上，themselves/ourselves是反身代词不表互相。"},{"i":44,"s":"All the team members should help one another to win the game.","o":["A. each other","B. ourselves","C. themselves","D. one another"],"a":"D","e":"全队成员为多人，互相帮助用one another。each other多用于两者之间，反身代词不表互相。"},{"i":45,"s":"There are many visitors at Lushan Mountain every summer.","o":["A. much","B. many","C. few","D. a little"],"a":"B","e":"visitors是可数名词复数，用many修饰。much/a little修饰不可数名词，few表否定含义与语境矛盾。","t":"庐山是江西著名景点，夏季游客众多。"},{"i":46,"s":"Jingdezhen is famous for its beautiful porcelain, the guide said.","o":["A. it","B. itself","C. its","D. this"],"a":"C","e":"名词porcelain前用形容词性物主代词its指「它的瓷器」。it是主/宾格，itself是反身代词，this指示不当。","t":"景德镇以瓷器闻名天下，有「瓷都」之称。"},{"i":47,"s":"Is this your first time to visit Tengwang Pavilion? she asked.","o":["A. you","B. your","C. yours","D. yourself"],"a":"B","e":"名词time前用形容词性物主代词your修饰。you是主/宾格，yours是名词性物主代词，yourself是反身代词。","t":"滕王阁位于南昌，因王勃《滕王阁序》名扬天下。"},{"i":48,"s":"Poyang Lake is the largest freshwater lake in China. We are proud of it.","o":["A. it","B. its","C. itself","D. this"],"a":"A","e":"介词of后接宾格代词it指代Poyang Lake。its是物主代词需接名词，itself是反身代词，this不用于此指代。","t":"鄱阳湖是中国最大的淡水湖，位于江西北部。"},{"i":49,"s":"Visitors to Jinggangshan can learn about its revolutionary history.","o":["A. it","B. this","C. its","D. itself"],"a":"C","e":"名词history前用形容词性物主代词its指「它的历史」。it是主/宾格，this语义不当，itself是反身代词。","t":"井冈山是中国革命摇篮，红色旅游圣地。"},{"i":50,"s":"None of the students knew the answer to the last question.","o":["A. Both","B. Neither","C. Either","D. None"],"a":"D","e":"学生为三者以上，全部不知道用None。Both/Neither/Either均只用于两者之间。"}]},{"id":"future","n":"一般将来时","d":"六年考频1/6（2021）","dd":"同词根四时态，需判断将来时间参照。区分：will(临时决定) vs be going to(计划)。覆盖主将从现、Shall we...建议句型。","q":[{"i":1,"s":"My family and I ______ to Beijing next week.","o":["A. will go","B. are going","C. went","D. goes"],"a":"A","e":"next week是明确将来时间标志，用will+动词原形。"},{"i":2,"s":"All the students in Grade 9 ______ a test tomorrow morning.","o":["A. will have","B. are having","C. had","D. have"],"a":"A","e":"tomorrow morning表示将来时间，用will+动词原形。"},{"i":3,"s":"My father ______ a new computer for my birthday next month.","o":["A. will buy","B. is buying","C. bought","D. buys"],"a":"A","e":"next month是将来时间标志，用will buy。"},{"i":4,"s":"— When will you come back home? — I ______ back in two days.","o":["A. came","B. will come","C. come","D. am coming"],"a":"B","e":"in two days表示「两天后」，用will come。"},{"i":5,"s":"We ______ an exciting sports meeting in our school next Friday.","o":["A. had","B. will have","C. have","D. are having"],"a":"B","e":"next Friday是将来时间标志，用will have。"},{"i":6,"s":"— What will the weather be like tomorrow? — It ______ sunny and warm.","o":["A. is","B. will be","C. was","D. is being"],"a":"B","e":"tomorrow指将来，天气预测用will be。"},{"i":7,"s":"— What does the weather report say? — It says it ______ sunny this Sunday.","o":["A. is","B. was","C. will be","D. is being"],"a":"C","e":"this Sunday在此为将来时间，用will be。"},{"i":8,"s":"— What are you doing this weekend? — My mother ______ me to the zoo.","o":["A. took","B. takes","C. will take","D. is taking"],"a":"C","e":"this weekend指即将到来的周末，用will take。"},{"i":9,"s":"— What is your plan for tonight? — I ______ my homework this evening.","o":["A. did","B. do","C. will do","D. am doing"],"a":"C","e":"this evening还未发生，用will do表将来动作。"},{"i":10,"s":"— Any big events next month? — Yes, there ______ a big concert in the city.","o":["A. is","B. was","C. has","D. will be"],"a":"D","e":"next month是将来时间，there will be表「将有」。"},{"i":11,"s":"— What will the boys do after school? — They ______ basketball on the playground.","o":["A. played","B. are playing","C. play","D. will play"],"a":"D","e":"after school this afternoon还未发生，用will play。"},{"i":12,"s":"— Can you join us for dinner? — Sorry, I ______ my aunt this evening.","o":["A. visited","B. am visiting","C. visit","D. will visit"],"a":"D","e":"this evening指今晚(将来)，用will visit。"},{"i":13,"s":"— What does your sister want to be? — She says she ______ a doctor when she grows up.","o":["A. will become","B. is becoming","C. became","D. becomes"],"a":"A","e":"when she grows up指将来时间，用will become。"},{"i":14,"s":"They ______ a beautiful new house in the countryside next year.","o":["A. will build","B. are building","C. built","D. build"],"a":"A","e":"next year是将来时间标志，用will build。"},{"i":15,"s":"— Hurry up! We are going to be late! — Don't worry. We ______ late.","o":["A. weren't","B. aren't","C. aren't being","D. won't be"],"a":"D","e":"对话中安慰对方「不会迟到」，用won't be。"},{"i":16,"s":"— The phone is ringing. — I ______ it right away.","o":["A. answered","B. will answer","C. answer","D. am answering"],"a":"B","e":"电话响了，临时决定去接，用will answer。"},{"i":17,"s":"— What are your plans for the holiday? — I ______ my grandparents in the countryside.","o":["A. visit","B. visited","C. am going to visit","D. am visiting"],"a":"C","e":"问「假期计划」，用be going to表计划好的意图。"},{"i":18,"s":"Look at those black clouds! It ______ soon.","o":["A. rained","B. is raining","C. rains","D. is going to rain"],"a":"D","e":"看到乌云，有证据的预测，用is going to rain。"},{"i":19,"s":"— I don't know how to use this app. — Don't worry. I ______ you.","o":["A. will help","B. am helping","C. helped","D. help"],"a":"A","e":"承诺帮助对方，用will help表承诺。"},{"i":20,"s":"Lily ______ a birthday party for her daughter next Sunday.","o":["A. has","B. is going to have","C. had","D. is having"],"a":"B","e":"next Sunday是将来时间，用is going to have表计划。"},{"i":21,"s":"— Why are you taking an umbrella? — Because I think it ______ later.","o":["A. rains","B. rained","C. will rain","D. is raining"],"a":"C","e":"I think引导的预测，用will rain。"},{"i":22,"s":"— There is no milk at home. — Really? I ______ some from the store.","o":["A. bought","B. buy","C. am buying","D. will buy"],"a":"D","e":"听到没牛奶后临时决定去买，用will buy。"},{"i":23,"s":"I promise that I ______ to you every week while I am away.","o":["A. will write","B. am writing","C. wrote","D. write"],"a":"A","e":"I promise引导的承诺，用will write。"},{"i":24,"s":"— These bags are too heavy for me. — I ______ them for you.","o":["A. carried","B. will carry","C. carry","D. am carrying"],"a":"B","e":"主动提出帮忙，临时决定，用will carry。"},{"i":25,"s":"The Browns ______ to Hainan for their winter holiday.","o":["A. fly","B. flew","C. are going to fly","D. are flying"],"a":"C","e":"已有计划的冬季旅行，用are going to fly。"},{"i":26,"s":"— Is there any meeting next week? — Yes, there ______ a parents' meeting next Monday.","o":["A. is","B. was","C. has been","D. will be"],"a":"D","e":"next Monday是将来时间，用will be表「将有」。"},{"i":27,"s":"— When will you clean your room? — I ______ it before my friends come over.","o":["A. am going to clean","B. am cleaning","C. cleaned","D. clean"],"a":"A","e":"before从句用现在时，主句用be going to表计划。"},{"i":28,"s":"— It is really hot in this room. — I ______ the window for you.","o":["A. opened","B. will open","C. open","D. am opening"],"a":"B","e":"感觉热，临时决定开窗，用will open。"},{"i":29,"s":"The bus is leaving right now! We ______ it if we don't run.","o":["A. miss","B. missed","C. are going to miss","D. are missing"],"a":"C","e":"车要开走了，有证据的推测，用are going to miss。"},{"i":30,"s":"— Please remember to call me tonight. — OK, I ______.","o":["A. am remembering","B. remembered","C. remember","D. will"],"a":"D","e":"OK回应请求，省略句I will表承诺。"},{"i":31,"s":"Maybe our school team ______ the football match tomorrow.","o":["A. will win","B. is winning","C. won","D. wins"],"a":"A","e":"maybe表示不确定预测，用will win。"},{"i":32,"s":"My elder brother ______ abroad to study medicine next year.","o":["A. went","B. is going to go","C. goes","D. is going"],"a":"B","e":"next year是将来时间，用is going to go表计划。"},{"i":33,"s":"— We need someone to take photos at the party. — Don't worry, I ______ them.","o":["A. took","B. take","C. will take","D. am taking"],"a":"C","e":"对话中临时承担任务，用will take。"},{"i":34,"s":"The twins ______ their own business after they finish college.","o":["A. started","B. start","C. are starting","D. are going to start"],"a":"D","e":"after college指将来，用are going to start表计划。"},{"i":35,"s":"— Do you think people will live on the moon? — Yes, I believe people ______ there one day.","o":["A. will live","B. are living","C. lived","D. live"],"a":"A","e":"one day「总有一天」，用will live表将来。"},{"i":36,"s":"If it doesn't rain tomorrow, we ______ a picnic in the park.","o":["A. have","B. will have","C. had","D. are having"],"a":"B","e":"if条件句用现在时，主句用will have「主将从现」。"},{"i":37,"s":"When my father arrives home, I ______ him the good news.","o":["A. told","B. tell","C. will tell","D. am telling"],"a":"C","e":"when从句用现在时，主句用will tell「主将从现」。"},{"i":38,"s":"As soon as the class ends, the students ______ out of the room.","o":["A. ran","B. are running","C. run","D. will run"],"a":"D","e":"as soon as从句用现在时，主句用will run「主将从现」。"},{"i":39,"s":"— ______ we go to the library together this afternoon? — Good idea!","o":["A. Shall","B. Will","C. Did","D. Are"],"a":"A","e":"Shall we...是提建议的固定句型，用于第一人称。"},{"i":40,"s":"— What do your parents hope for you? — They hope I ______ a famous writer some day.","o":["A. became","B. will become","C. become","D. am becoming"],"a":"B","e":"some day「有朝一日」，用will become表将来。"},{"i":41,"s":"Next month, our class ______ Lushan Mountain for a school trip.","o":["A. visited","B. visits","C. will visit","D. is visiting"],"a":"C","e":"next month是将来标志，用will visit。庐山是江西名山。","t":"庐山位于江西九江，是联合国教科文组织世界遗产"},{"i":42,"s":"Unless you hurry up, you ______ the school bus.","o":["A. missed","B. miss","C. are missing","D. will miss"],"a":"D","e":"unless从句用现在时，主句用will miss「主将从现」。"},{"i":43,"s":"The Jingdezhen Ceramic Festival ______ next October as planned.","o":["A. will take place","B. is taking place","C. took place","D. takes place"],"a":"A","e":"next October是将来时间，用will take place。景德镇在江西。","t":"景德镇陶瓷节是江西重要的文化活动"},{"i":44,"s":"I believe you ______ much progress in English this term.","o":["A. made","B. will make","C. make","D. are making"],"a":"B","e":"this term指本学期(未结束)，用will make表预期。"},{"i":45,"s":"We ______ to Poyang Lake to watch birds this winter.","o":["A. go","B. went","C. are going to go","D. are going"],"a":"C","e":"this winter指即将到来的冬天，用be going to表计划。鄱阳湖在江西。","t":"鄱阳湖是中国最大的淡水湖，冬季是观鸟最佳季节"},{"i":46,"s":"There ______ a big art show at Tengwang Pavilion next Saturday.","o":["A. was","B. is","C. has been","D. will be"],"a":"D","e":"next Saturday是将来时间，用will be。滕王阁在南昌。","t":"滕王阁位于江西南昌，是江南三大名楼之一"},{"i":47,"s":"I ______ you a message as soon as I get to the train station.","o":["A. will send","B. am sending","C. sent","D. send"],"a":"A","e":"as soon as从句用现在时，主句用will send「主将从现」。"},{"i":48,"s":"Students ______ about the Red Army history in Jinggangshan next term.","o":["A. learned","B. will learn","C. learn","D. are learning"],"a":"B","e":"next term是将来时间标志，用will learn。井冈山在江西。","t":"井冈山位于江西，是中国革命的摇篮"},{"i":49,"s":"— I feel sad about the exam result. — Don't lose heart. Things ______ better soon.","o":["A. got","B. get","C. will get","D. are getting"],"a":"C","e":"soon是将来标志，用will get表「会好起来」。"},{"i":50,"s":"She ______ until her mother comes back home.","o":["A. didn't sleep","B. isn't sleeping","C. doesn't sleep","D. won't sleep"],"a":"D","e":"not...until句型，主句用won't sleep表将来。"}]},{"id":"past_vs_present","n":"一般过去时 vs 一般现在时","d":"课标补充（近年未单考）","dd":"同一动词词根 × 四种时态。区分：过去一次性事件 vs 现在习惯/真理。覆盖yesterday/last week等过去标志、always/every day等现在习惯标志。","q":[{"i":1,"s":"— What did you do yesterday? — I ______ to the museum with my classmates.","o":["A. went","B. go","C. will go","D. am going"],"a":"A","e":"yesterday是过去时间标志，用一般过去时went。"},{"i":2,"s":"— What does your brother do after school? — He ______ his homework every day.","o":["A. did","B. does","C. will do","D. is doing"],"a":"B","e":"every day表示习惯性动作，用一般现在时does。"},{"i":3,"s":"— What did you do last Sunday? — We ______ a picnic in the park.","o":["A. had","B. have","C. will have","D. are having"],"a":"A","e":"last Sunday是过去时间，用一般过去时had。"},{"i":4,"s":"The class ______ an important test next Friday, so everyone is busy reviewing.","o":["A. took","B. takes","C. will take","D. is taking"],"a":"C","e":"next Friday是将来时间，用一般将来时will take。"},{"i":5,"s":"— Did you see any good films recently? — Yes, I ______ a wonderful one a week ago.","o":["A. saw","B. sees","C. will see","D. is seeing"],"a":"A","e":"a week ago是过去时间标志，用一般过去时saw。"},{"i":6,"s":"— What time does Lucy get up? — She usually ______ up at half past six.","o":["A. got","B. gets","C. will get","D. is getting"],"a":"B","e":"usually表示经常发生的习惯，用一般现在时gets。"},{"i":7,"s":"— Be quiet! The baby ______. — Oh, sorry. I didn't notice.","o":["A. slept","B. sleeps","C. will sleep","D. is sleeping"],"a":"D","e":"Be quiet!提示动作正在发生，用现在进行时is sleeping。"},{"i":8,"s":"— Look! The boys ______ this way. — Let's wait for them here.","o":["A. came","B. come","C. will come","D. are coming"],"a":"D","e":"Look!表示正在发生的动作，用现在进行时are coming。"},{"i":9,"s":"— Where is Tom? I can't find him. — He ______ out just now.","o":["A. went","B. goes","C. will go","D. is going"],"a":"A","e":"just now是过去时间状语，用一般过去时went。"},{"i":10,"s":"— Does your sister drink coffee? — No, she never ______ coffee. It's too bitter.","o":["A. drank","B. drinks","C. will drink","D. is drinking"],"a":"B","e":"never表示一贯的情况，用一般现在时drinks。"},{"i":11,"s":"My cousin ______ to Canada for further study next month.","o":["A. went","B. goes","C. will go","D. is going"],"a":"C","e":"next month是将来时间，用一般将来时will go。"},{"i":12,"s":"— You look tired. Did you sleep well? — No, I ______ only four hours last night.","o":["A. slept","B. sleep","C. will sleep","D. am sleeping"],"a":"A","e":"last night是过去时间，用一般过去时slept。"},{"i":13,"s":"— What is your mother doing? — Sorry, she ______ a shower at the moment.","o":["A. took","B. takes","C. will take","D. is taking"],"a":"D","e":"at the moment表示此刻正在进行的动作，用现在进行时。"},{"i":14,"s":"My grandfather ______ a walk in the park every morning before breakfast.","o":["A. took","B. takes","C. will take","D. is taking"],"a":"B","e":"every morning表示每天的习惯，用一般现在时takes。"},{"i":15,"s":"She ______ to play the piano when she was only five years old.","o":["A. began","B. begins","C. will begin","D. is beginning"],"a":"A","e":"when she was five是过去时间状语，用一般过去时began。"},{"i":16,"s":"— What is that delicious smell? — Mum ______ a chocolate cake in the kitchen.","o":["A. made","B. makes","C. will make","D. is making"],"a":"D","e":"根据语境判断动作正在发生，用现在进行时is making。"},{"i":17,"s":"— When will the package arrive? — Don't worry. I ______ it in a few days.","o":["A. sent","B. sends","C. will send","D. is sending"],"a":"C","e":"in a few days是将来时间，用一般将来时will send。"},{"i":18,"s":"My grandmother always ______ me stories when I was a little child.","o":["A. told","B. tells","C. will tell","D. is telling"],"a":"A","e":"when I was a child表明是过去的习惯，用一般过去时told。虽然always看似现在标记，但时间框架是过去。"},{"i":19,"s":"— Listen! Someone ______ in the next room. — It sounds beautiful.","o":["A. sang","B. sings","C. will sing","D. is singing"],"a":"D","e":"Listen!提示动作正在发生，用现在进行时is singing。"},{"i":20,"s":"The sun ______ in the east and sets in the west every day.","o":["A. rose","B. rises","C. will rise","D. is rising"],"a":"B","e":"太阳东升西落是客观真理，永远用一般现在时rises。"},{"i":21,"s":"— Have you ever been to Shanghai? — Not yet, but I ______ it next month.","o":["A. visited","B. visits","C. will visit","D. is visiting"],"a":"C","e":"next month是明确的将来时间，用一般将来时will visit。"},{"i":22,"s":"My father is very healthy. He ______ in the park twice a week.","o":["A. ran","B. runs","C. will run","D. is running"],"a":"B","e":"twice a week表示经常性习惯，用一般现在时runs。"},{"i":23,"s":"My sister ______ a lot of time on her studies these days.","o":["A. spent","B. spends","C. will spend","D. is spending"],"a":"D","e":"these days表示现阶段持续的动作，用现在进行时is working。"},{"i":24,"s":"— How long has she lived here? — She ______ in this city since 2019.","o":["A. lived","B. lives","C. will live","D. has lived"],"a":"D","e":"since 2019表示从过去持续到现在的动作，用现在完成时has lived。"},{"i":25,"s":"The teacher ______ us the test results tomorrow, so don't worry now.","o":["A. gave","B. gives","C. will give","D. is giving"],"a":"C","e":"tomorrow是将来时间，用一般将来时will give。"},{"i":26,"s":"She is very kind. She ______ a small gift every time she visits us.","o":["A. brought","B. brings","C. will bring","D. is bringing"],"a":"B","e":"every time表示反复发生的习惯，用一般现在时brings。"},{"i":27,"s":"— Who ______ you English last month? — Mrs. Green did. She was great.","o":["A. taught","B. teaches","C. will teach","D. is teaching"],"a":"A","e":"last month是过去时间，用一般过去时taught。"},{"i":28,"s":"— Where is Lily? I can't find her. — She ______ a red dress today.","o":["A. wore","B. wears","C. will wear","D. is wearing"],"a":"D","e":"问Where is Lily?说明描述当前状态，用现在进行时is wearing。"},{"i":29,"s":"— He studies very hard every day. — I'm sure he ______ a doctor one day.","o":["A. became","B. becomes","C. will become","D. is becoming"],"a":"C","e":"one day表示将来的某一天，用一般将来时will become。"},{"i":30,"s":"My mother always ______ that health is more important than money.","o":["A. said","B. says","C. will say","D. is saying"],"a":"B","e":"always表示一贯的看法和习惯，用一般现在时says。"},{"i":31,"s":"— What is Tom doing this weekend? — He ______ his cousin in Nanchang.","o":["A. visited","B. visits","C. will visit","D. is visiting"],"a":"D","e":"this weekend表示计划好的近期安排，用现在进行时is visiting表将来。"},{"i":32,"s":"— The phone is ringing. — Don't move. I ______ it myself.","o":["A. got","B. gets","C. will get","D. am getting"],"a":"C","e":"说话时临时决定做某事，用一般将来时will get。"},{"i":33,"s":"— I didn't see you at the party. — I ______ at home all evening yesterday.","o":["A. stayed","B. stays","C. will stay","D. am staying"],"a":"A","e":"didn't see说明对话在谈论过去，用一般过去时stayed。"},{"i":34,"s":"There ______ an important meeting in the school hall this Friday afternoon.","o":["A. was","B. is","C. will be","D. has been"],"a":"C","e":"this Friday afternoon是将来时间，用一般将来时will be。"},{"i":35,"s":"Water ______ at 100 degrees Celsius. This is a basic fact in science.","o":["A. boiled","B. boils","C. will boil","D. is boiling"],"a":"B","e":"水在100度沸腾是科学真理，永远用一般现在时boils。"},{"i":36,"s":"When I ______ a child, I lived with my grandparents in a small village.","o":["A. was","B. am","C. will be","D. am being"],"a":"A","e":"lived表明整个语境是过去，用一般过去时was。"},{"i":37,"s":"— Your bag looks really heavy. — Yes, I think I ______ a taxi home.","o":["A. took","B. takes","C. will take","D. am taking"],"a":"C","e":"临时做出的决定，用一般将来时will take。"},{"i":38,"s":"Light ______ much faster than sound, as every student knows.","o":["A. traveled","B. travels","C. will travel","D. is traveling"],"a":"B","e":"光速比声速快是客观真理，永远用一般现在时travels。"},{"i":39,"s":"The old man ______ his keys and couldn't get into his own house.","o":["A. lost","B. loses","C. will lose","D. is losing"],"a":"A","e":"couldn't表明整个语境是过去，用一般过去时lost。"},{"i":40,"s":"— I have a bad headache. — Sit down and I ______ you a cup of hot tea.","o":["A. made","B. makes","C. will make","D. am making"],"a":"C","e":"临时主动提出帮忙，用一般将来时will make。"},{"i":41,"s":"Two years ago, I learned that light ______ faster than sound in the air.","o":["A. traveled","B. travels","C. will travel","D. is traveling"],"a":"B","e":"虽然主句有Two years ago，但光速快于声速是客观真理，从句永远用一般现在时travels。"},{"i":42,"s":"When I was a child, my father always ______ me to the park on Sundays.","o":["A. took","B. takes","C. will take","D. is taking"],"a":"A","e":"when I was a child表明整个语境是过去，「always」修饰的是过去的习惯动作，用一般过去时took。"},{"i":43,"s":"Every year, thousands of tourists ______ Tengwang Pavilion in Nanchang.","o":["A. visited","B. visit","C. will visit","D. are visiting"],"a":"B","e":"Every year表示每年重复的习惯，用一般现在时visit。注意thousands of tourists是复数主语。","t":"南昌「滕王阁」每年吸引大量游客，every year指向习惯性动作，用一般现在时。"},{"i":44,"s":"Jingdezhen ______ famous for its ceramics ever since the Song Dynasty.","o":["A. was","B. is","C. will be","D. has been"],"a":"D","e":"ever since the Song Dynasty表示从宋代持续至今，用现在完成时has been。","t":"「景德镇」自宋代至今因陶瓷闻名，ever since表示从过去持续到现在，用现在完成时。"},{"i":45,"s":"— Do you know when the next train to Jiujiang ______? — In about twenty minutes.","o":["A. left","B. leaves","C. will leave","D. is leaving"],"a":"C","e":"问的是将来时间点，用一般将来时will leave。"},{"i":46,"s":"Farmers in Gannan ______ navel oranges for hundreds of years, and the tradition continues.","o":["A. grew","B. grow","C. will grow","D. have grown"],"a":"D","e":"for hundreds of years表示从过去持续至今，且tradition continues提示现在仍在进行，用现在完成时。","t":"「赣南脐橙」种植延续数百年至今，for+时间段用现在完成时have grown。"},{"i":47,"s":"Zhu Xi ______ at Bailudong Academy in the Song Dynasty long ago.","o":["A. taught","B. teaches","C. will teach","D. has taught"],"a":"A","e":"in the Song Dynasty是明确的历史时间，动作已结束，用一般过去时taught。","t":"「白鹿洞书院」朱熹在宋代讲学，宋代是明确的过去历史时期，用一般过去时。"},{"i":48,"s":"So far, the scientist ______ no sign of life on that distant planet.","o":["A. found","B. finds","C. will find","D. has found"],"a":"D","e":"So far表示到目前为止，用现在完成时has found。"},{"i":49,"s":"— I'm not sure if it ______ tomorrow. — If it rains, we will stay indoors.","o":["A. rained","B. rains","C. will rain","D. is raining"],"a":"C","e":"tomorrow是将来的时间，主句询问将来是否下雨，用一般将来时will rain。if引导的宾语从句中可以用will。"},{"i":50,"s":"Our geography teacher told us that the moon ______ around the earth.","o":["A. went","B. goes","C. will go","D. is going"],"a":"B","e":"虽然主句told是过去时，但月球绕地球转是客观真理，从句始终用一般现在时goes。"}]},{"id":"tense_mixed","n":"时态综合","d":"融合练习 · 4考点混编","dd":"混合现在进行时、一般过去时vs一般现在时、现在完成时、被动语态。不再提示考点名称，学生需自己判断语境→选择正确时态/语态。每轮随机抽50题，每次不同组合。","q":[{"i":1,"s":"Listen! The girl ____ an English song in the next room.","o":["A. is singing","B. was singing","C. sings","D. sang"],"a":"A","e":"「Listen!」是现在进行时典型信号词，指向正在发生的动作。B-过去进行时（过去某刻正在唱），C-一般现在时（习惯性），D-一般过去时（已唱完）。","sc":"现在进行时"},{"i":2,"s":"Look! The boys ____ basketball on the playground right now.","o":["A. play","B. are playing","C. were playing","D. will play"],"a":"B","e":"「Look!」+「right now」双信号锁定此刻正在打篮球。A-一般现在时（习惯），C-过去进行时，D-一般将来时。","sc":"现在进行时"},{"i":3,"s":"Be quiet! Your father ____ an important phone call at the moment.","o":["A. was making","B. made","C. is making","D. makes"],"a":"C","e":"「Be quiet!」+「at the moment」表明说话瞬间正在打电话。A-过去进行时，B-一般过去时，D-一般现在时（习惯性）。","sc":"现在进行时"},{"i":4,"s":"Don't go out now. It ____ very hard outside.","o":["A. rains","B. rained","C. will rain","D. is raining"],"a":"D","e":"「now」明确指向此刻正在下雨——不要现在出门的原因。A-一般现在时（常态），B-一般过去时，C-一般将来时。","sc":"现在进行时"},{"i":5,"s":"Hurry up! Everyone ____ for you at the bus stop right now.","o":["A. is waiting","B. was waiting","C. waits","D. waited"],"a":"A","e":"「Hurry up!」催促+「right now」说明大家正在等候。B-过去进行时，C-一般现在时（习惯），D-一般过去时。","sc":"现在进行时"},{"i":6,"s":"Shh! The baby ____ in the bedroom. Don't wake her up.","o":["A. slept","B. is sleeping","C. was sleeping","D. sleeps"],"a":"B","e":"「Shh!」+「Don't wake」共同指向婴儿此刻正在睡觉。A-一般过去时，C-过去进行时，D-一般现在时（习惯）。","sc":"现在进行时"},{"i":7,"s":"Look! The sun ____ over Lushan Mountain right now.","o":["A. was rising","B. rose","C. is rising","D. rises"],"a":"C","e":"「Look!」+「right now」指向庐山日出正在升起的瞬间。A-过去进行时，B-一般过去时，D-一般现在时（自然规律）。","t":"以庐山日出为场景，融入江西地理文化元素。","sc":"现在进行时"},{"i":8,"s":"It is seven o'clock now. My mother ____ dinner in the kitchen.","o":["A. cooks","B. cooked","C. will cook","D. is cooking"],"a":"D","e":"「seven o'clock now」点明此刻时间，妈妈正在做饭。A-一般现在时（日常习惯），B-一般过去时，C-一般将来时。","sc":"现在进行时"},{"i":9,"s":"Please be quiet. I ____ to the news on the radio now.","o":["A. am listening","B. was listening","C. listen","D. will listen"],"a":"A","e":"「now」标记此刻正在收听新闻。B-过去进行时，C-一般现在时（习惯），D-一般将来时。","sc":"现在进行时"},{"i":10,"s":"Don't talk to him. He ____ a difficult math problem now.","o":["A. solves","B. is solving","C. was solving","D. will solve"],"a":"B","e":"「Don't talk」暗示他此刻正在解题——打扰正在做困难事情的人不合理。A-一般现在时，C-过去进行时，D-一般将来时。","sc":"现在进行时"},{"i":11,"s":"The children ____ a big snowman in the yard at this moment.","o":["A. were making","B. made","C. are making","D. make"],"a":"C","e":"「at this moment」是现在进行时明确信号词。A-过去进行时，B-一般过去时，D-一般现在时（习惯）。","sc":"现在进行时"},{"i":12,"s":"Look at the sky! The birds ____ south for the winter now.","o":["A. fly","B. flew","C. will fly","D. are flying"],"a":"D","e":"「Look!」+「now」双信号指向鸟儿正在南飞。A-一般现在时（自然规律），B-一般过去时，C-一般将来时。","sc":"现在进行时"},{"i":13,"s":"My little brother ____ a letter to his pen pal right now.","o":["A. is writing","B. was writing","C. writes","D. wrote"],"a":"A","e":"「right now」直接指向此刻正在写信。B-过去进行时，C-一般现在时（习惯），D-一般过去时。","sc":"现在进行时"},{"i":14,"s":"She cannot answer the phone. She ____ a shower at the moment.","o":["A. takes","B. is taking","C. took","D. was taking"],"a":"B","e":"「cannot answer」解释当前无法接电话的原因+「at the moment」指向正在洗澡。A-一般现在时，C-一般过去时，D-过去进行时。","sc":"现在进行时"},{"i":15,"s":"Wait a moment! I ____ my keys. I cannot find them.","o":["A. looked for","B. will look for","C. am looking for","D. look for"],"a":"C","e":"「Wait」说明说话人此刻正在找东西，动作与说话同时进行。A-一般过去时，B-一般将来时，D-一般现在时（习惯）。","sc":"现在进行时"},{"i":16,"s":"— Why are you so quiet? — I ____ about the English test tomorrow.","o":["A. thought","B. think","C. was thinking","D. am thinking"],"a":"D","e":"问句「are you」点明现在时语境，答句描述此刻正在进行的心理活动。A-一般过去时，B-一般现在时（习惯），C-过去进行时。","sc":"现在进行时"},{"i":17,"s":"— Where is your sister? — She ____ the flowers in the garden.","o":["A. is watering","B. was watering","C. waters","D. watered"],"a":"A","e":"问句用「is」询问当前位置，答句说明她正在浇花——位置与动作同步。B-过去进行时，C-一般现在时（习惯），D-一般过去时。","sc":"现在进行时"},{"i":18,"s":"— May I speak to Mr. Wang? — Sorry, he ____ a meeting right now.","o":["A. has","B. is having","C. had","D. was having"],"a":"B","e":"打电话场景+「right now」说明王先生此刻正在开会，无法接听。A-一般现在时（习惯），C-一般过去时，D-过去进行时。","sc":"现在进行时"},{"i":19,"s":"— Can I use your bike today? — Sorry, my brother ____ it to school.","o":["A. was riding","B. rode","C. is riding","D. rides"],"a":"C","e":"借车被拒——弟弟正骑着去学校，车不在。A-过去进行时，B-一般过去时，D-一般现在时（习惯）。","sc":"现在进行时"},{"i":20,"s":"— What is that loud noise? — The workers ____ the road outside.","o":["A. repaired","B. repair","C. will repair","D. are repairing"],"a":"D","e":"问句听到噪音，答句解释工人正在修路——动作与听到的声音同步。A-一般过去时，B-一般现在时（习惯），C-一般将来时。","sc":"现在进行时"},{"i":21,"s":"— Is Tom in his room? — Yes, he ____ his homework there now.","o":["A. is doing","B. does","C. did","D. was doing"],"a":"A","e":"问当前位置+答句「now」说明他此刻正在做作业。B-一般现在时（习惯），C-一般过去时，D-过去进行时。","sc":"现在进行时"},{"i":22,"s":"— Why isn't she coming to dinner? — She ____ her hands in the bathroom.","o":["A. washed","B. is washing","C. washes","D. will wash"],"a":"B","e":"问句「isn't coming」奠定现在进行时语境，答句延续同一时间框架——正在洗手。A-一般过去时，C-一般现在时，D-一般将来时。","sc":"现在进行时"},{"i":23,"s":"— Can you help me with this box? — Wait. I ____ the dishes now.","o":["A. did","B. will do","C. am doing","D. was doing"],"a":"C","e":"「Wait」+「now」表明说话人此刻正在洗碗，稍后帮忙。A-一般过去时，B-一般将来时，D-过去进行时。","sc":"现在进行时"},{"i":24,"s":"— Where are the children? — They ____ a game in the living room.","o":["A. played","B. play","C. were playing","D. are playing"],"a":"D","e":"问句用「are」问现在位置，答句说明孩子们正在玩游戏——动作与询问同步。A-一般过去时，B-一般现在时，C-过去进行时。","sc":"现在进行时"},{"i":25,"s":"— Why are you under the desk? — I ____ my lost pen everywhere.","o":["A. am looking for","B. looked for","C. was looking for","D. look for"],"a":"A","e":"问句「are you」暗示当前状态，答句延续此刻正在找笔。B-一般过去时，C-过去进行时，D-一般现在时。","sc":"现在进行时"},{"i":26,"s":"— Let's go out and play. — Not now. I ____ an interesting book.","o":["A. read","B. am reading","C. was reading","D. will read"],"a":"B","e":"「Not now」拒绝当前邀请，因为此刻正在读书——动作正在发生。A-一般现在时，C-过去进行时，D-一般将来时。","sc":"现在进行时"},{"i":27,"s":"— Why is the door open? — Dad ____ the car in the garage.","o":["A. cleaned","B. cleans","C. is cleaning","D. was cleaning"],"a":"C","e":"问句问当前状态原因，答句解释爸爸正在车库洗车——动作与门开的状态同步。A-一般过去时，B-一般现在时，D-过去进行时。","sc":"现在进行时"},{"i":28,"s":"— Do you know where Anna is? — She ____ her trip with her mother.","o":["A. plans","B. planned","C. was planning","D. is planning"],"a":"D","e":"问句问位置，答句说明Anna正在和妈妈规划旅行——当前正在进行的活动。A-一般现在时，B-一般过去时，C-过去进行时。","sc":"现在进行时"},{"i":29,"s":"— Is your father back home? — No, he ____ his car to the office now.","o":["A. is driving","B. was driving","C. drives","D. drove"],"a":"A","e":"问「回来了吗」答「正在开车去办公室」——「now」锁定此刻正在发生的动作。B-过去进行时，C-一般现在时，D-一般过去时。","sc":"现在进行时"},{"i":30,"s":"— Why are you carrying an umbrella? — It ____ outside. Look at the window.","o":["A. rained","B. is raining","C. was raining","D. rains"],"a":"B","e":"问句「are carrying」奠定现在时+答句「Look」说明外面正在下雨。A-一般过去时，C-过去进行时，D-一般现在时。","sc":"现在进行时"},{"i":31,"s":"— Can you turn down the TV? — Sorry, I ____ an important basketball match.","o":["A. watched","B. will watch","C. am watching","D. was watching"],"a":"C","e":"请求降低音量被拒——因为正在看关键比赛，不能错过。A-一般过去时，B-一般将来时，D-过去进行时。","sc":"现在进行时"},{"i":32,"s":"— Where is Lily now? — She ____ her clothes for the school trip.","o":["A. packs","B. packed","C. was packing","D. is packing"],"a":"D","e":"问句用「is」问现在位置，答句说明她正在为学校旅行打包。A-一般现在时，B-一般过去时，C-过去进行时。","sc":"现在进行时"},{"i":33,"s":"— What's that noise on your phone? — Oh, I ____ a short video. I'll turn it off.","o":["A. am watching","B. was watching","C. watch","D. will watch"],"a":"A","e":"问句听到声音+答句正在看视频——动作与说话时刻同步发生。B-过去进行时，C-一般现在时，D-一般将来时。","sc":"现在进行时"},{"i":34,"s":"— Are you free this afternoon? — No, I ____ for the English exam right now.","o":["A. prepare","B. am preparing","C. was preparing","D. will prepare"],"a":"B","e":"问是否有空，答句「right now」说明此刻正在备考，没空。A-一般现在时，C-过去进行时，D-一般将来时。","sc":"现在进行时"},{"i":35,"s":"— Why is the kitchen so messy? — My sister ____ a birthday cake for our mother.","o":["A. made","B. makes","C. is making","D. was making"],"a":"C","e":"问句描述当前厨房乱的状态，答句解释姐姐正在做蛋糕——动作与凌乱状态同步。A-一般过去时，B-一般现在时，D-过去进行时。","sc":"现在进行时"},{"i":36,"s":"— Can you hear that strange sound? — Yes, the wind ____ very hard outside.","o":["A. blows","B. blew","C. will blow","D. is blowing"],"a":"D","e":"「Can you hear」指向当前听觉，答句描述风正猛烈吹——无明确信号词但动作显然正在发生。A-一般现在时，B-一般过去时，C-一般将来时。","sc":"现在进行时"},{"i":37,"s":"— I smell something nice. What is it? — My grandma ____ chicken soup for us.","o":["A. cooks","B. was cooking","C. will cook","D. is cooking"],"a":"D","e":"闻到味道说明烹饪正在进行——感官线索锁定进行时，无now但动作已开始且未结束。A-一般现在时，B-过去进行时，C-一般将来时。","sc":"现在进行时"},{"i":38,"s":"— What is that artist doing? — He ____ a beautiful cup in Jingdezhen now.","o":["A. is making","B. was making","C. makes","D. made"],"a":"A","e":"问句「is doing」已奠定现在进行时语境，答句延续同一框架——正在制作瓷杯。B-过去进行时，C-一般现在时，D-一般过去时。","t":"以景德镇手工制瓷为场景，融入江西千年瓷都文化元素。","sc":"现在进行时"},{"i":39,"s":"— Is your mother busy? — Yes, she ____ the house all morning.","o":["A. cleans","B. is cleaning","C. cleaned","D. was cleaning"],"a":"B","e":"问句用「is」问现在状态，「all morning」包含此刻正在持续的清扫动作。A-一般现在时，C-一般过去时，D-过去进行时。","sc":"现在进行时"},{"i":40,"s":"— The phone is ringing. Can you get it? — Sorry, I ____ my hands now.","o":["A. was washing","B. washed","C. am washing","D. wash"],"a":"C","e":"电话正在响，答句「正在洗手」——为什么不能接电话的同步解释。A-过去进行时，B-一般过去时，D-一般现在时。","sc":"现在进行时"},{"i":41,"s":"— The school is so quiet today. — All the students ____ Tengwang Pavilion for a trip.","o":["A. visit","B. were visiting","C. will visit","D. are visiting"],"a":"D","e":"第一句描述学校当前安静，第二句解释学生们正在参观滕王阁——状态与动作因果关系。A-一般现在时，B-过去进行时，C-一般将来时。","t":"以滕王阁为研学旅行目的地，融入南昌标志性历史文化景点。","sc":"现在进行时"},{"i":42,"s":"— You look tired. What's wrong? — I ____ for a big test these days.","o":["A. am studying","B. was studying","C. study","D. studied"],"a":"A","e":"「You look tired」描述当前状态+「these days」近期持续进行——正在备考导致疲劳。B-过去进行时，C-一般现在时，D-一般过去时。","sc":"现在进行时"},{"i":43,"s":"— Can I borrow your dictionary? — Sorry, I ____ it myself.","o":["A. use","B. am using","C. was using","D. used"],"a":"B","e":"借字典被拒——因为自己正在用，对话逻辑锁定此刻动作。无now但现场情景必然为进行时。A-一般现在时，C-过去进行时，D-一般过去时。","sc":"现在进行时"},{"i":44,"s":"— That sounds so beautiful! — Someone ____ a folk song from Jiangxi next door.","o":["A. was singing","B. sang","C. is singing","D. sings"],"a":"C","e":"「sounds」为现在时+隔壁歌声显然正在发生——听觉线索与说话时刻同步。A-过去进行时，B-一般过去时，D-一般现在时。","t":"以江西民歌为听觉场景，融入赣鄱音乐文化元素。","sc":"现在进行时"},{"i":45,"s":"— The river ____ very fast after the rain. — We should stay away from it.","o":["A. runs","B. ran","C. was running","D. is running"],"a":"D","e":"大雨之后河水正在快速流动——当前危险状态，建议远离。动作隐含「此刻」意义但无显性时间词。A-一般现在时，B-一般过去时，C-过去进行时。","sc":"现在进行时"},{"i":46,"s":"— Don't disturb your brother. — Oh, he ____ for his final exam upstairs.","o":["A. is studying","B. was studying","C. studies","D. studied"],"a":"A","e":"「Don't disturb」暗示他此刻正在做需要专注的事——备考。勿打扰的逻辑前提是动作正在进行。B-过去进行时，C-一般现在时，D-一般过去时。","sc":"现在进行时"},{"i":47,"s":"— The water ____. Turn off the fire. — OK, I will make the tea now.","o":["A. boils","B. is boiling","C. was boiling","D. boiled"],"a":"B","e":"「Turn off the fire」说明水正在沸腾——关火动作紧随进行中的状态。A-一般现在时，C-过去进行时，D-一般过去时。","sc":"现在进行时"},{"i":48,"s":"— The fruit at the market tastes so fresh. — Farmers ____ Gannan oranges on the hills these days.","o":["A. were picking","B. picked","C. are picking","D. pick"],"a":"C","e":"「these days」指近期正在进行的收获季节——当前阶段进行时用法，不限于说话瞬间但属于现阶段。A-过去进行时，B-一般过去时，D-一般现在时。","t":"以赣南脐橙采摘季为场景，融入江西农业文化。","sc":"现在进行时"},{"i":49,"s":"— Why is the dog barking? — Someone ____ at the front door.","o":["A. knocks","B. is knocking","C. knocked","D. was knocking"],"a":"B","e":"狗正在叫说明有人正在敲门——因果关系锁定进行时，敲门与犬吠同时发生。A-一般现在时，C-一般过去时，D-过去进行时。","sc":"现在进行时"},{"i":50,"s":"— The light is still on in the library. — Some students ____ for the exam there.","o":["A. were preparing","B. prepared","C. are preparing","D. prepare"],"a":"C","e":"灯还亮着说明学生们此刻正在图书馆备考——从可见状态推理进行中的不可见动作。A-过去进行时，B-一般过去时，D-一般现在时。","sc":"现在进行时"},{"i":51,"s":"Fine porcelain cups and plates ______ in Jingdezhen every day.","o":["A. are made","B. were made","C. make","D. made"],"a":"A","e":"主语porcelain cups是物，「被制作」的承受者；every day
